<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Battle V8: Fun Learning!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* Base Setup */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .svg-defs { display: none; }

        /* Duolingo-style Landscape */
        .bg-landscape {
            background: linear-gradient(to bottom, #4fc3f7 0%, #b3e5fc 50%, #e0f7fa 100%);
            position: relative;
            overflow: hidden;
        }

        .grass-ground {
            position: absolute; bottom: 0; width: 100%; height: 45vh;
            background: linear-gradient(to bottom, #58cc02 0%, #46a302 100%);
            z-index: 1; 
        }
        
        .grass-blades {
            position: absolute; bottom: 44.5vh; width: 100%; height: 25px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="25" viewBox="0 0 60 25"><path d="M0 25 Q10 10 15 25 Q25 5 30 25 Q40 15 45 25 Q55 0 60 25 Z" fill="%2358cc02"/></svg>');
            background-repeat: repeat-x; z-index: 2;
        }

        /* Fun Flowers Background */
        .grass-flowers {
            position: absolute; bottom: 0; width: 100%; height: 45vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150"><g transform="translate(30, 40)"><circle cx="0" cy="0" r="6" fill="%23ffc800"/><path d="M0 -6 A6 6 0 0 1 6 0 A6 6 0 0 1 -6 0 A6 6 0 0 1 0 -6" stroke="%23ffffff" stroke-width="6" stroke-dasharray="1 6" stroke-linecap="round"/></g><g transform="translate(110, 90)"><circle cx="0" cy="0" r="7" fill="%23ffc800"/><path d="M0 -7 A7 7 0 0 1 7 0 A7 7 0 0 1 0 7 A7 7 0 0 1 -7 0 A7 7 0 0 1 0 -7" stroke="%23ff4b4b" stroke-width="7" stroke-dasharray="1 7" stroke-linecap="round"/></g><g transform="translate(70, 130) scale(0.6)"><circle cx="0" cy="0" r="6" fill="%23ffc800"/><path d="M0 -6 A6 6 0 0 1 6 0 A6 6 0 0 1 0 6 A6 6 0 0 1 -6 0 A6 6 0 0 1 0 -6" stroke="%231cb0f6" stroke-width="6" stroke-dasharray="1 6" stroke-linecap="round"/></g></svg>');
            background-repeat: repeat; z-index: 2; opacity: 0.9; pointer-events: none;
        }

        .hills-front {
            position: absolute; bottom: 44vh; width: 100%; height: 20vh;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%2389e219" fill-opacity="1" d="M0,224L60,213.3C120,203,240,181,360,192C480,203,600,245,720,250.7C840,256,960,224,1080,208C1200,192,1320,192,1380,192L1440,192L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path></svg>');
            background-size: cover; background-repeat: no-repeat; background-position: bottom; z-index: 1;
        }
        .hills-back {
            position: absolute; bottom: 48vh; width: 100%; height: 30vh;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%23a4f046" fill-opacity="1" d="M0,160L48,170.7C96,181,192,203,288,197.3C384,192,480,160,576,149.3C672,139,768,149,864,170.7C960,192,1056,224,1152,213.3C1248,203,1344,149,1392,122.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover; background-repeat: no-repeat; background-position: bottom; z-index: 0;
        }

        /* Sun & Clouds */
        .sun {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 100px; height: 100px;
            background: radial-gradient(circle, #ffeb3b 0%, #ffc107 100%);
            border-radius: 50%; border: 4px solid #fff59d;
            box-shadow: 0 0 40px #ffc107;
            animation: pulseSun 3s infinite alternate; z-index: 0;
        }
        @keyframes pulseSun { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.05); } }

        .cloud {
            position: absolute; background: white; border-radius: 50px;
            filter: drop-shadow(0 8px 0px rgba(0,0,0,0.05)); animation: floatCloud linear infinite; z-index: 1;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: inherit; border-radius: 50%; }
        .cloud1 { width: 140px; height: 45px; top: 15%; left: -200px; animation-duration: 40s; }
        .cloud1::before { width: 60px; height: 60px; top: -25px; left: 20px; }
        .cloud1::after { width: 80px; height: 80px; top: -40px; right: 20px; }
        .cloud2 { width: 100px; height: 35px; top: 25%; left: -200px; animation-duration: 30s; animation-delay: 10s; opacity: 0.9;}
        .cloud2::before { width: 40px; height: 40px; top: -15px; left: 15px; }
        .cloud2::after { width: 50px; height: 50px; top: -25px; right: 15px; }
        @keyframes floatCloud { 0% { transform: translateX(-200px); } 100% { transform: translateX(110vw); } }

        /* Chunky Duolingo-style Buttons */
        .btn-bubbly {
            transition: transform 0.1s, filter 0.1s, box-shadow 0.1s;
            position: relative; top: 0;
            border-radius: 1rem;
            text-transform: uppercase;
        }
        .btn-bubbly:active, .btn-bubbly.simulated-active { 
            top: 6px; 
            box-shadow: 0 0 0 rgba(0,0,0,0.2) !important; 
            transform: translateY(2px);
        }
        .btn-disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(80%); transform: none !important; box-shadow: none !important; top: 6px;}

        /* Character Animations */
        .idle-anim { animation: bounceIdle 2s infinite ease-in-out; }
        @keyframes bounceIdle { 0%, 100% { transform: translateY(0) scaleY(1); } 50% { transform: translateY(-10px) scaleY(0.98); } }
        .hit-anim { animation: squash 0.4s; }
        @keyframes squash {
            0% { transform: scale(1, 1); filter: brightness(1); }
            25% { transform: scale(1.1, 0.8) translateY(10px); filter: brightness(1.5) sepia(1) hue-rotate(-50deg); }
            50% { transform: scale(0.9, 1.1) translateY(-10px); }
            75% { transform: scale(1.05, 0.95); }
            100% { transform: scale(1, 1); filter: brightness(1); }
        }
        .character-svg { filter: drop-shadow(0 15px 10px rgba(0,0,0,0.3)); transform-origin: bottom center; }

        /* Dynamic Projectiles based on CSS Variables */
        .projectile { 
            position: absolute; z-index: 50; pointer-events: none; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4)); 
            top: 0; left: 0;
            transform-origin: center;
        }
        .projectile span { display: flex; justify-content: center; align-items: center; transition: transform 0.2s; }
        
        .throw-r { animation: flyDynamicR 1.2s cubic-bezier(.36,-0.32,.58,1.3) forwards; }
        .throw-l { animation: flyDynamicL 1.2s cubic-bezier(.36,-0.32,.58,1.3) forwards; }

        @keyframes flyDynamicR {
            0% { transform: translate(var(--start-x), var(--start-y)) rotate(0deg) scale(0.8); }
            50% { transform: translate(calc((var(--start-x) + var(--end-x)) / 2), calc(var(--start-y) - 150px)) rotate(180deg) scale(1.5); }
            100% { transform: translate(var(--end-x), var(--end-y)) rotate(360deg) scale(1); }
        }
        @keyframes flyDynamicL {
            0% { transform: translate(var(--start-x), var(--start-y)) rotate(0deg) scale(0.8); }
            50% { transform: translate(calc((var(--start-x) + var(--end-x)) / 2), calc(var(--start-y) - 150px)) rotate(-180deg) scale(1.5); }
            100% { transform: translate(var(--end-x), var(--end-y)) rotate(-360deg) scale(1); }
        }

        /* Splash */
        .splash-effect { 
            position: absolute; z-index: 45; pointer-events: none; 
            width: 140px; height: 140px; top: 0; left: 0; 
            animation: splashAnim 0.5s ease-out forwards; 
        }
        @keyframes splashAnim {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; filter: brightness(2); }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) translateY(20px); opacity: 0; }
        }

        /* Health Bar */
        .health-bar-container { border: 4px solid white; border-radius: 999px; background-color: #e5e5e5; overflow: hidden; height: 28px; box-shadow: inset 0 4px 6px rgba(0,0,0,0.1); }
        .health-bar { height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; border-radius: 999px; position: relative;}
        .health-bar::after { content: ''; position: absolute; top: 2px; left: 4px; right: 4px; height: 6px; background: rgba(255,255,255,0.4); border-radius: 999px;}

        /* Typography Utilities */
        .text-stroke { -webkit-text-stroke: 2px white; }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; }

        /* Start Screen Pattern */
        .bg-pattern {
            background-color: #ffc800;
            background-image: radial-gradient(#ffa000 3px, transparent 3px);
            background-size: 40px 40px;
        }

        /* Power Bar UI */
        .power-bar-wrapper { width: 100%; height: 40px; background: #f3f4f6; border-radius: 999px; border: 4px solid #d1d5db; overflow: hidden; position: relative; }
        .power-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #1cb0f6 0%, #58cc02 50%, #ff4b4b 100%); }
        .power-indicator { position: absolute; top: -4px; bottom: -4px; width: 10px; background: white; border: 3px solid #374151; border-radius: 5px; left: 0%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(0,0,0,0.3);}
        
        /* Damage Popup */
        .dmg-popup { position: absolute; font-size: 4rem; font-weight: 900; color: #ff4b4b; -webkit-text-stroke: 3px white; animation: floatUp 1s forwards; pointer-events: none; z-index: 60; text-shadow: 0 5px 0px rgba(0,0,0,0.2); }
        .heal-popup { color: #58cc02; }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 20% { transform: translate(-50%, calc(-50% - 20px)) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, calc(-50% - 100px)) scale(1); } }

        /* End Screen Celebration */
        .bg-celebrate { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); }
    </style>
</head>

    <!-- START SCREEN -->
    <div id="start-screen" class="absolute inset-0 bg-pattern flex flex-col items-center justify-center z-50 p-4">
        
        <h1 class="text-5xl md:text-7xl font-black mb-4 text-stroke text-[#ff4b4b] drop-shadow-[0_6px_0_#991b1b] tracking-wider text-center leading-tight">
            MATH FUN<br>BATTLE
        </h1>
        
        <div class="bg-white border-4 border-[#1cb0f6] rounded-full px-6 py-2 mb-8 inline-flex items-center gap-2 font-bold text-[#1cb0f6] shadow-lg text-sm md:text-lg">
            ✨ Learn & Play ✨
        </div>
        
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-[0_15px_0_rgba(0,0,0,0.1)] w-full max-w-lg border-4 border-gray-100 relative text-center">
            
            <h2 class="text-xl font-black text-gray-400 mb-3 uppercase tracking-wide">1. Select Mode</h2>
            <div class="flex gap-3 justify-center mb-6">
                <button onclick="setMode('pvc')" id="btn-pvc" class="flex-1 py-4 px-2 rounded-2xl font-black text-lg md:text-xl text-white bg-[#1cb0f6] border-b-[6px] border-[#0284c7] btn-bubbly ring-4 ring-[#bae6fd]">

    <script>
        // === CONFIG & STATE ===
        let gameMode = 'pvc'; 
        let mathRange = 10;
        const BASE_DAMAGE = 10; 
        const apiKey = ""; 
        
        let p1 = { id: 'girl', hp: 100, score: 0, isStunned: false, dmgMult: 1, sizeMult: 1, ans: 0, power: 0, powerDir: 1, powerAnim: null, usedItems: {dmg:false, size:false, heal:false} };
        let p2 = { id: 'boy', hp: 100, score: 0, isStunned: false, dmgMult: 1, sizeMult: 1, ans: 0, power: 0, powerDir: 1, powerAnim: null, usedItems: {dmg:false, size:false, heal:false} };
        
        let isGameOver = false;

        // === AUDIO SYSTEM (Playful Synths) ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3); 
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'throw') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.4); 
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'powerup') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1500, audioCtx.currentTime + 0.3); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'win') {
                osc.type = 'triangle'; 
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => { osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i*0.15); });
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5); 
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        }

        // === GEMINI API CHEER ===
        async function getAICheer(winnerName) {
            const aiMessageEl = document.getElementById('ai-message');
            aiMessageEl.innerText = "✨ Magic AI is thinking... ✨";
            
            const prompt = `Write a short, super fun, enthusiastic congratulatory message (just 1 sentence) for a 4-5 year old kid who just won a math game as ${winnerName}. Use simple English and fun emojis. No quotes.`;
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i <= 5; i++) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.9, maxOutputTokens: 60 }
                        })
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (text) {
                            aiMessageEl.innerText = text.replace(/\"/g, '');
                            return; 
                        }
                    }
                } catch(e) {}
                
                if (i < 5) {
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                } else {
                    aiMessageEl.innerText = `Yay ${winnerName}! You are a super smart math star! 🌟🎉`;
                }
            }
        }

        // === MAIN MENU ===
        function setMode(mode) {
            initAudio(); playSound('click'); gameMode = mode;
            
            const btnPvc = document.getElementById('btn-pvc');
            const btnPvp = document.getElementById('btn-pvp');
            
            if(mode === 'pvc') {
                btnPvc.className = "flex-1 py-4 px-2 rounded-2xl font-black text-lg md:text-xl text-white bg-[#1cb0f6] border-b-[6px] border-[#0284c7] btn-bubbly ring-4 ring-[#bae6fd]";
                btnPvp.className = "flex-1 py-4 px-2 rounded-2xl font-black text-lg md:text-xl text-gray-500 bg-gray-200 border-b-[6px] border-gray-300 btn-bubbly";
            } else {
                btnPvp.className = "flex-1 py-4 px-2 rounded-2xl font-black text-lg md:text-xl text-white bg-[#1cb0f6] border-b-[6px] border-[#0284c7] btn-bubbly ring-4 ring-[#bae6fd]";
                btnPvc.className = "flex-1 py-4 px-2 rounded-2xl font-black text-lg md:text-xl text-gray-500 bg-gray-200 border-b-[6px] border-gray-300 btn-bubbly";
            }
        }

        function setRange(range) {
            initAudio(); playSound('click'); mathRange = range;
            document.querySelectorAll('.range-btn').forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#fecaca]');
                if (parseInt(btn.innerText.split(' ')[2]) === range) {
                    btn.classList.add('ring-4', 'ring-[#fecaca]'); 
                }
            });
        }

        function startGame() {
            initAudio(); playSound('correct');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('flex');
            
            p1 = { id: 'girl', hp: 100, score: 0, isStunned: false, dmgMult: 1, sizeMult: 1, ans: 0, power: 0, powerDir: 1, powerAnim: null, usedItems: {dmg:false, size:false, heal:false} };
            p2 = { id: 'boy', hp: 100, score: 0, isStunned: false, dmgMult: 1, sizeMult: 1, ans: 0, power: 0, powerDir: 1, powerAnim: null, usedItems: {dmg:false, size:false, heal:false} };
            isGameOver = false;

            document.getElementById('score-girl').innerText = "0";
            document.getElementById('score-boy').innerText = "0";

            resetPowerupUI('girl'); resetPowerupUI('boy');
            updateHealthBars();
            
            document.getElementById('math-ui-girl').classList.remove('hidden');
            document.getElementById('power-ui-girl').classList.add('hidden');
            document.getElementById('math-ui-boy').classList.remove('hidden');
            document.getElementById('power-ui-boy').classList.add('hidden');
            
            document.getElementById('overlay-girl').classList.add('hidden');
            document.getElementById('overlay-boy').classList.add('hidden');

            generateQuestion(p1); generateQuestion(p2);

            if(gameMode === 'pvc') {
                document.getElementById('btn-dmg-boy').classList.add('btn-disabled');
                document.getElementById('btn-size-boy').classList.add('btn-disabled');
                document.getElementById('btn-heal-boy').classList.add('btn-disabled');
                document.getElementById('btn-throw-boy').classList.add('btn-disabled'); 
                botLoop();
            }
        }

        // === GAME LOGIC ===
        function updateHealthBars() {
            document.getElementById('health-girl').style.width = `${p1.hp}%`;
            document.getElementById('health-boy').style.width = `${p2.hp}%`;
            document.getElementById('hp-text-girl').innerText = `${p1.hp} HP`;
            document.getElementById('hp-text-boy').innerText = `${p2.hp} HP`;
            
            document.getElementById('health-girl').style.backgroundColor = p1.hp > 30 ? '#ff4b4b' : '#c80000';
            document.getElementById('health-boy').style.backgroundColor = p2.hp > 30 ? '#1cb0f6' : '#ff4b4b'; 
        }

        function generateQuestion(p) {
            if(isGameOver) return;
            const isAddition = Math.random() > 0.4; 
            let num1, num2;

            if (isAddition) {
                num1 = Math.floor(Math.random() * (mathRange - 1)) + 1; 
                let maxNum2 = mathRange - num1;
                if (maxNum2 < 1) maxNum2 = 1; 
                num2 = Math.floor(Math.random() * maxNum2) + 1;
                p.ans = num1 + num2;
                document.getElementById(`math-question-${p.id}`).innerText = `${num1} + ${num2} = ?`;
            } else {
                num1 = Math.floor(Math.random() * (mathRange - 1)) + 2; 
                num2 = Math.floor(Math.random() * (num1 - 1)) + 1; 
                p.ans = num1 - num2;
                document.getElementById(`math-question-${p.id}`).innerText = `${num1} - ${num2} = ?`;
            }

            let answers = new Set([p.ans]);
            while(answers.size < 4) {
                let offset = Math.floor(Math.random() * 4) + 1;
                let wrongAns = p.ans + offset * (Math.random() > 0.5 ? 1 : -1);
                if (wrongAns >= 0 && wrongAns <= mathRange + 10) answers.add(wrongAns); 
            }

            let answersArray = Array.from(answers).sort(() => Math.random() - 0.5);
            const container = document.getElementById(`answers-container-${p.id}`);
            container.innerHTML = '';
            
            const btnColor = p.id === 'girl' ? 'bg-[#ff4b4b] border-[#c80000]' : 'bg-[#1cb0f6] border-[#0284c7]';

            answersArray.forEach((ans) => {
                const btn = document.createElement('button');
                btn.dataset.answer = ans;
                btn.className = `py-3 md:py-5 text-3xl sm:text-4xl md:text-5xl font-black text-white rounded-2xl border-b-[6px] btn-bubbly ${btnColor} shadow-sm`;
                btn.innerText = ans;
                btn.onclick = () => checkAnswer(ans, btn, p);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedAnswer, btnElement, p) {
            if (p.isStunned || isGameOver) return;

            const container = document.getElementById(`answers-container-${p.id}`);
            container.querySelectorAll('button').forEach(b => b.disabled = true);

            if (selectedAnswer === p.ans) {
                playSound('correct');
                p.score++;
                document.getElementById(`score-${p.id}`).innerText = p.score;

                btnElement.classList.add('ring-4', 'ring-white', 'simulated-active');
                
                setTimeout(() => {
                    document.getElementById(`math-ui-${p.id}`).classList.add('hidden');
                    document.getElementById(`power-ui-${p.id}`).classList.remove('hidden');
                    startPowerBar(p);
                }, 400);

            } else {
                playSound('wrong');
                btnElement.classList.remove('border-b-[6px]');
                btnElement.classList.add('bg-gray-400', 'border-gray-500', 'translate-y-[6px]');
                stunPlayer(p, 3, "OOPS! WAIT", "🧊");
            }
        }

        function stunPlayer(p, seconds, msgText, iconEmoji) {
            p.isStunned = true;
            const overlay = document.getElementById(`overlay-${p.id}`);
            const textEl = document.getElementById(`text-freeze-${p.id}`);
            document.getElementById(`icon-freeze-${p.id}`).innerText = iconEmoji;
            
            overlay.classList.remove('hidden');
            
            let time = seconds;
            textEl.innerText = `${msgText} ${time}s`;
            
            const interval = setInterval(() => {
                time--;
                if(time > 0) {
                    textEl.innerText = `${msgText} ${time}s`;
                } else {
                    clearInterval(interval);
                    p.isStunned = false;
                    overlay.classList.add('hidden');
                    if(document.getElementById(`math-ui-${p.id}`).classList.contains('hidden') === false) {
                        generateQuestion(p);
                    }
                }
            }, 1000);
        }

        // === POWER BAR ===
        function startPowerBar(p) {
            p.power = 0; p.powerDir = 1;
            const indicator = document.getElementById(`power-indicator-${p.id}`);
            
            function animate() {
                if(isGameOver || p.isStunned || document.getElementById(`power-ui-${p.id}`).classList.contains('hidden')) {
                    cancelAnimationFrame(p.powerAnim); return;
                }
                p.power += (2.5 * p.powerDir); 
                if (p.power >= 100) { p.power = 100; p.powerDir = -1; }
                if (p.power <= 0) { p.power = 0; p.powerDir = 1; }
                
                indicator.style.left = `${p.power}%`;
                p.powerAnim = requestAnimationFrame(animate);
            }
            p.powerAnim = requestAnimationFrame(animate);
        }

        // === DYNAMIC PROJECTILE THROWING USING WEB ANIMATIONS API ===
        function throwWeapon(playerId) {
            const p = playerId === 'girl' ? p1 : p2;
            const target = playerId === 'girl' ? p2 : p1;
            
            if(p.isStunned || isGameOver) return;
            cancelAnimationFrame(p.powerAnim); 

            playSound('throw');
            
            document.getElementById(`power-ui-${p.id}`).classList.add('hidden');
            document.getElementById(`math-ui-${p.id}`).classList.remove('hidden');

            let powerRatio = Math.max(0.2, p.power / 100);
            let finalDmg = Math.ceil(BASE_DAMAGE * powerRatio) * p.dmgMult;
            
            // Limit CPU damage
            if (gameMode === 'pvc' && p.id === 'boy') {
                finalDmg = Math.min(10, finalDmg);
            }
            
            const battleArea = document.getElementById('battle-area');
            
            const proj = document.createElement('div');
            proj.className = 'projectile';
            
            const span = document.createElement('span');
            span.innerHTML = p.id === 'girl' ? '<svg class="w-16 h-16 md:w-24 md:h-24"><use href="#icon-tomato"></use></svg>' : '<svg class="w-16 h-16 md:w-24 md:h-24"><use href="#icon-egg"></use></svg>';
            
            proj.appendChild(span);
            battleArea.appendChild(proj);

            // Get exact screen coordinates for perfect aiming
            const startRect = document.getElementById(`char-${p.id}`).getBoundingClientRect();
            const endRect = document.getElementById(`char-${target.id}`).getBoundingClientRect();
            
            const startX = startRect.left + startRect.width / 2;
            const startY = startRect.top + startRect.height / 2;
            const endX = endRect.left + endRect.width / 2;
            const endY = endRect.top + endRect.height / 2;

            // Base scale based on powerup
            const baseScale = p.sizeMult > 1 ? 1.5 : 0.8;
            const midScale = p.sizeMult > 1 ? 2.5 : 1.5;
            const endScale = p.sizeMult > 1 ? 2 : 1;

            const rotateDir = p.id === 'girl' ? 360 : -360;

            const flyAnimation = [
                { transform: `translate(calc(${startX}px - 50%), calc(${startY}px - 50%)) rotate(0deg) scale(${baseScale})` },
                { transform: `translate(calc(${(startX + endX) / 2}px - 50%), calc(${startY - 200}px - 50%)) rotate(${rotateDir / 2}deg) scale(${midScale})` },
                { transform: `translate(calc(${endX}px - 50%), calc(${endY}px - 50%)) rotate(${rotateDir}deg) scale(${endScale})` }
            ];

            const animTiming = {
                duration: 1200,
                easing: 'cubic-bezier(.36,-0.32,.58,1.3)',
                fill: 'forwards'
            };

            const animation = proj.animate(flyAnimation, animTiming);

            // Hit logic when animation finishes
            animation.onfinish = () => {
                if(isGameOver) return;
                proj.remove(); 
                playSound('hit');
                
                createSplashEffect(target.id, p.id, p.sizeMult);

                const targetChar = document.getElementById(`char-${target.id}`);
                targetChar.classList.add('hit-anim');
                setTimeout(() => targetChar.classList.remove('hit-anim'), 400);

                target.hp -= finalDmg;
                if(target.hp < 0) target.hp = 0;
                updateHealthBars();
                showPopup(target.id, `-${finalDmg}`, 'dmg-popup');

                p.dmgMult = 1; p.sizeMult = 1;

                if (target.hp === 0) endGame();
                else generateQuestion(p); 
            };
        }

        // === SPLASH EFFECT ===
        function createSplashEffect(targetId, attackerId, sizeMult) {
            const battleArea = document.getElementById('battle-area');
            const splash = document.createElement('div');
            splash.className = 'splash-effect';
            
            const targetRect = document.getElementById(`char-${targetId}`).getBoundingClientRect();
            splash.style.left = `${targetRect.left + targetRect.width / 2}px`;
            splash.style.top = `${targetRect.top + targetRect.height / 2}px`;
            
            if(sizeMult > 1) splash.style.transform = `translate(-50%, -50%) scale(1.5)`;

            if (attackerId === 'girl') {
                splash.innerHTML = `
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                        <path d="M50 10 Q70 0 80 20 Q90 30 85 50 Q100 70 80 80 Q60 100 50 85 Q30 95 20 80 Q0 60 15 45 Q5 20 25 20 Q40 5 50 10" fill="#ff4b4b"/>
                        <circle cx="20" cy="20" r="5" fill="#ff4b4b"/><circle cx="80" cy="80" r="4" fill="#ff4b4b"/>
                    </svg>`;
            } else {
                splash.innerHTML = `
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                        <path d="M50 15 Q75 5 85 30 Q100 50 80 75 Q60 95 40 85 Q15 90 15 50 Q0 25 35 20 Q40 5 50 15" fill="#ffffff" opacity="0.9"/>
                        <circle cx="50" cy="50" r="15" fill="#ffc800"/>
                        <circle cx="20" cy="80" r="6" fill="#ffffff"/><circle cx="90" cy="20" r="4" fill="#ffc800"/>
                    </svg>`;
            }

            battleArea.appendChild(splash);
            setTimeout(() => splash.remove(), 500);
        }

        function showPopup(targetId, text, className) {
            const el = document.createElement('div');
            el.className = className;
            el.innerText = text;
            
            const targetRect = document.getElementById(`char-${targetId}`).getBoundingClientRect();
            el.style.left = `${targetRect.left + targetRect.width / 2}px`;
            el.style.top = `${targetRect.top - 50}px`; // Pop up above character
            
            document.getElementById('battle-area').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // === ITEMS ===
        function usePowerup(playerId, type) {
            const p = playerId === 'girl' ? p1 : p2;
            if (p.usedItems[type] || p.isStunned || isGameOver) return; 
            
            playSound('powerup');
            p.usedItems[type] = true;
            document.getElementById(`btn-${type}-${p.id}`).classList.add('btn-disabled');

            if (type === 'dmg') {
                p.dmgMult = 2; showPopup(p.id, "SUPER!", 'heal-popup text-[#ffc800] -webkit-text-stroke-2');
            } else if (type === 'size') {
                p.sizeMult = 2; showPopup(p.id, "BIG!", 'heal-popup text-[#58cc02] -webkit-text-stroke-2');
            } else if (type === 'heal') {
                p.hp += 40; if(p.hp > 100) p.hp = 100;
                updateHealthBars(); showPopup(p.id, "+40 HP", 'heal-popup');
                
                document.getElementById(`power-ui-${p.id}`).classList.add('hidden');
                document.getElementById(`math-ui-${p.id}`).classList.remove('hidden');
                cancelAnimationFrame(p.powerAnim);

                stunPlayer(p, 5, "HEALING...", "💖");
            }
        }

        function resetPowerupUI(playerId) {
            ['dmg', 'size', 'heal'].forEach(type => { document.getElementById(`btn-${type}-${playerId}`).classList.remove('btn-disabled'); });
        }

        // === BOT LOGIC ===
        function botLoop() {
            if(gameMode !== 'pvc' || isGameOver) return;
            if(p2.isStunned) { setTimeout(botLoop, 1000); return; }

            const thinkTime = Math.random() * 2000 + 2000; 
            
            setTimeout(() => {
                if(p2.isStunned || isGameOver || document.getElementById(`math-ui-boy`).classList.contains('hidden') === false) {
                    const container = document.getElementById('answers-container-boy');
                    const correctBtn = container.querySelector(`button[data-answer="${p2.ans}"]`);
                    
                    if(correctBtn) {
                        correctBtn.classList.add('ring-4', 'ring-white', 'simulated-active'); playSound('correct');
                        p2.score++; document.getElementById('score-boy').innerText = p2.score;

                        setTimeout(() => {
                            if(isGameOver) return;
                            document.getElementById('math-ui-boy').classList.add('hidden');
                            document.getElementById('power-ui-boy').classList.remove('hidden');
                            startPowerBar(p2);
                            
                            setTimeout(() => {
                                p2.power = Math.floor(Math.random() * 50) + 50; throwWeapon('boy'); botLoop(); 
                            }, Math.random() * 800 + 400);
                        }, 400);
                    } else { botLoop(); }
                } else { botLoop(); }
            }, thinkTime);
        }

        // === END GAME & CONFETTI ===
        function endGame() {
            if(isGameOver) return;
            isGameOver = true; playSound('win');
            
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            
            const endScreen = document.getElementById('end-screen');
            endScreen.classList.remove('hidden'); endScreen.classList.add('flex');

            const modal = document.getElementById('end-modal');
            setTimeout(() => { modal.classList.remove('scale-0'); modal.classList.add('scale-100'); }, 100);

            const winnerText = document.getElementById('winner-text');
            const scoreText = document.getElementById('score-text');
            const mathScoreText = document.getElementById('math-score-text');
            
            let winName = "TEAM RED";

            if (p2.hp === 0 && p1.hp > 0) {
                winName = "TEAM RED";
                winnerText.innerText = "TEAM RED WINS!";
                winnerText.className = "text-4xl md:text-5xl font-black mb-6 text-[#ff4b4b] text-stroke drop-shadow-md";
                scoreText.innerText = `${p1.hp} HP`; 
                mathScoreText.innerText = `⭐ ${p1.score}`;
            } else if (p1.hp === 0 && p2.hp > 0) {
                winName = gameMode === 'pvc' ? "ROBOT" : "TEAM BLUE";
                winnerText.innerText = winName === "ROBOT" ? "ROBOT WINS!" : "TEAM BLUE WINS!";
                winnerText.className = "text-4xl md:text-5xl font-black mb-6 text-[#1cb0f6] text-stroke drop-shadow-md";
                scoreText.innerText = `${p2.hp} HP`; 
                mathScoreText.innerText = `⭐ ${p2.score}`;
            } else {
                winName = "EVERYONE";
                winnerText.innerText = "IT'S A DRAW!"; 
                winnerText.className = "text-4xl md:text-5xl font-black mb-6 text-[#ffc800] text-stroke drop-shadow-md";
                scoreText.innerText = `0 HP`;
                mathScoreText.innerText = `⭐ ${p1.score}`;
            }

            getAICheer(winName);
            startConfetti();
        }

        function resetGame() {
            playSound('click');
            document.getElementById('end-screen').classList.add('hidden'); document.getElementById('end-screen').classList.remove('flex');
            document.getElementById('end-modal').classList.remove('scale-100'); document.getElementById('end-modal').classList.add('scale-0');
            
            stopConfetti();
            document.getElementById('start-screen').classList.remove('hidden'); document.getElementById('start-screen').classList.add('flex');
            document.querySelectorAll('.projectile').forEach(e => e.remove()); document.querySelectorAll('.splash-effect').forEach(e => e.remove());
        }

        /* --- GLORIOUS 3D CONFETTI ANIMATION --- */
        const canvas = document.getElementById('confetti'); 
        const ctx = canvas.getContext('2d');
        let confettis = []; 
        let isConfettiActive = false;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        const confettiColors = ['#ff4b4b', '#1cb0f6', '#58cc02', '#ffc800', '#ce82ff', '#ff9600', '#f472b6'];

        class ConfettiPiece {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.w = Math.random() * 10 + 10;
                this.h = Math.random() * 8 + 8;
                this.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                this.vy = Math.random() * 3 + 2;
                this.vx = Math.random() * 4 - 2;
                this.angle = Math.random() * 360;
                this.spin = (Math.random() * 6 - 3);
                this.type = Math.random() > 0.5 ? 'circle' : 'rect';
                this.tiltAngle = 0;
                this.tiltAngleInc = (Math.random() * 0.07) + 0.05;
            }
            update() {
                this.y += this.vy;
                this.x += this.vx + Math.sin(this.tiltAngle) * 2; 
                this.angle += this.spin;
                this.tiltAngle += this.tiltAngleInc;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.scale(1, Math.sin(this.tiltAngle)); // 3D flip effect
                ctx.fillStyle = this.color;
                
                if (this.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
                }
                ctx.restore();
            }
        }

        function loopConfetti() {
            if (!isConfettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettis.forEach(c => { c.update(); c.draw(); });
            requestAnimationFrame(loopConfetti);
        }

        function startConfetti() { 
            isConfettiActive = true; 
            confettis = Array.from({length: 250}, () => new ConfettiPiece()); 
            loopConfetti(); 
        }
        function stopConfetti() { 
            isConfettiActive = false; 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
        }
    </script>
</body>
