<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <!-- Assuming external brand.css is available, if not, inline styles act as fallback -->
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place Value Party!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <style>
        :root {
            --bg-grad-1: #FF9A9E;
            --bg-grad-2: #FECFEF;
            --bg-grad-3: #A1C4FD;
            --bg-grad-4: #C2E9FB;
            
            --font-main: 'Poppins', sans-serif;
            --c-red: #FF6B6B;
            --c-blue: #4ECDC4;
            --c-green: #2ecc71;
            --c-yellow: #f1c40f;
            --c-orange: #ff9f43;
            --c-purple: #9b59b6;
            --c-white: #FFFFFF;
            
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.15);
            --shadow-3d: 0 6px 0 rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-4));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevents scroll while dragging */
        }

        /* --- Header --- */
        header {
            width: 100%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: var(--shadow-3d), 0 15px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 4px solid white;
        }

        .title-group h1 {
            color: var(--c-purple);
            font-size: 1.8rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .speaker-btn {
            background: var(--c-yellow);
            border: 4px solid #fff;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #d4ac0d;
        }

        .speaker-btn:active { transform: scale(0.9) translateY(4px); box-shadow: 0 2px 0 #d4ac0d; }

        .score-board {
            background: var(--c-blue);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            box-shadow: 0 6px 0 #2b9d8f, inset 0 3px 0 rgba(255,255,255,0.4);
            text-align: center;
            min-width: 140px;
            border: 3px solid white;
        }

        /* --- Main Stage --- */
        #main-stage {
            width: 100%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
            min-height: 0;
            border: 5px solid white;
        }

        .instruction-text {
            font-size: 1.8rem;
            color: var(--c-orange);
            text-align: center;
            margin-bottom: 20px;
            font-weight: 900;
            background: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- Panels --- */
        .game-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: rgba(255, 255, 255, 0.7);
            border: 4px solid #e2e8f0;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .source-panel { flex: 1; border-color: var(--c-orange); background: #fffaf0; }
        .target-panel { flex: 1.2; border-color: var(--c-green); background: #f0fff4; }

        .panel-title {
            text-align: center;
            font-weight: 900;
            margin-bottom: 15px;
            color: #475569;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #item-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 15px;
            overflow-y: auto;
            flex: 1;
            padding: 10px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 100%;
        }

        .drop-column {
            background: rgba(255, 255, 255, 0.9);
            border: 5px dashed #cbd5e1;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .drop-column.highlight { 
            border-color: var(--c-orange); 
            background: #fffbeb; 
            transform: scale(1.03); 
            box-shadow: 0 10px 20px rgba(255, 165, 0, 0.2);
        }

        .column-header { font-weight: 900; font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; }
        .tens-header { color: var(--c-orange); text-shadow: 1px 1px 0px rgba(0,0,0,0.1); }
        .ones-header { color: var(--c-green); text-shadow: 1px 1px 0px rgba(0,0,0,0.1); }

        .drop-area { 
            flex: 1; 
            width: 100%; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-content: flex-start; 
            gap: 10px; 
        }

        /* --- Items --- */
        .draggable-item { 
            touch-action: none; 
            cursor: grab; 
            transition: transform 0.1s; 
            /* Added drop-shadow directly to make icons pop more */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        .dragging { 
            opacity: 0.9; 
            transform: scale(1.2) rotate(5deg); 
            z-index: 1000 !important; 
            cursor: grabbing; 
            pointer-events: none; 
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3));
        }

        .tens-bundle {
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border: 4px solid var(--c-yellow);
            box-shadow: 0 6px 0 #d4ac0d;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            padding: 8px;
        }
        
        /* Fixed size and beautiful shadow for tens icons */
        .tens-bundle span { 
            font-size: 1.6rem; 
            line-height: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 32px;
            height: 32px;
            filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.2));
        }

        /* Fixed size and beautiful shadow for ones icons */
        .ones-item {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border: 4px solid var(--c-green);
            box-shadow: 0 6px 0 #27ae60;
            border-radius: 15px;
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
        }
        
        .ones-item span {
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.25));
        }

        /* --- Footer Options --- */
        .options-bar {
            width: 100%;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 4px dashed #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ans-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

        .ans-btn {
            background: white;
            border: 4px solid #cbd5e1;
            border-radius: 25px;
            padding: 12px 35px;
            font-size: 2rem;
            font-weight: 900;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 8px 0 #cbd5e1;
            transition: all 0.1s;
            font-family: var(--font-main);
        }
        .ans-btn:not(.locked):hover { background: #f8fafc; transform: translateY(-2px); box-shadow: 0 10px 0 #cbd5e1; }
        .ans-btn:not(.locked):active { transform: translateY(6px); box-shadow: 0 2px 0 #cbd5e1; }
        .ans-btn.locked { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: translateY(8px); border-color: #e2e8f0; }

        /* --- Overlays & Modals --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .hidden { display: none !important; }

        .start-btn {
            background: linear-gradient(180deg, var(--c-orange), #e67e22);
            color: white;
            border: 5px solid white;
            padding: 20px 60px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #d35400, 0 20px 30px rgba(0,0,0,0.2);
            transition: all 0.1s;
            text-transform: uppercase;
            font-family: var(--font-main);
        }
        .start-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #d35400; }

        /* Responsive Canvas */
        #game-canvas {
            background: linear-gradient(to bottom, #74b9ff, #81ecec);
            border-radius: 25px;
            border: 8px solid white;
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 700px; /* Limits max size on desktop */
            height: auto; /* Maintains aspect ratio */
            aspect-ratio: 600 / 250; 
        }

        /* --- Feedback Labels --- */
        .feedback-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 3rem;
            font-weight: 900;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            z-index: 500;
            display: none;
            text-transform: uppercase;
            border: 6px solid;
            animation: popOut 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes popOut { 
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 
        }
        
        @keyframes bounceIn { 
            0% { transform: scale(0.5); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }

        #fireworks-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 300; }

        /* --- Media Queries for Responsiveness --- */
        @media (max-width: 850px) {
            .game-layout { flex-direction: column; }
            .target-panel { flex: none; height: 350px; }
            .source-panel { flex: none; height: 200px; }
            .title-group h1 { font-size: 1.4rem; }
            .score-board { padding: 8px 15px; font-size: 1.2rem; min-width: 100px; }
            .speaker-btn { width: 45px; height: 45px; font-size: 1.4rem; }
            .instruction-text { font-size: 1.3rem; padding: 10px 20px; }
            .ones-item { width: 50px; height: 50px; font-size: 1.8rem; }
            .tens-bundle span { width: 25px; height: 25px; font-size: 1.2rem; }
            .ans-btn { font-size: 1.5rem; padding: 10px 25px; }
        }

        @media (max-width: 450px) {
            .target-panel { height: auto; min-height: 400px; }
            .chart-grid { grid-template-columns: 1fr; } /* Stack Tens and Ones vertically on tiny screens */
            .start-btn { font-size: 1.8rem; padding: 15px 30px; }
            .feedback-label { font-size: 1.8rem; padding: 15px 25px; width: 80%; text-align: center; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <header>
        <div class="title-group">
            <h1>Place Value Party! 🎈</h1>
        </div>
        <div class="controls">
            <button class="speaker-btn" onclick="speakInstruction()" title="Listen">🔊</button>
            <div class="score-board">Score: <span id="score-val">0</span></div>
        </div>
    </header>

    <main id="main-stage">
        <div id="instruction" class="instruction-text">Drag ALL blocks to the chart! 👇</div>
        
        <div class="game-layout">
            <div class="panel source-panel">
                <div class="panel-title">My Toys 🎁</div>
                <div id="item-container"></div>
            </div>

            <div class="panel target-panel">
                <div class="panel-title">Place Value Chart 🎯</div>
                <div class="chart-grid">
                    <div id="tens-col" class="drop-column">
                        <div class="column-header tens-header">Tens</div>
                        <div id="tens-drop" class="drop-area"></div>
                    </div>
                    <div id="ones-col" class="drop-column">
                        <div class="column-header ones-header">Ones</div>
                        <div id="ones-drop" class="drop-area"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="options-bar">
            <div class="panel-title" style="color: var(--c-purple)">How Many? (Drag First!)</div>
            <div id="ans-grid" class="ans-grid"></div>
        </div>
    </main>

    <!-- Overlays -->
    <div id="start-overlay" class="overlay">
        <h1 style="font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; color: var(--c-purple); margin-bottom: 10px; text-shadow: 4px 4px 0 white;">Place Value<br><span style="color: var(--c-orange)">Party!</span></h1>
        <div style="font-size: clamp(4rem, 10vw, 7rem); margin-bottom: 30px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));">🦘🐨🎈</div>
        <button class="start-btn" onclick="startGame()">PLAY GAME ▶</button>
    </div>

    <div id="game-overlay" class="overlay hidden">
        <h2 style="font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; color: var(--c-green); margin-bottom: 5px; text-shadow: 2px 2px 0 white;">GO KANGAROO GO!</h2>
        <p style="font-size: 1.2rem; font-weight: 800; color: #64748b; margin-bottom: 15px; background: white; padding: 5px 20px; border-radius: 20px;">Tap screen or press <strong>SPACE</strong> to Jump! 🌲🥚</p>
        <div style="font-size: 1.8rem; font-weight: 900; color: var(--c-blue); margin-bottom: 15px; text-shadow: 1px 1px 0 white;">Time Left: <span id="timer-val">15</span>s</div>
        <!-- Notice the canvas now scales with CSS via the id -->
        <canvas id="game-canvas" width="600" height="250"></canvas>
        <div id="game-score-display" style="font-size: 2.5rem; font-weight: 900; color: var(--c-orange); margin-top: 15px; text-shadow: 2px 2px 0 white;">Score: 0</div>
        <button id="game-start-btn" class="start-btn" style="margin-top: 20px;" onclick="startGameMini()">START JUMPING!</button>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <canvas id="fireworks-canvas"></canvas>
        <div style="font-size: clamp(5rem, 15vw, 8rem); position: relative; z-index: 10; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.2));">🏆✨</div>
        <h1 style="font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; color: var(--c-orange); position: relative; z-index: 10; text-shadow: 4px 4px 0 white;">YOU WON!</h1>
        <div style="font-size: 2.5rem; font-weight: 900; color: var(--c-blue); margin-bottom: 40px; position: relative; z-index: 10; background: white; padding: 10px 40px; border-radius: 40px; border: 4px solid var(--c-blue);">Final Score: <span id="final-score">0</span></div>
        <button class="start-btn" style="position: relative; z-index: 10;" onclick="location.reload()">Play Again ↺</button>
    </div>

    <div id="feedback" class="feedback-label"></div>

    <script>
        // Updated items to be highly appealing for toddlers
        const QUESTIONS = [
            { num: 12, item: '🍎', options: [12, 11, 21] },
            { num: 15, item: '🦄', options: [15, 14, 51] },
            { num: 13, item: '🚗', options: [13, 31, 14] },
            { num: 21, item: '🧸', options: [21, 12, 20] },
            { num: 24, item: '🎈', options: [24, 42, 25] },
            { num: 11, item: '🍦', options: [11, 10, 12] },
            { num: 22, item: '🐶', options: [22, 21, 23] },
            { num: 23, item: '🦋', options: [23, 32, 24] },
            { num: 25, item: '🦖', options: [25, 24, 26] },
            { num: 30, item: '⚽', options: [30, 3, 13] }
        ];

        let state = {
            idx: 0,
            score: 0,
            dropped: 0,
            totalToDrag: 0,
            soundStarted: false
        };

        // Enhanced, kid-friendly sound design
        const sounds = {
            pop: new Tone.Synth({ 
                oscillator: { type: 'sine' }, 
                envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } 
            }).toDestination(),
            
            // Magical chime for correct answers
            correct: new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.01, decay: 0.5, sustain: 0.2, release: 1 }
            }).toDestination(),
            
            // Soft boop for wrong answers
            wrong: new Tone.MembraneSynth({
                pitchDecay: 0.05,
                octaves: 2,
                envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.1 }
            }).toDestination(),
            
            jump: new Tone.Synth({ 
                oscillator: { type: 'triangle' },
                envelope: { attack: 0.05, decay: 0.3 }
            }).toDestination(),
            
            crash: new Tone.MembraneSynth({
                pitchDecay: 0.1,
                octaves: 4,
            }).toDestination()
        };

        function playSfx(s) {
            if(!state.soundStarted) return;
            try {
                if(s==='correct') sounds.correct.triggerAttackRelease(['C5','E5','G5','C6'], '4n');
                else if(s==='wrong') sounds.wrong.triggerAttackRelease('G2', '8n');
                else if(s==='jump') sounds.jump.triggerAttackRelease('C5', '16n');
                else if(s==='crash') sounds.crash.triggerAttackRelease('C2', '8n');
                else sounds.pop.triggerAttackRelease('E5', '32n');
            } catch(e) { console.log("Audio play error ignored."); }
        }

        function speakInstruction() {
            window.speechSynthesis.cancel();
            const text = (state.dropped < state.totalToDrag) ? "Drag all toys to the chart!" : `Choose the correct number for ${QUESTIONS[state.idx].num}.`;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'en-US';
            ut.rate = 0.85; // Slightly slower for kids
            ut.pitch = 1.2; // Slightly higher pitch for a friendly tone
            window.speechSynthesis.speak(ut);
        }

        function showFeedback(text, color) {
            const f = document.getElementById('feedback');
            
            // Reset animation by removing and re-adding the element clone (hack for CSS animations)
            const newF = f.cloneNode(true);
            f.parentNode.replaceChild(newF, f);
            
            newF.innerText = text;
            newF.style.color = color;
            newF.style.borderColor = color;
            newF.style.display = 'block';
            
            setTimeout(() => newF.style.display = 'none', 1200);
        }

        function startGame() {
            if(Tone.context.state !== 'running') { Tone.start(); }
            state.soundStarted = true;
            document.getElementById('start-overlay').classList.add('hidden');
            QUESTIONS.sort(() => Math.random() - 0.5); // Shuffle questions
            loadQuestion();
        }

        function loadQuestion() {
            const q = QUESTIONS[state.idx];
            const tens = Math.floor(q.num / 10);
            const ones = q.num % 10;
            
            state.dropped = 0;
            state.totalToDrag = tens + ones;
            
            document.getElementById('item-container').innerHTML = '';
            document.getElementById('tens-drop').innerHTML = '';
            document.getElementById('ones-drop').innerHTML = '';
            document.getElementById('ans-grid').innerHTML = '';
            
            const inst = document.getElementById('instruction');
            inst.innerText = "Drag ALL toys to the chart! 👇";
            inst.style.color = "var(--c-orange)";

            for(let i=0; i<tens; i++) document.getElementById('item-container').appendChild(createBlock('tens', q.item));
            for(let i=0; i<ones; i++) document.getElementById('item-container').appendChild(createBlock('ones', q.item));

            const opts = [...q.options].sort(() => Math.random() - 0.5);
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "ans-btn locked";
                btn.innerText = opt;
                btn.disabled = true;
                btn.onclick = () => checkAnswer(opt, q.num, btn);
                document.getElementById('ans-grid').appendChild(btn);
            });
            
            // Auto-speak on new question
            setTimeout(speakInstruction, 500);
        }

        function createBlock(type, emoji) {
            const div = document.createElement('div');
            div.className = `draggable-item ${type==='tens'?'tens-bundle':'ones-item'}`;
            div.dataset.type = type;
            if(type==='tens') {
                for(let i=0; i<10; i++) div.innerHTML += `<span>${emoji}</span>`;
            } else {
                div.innerHTML = `<span>${emoji}</span>`; // Wrapped in span for consistent filter
            }
            div.onpointerdown = handlePointerDown;
            return div;
        }

        // --- Drag & Drop ---
        let dragItem = null, placeholder = null, startX, startY;

        function handlePointerDown(e) {
            if(e.currentTarget.parentElement.id.includes('drop')) return;
            dragItem = e.currentTarget;
            const rect = dragItem.getBoundingClientRect();
            
            placeholder = dragItem.cloneNode(true);
            placeholder.style.visibility = 'hidden';
            dragItem.parentNode.insertBefore(placeholder, dragItem);

            dragItem.style.position = 'fixed';
            dragItem.style.width = rect.width + 'px';
            dragItem.style.height = rect.height + 'px';
            dragItem.style.left = rect.left + 'px';
            dragItem.style.top = rect.top + 'px';
            dragItem.classList.add('dragging');
            
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            dragItem.setPointerCapture(e.pointerId);
            dragItem.onpointermove = handlePointerMove;
            dragItem.onpointerup = handlePointerUp;
            playSfx('pop');
        }

        function handlePointerMove(e) {
            if(!dragItem) return;
            dragItem.style.left = (e.clientX - startX) + 'px';
            dragItem.style.top = (e.clientY - startY) + 'px';
            
            const tCol = document.getElementById('tens-col');
            const oCol = document.getElementById('ones-col');
            const tRect = tCol.getBoundingClientRect(), oRect = oCol.getBoundingClientRect();
            
            tCol.classList.remove('highlight'); oCol.classList.remove('highlight');
            if(e.clientX > tRect.left && e.clientX < tRect.right && e.clientY > tRect.top && e.clientY < tRect.bottom) tCol.classList.add('highlight');
            else if(e.clientX > oRect.left && e.clientX < oRect.right && e.clientY > oRect.top && e.clientY < oRect.bottom) oCol.classList.add('highlight');
        }

        function handlePointerUp(e) {
            if(!dragItem) return;
            const tCol = document.getElementById('tens-col'), oCol = document.getElementById('ones-col');
            const tRect = tCol.getBoundingClientRect(), oRect = oCol.getBoundingClientRect();
            let success = false;

            if(dragItem.dataset.type === 'tens' && e.clientX > tRect.left && e.clientX < tRect.right && e.clientY > tRect.top && e.clientY < tRect.bottom) {
                document.getElementById('tens-drop').appendChild(dragItem);
                success = true;
            } else if(dragItem.dataset.type === 'ones' && e.clientX > oRect.left && e.clientX < oRect.right && e.clientY > oRect.top && e.clientY < oRect.bottom) {
                document.getElementById('ones-drop').appendChild(dragItem);
                success = true;
            }

            if(success) {
                dragItem.style.position = ''; dragItem.style.width = ''; dragItem.style.height = ''; dragItem.style.left = ''; dragItem.style.top = '';
                dragItem.onpointerdown = null; dragItem.classList.remove('dragging');
                state.dropped++;
                playSfx('pop');
                
                if(state.dropped === state.totalToDrag) {
                    document.querySelectorAll('.ans-btn').forEach(b => { b.disabled = false; b.classList.remove('locked'); });
                    const inst = document.getElementById('instruction');
                    inst.innerText = "Awesome! Now choose the number! 🏆";
                    inst.style.color = "var(--c-green)";
                    playSfx('correct'); // Little chime for completing drag
                }
            } else {
                dragItem.classList.remove('dragging');
                dragItem.style.position = ''; dragItem.style.width = ''; dragItem.style.height = ''; dragItem.style.left = ''; dragItem.style.top = '';
                placeholder.replaceWith(dragItem);
                playSfx('wrong');
            }
            if(placeholder && placeholder.parentNode) placeholder.remove();
            dragItem = null;
            tCol.classList.remove('highlight'); oCol.classList.remove('highlight');
        }

        function checkAnswer(val, correct, btn) {
            if(val === correct) {
                playSfx('correct');
                showFeedback("YAY! JUMP TIME! 🦘", "var(--c-green)");
                setTimeout(() => {
                    document.getElementById('game-overlay').classList.remove('hidden');
                }, 1200);
            } else {
                playSfx('wrong');
                btn.style.background = "#fee2e2";
                btn.disabled = true;
                showFeedback("Try again!", "var(--c-red)");
            }
        }

        // --- Kangaroo Mini Game (Polished) ---
        // Internal canvas size remains 600x250, CSS handles the scaling responsively
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let gameId, isMiniRunning = false, kangaroo = { x: 50, y: 170, dy: 0, grounded: true }, obstacles = [], miniScore = 0, miniSpeed = 5, frameCounter = 0, startTime;
        
        let cloudObjects = [
            { x: 100, y: 40, s: 0.8 }, { x: 350, y: 60, s: 1.1 }, { x: 580, y: 30, s: 0.7 }
        ];

        function startGameMini() {
            document.getElementById('game-start-btn').classList.add('hidden');
            obstacles = []; miniScore = 0; miniSpeed = 5; frameCounter = 0; startTime = Date.now(); isMiniRunning = true;
            kangaroo.y = 165; kangaroo.dy = 0;
            document.getElementById('game-score-display').innerText = "Score: 0";
            updateMini();
        }

        function drawKangaroo(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Tail
            ctx.strokeStyle = "#C07B2D";
            ctx.lineWidth = 10;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(5, 35);
            ctx.quadraticCurveTo(-20, 50, -15, 20);
            ctx.stroke();

            // Back leg
            ctx.fillStyle = "#A0522D";
            ctx.beginPath();
            ctx.ellipse(15, 45, 12, 5, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = "#D2691E"; 
            ctx.beginPath();
            ctx.ellipse(20, 30, 20, 15, -0.2, 0, Math.PI * 2);
            ctx.fill();

            // Pouch
            ctx.fillStyle = "#E9967A";
            ctx.beginPath();
            ctx.arc(25, 35, 10, 0, Math.PI);
            ctx.fill();

            // Head
            ctx.fillStyle = "#D2691E";
            ctx.beginPath();
            ctx.ellipse(40, 12, 12, 10, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.beginPath();
            ctx.ellipse(35, 0, 5, 15, -0.4, 0, Math.PI * 2); 
            ctx.ellipse(42, -2, 5, 15, -0.2, 0, Math.PI * 2); 
            ctx.fill();

            // Nose
            ctx.fillStyle = "#333";
            ctx.beginPath(); ctx.arc(52, 12, 2.5, 0, Math.PI * 2); ctx.fill();

            // Eye
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(42, 8, 3.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(43, 8, 2, 0, Math.PI * 2); ctx.fill();

            // Front leg
            ctx.strokeStyle = "#A0522D";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(35, 30);
            ctx.lineTo(45, 40);
            ctx.stroke();

            ctx.restore();
        }

        function drawBackground() {
            // Grass
            ctx.fillStyle = "#55A630"; ctx.fillRect(0, 215, 600, 35);
            ctx.fillStyle = "#2B9348"; ctx.fillRect(0, 215, 600, 5); 

            // Sun (Radial Gradient)
            let sunGrd = ctx.createRadialGradient(530, 50, 5, 530, 50, 40);
            sunGrd.addColorStop(0, "#FFD700"); 
            sunGrd.addColorStop(0.6, "#FFA500"); 
            sunGrd.addColorStop(1, "rgba(255, 165, 0, 0)"); 
            ctx.fillStyle = sunGrd;
            ctx.beginPath();
            ctx.arc(530, 50, 40, 0, Math.PI * 2);
            ctx.fill();

            // Sun rays
            ctx.strokeStyle = "rgba(255, 215, 0, 0.4)";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            for(let i=0; i<12; i++) {
                const angle = (Math.PI*2/12)*i + (frameCounter*0.02);
                ctx.beginPath();
                ctx.moveTo(530 + Math.cos(angle)*35, 50 + Math.sin(angle)*35);
                ctx.lineTo(530 + Math.cos(angle)*55, 50 + Math.sin(angle)*55);
                ctx.stroke();
            }

            // Fluffy Clouds
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            cloudObjects.forEach(c => {
                c.x -= 0.5; // Slow drift
                if(c.x < -120) c.x = 650;
                
                ctx.beginPath();
                ctx.arc(c.x, c.y, 25*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 20*c.s, c.y - 15*c.s, 30*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 45*c.s, c.y, 25*c.s, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function updateMini() {
            if(!isMiniRunning) return;
            // Clear sky with gradient
            let skyGrd = ctx.createLinearGradient(0,0,0,250);
            skyGrd.addColorStop(0, "#74b9ff");
            skyGrd.addColorStop(1, "#81ecec");
            ctx.fillStyle = skyGrd;
            ctx.fillRect(0,0,600,250);
            
            frameCounter++;
            
            const timePassed = Math.max(0, 15 - Math.floor((Date.now() - startTime)/1000));
            document.getElementById('timer-val').innerText = timePassed;
            if(timePassed <= 0) return endMiniRun("TIME UP!");

            drawBackground();
            
            // Physics
            kangaroo.dy += 0.7; // Gravity
            kangaroo.y += kangaroo.dy;
            if(kangaroo.y > 165) { kangaroo.y = 165; kangaroo.dy = 0; kangaroo.grounded = true; }
            
            drawKangaroo(kangaroo.x, kangaroo.y);
            
            // Obstacles
            if(frameCounter % 90 === 0) {
                let obsTypes = ['🌵','🌲','🥚','🍄'];
                let chosenType = obsTypes[Math.floor(Math.random()*obsTypes.length)];
                obstacles.push({x: 620, type: chosenType});
            }
            
            for(let i=obstacles.length-1; i>=0; i--) {
                const o = obstacles[i];
                o.x -= miniSpeed;
                ctx.font = "38px Arial"; 
                // Add tiny shadow to obstacles
                ctx.fillStyle = "rgba(0,0,0,0.2)";
                ctx.fillText(o.type, o.x + 2, 214);
                ctx.fillStyle = "black";
                ctx.fillText(o.type, o.x, 212);
                
                // Fine-tuned collision box
                if(kangaroo.x + 15 < o.x + 30 && kangaroo.x + 40 > o.x && kangaroo.y + 45 > 185) return endMiniRun("OOPS!");
                
                if(o.x < -40) { 
                    obstacles.splice(i,1); 
                    miniScore++; 
                    document.getElementById('game-score-display').innerText = `Score: ${miniScore}`; 
                }
            }
            gameId = requestAnimationFrame(updateMini);
        }

        // Handle jump logic
        function triggerJump() {
            if(kangaroo.grounded && isMiniRunning) { 
                kangaroo.dy = -14; 
                kangaroo.grounded = false; 
                playSfx('jump'); 
            }
        }

        // Pointer/touch seamlessly
        canvas.addEventListener('pointerdown', (e) => { 
            e.preventDefault();
            triggerJump();
        });

        // Keyboard support (Spacebar) to jump
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.key === ' ') && isMiniRunning) {
                e.preventDefault(); // Prevent page from scrolling down
                triggerJump();
            }
        });

        function endMiniRun(msg) {
            isMiniRunning = false; 
            cancelAnimationFrame(gameId);
            playSfx(msg === "OOPS!" ? 'crash' : 'correct');
            
            const btn = document.getElementById('game-start-btn');
            btn.innerText = `${msg} NEXT ROUND ➔`;
            btn.classList.remove('hidden');
            
            btn.onclick = () => {
                document.getElementById('game-overlay').classList.add('hidden');
                state.score += miniScore;
                document.getElementById('score-val').innerText = state.score;
                state.idx++;
                if(state.idx < QUESTIONS.length) loadQuestion();
                else showVictory();
                btn.onclick = startGameMini; // Reset for next time
            };
        }

        function showVictory() {
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('final-score').innerText = state.score;
            playSfx('correct'); // Victory chime
            startWinFireworks();
        }

        function startWinFireworks() {
            const fw = document.getElementById('fireworks-canvas');
            const fctx = fw.getContext('2d');
            fw.width = window.innerWidth; 
            fw.height = window.innerHeight;
            let particlesArr = [];
            
            function loopFw() {
                // Creates a nice trailing effect
                fctx.fillStyle = 'rgba(255,255,255,0.2)'; 
                fctx.fillRect(0,0,fw.width,fw.height);
                
                // Randomly spawn fireworks
                if(Math.random()<0.08) {
                    const colors = ['#FF6B6B', '#4ECDC4', '#f1c40f', '#9b59b6', '#ff9f43'];
                    const c = colors[Math.floor(Math.random() * colors.length)];
                    const x = Math.random()*fw.width;
                    const y = Math.random()*(fw.height * 0.6); // Keep in upper half
                    playSfx('pop'); // Little popping sound
                    
                    for(let i=0; i<50; i++) {
                        const a = Math.random()*Math.PI*2;
                        const s = Math.random()*6+2;
                        particlesArr.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, c, life: 1, size: Math.random()*4+2});
                    }
                }
                
                particlesArr.forEach((p, i) => {
                    p.x += p.vx; 
                    p.y += p.vy; 
                    p.vy += 0.15; // Gravity
                    p.life -= 0.015; // Fade out
                    
                    fctx.globalAlpha = Math.max(0, p.life); 
                    fctx.fillStyle = p.c; 
                    fctx.beginPath();
                    fctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    fctx.fill();
                    
                    if(p.life <= 0) particlesArr.splice(i, 1);
                });
                
                requestAnimationFrame(loopFw);
            }
            loopFw();
        }
    </script>
