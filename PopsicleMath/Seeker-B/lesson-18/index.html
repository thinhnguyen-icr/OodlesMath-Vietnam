<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Measurement Class - Version 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap');

        :root {
            --duo-green: #58CC02;
            --duo-green-dark: #46A302;
            --duo-sky: #1CB0F6;
            --duo-sky-dark: #1899D6;
            --duo-yellow: #FFC800;
            --duo-yellow-dark: #E5B400;
            --duo-red: #FF4B4B;
            --duo-red-dark: #EA2B2B;
            --duo-text: #4B4B4B;
            --duo-bg: #E5E5E5;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--duo-sky);
            overflow: hidden;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
            color: var(--duo-text);
        }

        /* Duolingo Style Buttons */
        .duo-btn {
            background-color: var(--duo-green);
            color: white;
            border-radius: 1.5rem;
            border-bottom: 6px solid var(--duo-green-dark);
            transition: all 0.1s ease-in-out;
            cursor: pointer;
            text-transform: uppercase;
        }
        .duo-btn:active {
            border-bottom-width: 0px;
            transform: translateY(6px);
        }

        /* Beautiful Flat Scenery */
        .scenery {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .sun {
            position: absolute;
            top: 8%;
            left: 8%; 
            width: 100px;
            height: 100px;
            background-color: var(--duo-yellow);
            border-radius: 50%;
            animation: floatSun 4s infinite alternate ease-in-out;
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.4);
        }
        .hills-back {
            position: absolute;
            bottom: 12vh;
            width: 150%;
            left: -25%;
            height: 45vh;
            background-color: #58CC02;
            border-radius: 50% 50% 0 0;
            opacity: 0.9;
        }
        .hills-front {
            position: absolute;
            bottom: 10vh;
            width: 120%;
            left: -10%;
            height: 35vh;
            background-color: #46A302;
            border-radius: 50% 50% 0 0;
        }
        
        /* Flowers Decorative Elements */
        .flower {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #FFC800; /* Yellow center */
            border-radius: 50%;
            /* 4 White petals */
            box-shadow: 
                0 -8px 0 white,
                0 8px 0 white,
                -8px 0 0 white,
                8px 0 0 white;
            animation: floatSun 3s infinite alternate ease-in-out;
            animation-delay: calc(var(--delay) * 1s);
        }
        .flower.pink {
            background-color: white; /* White center */
            box-shadow: 
                0 -8px 0 #FFA5A5,
                0 8px 0 #FFA5A5,
                -8px 0 0 #FFA5A5,
                8px 0 0 #FFA5A5;
        }

        /* Clean Flat Desk */
        .desk {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15vh;
            background-color: #D3A068;
            border-top: 12px solid #B88550;
            background-image: repeating-linear-gradient(
                to right,
                rgba(0,0,0,0.03) 0px,
                rgba(0,0,0,0.03) 25px,
                transparent 25px,
                transparent 50px
            );
            box-shadow: inset 0 15px 15px -15px rgba(0,0,0,0.4);
            z-index: 10;
        }

        /* Typography */
        .kid-text {
            color: var(--duo-text);
            letter-spacing: 1px;
        }

        /* Game Objects */
        .game-object {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            transform-origin: bottom center;
            filter: drop-shadow(0 15px 5px rgba(0,0,0,0.25));
        }
        .game-object:active {
            transform: scale(0.9) translateY(15px);
        }
        .game-object:hover {
            transform: translateY(-15px) scale(1.05);
            filter: drop-shadow(0 25px 8px rgba(0,0,0,0.3));
        }

        /* Animations */
        @keyframes floatSun { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        @keyframes floatClouds { 0% { transform: translateX(-150px); } 100% { transform: translateX(110vw); } }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        @keyframes happyBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-40px) scale(1.05); } }
        
        .animate-bounce-in { animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-wiggle { animation: wiggle 0.4s ease-in-out; }
        .animate-happy { animation: happyBounce 0.5s ease-in-out 2; }
        .cloud-anim { animation: floatClouds linear infinite; position: absolute; z-index: 1; opacity: 0.9; }

        /* Mini-game styling */
        .basket {
            position: absolute;
            bottom: 5vh;
            width: 130px;
            height: 70px;
            background-color: #D3A068;
            border: 6px solid #B88550;
            border-radius: 10px 10px 40px 40px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            z-index: 50;
            transform-origin: center;
            transition: left 0.1s ease-out;
        }
        .falling-item {
            position: absolute;
            font-size: 60px;
            top: -80px;
            filter: drop-shadow(0 8px 5px rgba(0,0,0,0.25));
            z-index: 40;
        }

        #fireworks-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Pill styling */
        .pill {
            background: white;
            border: 4px solid var(--duo-bg);
            border-bottom: 6px solid var(--duo-bg);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            font-weight: 800;
            gap: 0.5rem;
        }
    </style>
</head>

    <script>
        // --- Game State & Config ---
        let score = 0;
        const maxScore = 5;
        let fruitScore = 0;
        let currentLevelData = null;
        let soundEnabled = true;
        let isProcessing = false;
        let isMiniGameActive = false;
        let audioCtx;

        // --- Flat Vector Colors (Duolingo Style) ---
        const flatColors = [
            { id: 'red', main: '#FF4B4B', dark: '#EA2B2B', light: '#FF8A8A' },
            { id: 'blue', main: '#1CB0F6', dark: '#1899D6', light: '#78C8F6' },
            { id: 'green', main: '#58CC02', dark: '#46A302', light: '#89E23D' },
            { id: 'yellow', main: '#FFC800', dark: '#E5B400', light: '#FFDE59' },
            { id: 'purple', main: '#CE82FF', dark: '#A568CC', light: '#E4B8FF' },
            { id: 'orange', main: '#FF9600', dark: '#E58700', light: '#FFB84D' }
        ];

        function getRandomColorObj() {
            return flatColors[Math.floor(Math.random() * flatColors.length)];
        }

        // --- Init Audio Context cleanly ---
        function initGame() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            let utter = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(utter);

            document.getElementById('start-overlay').classList.add('hidden');
            updateStars();
            renderLevel();
            playSuccessSound(); 
        }

        // --- Beautiful Audio Synth ---
        function playTone(freq, type, duration, vol=0.1) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSuccessSound() {
            playTone(523.25, 'triangle', 0.3, 0.15); 
            setTimeout(() => playTone(659.25, 'triangle', 0.3, 0.15), 100); 
            setTimeout(() => playTone(783.99, 'triangle', 0.4, 0.15), 200); 
            setTimeout(() => playTone(1046.50, 'triangle', 0.6, 0.15), 300); 
        }

        function playErrorSound() {
            playTone(250, 'square', 0.3, 0.1);
            setTimeout(() => playTone(200, 'square', 0.4, 0.1), 100);
        }

        function playCatchSound() { 
            playTone(880, 'sine', 0.15, 0.1); 
            setTimeout(() => playTone(1200, 'sine', 0.2, 0.1), 50);
        } 
        function playBombSound() { 
            playTone(150, 'sawtooth', 0.4, 0.2); 
        }
        function playCheerSound() {
            [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'triangle', 0.4, 0.15), i * 150);
            });
            setTimeout(() => playSuccessSound(), 800);
        }

        function speak(text) {
            if (!soundEnabled) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85; 
            utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
        }

        // --- UPGRADED REALISTIC 3D FLAT VECTORS ---
        
        function createFlatPencil(h, c) {
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <!-- Wood Cone -->
                    <polygon points="30,50 70,50 50,0" fill="#FDE047" />
                    <!-- Lead -->
                    <polygon points="43,18 57,18 50,0" fill="#374151" />
                    <!-- Main Body with Hexagonal facets -->
                    <rect x="30" y="50" width="40" height="${h-85}" fill="${c.main}" />
                    <rect x="30" y="50" width="12" height="${h-85}" fill="white" opacity="0.3" />
                    <rect x="58" y="50" width="12" height="${h-85}" fill="black" opacity="0.15" />
                    <line x1="42" y1="50" x2="42" y2="${h-35}" stroke="rgba(0,0,0,0.1)" stroke-width="1" />
                    <line x1="58" y1="50" x2="58" y2="${h-35}" stroke="rgba(0,0,0,0.1)" stroke-width="1" />
                    <!-- Metal Ferrule (More realistic) -->
                    <rect x="30" y="${h-35}" width="40" height="15" fill="#D1D5DB" />
                    <rect x="30" y="${h-35}" width="12" height="15" fill="white" opacity="0.5" />
                    <rect x="58" y="${h-35}" width="12" height="15" fill="black" opacity="0.2" />
                    <line x1="30" y1="${h-30}" x2="70" y2="${h-30}" stroke="#9CA3AF" stroke-width="2" />
                    <line x1="30" y1="${h-25}" x2="70" y2="${h-25}" stroke="#9CA3AF" stroke-width="2" />
                    <!-- Eraser -->
                    <path d="M 30 ${h-20} L 70 ${h-20} L 70 ${h-5} Q 70 ${h} 65 ${h} L 35 ${h} Q 30 ${h} 30 ${h-5} Z" fill="#FCA5A5" />
                    <rect x="30" y="${h-20}" width="12" height="20" fill="white" opacity="0.3" />
                </svg>
            `;
        }

        function createFlatCrayon(h, c) {
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <!-- Rounded Crayon Tip -->
                    <path d="M 35 30 L 65 30 L 58 5 Q 50 0 42 5 Z" fill="${c.main}" />
                    <path d="M 35 30 L 45 30 L 42 5 Q 40 3 40 5 Z" fill="white" opacity="0.25" />
                    <!-- Wrapper Paper -->
                    <rect x="30" y="30" width="40" height="${h-30}" fill="${c.light}" />
                    <!-- Wrapper Shadows/Highlights for 3D cylinder look -->
                    <rect x="30" y="30" width="10" height="${h-30}" fill="white" opacity="0.3" />
                    <rect x="60" y="30" width="10" height="${h-30}" fill="black" opacity="0.1" />
                    <!-- Wrapper Waves Design -->
                    <path d="M 30 40 Q 40 35 50 40 T 70 40 L 70 48 Q 60 43 50 48 T 30 48 Z" fill="#111827" opacity="0.8" />
                    <path d="M 30 ${h-25} Q 40 ${h-30} 50 ${h-25} T 70 ${h-25} L 70 ${h-17} Q 60 ${h-22} 50 ${h-17} T 30 ${h-17} Z" fill="#111827" opacity="0.8" />
                    <!-- Center Oval Logo -->
                    <ellipse cx="50" cy="${(h/2)+10}" rx="12" ry="20" fill="#111827" opacity="0.9" />
                    <ellipse cx="50" cy="${(h/2)+10}" rx="10" ry="18" fill="${c.main}" />
                </svg>
            `;
        }

        function createFlatRuler(h, c) {
            let ticks = '';
            for(let i=30; i<h-20; i+=15) {
                ticks += `<line x1="25" y1="${i}" x2="${(i % 30 === 0) ? 45 : 35}" y2="${i}" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>`;
            }
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <!-- Main Body (Slightly transparent plastic) -->
                    <rect x="25" y="0" width="50" height="${h}" fill="${c.main}" rx="4" opacity="0.9" />
                    <!-- Beveled Edge (3D effect) -->
                    <rect x="60" y="5" width="10" height="${h-10}" fill="black" opacity="0.1" rx="2" />
                    <line x1="60" y1="5" x2="60" y2="${h-5}" stroke="white" stroke-width="2" opacity="0.4" />
                    <!-- Hang Hole -->
                    <circle cx="50" cy="15" r="5" fill="var(--duo-sky)" />
                    <!-- Beautiful Highlight Strip -->
                    <rect x="28" y="5" width="8" height="${h-10}" fill="white" opacity="0.3" rx="2" />
                    <!-- Measurement Ticks -->
                    ${ticks}
                </svg>
            `;
        }

        function createFlatPaintbrush(h, c) {
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    <!-- Bristles Texture (Multi-layer) -->
                    <path d="M 35 45 Q 30 -5 50 0 Q 70 -5 65 45 Z" fill="#D97706" />
                    <path d="M 38 45 Q 35 5 50 5 Q 65 5 62 45 Z" fill="#FBBF24" />
                    <path d="M 42 45 Q 40 10 50 10 Q 60 10 58 45 Z" fill="#FDE68A" />
                    <!-- Paint Dip (Match Color) -->
                    <path d="M 36 30 Q 30 -5 50 0 Q 70 -5 64 30 Q 58 40 50 30 Q 42 20 36 30 Z" fill="${c.main}" />
                    <!-- Metal Ferrule -->
                    <rect x="33" y="45" width="34" height="20" fill="#9CA3AF" rx="2"/>
                    <rect x="33" y="45" width="10" height="20" fill="white" opacity="0.5" />
                    <rect x="57" y="45" width="10" height="20" fill="black" opacity="0.2" />
                    <!-- Crimp lines -->
                    <line x1="33" y1="50" x2="67" y2="50" stroke="#4B5563" stroke-width="2" />
                    <line x1="33" y1="55" x2="67" y2="55" stroke="#4B5563" stroke-width="2" />
                    <!-- Wood Handle -->
                    <path d="M 36 65 L 64 65 L 60 ${h-10} Q 50 ${h} 40 ${h-10} Z" fill="#92400E" /> 
                    <!-- Painted Tip of Handle -->
                    <path d="M 37 ${h-30} L 63 ${h-30} L 60 ${h-10} Q 50 ${h} 40 ${h-10} Z" fill="${c.dark}" />
                    <!-- Handle Highlight -->
                    <path d="M 40 65 L 45 65 L 43 ${h-15} Z" fill="white" opacity="0.2" />
                </svg>
            `;
        }

        function createFlatBlocks(h, c) {
            const blockH = 26;
            const count = Math.floor(h / blockH);
            let blocks = '';
            for(let i=0; i<count; i++) {
                let y = h - (i + 1) * blockH;
                let color = i % 2 === 0 ? c.main : c.light;
                let darkColor = i % 2 === 0 ? c.dark : c.main;
                blocks += `
                    <g transform="translate(0, ${y})">
                        <!-- Connecting Studs with Light/Shadow -->
                        <rect x="35" y="0" width="8" height="6" fill="${color}" rx="1"/>
                        <rect x="46" y="0" width="8" height="6" fill="${color}" rx="1"/>
                        <rect x="57" y="0" width="8" height="6" fill="${color}" rx="1"/>
                        <rect x="35" y="0" width="3" height="6" fill="white" opacity="0.3" rx="1"/>
                        <rect x="46" y="0" width="3" height="6" fill="white" opacity="0.3" rx="1"/>
                        <rect x="57" y="0" width="3" height="6" fill="white" opacity="0.3" rx="1"/>
                        
                        <!-- Main Block Body -->
                        <rect x="30" y="5" width="40" height="${blockH-5}" fill="${color}" rx="3" />
                        <!-- 3D Bottom & Right Shadows -->
                        <rect x="30" y="${blockH-4}" width="40" height="4" fill="${darkColor}" rx="2" />
                        <rect x="66" y="5" width="4" height="${blockH-5}" fill="${darkColor}" rx="2" />
                        <!-- Top & Left Highlight -->
                        <rect x="30" y="5" width="40" height="4" fill="white" opacity="0.3" rx="2" />
                        <rect x="30" y="5" width="4" height="${blockH-5}" fill="white" opacity="0.3" rx="2" />
                    </g>
                `;
            }
            return `
                <svg viewBox="0 0 100 ${h}" preserveAspectRatio="xMidYMax meet" width="100%" height="100%" style="overflow:visible;">
                    ${blocks}
                </svg>
            `;
        }


        // --- Core Game Logic ---
        const generators = [createFlatPencil, createFlatCrayon, createFlatRuler, createFlatPaintbrush, createFlatBlocks];
        
        const prompts = {
            superlative: [
                { text: "Which one is the longest?", compare: (a, b) => b.val - a.val },
                { text: "Which one is the shortest?", compare: (a, b) => a.val - b.val }
            ],
            comparative: [
                { text: "Which one is longer?", compare: (a, b) => b.val - a.val },
                { text: "Which one is shorter?", compare: (a, b) => a.val - b.val }
            ]
        };

        function generateLevel() {
            const numObjects = score < 2 ? 2 : 3;
            const isComparative = numObjects === 2;
            const generator = generators[Math.floor(Math.random() * generators.length)];
            
            let items = [];
            const maxUnits = 12; // Tăng base height để icons cao hơn
            
            for (let i = 0; i < numObjects; i++) {
                let units;
                let isUnique = false;
                while (!isUnique) {
                    units = Math.floor(Math.random() * 6) + 6; // 6 to 11 units
                    const tooClose = items.some(item => Math.abs(item.units - units) < 1.5);
                    if (!tooClose) isUnique = true;
                }

                const heightPct = (units / maxUnits) * 100;
                const svgHeight = units * 25; // Scale up the SVG coordinates

                items.push({
                    id: i,
                    units: units,
                    heightPct: heightPct,
                    val: units,
                    svg: generator(svgHeight, getRandomColorObj())
                });
            }

            const questionPool = isComparative ? prompts.comparative : prompts.superlative;
            const question = questionPool[Math.floor(Math.random() * questionPool.length)];
            
            const sorted = [...items].sort((a, b) => question.compare(a, b));
            const correctId = sorted[0].id;

            return { items, question, correctId };
        }

        function renderLevel() {
            if(isMiniGameActive) return;
            isProcessing = false;
            currentLevelData = generateLevel();
            const stage = document.getElementById('game-stage');
            stage.innerHTML = '';

            currentLevelData.items.forEach(item => {
                const container = document.createElement('div');
                container.className = 'game-object flex-1 flex justify-center items-end';
                container.style.height = item.heightPct + '%';
                // Container width reduced greatly to enforce the slim new look
                container.style.maxWidth = '100px'; 
                container.onclick = () => handleInput(item.id, container);
                container.innerHTML = item.svg;
                stage.appendChild(container);
            });

            setTimeout(speakCurrentPrompt, 600);
        }

        function speakCurrentPrompt() {
            if(currentLevelData && !isMiniGameActive) {
                speak(currentLevelData.question.text);
            }
        }

        function handleInput(id, element) {
            if (isProcessing || isMiniGameActive) return;

            if (id === currentLevelData.correctId) {
                isProcessing = true;
                playSuccessSound();
                speak("Correct!");
                element.classList.add('animate-happy');
                createConfettiExplosion(element);
                
                score++;
                updateStars();

                setTimeout(() => {
                    startMiniGame();
                }, 1500);

            } else {
                playErrorSound();
                element.classList.add('animate-wiggle');
                speak("Oops! Try again.");
                setTimeout(() => {
                    element.classList.remove('animate-wiggle');
                }, 500);
            }
        }

        function updateStars() {
            const container = document.getElementById('star-container');
            container.innerHTML = '';
            for(let i=0; i<maxScore; i++) {
                if (i < score) {
                    container.innerHTML += `<div class="text-3xl sm:text-4xl filter drop-shadow-sm animate-bounce-in">⭐</div>`;
                } else {
                    container.innerHTML += `<div class="text-3xl sm:text-4xl opacity-20 grayscale">⭐</div>`;
                }
            }
        }

        // --- Visual Effects ---
        function createConfettiExplosion(target) {
            const rect = target.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'fixed w-3 h-3 sm:w-4 sm:h-4 rounded-sm z-[100]';
                conf.style.backgroundColor = flatColors[Math.floor(Math.random()*flatColors.length)].main;
                conf.style.left = centerX + 'px';
                conf.style.top = centerY + 'px';
                conf.style.transition = 'all 1s cubic-bezier(0.1, 0.8, 0.3, 1)';
                document.body.appendChild(conf);
                
                conf.getBoundingClientRect(); // Reflow
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance + 50; 
                const rot = Math.random() * 720;
                
                conf.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
                conf.style.opacity = 0;
                
                setTimeout(() => conf.remove(), 1000);
            }
        }

        // --- Mini-game Logic ---
        let itemSpawnInterval;
        let miniGameStartTime;
        let basketPosition = 50; 
        const basket = document.getElementById('basket');
        const miniGameArea = document.getElementById('mini-game-area');
        const fruitScoreEl = document.getElementById('fruit-score');

        function startMiniGame() {
            isMiniGameActive = true;
            miniGameStartTime = Date.now();
            
            document.getElementById('main-game-layer').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('mini-game-layer').classList.remove('hidden', 'opacity-0', 'pointer-events-none');
            document.getElementById('mini-game-layer').classList.add('flex');
            
            speak("Fruit party! Catch the apples!");

            basketPosition = 50;
            updateBasketPosition();
            scheduleNextSpawn();
            setupMiniGameControls();
        }

        function scheduleNextSpawn() {
            if(!isMiniGameActive) return;
            const elapsed = Date.now() - miniGameStartTime;
            const level = Math.floor(elapsed / 3000); 
            let delay = Math.max(350, 800 - (level * 100));

            itemSpawnInterval = setTimeout(() => {
                spawnItem();
                scheduleNextSpawn();
            }, delay);
        }

        function endMiniGame() {
            clearTimeout(itemSpawnInterval);
            document.querySelectorAll('.falling-item').forEach(el => el.remove());
            teardownMiniGameControls();

            isMiniGameActive = false;
            
            document.getElementById('mini-game-layer').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                 document.getElementById('mini-game-layer').classList.add('hidden');
                 document.getElementById('mini-game-layer').classList.remove('flex');
                 document.getElementById('main-game-layer').classList.remove('opacity-0', 'pointer-events-none');
            }, 500);
            
            if (score >= maxScore) {
                setTimeout(() => {
                    document.getElementById('final-fruit-score').innerText = fruitScore;
                    document.getElementById('victory-modal').classList.remove('hidden');
                    playCheerSound();
                    speak("Awesome! You are a measurement star!");
                    startFireworks();
                }, 800);
            } else {
                speak("Next level! Get ready!");
                setTimeout(renderLevel, 800);
            }
        }

        function spawnItem() {
            const elapsed = Date.now() - miniGameStartTime;
            const level = Math.floor(elapsed / 4000); 

            let items = ['🍎', '🍎', '🍊', '🍇', '🍓', '🍌']; 
            let speed = Math.min(18, 6 + level * 2);
            
            const bombCount = 1 + Math.floor(level/2);
            for(let i=0; i<bombCount; i++) items.push('💣');

            const item = items[Math.floor(Math.random() * items.length)];
            const el = document.createElement('div');
            el.classList.add('falling-item');
            el.innerText = item;
            el.style.left = Math.random() * 80 + 10 + '%'; 
            miniGameArea.appendChild(el);

            let posY = -100;
            
            const fallInterval = setInterval(() => {
                if(!isMiniGameActive) {
                    clearInterval(fallInterval);
                    el.remove();
                    return;
                }

                posY += speed;
                el.style.top = posY + 'px';

                const basketRect = basket.getBoundingClientRect();
                const itemRect = el.getBoundingClientRect();

                if(posY > miniGameArea.offsetHeight - 120 && 
                   itemRect.right > basketRect.left + 20 && 
                   itemRect.left < basketRect.right - 20) {
                    
                    clearInterval(fallInterval);
                    el.remove();

                    if(item === '💣') {
                        playBombSound();
                        basket.classList.add('animate-wiggle');
                        speak("Oh no! A bomb!");
                        setTimeout(() => basket.classList.remove('animate-wiggle'), 500);
                        endMiniGame();
                    } else {
                        playCatchSound();
                        fruitScore++;
                        
                        const plusOne = document.createElement('div');
                        plusOne.innerText = '+1';
                        plusOne.className = 'absolute text-[var(--duo-yellow)] font-black text-4xl animate-bounce-in drop-shadow-md z-50';
                        plusOne.style.left = (itemRect.left - miniGameArea.getBoundingClientRect().left) + 'px';
                        plusOne.style.top = (basketRect.top - miniGameArea.getBoundingClientRect().top - 40) + 'px';
                        miniGameArea.appendChild(plusOne);
                        setTimeout(()=>plusOne.remove(), 600);
                        
                        fruitScoreEl.innerText = fruitScore;
                        
                        basket.style.transform = 'translateX(-50%) scale(1.1) translateY(10px)';
                        setTimeout(()=> basket.style.transform = 'translateX(-50%) scale(1) translateY(0)', 100);
                    }

                } else if (posY > miniGameArea.offsetHeight) {
                    clearInterval(fallInterval);
                    el.remove();
                }
            }, 20);
        }

        function setupMiniGameControls() {
            miniGameArea.addEventListener('touchmove', handleMove, {passive: false});
            miniGameArea.addEventListener('mousemove', handleMove);
        }
        function teardownMiniGameControls() {
            miniGameArea.removeEventListener('touchmove', handleMove);
            miniGameArea.removeEventListener('mousemove', handleMove);
        }
        function handleMove(e) {
            if(!isMiniGameActive) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = miniGameArea.getBoundingClientRect();
            let relativeX = clientX - rect.left;
            basketPosition = (relativeX / rect.width) * 100;
            updateBasketPosition();
        }
        function updateBasketPosition() {
            basketPosition = Math.max(10, Math.min(90, basketPosition)); 
            basket.style.left = `${basketPosition}%`; 
        }

        function restartGame() {
            stopFireworks();
            score = 0;
            fruitScore = 0;
            fruitScoreEl.innerText = '0';
            document.getElementById('victory-modal').classList.add('hidden');
            updateStars();
            renderLevel();
        }

        // --- Canvas Fireworks System ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fireworksAnimId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.96; this.gravity = 0.15;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 6 + 3;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.vx * 0.5);
                ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function startFireworks() {
            resizeCanvas();
            particles = [];
            
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if(Math.random() < 0.1) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * (canvas.height * 0.6); 
                    const color = flatColors[Math.floor(Math.random()*flatColors.length)].main;
                    for(let i=0; i<60; i++) particles.push(new Particle(x, y, color));
                    
                    if(Math.random() < 0.4) playTone(500 + Math.random()*500, 'triangle', 0.1, 0.05);
                }

                particles.forEach((p, index) => {
                    p.update();
                    p.draw(ctx);
                    if(p.alpha <= 0) particles.splice(index, 1);
                });

                fireworksAnimId = requestAnimationFrame(loop);
            }
            loop();
        }

        function stopFireworks() {
            cancelAnimationFrame(fireworksAnimId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
