<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Shape Quest V6!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            /* Duolingo-inspired vibrant color palette */
            --bg-sky-top: #1cb0f6;
            --bg-sky-bottom: #8fe0ff;
            --c-green: #58cc02;
            --c-green-shadow: #58a700;
            --c-blue: #1cb0f6;
            --c-blue-shadow: #1899d6;
            --c-yellow: #ffc800;
            --c-yellow-shadow: #e5b400;
            --c-red: #ff4b4b;
            --c-red-shadow: #ea1515;
            --c-purple: #ce82ff;
            --c-purple-shadow: #a568cc;
            --text-dark: #3c3c3c;
            --text-light: #afafaf;
            --font-main: 'Poppins', sans-serif;
            --card-bg: #ffffff;
            --card-border: #e5e5e5;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background: linear-gradient(180deg, var(--bg-sky-top) 0%, var(--bg-sky-bottom) 100%);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100vh; overflow: hidden; touch-action: none;
            color: var(--text-dark);
        }

        /* Landscape Background Fixed to bottom */
        .scenery {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            z-index: -2; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .hill-back {
            position: absolute; bottom: 0; left: -10%; right: -10%; height: 50vh;
            background: #64d115; border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            z-index: 1;
        }
        .hill-front {
            position: absolute; bottom: 0; left: -20%; right: -20%; height: 40vh;
            background: #58cc02; border-radius: 50% 50% 0 0 / 15% 15% 0 0;
            z-index: 2; border-top: 15px solid #71df1e;
        }
        
        .clouds { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
        .cloud {
            position: absolute; background: rgba(255, 255, 255, 0.9); border-radius: 100px;
            animation: float linear infinite; 
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.9); border-radius: 50%; }
        @keyframes float { from { transform: translateX(-300px); } to { transform: translateX(calc(100vw + 300px)); } }

        /* Chunky Header */
        header {
            width: 100%; max-width: 900px;
            background: rgba(255, 255, 255, 0.95); padding: 12px 25px;
            border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border: 3px solid var(--card-border);
            border-bottom-width: 6px;
            margin-bottom: 10px; z-index: 10;
        }

        .title-text { font-weight: 900; color: var(--c-blue); font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }

        .score-box {
            background: var(--c-yellow); color: white; padding: 6px 20px;
            border-radius: 16px; font-weight: 800; font-size: 1.2rem;
            border-bottom: 4px solid var(--c-yellow-shadow);
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }

        /* Main Game Area Perfectly Centered */
        main {
            width: 100%; max-width: 900px; flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }

        .question-card {
            background: white; width: 100%; border-radius: 24px; padding: 20px 30px;
            border: 3px solid var(--card-border); border-bottom-width: 6px;
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .question-text {
            font-size: 2.2rem; font-weight: 800; color: var(--text-dark); text-align: center;
        }

        .speaker-btn {
            background: var(--c-blue); border: none; border-radius: 18px;
            width: 60px; height: 60px; font-size: 2rem; cursor: pointer; color: white;
            border-bottom: 5px solid var(--c-blue-shadow);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s; flex-shrink: 0;
        }
        .speaker-btn:active { transform: translateY(4px); border-bottom-width: 1px; }

        #game-content {
            width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap;
        }

        /* Taller Choice Cards */
        .choice-card {
            background: var(--card-bg); border-radius: 24px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid var(--card-border); border-bottom-width: 8px;
            width: 260px; height: 320px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }
        .choice-card:hover { transform: translateY(-5px); }
        .choice-card:active { transform: translateY(5px); border-bottom-width: 3px; }

        .choice-card.correct { border-color: var(--c-green); background: #e5f9d4; border-bottom-color: var(--c-green-shadow); }
        .choice-card.wrong { border-color: var(--c-red); background: #ffdfdf; border-bottom-color: var(--c-red-shadow); opacity: 0.6; pointer-events: none;}

        .choice-card canvas {
            width: 220px !important; height: 220px !important;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.1));
        }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            z-index: 500; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            backdrop-filter: blur(10px);
        }

        .start-btn {
            background: var(--c-green); color: white; border: none;
            padding: 20px 60px; font-size: 2.2rem; font-weight: 800;
            border-radius: 25px; cursor: pointer; border-bottom: 8px solid var(--c-green-shadow);
            text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s;
        }
        .start-btn:active { transform: translateY(6px); border-bottom-width: 2px; }

        .start-btn.blue { background: var(--c-blue); border-bottom-color: var(--c-blue-shadow); }
        .start-btn.red { background: var(--c-red); border-bottom-color: var(--c-red-shadow); }

        #bonus-overlay .container {
            width: 100%; max-width: 800px;
            display: flex; flex-direction: column; align-items: center;
        }

        #bonus-canvas {
            background: linear-gradient(to bottom, #2c3e50, #34495e); /* Darker background for fruit ninja */
            border-radius: 24px; border: 6px solid var(--card-border);
            border-bottom-width: 12px; max-width: 100%; height: auto; width: 800px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            touch-action: none; /* prevent scrolling when swiping */
            cursor: crosshair;
        }

        .feedback {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 5rem; font-weight: 900; z-index: 1000; pointer-events: none; display: none;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
            -webkit-text-stroke: 3px white;
        }

        .hidden { display: none !important; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 600; }

        /* Responsive Design */
        @media (max-width: 850px) {
            .choice-card { width: 30%; height: 260px; }
            .choice-card canvas { width: 100% !important; height: auto !important; aspect-ratio: 1/1; }
        }
        @media (max-width: 600px) {
            .question-text { font-size: 1.5rem; }
            .question-card { padding: 15px; margin-bottom: 2vh; flex-direction: column; gap: 10px; }
            .choice-card { width: 45%; height: 220px; border-bottom-width: 6px; }
            .start-btn { font-size: 1.6rem; padding: 15px 40px; }
            header { padding: 10px 15px; }
            .title-text { font-size: 1.2rem; }
            .hill-back { height: 60vh; }
            .hill-front { height: 48vh; }
            .speaker-btn { width: 50px; height: 50px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="scenery">
        <div class="hill-back"></div>
        <div class="hill-front"></div>
    </div>
    <div class="clouds" id="clouds-container"></div>

    <header>
        <div class="title-text">3D Shape Quest</div>
        <div class="score-box">⭐ <span id="score-val">0</span></div>
    </header>

    <main>
        <div class="question-card">
            <div id="question" class="question-text">Loading...</div>
            <button class="speaker-btn" onclick="speakTask()">🔊</button>
        </div>

        <div id="game-content"></div>

        <div id="feedback" class="feedback"></div>
    </main>

    <div id="start-overlay" class="overlay">
        <div style="font-size: 80px; margin-bottom: 10px;">💎</div>
        <h1 style="font-size: 4rem; color: var(--c-blue); margin-bottom: 5px; font-weight: 900; line-height: 1.1; text-transform: uppercase;">Shape Quest</h1>
        <p style="font-size: 1.5rem; color: var(--text-dark); margin-bottom: 40px; font-weight: 700;">Find the 3D shapes and slice fruits! 🍉</p>
        <button class="start-btn" onclick="startGame()">LET'S PLAY</button>
    </div>

    <div id="bonus-overlay" class="overlay hidden">
        <div class="container">
            <h2 style="font-size: 3.5rem; color: var(--c-red); font-weight: 900; text-transform: uppercase; margin-bottom: 10px;">FRUIT SLICE! 🍉</h2>
            <p style="font-weight: 700; color: var(--text-dark); font-size: 1.3rem; margin-bottom: 20px;">Swipe to slice fruits! AVOID BOMBS! 💣</p>
            
            <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; font-weight: 800; font-size: 1.5rem;">
                <div style="color: var(--c-blue);">TIME: <span id="timer-val">60</span>s</div>
                <div style="color: var(--c-yellow); text-shadow: 1px 1px 0 rgba(0,0,0,0.1);">PTS: <span id="bonus-score">0</span></div>
            </div>
            
            <!-- Taller canvas for better throwing arcs -->
            <canvas id="bonus-canvas" width="800" height="400"></canvas>
            <button id="bonus-start-btn" class="start-btn blue" style="margin-top: 30px;" onclick="startFruitGame()">START SLICING</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <canvas id="confetti-canvas"></canvas>
        <div id="win-icon" style="font-size: 100px; margin-bottom: 10px; filter: drop-shadow(0 20px 20px rgba(0,0,0,0.2));">🏆</div>
        <h1 id="win-title" style="font-size: 4rem; color: var(--c-green); font-weight: 900; text-transform: uppercase;">AMAZING JOB!</h1>
        <div style="font-size: 2.5rem; font-weight: 800; color: var(--text-dark); margin-bottom: 50px;">Total Score: <span id="final-score" style="color: var(--c-yellow)">0</span> ⭐</div>
        <button class="start-btn blue" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        // 3D Geometries (from Ver4)
        const SHAPES = [
            { id: 'cube', name: 'Cube', color: 0xff4b4b, geometry: (s=4) => new THREE.BoxGeometry(s, s, s) },
            { id: 'sphere', name: 'Sphere', color: 0x1cb0f6, geometry: (s=2.8) => new THREE.SphereGeometry(s, 64, 64) },
            { id: 'cylinder', name: 'Cylinder', color: 0xffc800, geometry: (s=1.8) => new THREE.CylinderGeometry(s, s, 5.5, 64) },
            { id: 'cone', name: 'Cone', color: 0xce82ff, geometry: (s=2.8) => new THREE.ConeGeometry(s, 6, 64) },
            { id: 'pyramid', name: 'Pyramid', color: 0x58cc02, geometry: (s=3.2) => new THREE.ConeGeometry(s, 6, 4) },
            { id: 'prism', name: 'Prism', color: 0xff9600, geometry: (s=2.8) => new THREE.CylinderGeometry(s, s, 6, 3) }
        ];

        let state = {
            score: 0,
            currentIdx: 0,
            questions: [],
            isLocked: false,
            soundInited: false
        };

        let synth;

        function initClouds() {
            const container = document.getElementById('clouds-container');
            for(let i=0; i<8; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                const w = 150 + Math.random()*200;
                c.style.width = w + 'px';
                c.style.height = w*0.4 + 'px';
                c.style.top = (5 + Math.random()*35) + '%';
                c.style.left = '-400px';
                c.style.animationDuration = (30 + Math.random()*40) + 's';
                c.style.animationDelay = (Math.random()*25) + 's';
                
                const b1 = document.createElement('div');
                b1.style.width = w*0.5 + 'px'; b1.style.height = w*0.5 + 'px';
                b1.style.top = -w*0.2 + 'px'; b1.style.left = w*0.1 + 'px';
                b1.style.borderRadius = '50%'; b1.style.background = 'rgba(255,255,255,0.9)'; b1.style.position = 'absolute';
                
                const b2 = document.createElement('div');
                b2.style.width = w*0.4 + 'px'; b2.style.height = w*0.4 + 'px';
                b2.style.top = -w*0.15 + 'px'; b2.style.right = w*0.15 + 'px';
                b2.style.borderRadius = '50%'; b2.style.background = 'rgba(255,255,255,0.9)'; b2.style.position = 'absolute';

                c.appendChild(b1); c.appendChild(b2);
                container.appendChild(c);
            }
        }
        initClouds();

        function startGame() {
            if(!synth) {
                synth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 }
                }).toDestination();
                synth.volume.value = -5;
            }
            Tone.start();
            state.soundInited = true;
            document.getElementById('start-overlay').classList.add('hidden');
            startLevel1();
        }

        function startLevel1() {
            state.currentIdx = 0;
            state.questions = [...SHAPES].sort(() => Math.random() - 0.5);
            loadNext();
        }

        function loadNext() {
            state.isLocked = false;
            const target = state.questions[state.currentIdx];
            const choices = [target];
            while(choices.length < 3) {
                const r = SHAPES[Math.floor(Math.random()*SHAPES.length)];
                if(!choices.find(c => c.id === r.id)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            document.getElementById('question').innerText = `Where is the ${target.name}?`;
            const container = document.getElementById('game-content');
            container.innerHTML = '';

            const cSize = 250; 

            choices.forEach(c => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                const canvas = document.createElement('canvas');
                canvas.width = cSize; canvas.height = cSize;
                card.appendChild(canvas);
                container.appendChild(card);
                initMiniThree(canvas, c);
                card.onclick = () => handleChoice(c, card, target);
            });

            speakTask();
        }

        function initMiniThree(canvas, shapeData) {
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 11;
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.45);
            dirLight.position.set(5, 10, 8);
            scene.add(dirLight);

            const mat = new THREE.MeshLambertMaterial({ 
                color: shapeData.color
            });
            
            const mesh = new THREE.Mesh(shapeData.geometry(3.2), mat);
            
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                color: 0x222222, 
                linewidth: 2, 
                opacity: 0.85,
                transparent: true
            }));
            mesh.add(line);

            mesh.rotation.x = 0.4;
            mesh.rotation.y = 0.4;
            scene.add(mesh);

            function animate() {
                if(!canvas.isConnected) return;
                requestAnimationFrame(animate);
                mesh.rotation.y += 0.015;
                mesh.rotation.x += 0.005;
                renderer.render(scene, camera);
            }
            animate();
        }

        function handleChoice(choice, card, target) {
            if(state.isLocked) return;
            state.isLocked = true;

            if(choice.id === target.id) {
                state.score += 10;
                document.getElementById('score-val').innerText = state.score;
                card.classList.add('correct');
                showFeedback("AWESOME! ✨", "var(--c-green)");
                
                if(synth) synth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "8n");

                setTimeout(() => {
                    state.currentIdx++;
                    if(state.currentIdx >= state.questions.length) showBonusIntro();
                    else loadNext();
                }, 1500);
            } else {
                card.classList.add('wrong');
                showFeedback("OOPS!", "var(--c-red)");
                
                if(synth) synth.triggerAttackRelease("C3", "8n");
                
                setTimeout(() => {
                    card.classList.remove('wrong');
                    state.isLocked = false;
                }, 800);
            }
        }

        function showFeedback(text, color) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.style.color = color;
            fb.style.display = 'block';
            fb.animate([
                { transform: 'translate(-50%, -30%) scale(0.5)', opacity: 0 },
                { transform: 'translate(-50%, -50%) scale(1.2)', opacity: 1, offset: 0.2 },
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1, offset: 0.8 },
                { transform: 'translate(-50%, -70%) scale(0.8)', opacity: 0 }
            ], { duration: 1500, easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)' });
            setTimeout(() => fb.style.display = 'none', 1400);
        }

        function speakTask() {
            if(!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(document.getElementById('question').innerText);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; 
            utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
        }

        // --- FRUIT NINJA MINI GAME ---
        const bCanvas = document.getElementById('bonus-canvas');
        const bCtx = bCanvas.getContext('2d');
        let fId, fRunning = false, fScore = 0, fStart;
        
        let fruits = [];
        let trails = [];
        let isSwiping = false;
        let swipePos = {x: 0, y: 0};
        let isExploding = false;

        function showBonusIntro() {
            document.getElementById('bonus-overlay').classList.remove('hidden');
        }

        function startFruitGame() {
            document.getElementById('bonus-start-btn').classList.add('hidden');
            fScore = 0; fruits = []; trails = []; isExploding = false;
            fStart = Date.now(); fRunning = true;
            document.getElementById('bonus-score').innerText = '0';
            updateFruitGame();
        }

        // Calculate distance from point to line segment
        function distToSegment(p, v, w) {
            let l2 = (w.x - v.x)**2 + (w.y - v.y)**2;
            if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        function checkSlice(p1, p2) {
            fruits.forEach(f => {
                if (!f.sliced && !isExploding) {
                    if (distToSegment(f, p1, p2) < f.radius) {
                        sliceObject(f);
                    }
                }
            });
        }

        function sliceObject(f) {
            f.sliced = true;
            if (f.type === 'bomb') {
                isExploding = true;
                f.radius *= 3; // Explosion size
                if(synth) synth.triggerAttackRelease("C2", "2n"); // Boom sound
                
                // End game after explosion
                setTimeout(() => endFruitGame("GAME OVER"), 1200);
            } else {
                fScore += 5;
                document.getElementById('bonus-score').innerText = fScore;
                if(synth) synth.triggerAttackRelease("C6", "32n"); // Slice sound
            }
        }

        function spawnFruit() {
            // Spawn logic
            if (Math.random() < 0.04) {
                let isBomb = Math.random() < 0.25; // 25% chance of bomb
                let types = ['apple', 'orange', 'watermelon'];
                let type = isBomb ? 'bomb' : types[Math.floor(Math.random()*types.length)];
                
                fruits.push({
                    x: 150 + Math.random() * 500,
                    y: 450, // Below canvas bottom
                    vx: (Math.random() - 0.5) * 6,
                    vy: -13 - Math.random() * 5, // Throw upward
                    radius: type === 'watermelon' ? 35 : (type === 'bomb' ? 30 : 25),
                    type: type,
                    sliced: false,
                    rotation: Math.random() * Math.PI,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    splitDist: 0
                });
            }
        }

        function drawHalfFruit(ctx, f, dir) {
            ctx.beginPath();
            ctx.arc(0, 0, f.radius, -Math.PI/2, Math.PI/2);
            
            if (f.type === 'apple') {
                ctx.fillStyle = "#e74c3c"; ctx.fill();
                ctx.fillStyle = "#fdfebd"; // Inside
                ctx.beginPath(); ctx.arc(0, 0, f.radius-4, -Math.PI/2, Math.PI/2); ctx.fill();
                // Seeds
                ctx.fillStyle = "#333";
                ctx.beginPath(); ctx.ellipse(4, 5, 2, 4, 0.3, 0, Math.PI*2); ctx.fill();
            } else if (f.type === 'orange') {
                ctx.fillStyle = "#e67e22"; ctx.fill();
                ctx.fillStyle = "#f39c12"; // Inside
                ctx.beginPath(); ctx.arc(0, 0, f.radius-3, -Math.PI/2, Math.PI/2); ctx.fill();
                ctx.strokeStyle = "white"; ctx.lineWidth = 2; // segments
                for(let i=-1; i<=1; i+=0.5) {
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(i)*f.radius, Math.sin(i)*f.radius); ctx.stroke();
                }
            } else if (f.type === 'watermelon') {
                ctx.fillStyle = "#27ae60"; ctx.fill();
                ctx.fillStyle = "#e74c3c"; // Inside
                ctx.beginPath(); ctx.arc(0, 0, f.radius-5, -Math.PI/2, Math.PI/2); ctx.fill();
                // Seeds
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(8, 10, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(15, -5, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(10, -18, 2, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawWholeFruit(ctx, f) {
            if (f.type === 'bomb') {
                ctx.fillStyle = "#111";
                ctx.beginPath(); ctx.arc(0, 0, f.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(-8, -f.radius-6, 16, 10); // cap
                ctx.strokeStyle = "#e67e22"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(0, -f.radius-6); ctx.quadraticCurveTo(15, -f.radius-15, 10, -f.radius-25); ctx.stroke(); // fuse
                // spark
                if (Math.random() > 0.3 && !isExploding) {
                    ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(10, -f.radius-25, 4+Math.random()*4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.arc(10, -f.radius-25, 2, 0, Math.PI*2); ctx.fill();
                }
            } else {
                ctx.beginPath(); ctx.arc(0, 0, f.radius, 0, Math.PI*2);
                if (f.type === 'apple') {
                    ctx.fillStyle = "#e74c3c"; ctx.fill();
                    // Stem and leaf
                    ctx.fillStyle = "#27ae60";
                    ctx.beginPath(); ctx.ellipse(-5, -f.radius, 8, 4, -0.4, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "#8e44ad"; ctx.lineWidth=3;
                    ctx.beginPath(); ctx.moveTo(0,-f.radius+2); ctx.lineTo(2,-f.radius-8); ctx.stroke();
                } else if (f.type === 'orange') {
                    ctx.fillStyle = "#e67e22"; ctx.fill();
                    ctx.fillStyle = "#d35400"; // Texture dots
                    for(let i=0; i<5; i++) {
                        ctx.beginPath(); ctx.arc(Math.random()*20-10, Math.random()*20-10, 1.5, 0, Math.PI*2); ctx.fill();
                    }
                } else if (f.type === 'watermelon') {
                    ctx.fillStyle = "#2ecc71"; ctx.fill();
                    ctx.strokeStyle = "#27ae60"; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.arc(0, 0, f.radius-2, -0.2, 0.2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, f.radius-2, Math.PI-0.2, Math.PI+0.2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, -f.radius); ctx.lineTo(0, f.radius); ctx.stroke();
                }
            }
        }

        function updateFruitGame() {
            if(!fRunning) return;
            
            let timeElapsed = (Date.now() - fStart)/1000;
            const remaining = Math.max(0, 60 - Math.floor(timeElapsed));
            document.getElementById('timer-val').innerText = remaining;
            
            if(remaining <= 0 && !isExploding) { endFruitGame("TIME'S UP!"); return; }

            // Background
            bCtx.clearRect(0, 0, 800, 400);
            
            // Draw wooden board background text faintly
            bCtx.fillStyle = "rgba(255,255,255,0.05)";
            bCtx.font = "bold 80px Poppins";
            bCtx.textAlign = "center";
            bCtx.fillText("SHAPE QUEST", 400, 220);

            if (!isExploding) spawnFruit();

            // Physics & Drawing Fruits
            for(let i = fruits.length - 1; i >= 0; i--) {
                let f = fruits[i];
                
                if (!f.sliced) {
                    f.vy += 0.25; // gravity
                    f.x += f.vx;
                    f.y += f.vy;
                    f.rotation += f.rotSpeed;
                } else {
                    // Halves fall faster
                    f.vy += 0.4;
                    f.y += f.vy;
                    f.splitDist += 4;
                }

                // Draw
                bCtx.save();
                bCtx.translate(f.x, f.y);
                bCtx.rotate(f.rotation);

                if (f.type === 'bomb' && isExploding && f.sliced) {
                    // Explosion Effect
                    let grad = bCtx.createRadialGradient(0,0,10, 0,0,f.radius);
                    grad.addColorStop(0, "white");
                    grad.addColorStop(0.2, "yellow");
                    grad.addColorStop(0.5, "orange");
                    grad.addColorStop(1, "rgba(255,0,0,0)");
                    bCtx.fillStyle = grad;
                    bCtx.beginPath(); bCtx.arc(0,0,f.radius*2, 0, Math.PI*2); bCtx.fill();
                } 
                else if (!f.sliced) {
                    drawWholeFruit(bCtx, f);
                } else {
                    // Draw halves
                    bCtx.save(); bCtx.translate(-f.splitDist, 0); bCtx.rotate(-0.1); drawHalfFruit(bCtx, f, -1); bCtx.restore();
                    bCtx.save(); bCtx.scale(-1, 1); bCtx.translate(-f.splitDist, 0); bCtx.rotate(-0.1); drawHalfFruit(bCtx, f, 1); bCtx.restore();
                }
                bCtx.restore();

                // Remove if off screen
                if(f.y > 500) fruits.splice(i, 1);
            }

            // Draw Blade Trail
            if (trails.length > 1 && !isExploding) {
                bCtx.beginPath();
                bCtx.moveTo(trails[0].x, trails[0].y);
                for(let i=1; i<trails.length; i++) bCtx.lineTo(trails[i].x, trails[i].y);
                bCtx.strokeStyle = "rgba(236, 240, 241, 0.8)";
                bCtx.lineWidth = 6;
                bCtx.lineCap = "round";
                bCtx.lineJoin = "round";
                bCtx.shadowColor = "rgba(189, 195, 199, 0.8)";
                bCtx.shadowBlur = 10;
                bCtx.stroke();
                bCtx.shadowBlur = 0; // reset
            }

            fId = requestAnimationFrame(updateFruitGame);
        }

        // Pointer/Swipe Interactions
        function updateSwipePos(e) {
            const rect = bCanvas.getBoundingClientRect();
            const scaleX = bCanvas.width / rect.width;
            const scaleY = bCanvas.height / rect.height;
            // Support both mouse and touch
            let clientX = e.clientX;
            let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            swipePos.x = (clientX - rect.left) * scaleX;
            swipePos.y = (clientY - rect.top) * scaleY;
        }

        function startSwipe(e) {
            if(!fRunning || isExploding) return;
            e.preventDefault();
            isSwiping = true;
            updateSwipePos(e);
            trails = [{x: swipePos.x, y: swipePos.y}];
        }

        function moveSwipe(e) {
            if(!isSwiping || !fRunning || isExploding) return;
            e.preventDefault();
            let oldPos = {x: swipePos.x, y: swipePos.y};
            updateSwipePos(e);
            trails.push({x: swipePos.x, y: swipePos.y});
            if(trails.length > 8) trails.shift(); // Keep trail short
            checkSlice(oldPos, swipePos);
        }

        function endSwipe() {
            isSwiping = false;
            trails = [];
        }

        bCanvas.addEventListener('mousedown', startSwipe);
        bCanvas.addEventListener('mousemove', moveSwipe);
        window.addEventListener('mouseup', endSwipe);

        bCanvas.addEventListener('touchstart', startSwipe, {passive: false});
        bCanvas.addEventListener('touchmove', moveSwipe, {passive: false});
        window.addEventListener('touchend', endSwipe);

        function endFruitGame(reason) {
            fRunning = false; cancelAnimationFrame(fId);
            state.score += fScore;
            document.getElementById('score-val').innerText = state.score;
            
            const btn = document.getElementById('bonus-start-btn');
            btn.classList.remove('hidden');
            
            if (reason === "GAME OVER") {
                btn.innerText = "GAME OVER >>";
                btn.classList.add('red');
            } else {
                btn.innerText = "GREAT JOB! >>";
                btn.classList.remove('red');
            }
            
            btn.onclick = () => {
                document.getElementById('bonus-overlay').classList.add('hidden');
                showFinalWin(reason === "GAME OVER");
            };
        }

        function showFinalWin(isGameOver) {
            fRunning = false;
            cancelAnimationFrame(fId);
            document.getElementById('bonus-overlay').classList.add('hidden');
            
            let winOverlay = document.getElementById('win-overlay');
            let title = document.getElementById('win-title');
            let icon = document.getElementById('win-icon');
            
            if (isGameOver) {
                title.innerText = "GAME OVER!";
                title.style.color = "var(--c-red)";
                icon.innerText = "💥";
            } else {
                title.innerText = "AMAZING JOB!";
                title.style.color = "var(--c-green)";
                icon.innerText = "🏆";
            }

            winOverlay.classList.remove('hidden');
            document.getElementById('final-score').innerText = state.score;
            startConfetti();
        }

        // Beautiful Paper Confetti Effect
        function startConfetti() {
            const fCanvas = document.getElementById('confetti-canvas');
            const fCtx = fCanvas.getContext('2d');
            fCanvas.width = window.innerWidth; fCanvas.height = window.innerHeight;
            
            let particles = [];
            const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#ce82ff', '#ff9600'];

            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * fCanvas.width,
                    y: Math.random() * fCanvas.height - fCanvas.height, // Start above screen
                    w: Math.random() * 10 + 8,
                    h: Math.random() * 15 + 8,
                    vx: Math.random() * 3 - 1.5,
                    vy: Math.random() * 4 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: Math.random() * 15 - 7.5
                });
            }

            function loop() {
                fCtx.clearRect(0,0,fCanvas.width,fCanvas.height);
                let active = false;
                
                particles.forEach((p, i) => {
                    p.x += p.vx; 
                    p.y += p.vy; 
                    p.rot += p.rotSpeed;
                    
                    // Add slight flutter
                    p.vx += Math.sin(p.rot * 0.05) * 0.1;
                    
                    if(p.y < fCanvas.height + 20) active = true;

                    fCtx.save();
                    fCtx.translate(p.x, p.y);
                    fCtx.rotate(p.rot * Math.PI / 180);
                    fCtx.fillStyle = p.color;
                    
                    // 3D flip effect simulation using scale
                    const scaleY = Math.abs(Math.sin(p.rot * 0.05));
                    fCtx.scale(1, scaleY);
                    
                    // Draw paper rectangle
                    fCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                    fCtx.restore();
                });
                
                if(active) {
                    requestAnimationFrame(loop);
                } else {
                    // loop confetti for endless fun
                    particles.forEach(p => {
                        p.y = Math.random() * -fCanvas.height;
                        p.x = Math.random() * fCanvas.width;
                    });
                    requestAnimationFrame(loop);
                }
            }
            loop();
        }
    </script>
