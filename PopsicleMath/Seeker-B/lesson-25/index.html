<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tens & Ones: Subtraction Fun</title>
    <!-- 100% Poppins Font for clean, Duolingo-style text -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Duolingo Color Palette */
            --c-blue: #1CB0F6;
            --c-blue-dark: #1899D6;
            --c-green: #58CC02;
            --c-green-dark: #58A700;
            --c-red: #FF4B4B;
            --c-red-dark: #EA2B2B;
            --c-yellow: #FFC800;
            --c-yellow-dark: #E5B400;
            --c-purple: #CE82FF;
            --c-purple-dark: #A568CC;
            --c-gray-light: #F7F7F8;
            --c-gray-mid: #E5E5E5;
            --c-gray-dark: #AFAFAF;
            --c-text-main: #4B4B4B;
            
            --font-main: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            /* Beautiful, clean, animated pastel gradient background */
            background: linear-gradient(-45deg, #FF9A9E, #FECFEF, #A1C4FD, #C2E9FB);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--c-text-main);
            touch-action: manipulation;
        }

        /* App Container - Increased max-width for wider frame */
        #app-wrapper {
            width: 100%;
            max-width: 800px; /* Widened from 600px */
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Header redesign matching the new layout requested */
        header {
            background: #ffffff;
            padding: 12px 20px;
            border-radius: 20px;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex-wrap: wrap; /* Allows wrapping on very small screens */
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .title-group h1 {
            color: var(--c-text-main);
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-board {
            background: var(--c-yellow);
            color: white;
            padding: 8px 20px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            border-bottom: 4px solid var(--c-yellow-dark);
            min-width: 100px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* Chunky SVG Buttons */
        .btn-icon {
            background: #ffffff;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 4px solid var(--c-gray-mid);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            padding: 8px;
        }
        .btn-icon svg { width: 22px; height: 22px; fill: var(--c-gray-dark); transition: fill 0.2s; }
        .btn-icon:hover svg { fill: var(--c-blue); }
        .btn-icon:active { 
            transform: translateY(4px); 
            border-bottom: 0px solid var(--c-gray-mid); 
            margin-bottom: 4px;
        }
        .btn-icon:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            transform: none;
            border-bottom: 4px solid var(--c-gray-mid);
            margin-bottom: 0;
        }

        /* Screens */
        .screen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 20px;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 8px solid var(--c-gray-mid);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .hidden { display: none !important; }

        .title-main { 
            font-size: 3.5rem; 
            color: var(--c-blue); 
            font-weight: 900;
            margin-bottom: 10px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .subtitle { 
            font-size: 1.3rem; 
            color: var(--c-gray-dark); 
            font-weight: 700; 
            margin-bottom: 30px;
        }

        .btn-primary {
            background: var(--c-green);
            color: white;
            border: none;
            border-bottom: 6px solid var(--c-green-dark);
            padding: 16px 40px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            width: 100%;
            max-width: 300px;
        }
        .btn-primary:active {
            transform: translateY(6px);
            border-bottom: 0px solid var(--c-green-dark);
            margin-bottom: 6px;
        }

        .btn-secondary {
            background: white;
            color: var(--c-blue);
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
        }
        .btn-secondary:active {
            transform: translateY(6px);
            border-bottom: 0px solid var(--c-gray-mid);
            margin-bottom: 6px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 25px;
        }
        .level-btn {
            background: white;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            border-radius: 16px;
            padding: 20px 10px;
            font-size: 2rem;
            font-weight: 800;
            color: var(--c-blue);
            cursor: pointer;
            transition: all 0.1s;
        }
        .level-btn:hover { border-color: var(--c-blue); color: var(--c-blue-dark); }
        .level-btn:active { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }

        .equation-bar {
            background: white;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            width: 100%;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .eq-nums {
            font-size: 4rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 20px;
            line-height: 1;
        }

        /* -------------------------------------------
           RESPONSIVE BOARD LAYOUT (MOBILE FRIENDLY)
        ---------------------------------------------- */
        .board-container {
            width: 100%;
            flex: 1;
            background: var(--c-gray-light);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--c-gray-mid);
            min-height: 400px;
        }

        /* Mobile First: Column layout for phone screens */
        .board-cols {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .col-divider {
            height: 4px;
            background: var(--c-gray-mid);
            border-radius: 2px;
            width: 100%;
        }

        .col-header {
            text-align: center;
            padding: 10px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1.2rem;
            border-radius: 16px;
            border-bottom: 4px solid rgba(0,0,0,0.1);
        }
        .header-tens { background: var(--c-blue); color: white; border-bottom-color: var(--c-blue-dark); }
        .header-ones { background: var(--c-green); color: white; border-bottom-color: var(--c-green-dark); }

        .col-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 15px 10px;
            border-radius: 16px;
            transition: background 0.2s, box-shadow 0.2s;
            min-height: 120px;
            background: rgba(0,0,0,0.02);
            border: 3px dashed rgba(0,0,0,0.05);
        }
        .col-content.drag-over {
            background: rgba(88, 204, 2, 0.15);
            box-shadow: inset 0 0 0 4px var(--c-green);
            border-style: solid;
            border-color: var(--c-green);
        }

        .col-section {
            width: 100%;
            max-width: 280px; /* Limits spread of ones grid */
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            justify-items: center;
            align-items: center;
        }

        /* Desktop: Row layout for wider screens */
        @media (min-width: 650px) {
            .board-cols {
                flex-direction: row;
            }
            .col-divider {
                width: 4px;
                height: auto;
            }
        }

        /* -------------------------------------------
           BEAUTIFUL 3D BLOCKS (PERFECT SQUARES)
        ---------------------------------------------- */

        .ten-rod {
            display: flex;
            flex-direction: row; 
            background-color: var(--c-blue);
            border-radius: 8px;
            border: 2px solid var(--c-blue-dark);
            border-bottom: 6px solid var(--c-blue-dark);
            width: 100%;
            max-width: 360px; /* Adapts dynamically up to 360px */
            cursor: pointer;
            touch-action: none;
            transition: transform 0.1s;
            overflow: hidden;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.3); 
        }
        .ten-rod:active { transform: scale(0.95); border-bottom-width: 2px; margin-top: 4px;}
        
        .ten-block {
            flex: 1;
            aspect-ratio: 1 / 1; /* Forces exact square! Height auto-adjusts based on width */
            border-right: 2px solid rgba(0,0,0,0.15); 
            position: relative;
        }
        
        .ten-block::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            box-shadow: inset 0 -2px 2px rgba(0,0,0,0.1), inset 0 2px 2px rgba(255,255,255,0.4);
        }
        .ten-block:last-child { 
            border-right: none; 
        }

        .one-cube {
            width: 100%;
            max-width: 40px; 
            aspect-ratio: 1 / 1; /* Forces perfect square */
            background-color: var(--c-green);
            border-radius: 6px;
            border: 2px solid var(--c-green-dark);
            border-bottom: 6px solid var(--c-green-dark);
            cursor: pointer;
            touch-action: none;
            transition: transform 0.1s;
            position: relative;
            box-shadow: inset 0 3px 4px rgba(255,255,255,0.3);
        }
        .one-cube:active { transform: scale(0.9) translateY(4px); border-bottom-width: 2px; }
        
        .one-cube::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            box-shadow: inset 0 -2px 2px rgba(0,0,0,0.1), inset 0 2px 2px rgba(255,255,255,0.4);
        }

        /* ------------------------------------------- */

        .dimmed {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hint-bar {
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            color: var(--c-text-main);
            margin: 5px 0 15px 0;
        }
        .hint-sub { font-size: 0.9rem; color: var(--c-gray-dark); display: block; margin-top: 2px;}

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            position: relative;
        }
        .opt-btn {
            height: 80px;
            background: white;
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--c-blue);
            border: 2px solid var(--c-gray-mid);
            border-bottom: 6px solid var(--c-gray-mid);
            cursor: pointer;
            transition: all 0.1s;
        }
        .opt-btn:active { transform: translateY(6px); border-bottom: 0px; margin-bottom: 6px; }
        
        .opt-btn.correct { 
            background: var(--c-green); color: white; 
            border-color: var(--c-green-dark); border-bottom-color: var(--c-green-dark); 
        }
        .opt-btn.wrong { 
            background: var(--c-red); color: white; 
            border-color: var(--c-red-dark); border-bottom-color: var(--c-red-dark); 
        }
        .opt-btn:disabled { 
            opacity: 0.5; cursor: default; 
            transform: none; border-bottom: 6px solid var(--c-gray-mid); margin-bottom: 0; 
            color: var(--c-gray-dark);
        }

        #answer-feedback {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 900;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
        }

        #bonus-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 100;
            display: none;
            overflow: hidden;
        }
        .balloon {
            position: absolute;
            width: 70px; height: 90px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            border: 3px solid rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .balloon:active { transform: scale(0.9); }
        .balloon::after {
            content: ''; position: absolute;
            bottom: -20px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 25px; background: var(--c-gray-dark);
        }
        
        .notif-bubble {
            background: var(--c-yellow);
            color: white;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            border-bottom: 4px solid var(--c-yellow-dark);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .progress-bar-container {
            width: 100%;
            height: 14px;
            background: var(--c-gray-mid);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--c-green);
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -20px) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }

        @media (max-width: 450px) {
            header { justify-content: center; } /* Force center if extremely small screen */
            .eq-nums { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div id="app-wrapper">
        <header>
            <div class="header-left">
                <div class="title-group">
                    <h1>TENS & ONES</h1>
                </div>
                <div class="controls">
                     <button class="btn-icon" id="btn-undo" onclick="undoAction()" title="Undo">
                        <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C20.48 10.9 16.84 8 12.5 8z"/></svg>
                     </button>
                     <button class="btn-icon" onclick="resetGame()" title="Reset">
                        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                     </button>
                     <button class="btn-icon" onclick="speakEquation()" title="Listen">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                     </button>
                </div>
            </div>
            <div class="score-board">★ <span id="score-display">0</span></div>
        </header>

        <!-- START SCREEN -->
        <div id="start-screen" class="screen-container">
            <h1 class="title-main">Ready to<br>Subtract?</h1>
            <p class="subtitle">Learn math the fun way!</p>
            <button class="btn-primary" onclick="goToSetup()">START</button>
        </div>

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="screen-container hidden">
            <h1 class="title-main" style="font-size: 2.5rem; color: var(--c-text-main);">Level Select</h1>
            <p class="subtitle">Choose the highest number</p>
            <div class="level-grid">
                <button class="level-btn" onclick="startLevel(10)">10</button>
                <button class="level-btn" onclick="startLevel(20)">20</button>
                <button class="level-btn" onclick="startLevel(30)">30</button>
                <button class="level-btn" onclick="startLevel(50)">50</button>
                <button class="level-btn" onclick="startLevel(100)">100</button>
            </div>
            <button class="btn-primary btn-secondary" onclick="resetGame()" style="font-size: 1.3rem; padding: 12px 35px;">BACK</button>
        </div>

        <!-- PLAYING SCREEN -->
        <div id="playing-screen" class="hidden" style="display: flex; flex-direction: column; flex: 1;">
            
            <div class="progress-bar-container">
                <div class="progress-fill" id="round-progress"></div>
            </div>

            <div class="equation-bar" style="margin-top: 0;">
                <div class="eq-nums">
                    <span style="color:var(--c-blue)" id="eq-n1">0</span>
                    <span style="color:var(--c-gray-dark)">−</span>
                    <span style="color:var(--c-red)" id="eq-n2">0</span>
                    <span style="color:var(--c-gray-dark)">= ?</span>
                </div>
            </div>

            <div class="hint-bar">
                Tap blocks to subtract!
                <span class="hint-sub">Drag a Ten to Ones to break it, or a One to Tens to Make 10!</span>
            </div>

            <div class="board-container">
                <div class="board-cols">
                    <div class="col" id="tens-wrapper">
                        <div class="col-header header-tens">Tens</div>
                        <div class="col-content" id="tens-col"></div>
                    </div>
                    <div class="col-divider"></div>
                    <div class="col" id="ones-wrapper">
                        <div class="col-header header-ones">Ones</div>
                        <div class="col-content" id="ones-col"></div>
                    </div>
                </div>
            </div>

            <div class="options-grid" id="options-grid" style="margin-top: 15px;">
                <div id="answer-feedback"></div>
            </div>
        </div>

        <!-- FINISHED SCREEN -->
        <div id="finished-screen" class="screen-container hidden">
            <h1 class="title-main" style="color: var(--c-yellow); font-size: 4rem;">Awesome!</h1>
            <p class="subtitle" style="font-size: 1.5rem; margin-bottom: 10px;">Round Completed!</p>
            <p class="subtitle" style="font-size: 1.5rem; margin-bottom: 30px;">Final Score: <span id="final-score" style="color: var(--c-green); font-size: 3rem; font-weight: 900; display: block;">0</span></p>
            <button class="btn-primary" onclick="resetGame()">PLAY AGAIN</button>
        </div>

        <!-- NOTIFICATION -->
        <div id="notification-bubble" class="notif-bubble hidden">Ready!</div>

        <!-- BONUS -->
        <div id="bonus-overlay">
            <div style="position: absolute; top: 15%; width: 100%; text-align: center;">
                <h2 style="font-size: 4.5rem; color: var(--c-yellow); margin: 0; font-weight: 900; text-shadow: 0 4px 10px rgba(0,0,0,0.3);">BONUS!</h2>
                <p style="font-size: 1.8rem; color: white; font-weight: 700; text-shadow: 0 2px 5px rgba(0,0,0,0.3);">Pop the balloons!</p>
            </div>
            <div id="balloon-container"></div>
        </div>
    </div>

    <script>
        let state = {
            phase: 'start', 
            score: 0,
            questionIndex: 0,
            maxRange: 100,
            question: { n1: 0, n2: 0, ans: 0 },
            options: [],
            layout: { tens: 0, ones: 0 }, 
            removed: { tens: 0, ones: 0 },
            history: [],
            feedback: null,
            selectedOption: null,
            bonusActive: false,
            askedQuestions: new Set() 
        };

        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass) {
                    try {
                        audioCtx = new AudioContextClass();
                    } catch (e) {
                        console.log("Audio not supported");
                    }
                }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const ctx = audioCtx;
            const now = ctx.currentTime;
            
            if (type === 'pop') {
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.setValueAtTime(600, now);
                o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                g.gain.setValueAtTime(0.3, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(); o.stop(now + 0.1);
            } else if (type === 'success') {
                [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.type = 'triangle'; o.frequency.value = f;
                    g.gain.setValueAtTime(0, now + i*0.08);
                    g.gain.linearRampToValueAtTime(0.2, now + i*0.08 + 0.05);
                    g.gain.linearRampToValueAtTime(0, now + i*0.08 + 0.25);
                    o.start(now + i*0.08); o.stop(now + i*0.08 + 0.25);
                });
            } else if (type === 'wrong') {
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, now);
                o.frequency.linearRampToValueAtTime(80, now + 0.3);
                g.gain.setValueAtTime(0.2, now);
                g.gain.linearRampToValueAtTime(0, now + 0.3);
                o.start(); o.stop(now + 0.3);
            } else if (type === 'magic') {
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.type = 'sine';
                o.frequency.setValueAtTime(800, now);
                o.frequency.exponentialRampToValueAtTime(2000, now + 0.3);
                g.gain.setValueAtTime(0.15, now);
                g.gain.linearRampToValueAtTime(0, now + 0.3);
                o.start(); o.stop(now + 0.3);
            } else if (type === 'cheer') {
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.type = 'square';
                o.frequency.setValueAtTime(400, now);
                o.frequency.linearRampToValueAtTime(800, now + 0.5);
                g.gain.setValueAtTime(0.05, now);
                g.gain.linearRampToValueAtTime(0, now + 0.5);
                o.start(); o.stop(now + 0.5);
            }
        }

        function speakEquation() {
            if ('speechSynthesis' in window && window.SpeechSynthesisUtterance) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(`${state.question.n1} minus ${state.question.n2}`);
                u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.1;
                window.speechSynthesis.speak(u);
            }
        }

        function saveToHistory() {
            state.history.push(JSON.parse(JSON.stringify({
                layout: state.layout,
                removed: state.removed
            })));
            document.getElementById('btn-undo').disabled = false;
        }

        function undoAction() {
            if (state.history.length === 0) return;
            const prevState = state.history.pop();
            state.layout = prevState.layout;
            state.removed = prevState.removed;
            playSound('pop');
            updateUI();
        }

        function goToSetup() {
            state.phase = 'setup';
            updateUI();
            playSound('pop');
        }

        function startLevel(range) {
            state.maxRange = range;
            state.score = 0;
            state.questionIndex = 0;
            state.askedQuestions.clear();
            state.phase = 'playing';
            generateQuestion();
            updateUI();
            playSound('magic');
        }

        function generateQuestion() {
            const range = state.maxRange;
            let n1, n2, ans;
            let qKey;
            let attempts = 0;

            do {
                const minN1 = range <= 10 ? 5 : Math.floor(range / 2);
                n1 = Math.floor(Math.random() * (range - minN1 + 1)) + minN1;
                n2 = Math.floor(Math.random() * (n1 - 1)) + 1;
                ans = n1 - n2;
                qKey = `${n1}-${n2}`;
                attempts++;
            } while (state.askedQuestions.has(qKey) && attempts < 50);

            state.askedQuestions.add(qKey);
            
            const opts = [ans];
            while(opts.length < 4) {
                const o = ans + Math.floor(Math.random() * 11) - 5;
                if(o >= 0 && o <= range && !opts.includes(o)) opts.push(o);
            }
            
            state.question = { n1, n2, ans };
            state.options = opts.sort(() => Math.random() - 0.5);
            state.layout = { tens: Math.floor(n1/10), ones: n1 % 10 };
            state.removed = { tens: 0, ones: 0 };
            state.history = [];
            state.feedback = null;
            state.selectedOption = null;
            const feedbackEl = document.getElementById('answer-feedback');
            if(feedbackEl) feedbackEl.innerHTML = "";
            document.getElementById('btn-undo').disabled = true;
        }

        function resetGame() {
            state.phase = 'start'; state.bonusActive = false; state.history = [];
            updateUI();
            playSound('pop');
        }

        function subTen() {
            const targetTens = Math.floor(state.question.n2 / 10);
            const activeTens = state.layout.tens - state.removed.tens;
            if (state.removed.tens < targetTens && activeTens > 0) {
                saveToHistory();
                state.removed.tens++;
                playSound('pop');
                updateBoard();
            } else if (state.removed.tens >= targetTens) {
                showNotification("Enough Tens removed!");
            } else {
                showNotification("No Tens to remove!");
            }
        }

        function subOne() {
            const targetOnes = state.question.n2 % 10;
            const activeOnes = state.layout.ones - state.removed.ones;
            if (state.removed.ones < targetOnes && activeOnes > 0) {
                saveToHistory();
                state.removed.ones++;
                playSound('pop');
                updateBoard();
            } else if (state.removed.ones >= targetOnes) {
                showNotification("Enough Ones removed!");
            } else {
                showNotification("Break a Ten first!");
            }
        }

        function breakTen() {
            const activeTens = state.layout.tens - state.removed.tens;
            if (activeTens > 0) {
                saveToHistory();
                state.layout.tens--;
                state.layout.ones += 10;
                playSound('magic'); 
                showNotification("Great! 1 Ten Broken!");
                updateBoard();
            } else {
                showNotification("No Tens left to break!");
            }
        }

        function makeTen() {
            const activeOnes = state.layout.ones - state.removed.ones;
            if (activeOnes >= 10) {
                saveToHistory();
                state.layout.tens++;
                state.layout.ones -= 10;
                playSound('magic');
                showNotification("Awesome! 10 Ones Bundled!");
                updateBoard();
            } else {
                showNotification("Need at least 10 Ones to Make 10!");
                playSound('wrong');
            }
        }

        function handleAnswer(val) {
            if (state.feedback) return;
            state.selectedOption = val;
            const feedbackEl = document.getElementById('answer-feedback');
            if (val === state.question.ans) {
                playSound('success'); state.feedback = 'correct'; state.score += 10;
                feedbackEl.innerHTML = `<span style="color:var(--c-green)">Correct! ✨</span>`;
                setTimeout(startBonusRound, 1200);
            } else {
                playSound('wrong'); state.feedback = 'wrong';
                feedbackEl.innerHTML = `<span style="color:var(--c-red)">Try again! ❌</span>`;
                setTimeout(() => { 
                    state.feedback = null; state.selectedOption = null;
                    feedbackEl.innerHTML = ""; updateUI(); 
                }, 1200);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('start-screen').classList.toggle('hidden', state.phase !== 'start');
            document.getElementById('setup-screen').classList.toggle('hidden', state.phase !== 'setup');
            
            const playingScreen = document.getElementById('playing-screen');
            playingScreen.classList.toggle('hidden', state.phase !== 'playing');
            
            if (state.phase === 'playing') {
                document.getElementById('score-display').innerText = state.score;
                document.getElementById('eq-n1').innerText = state.question.n1;
                document.getElementById('eq-n2').innerText = state.question.n2;
                
                const progressPercent = (state.questionIndex / 10) * 100;
                document.getElementById('round-progress').style.width = `${progressPercent}%`;

                updateBoard(); renderOptions();
                document.getElementById('btn-undo').disabled = state.history.length === 0;
            }
            
            document.getElementById('finished-screen').classList.toggle('hidden', state.phase !== 'finished');
        }

        let dragInfo = {
            isDragging: false,
            startX: 0, startY: 0,
            clone: null,
            targetEl: null,
            type: null
        };

        function handlePointerDown(e, element, type) {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            e.preventDefault(); 
            
            dragInfo.isDragging = false;
            dragInfo.startX = e.clientX;
            dragInfo.startY = e.clientY;
            dragInfo.targetEl = element;
            dragInfo.type = type;

            document.addEventListener('pointermove', handlePointerMove);
            document.addEventListener('pointerup', handlePointerUp);
            document.addEventListener('pointercancel', handlePointerUp);
        }

        function isInside(e, rect) {
            return e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom;
        }

        function handlePointerMove(e) {
            if (!dragInfo.targetEl) return;
            
            const dx = Math.abs(e.clientX - dragInfo.startX);
            const dy = Math.abs(e.clientY - dragInfo.startY);

            // Increased tap threshold for better touch sensitivity on mobiles
            if (!dragInfo.isDragging && (dx > 12 || dy > 12)) {
                dragInfo.isDragging = true;
                
                dragInfo.clone = dragInfo.targetEl.cloneNode(true);
                dragInfo.clone.style.position = 'fixed';
                dragInfo.clone.style.pointerEvents = 'none';
                dragInfo.clone.style.zIndex = '1000';
                dragInfo.clone.style.opacity = '0.9';
                dragInfo.clone.style.transform = 'scale(1.1) rotate(5deg)';
                dragInfo.clone.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
                document.body.appendChild(dragInfo.clone);
                
                dragInfo.targetEl.style.opacity = '0.3';
            }

            if (dragInfo.isDragging && dragInfo.clone) {
                dragInfo.clone.style.left = (e.clientX - dragInfo.clone.offsetWidth / 2) + 'px';
                dragInfo.clone.style.top = (e.clientY - dragInfo.clone.offsetHeight / 2) + 'px';
                
                if (dragInfo.type === 'ten') {
                    const onesCol = document.getElementById('ones-col');
                    if (isInside(e, onesCol.getBoundingClientRect())) {
                        onesCol.classList.add('drag-over');
                    } else {
                        onesCol.classList.remove('drag-over');
                    }
                } else if (dragInfo.type === 'one') {
                    const tensCol = document.getElementById('tens-col');
                    if (isInside(e, tensCol.getBoundingClientRect())) {
                        tensCol.classList.add('drag-over');
                    } else {
                        tensCol.classList.remove('drag-over');
                    }
                }
            }
        }

        function handlePointerUp(e) {
            document.removeEventListener('pointermove', handlePointerMove);
            document.removeEventListener('pointerup', handlePointerUp);
            document.removeEventListener('pointercancel', handlePointerUp);

            const onesCol = document.getElementById('ones-col');
            const tensCol = document.getElementById('tens-col');
            onesCol.classList.remove('drag-over');
            tensCol.classList.remove('drag-over');

            if (dragInfo.clone) {
                dragInfo.clone.remove();
                dragInfo.clone = null;
            }
            if (dragInfo.targetEl) {
                dragInfo.targetEl.style.opacity = '1';
            }

            if (dragInfo.isDragging) {
                if (dragInfo.type === 'ten') {
                    if (isInside(e, onesCol.getBoundingClientRect())) breakTen();
                } else if (dragInfo.type === 'one') {
                    if (isInside(e, tensCol.getBoundingClientRect())) makeTen();
                }
            } else {
                if (dragInfo.type === 'ten') subTen();
                else if (dragInfo.type === 'one') subOne();
            }
            
            dragInfo.isDragging = false;
            dragInfo.targetEl = null;
            dragInfo.type = null;
        }

        function createRod() {
            const rod = document.createElement('div'); 
            rod.className = 'ten-rod';
            for(let j=0; j<10; j++) {
                let block = document.createElement('div');
                block.className = 'ten-block';
                rod.appendChild(block);
            }
            return rod;
        }

        function updateBoard() {
            const tensCol = document.getElementById('tens-col');
            tensCol.innerHTML = '';
            for(let i=0; i<state.layout.tens; i++) {
                const rod = createRod();
                if (i >= state.layout.tens - state.removed.tens) {
                    rod.classList.add('dimmed'); 
                } else {
                    rod.addEventListener('pointerdown', (e) => handlePointerDown(e, rod, 'ten'));
                }
                tensCol.appendChild(rod);
            }

            const onesCol = document.getElementById('ones-col');
            onesCol.innerHTML = '';
            const section = document.createElement('div'); 
            section.className = 'col-section';
            
            for(let i=0; i<state.layout.ones; i++) {
                const cube = document.createElement('div'); 
                cube.className = 'one-cube';
                if (i >= state.layout.ones - state.removed.ones) {
                    cube.classList.add('dimmed');
                } else {
                    cube.addEventListener('pointerdown', (e) => handlePointerDown(e, cube, 'one'));
                }
                section.appendChild(cube);
            }
            onesCol.appendChild(section);

            const doneTens = state.removed.tens === Math.floor(state.question.n2 / 10);
            const doneOnes = state.removed.ones === (state.question.n2 % 10);
            document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = !(doneTens && doneOnes));
            document.getElementById('btn-undo').disabled = state.history.length === 0;
        }

        function renderOptions() {
            const grid = document.getElementById('options-grid');
            const feedbackEl = document.getElementById('answer-feedback');
            grid.innerHTML = ''; 
            grid.appendChild(feedbackEl);
            
            state.options.forEach(opt => {
                const btn = document.createElement('button'); 
                btn.className = 'opt-btn';
                btn.innerText = opt;
                if (state.selectedOption === opt && state.feedback) btn.classList.add(state.feedback);
                btn.onclick = () => handleAnswer(opt); 
                grid.appendChild(btn);
            });
        }

        function showNotification(msg) {
            const el = document.getElementById('notification-bubble'); 
            el.innerText = msg;
            el.classList.remove('hidden'); 
            
            const newEl = el.cloneNode(true);
            el.parentNode.replaceChild(newEl, el);
            setTimeout(() => newEl.classList.add('hidden'), 2000);
        }

        function triggerConfetti() {
            if (typeof confetti !== 'undefined') {
                playSound('cheer');
                var duration = 4000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 8,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF']
                    });
                    confetti({
                        particleCount: 8,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }
        }

        function startBonusRound() {
            state.bonusActive = true;
            const overlay = document.getElementById('bonus-overlay');
            overlay.style.display = 'block';
            const container = document.getElementById('balloon-container');
            container.innerHTML = '';
            
            const colors = ['#1CB0F6', '#58CC02', '#FF4B4B', '#FFC800', '#CE82FF'];
            
            for(let i=0; i<15; i++) {
                const b = document.createElement('div');
                b.className = 'balloon'; 
                b.style.left = (Math.random()*85+5)+'%';
                b.style.top = '105%'; 
                
                const color = colors[Math.floor(Math.random()*colors.length)];
                b.style.backgroundColor = color;
                b.style.borderBottom = `6px solid rgba(0,0,0,0.2)`;
                
                let y = 105; const speed = 0.15 + Math.random()*0.2;
                const move = () => {
                    if(!state.bonusActive) return;
                    y -= speed; b.style.top = y + '%';
                    if(y > -20) requestAnimationFrame(move);
                };
                const pop = (e) => {
                    e.preventDefault(); 
                    playSound('pop'); 
                    b.remove(); 
                    state.score += 2; 
                    document.getElementById('score-display').innerText = state.score; 
                };
                b.onmousedown = pop; b.ontouchstart = pop;
                container.appendChild(b); move();
            }
            
            setTimeout(() => {
                state.bonusActive = false; overlay.style.display = 'none';
                state.questionIndex++;
                if(state.questionIndex < 10) { 
                    generateQuestion(); updateUI(); 
                } else { 
                    state.phase = 'finished'; 
                    document.getElementById('final-score').innerText = state.score; 
                    updateUI(); 
                    playSound('success');
                    triggerConfetti();
                }
            }, 6000);
        }

        updateUI();
    </script>
</body>
</html>
