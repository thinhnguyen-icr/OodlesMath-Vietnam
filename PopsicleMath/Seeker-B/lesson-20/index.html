<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Kept original stylesheet link as requested -->
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basketball Math Superstar Pro - V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --court-brown: #E27D60;
            --court-line: rgba(255, 255, 255, 0.85);
            --hoop-orange: #FF6B35;
            --sky-top: #4facfe;
            --sky-bottom: #00f2fe;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            background-color: #87CEEB;
            margin: 0;
            padding: 0;
        }

        .math-font { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 900; 
            letter-spacing: 1px;
        }
        
        /* Vibrant Sky Background */
        .sky-bg {
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        /* Friendly Sun - MOVED TO LEFT */
        .sun {
            position: absolute;
            top: 5%;
            left: 8%; /* Switched from right to left */
            width: 80px;
            height: 80px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500;
            animation: pulseSun 3s infinite alternate;
        }

        @keyframes pulseSun {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Improved Fluffy Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.95;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            animation: float linear infinite;
        }
        
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::before { 
            width: 55%; 
            height: 130%; 
            top: -60%; 
            left: 15%; 
        }
        .cloud::after { 
            width: 45%; 
            height: 100%; 
            top: -40%; 
            right: 15%; 
        }

        @keyframes float {
            from { transform: translateX(-300px); }
            to { transform: translateX(110vw); }
        }

        /* Court Design - Responsive */
        .court-floor {
            background-color: var(--court-brown);
            position: relative;
            border-top: 12px solid #C35B3A;
            overflow: hidden;
            z-index: 2;
        }
        .court-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .arc-3pt {
            position: absolute;
            top: -30vw;
            left: 50%;
            transform: translateX(-50%);
            width: 120vw;
            max-width: 900px;
            height: 120vw;
            max-height: 900px;
            border: 6px solid var(--court-line);
            border-radius: 50%;
        }
        .the-paint {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40vw;
            max-width: 320px;
            height: 30vh;
            max-height: 250px;
            border: 6px solid var(--court-line);
            border-top: none;
        }
        .free-throw-circle {
            position: absolute;
            top: 25vh;
            left: 50%;
            transform: translateX(-50%);
            width: 25vw;
            max-width: 200px;
            height: 25vw;
            max-height: 200px;
            border: 6px solid var(--court-line);
            border-radius: 50%;
        }

        /* Backboard */
        .backboard-container {
            width: 90vw;
            max-width: 380px;
            height: 220px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 8px solid #fff;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        .math-header {
            width: 90%;
            background: linear-gradient(to bottom, #ffffff, #f0f0f0);
            border-radius: 12px;
            padding: 10px 15px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            border: 3px solid #E2E8F0;
        }
        #math-display {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: #2D3748;
        }
        
        #tts-btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,198,255,0.4);
        }
        #tts-btn:active { transform: scale(0.85); box-shadow: 0 0 0 rgba(0,198,255,0); }

        .hoop-rim {
            width: 130px;
            height: 30px;
            border: 10px solid var(--hoop-orange);
            border-radius: 50%;
            margin-top: 30px;
            position: relative;
            z-index: 20;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2), inset 0 5px 0 rgba(255,255,255,0.3);
        }
        .hoop-net {
            width: 110px;
            height: 90px;
            background: repeating-linear-gradient(45deg, transparent, transparent 12px, rgba(255,255,255,0.7) 12px, rgba(255,255,255,0.7) 14px),
                        repeating-linear-gradient(-45deg, transparent, transparent 12px, rgba(255,255,255,0.7) 12px, rgba(255,255,255,0.7) 14px);
            clip-path: polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%);
            margin-top: -12px;
            z-index: 5;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }

        .ball-3d {
            background: radial-gradient(circle at 30% 30%, #ffad80 0%, #ff6b1a 40%, #c44500 80%, #6b2600 100%);
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.6), 0 25px 30px rgba(0,0,0,0.5);
            position: absolute;
            z-index: 999;
            pointer-events: none;
            border-radius: 50%;
        }
        .ball-line-h, .ball-line-v {
            position: absolute;
            background: #2a0f00;
            box-shadow: 0 1px 1px rgba(255,255,255,0.2);
        }
        .ball-line-h { top: 50%; width: 100%; height: 4px; transform: translateY(-50%); }
        .ball-line-v { left: 50%; height: 100%; width: 4px; transform: translateX(-50%); }
        .ball-curve-1, .ball-curve-2 {
            position: absolute; width: 70%; height: 100%; border: 4px solid #2a0f00; border-radius: 50%; top: 0;
        }
        .ball-curve-1 { left: -35%; }
        .ball-curve-2 { right: -35%; }

        .btn-option {
            background: linear-gradient(to bottom, #ffffff, #e2e8f0);
            border: 4px solid #fff;
            box-shadow: 0 10px 0 #cbd5e0, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 50;
            text-shadow: 1px 1px 0px #fff;
            color: #2b6cb0;
        }
        .btn-option:hover { transform: scale(1.1) translateY(-5px); box-shadow: 0 15px 0 #cbd5e0, 0 20px 25px rgba(0,0,0,0.2); }
        .btn-option:active { transform: scale(0.95) translateY(10px); box-shadow: 0 0 0 #cbd5e0, 0 5px 10px rgba(0,0,0,0.2); }

        .screen {
            position: absolute;
            inset: 0;
            z-index: 5;
        }

        .star-icon {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            animation: spinStar 10s linear infinite;
        }
        @keyframes spinStar { 100% { transform: rotate(360deg); } }
        
        .btn-main {
            background: linear-gradient(180deg, #FF9A44 0%, #FC6076 100%);
            box-shadow: 0 12px 0 #C43B4E, 0 20px 25px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            border: 4px solid rgba(255,255,255,0.4);
        }
        .btn-main:active {
            transform: translateY(12px) scale(0.98);
            box-shadow: 0 0 0 #C43B4E, 0 5px 10px rgba(0,0,0,0.3);
        }

        .text-gradient {
            background: linear-gradient(to right, #FF416C, #FF4B2B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px rgba(255,255,255,0.8));
        }
    </style>
</head>

    <style>

    <script>
        const state = {
            stars: 0,
            questionIndex: 0,
            questions: [],
            totalQuestions: 10,
            isAnimating: false,
            minigameScore: 0,
            minigameLevel: 1,
            cleanup: null,
            wasWrong: false
        };

        const ball = document.getElementById('basketball');
        const mathDisplay = document.getElementById('math-display');
        const answerContainer = document.getElementById('answer-container');
        const starCountDisplay = document.getElementById('star-count');
        const roundIndicator = document.getElementById('round-indicator');
        const ttsBtn = document.getElementById('tts-btn');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); 
                osc.frequency.setValueAtTime(659.25, now + 0.1); 
                osc.frequency.setValueAtTime(783.99, now + 0.2); 
                osc.frequency.setValueAtTime(1046.50, now + 0.3); 
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            } else if (type === 'wrong') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'hit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'swish') {
                const bufferSize = audioCtx.sampleRate * 0.3;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const src = audioCtx.createBufferSource();
                src.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass'; 
                filter.frequency.value = 1200;
                filter.Q.value = 0.5;
                
                src.connect(filter); filter.connect(gain);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                src.start(now); src.stop(now + 0.3);
            } else if (type === 'yay') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554.37, now + 0.15);
                osc.frequency.setValueAtTime(659.25, now + 0.3);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function createQ(isAdd) {
            let a, b, res;
            if (isAdd) {
                res = Math.floor(Math.random() * 9) + 2; 
                a = Math.floor(Math.random() * (res - 1)) + 1; 
                b = res - a;
            } else {
                a = Math.floor(Math.random() * 9) + 2; 
                b = Math.floor(Math.random() * (a - 1)) + 1; 
                res = a - b;
            }
            let opts = [res];
            while(opts.length < 3) {
                let diff = (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random()*2)+1);
                let alt = res + diff;
                if (alt > 0 && alt <= 12 && !opts.includes(alt)) opts.push(alt);
            }
            return {
                text: `${a} ${isAdd ? '+' : '-'} ${b} =`,
                speech: `${a} ${isAdd ? 'plus' : 'minus'} ${b} equals`,
                ans: res,
                opts: opts.sort(() => Math.random() - 0.5)
            };
        }

        function speak() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const q = state.questions[state.questionIndex];
            if (!q) return;

            window.speechSynthesis.cancel(); 
            const utter = new SpeechSynthesisUtterance(q.speech);
            utter.lang = "en-US";
            utter.rate = 0.75; 
            utter.pitch = 1.3; 
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Google US English') || v.name.includes('Female'));
            if(preferredVoice) utter.voice = preferredVoice;

            window.speechSynthesis.speak(utter);
        }

        if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSound('yay');
            state.stars = 0; state.questionIndex = 0;
            state.questions = Array.from({length:10}, (_, i) => createQ(i < 5)).sort(() => Math.random() - 0.5);
            starCountDisplay.textContent = "0";
            showScreen('screen-game');
            loadQ();
        }

        function loadQ() {
            if (state.questionIndex >= state.totalQuestions) { 
                playSound('yay');
                showScreen('screen-rewards'); 
                fireworks('fireworks-container', 20); 
                return; 
            }
            const q = state.questions[state.questionIndex];
            state.isAnimating = false;
            state.wasWrong = false;
            mathDisplay.textContent = q.text;
            roundIndicator.textContent = `Question ${state.questionIndex + 1}/${state.totalQuestions}`;
            
            answerContainer.innerHTML = '';
            q.opts.forEach(v => {
                const b = document.createElement('div');
                b.className = "btn-option w-20 h-20 md:w-28 md:h-28 rounded-3xl flex items-center justify-center text-4xl md:text-5xl font-black math-font";
                b.textContent = v;
                b.onclick = () => check(v, b);
                answerContainer.appendChild(b);
            });
            
            resetBallPosition();
            setTimeout(speak, 500);
        }

        function resetBallPosition() {
            const anchor = document.getElementById('ball-anchor').getBoundingClientRect();
            const container = document.getElementById('game-container').getBoundingClientRect();
            const ballRect = ball.getBoundingClientRect();
            ball.style.transition = 'none';
            ball.style.opacity = '1';
            ball.style.left = (anchor.left - container.left + (anchor.width / 2) - (ballRect.width / 2)) + 'px';
            ball.style.top = (anchor.top - container.top) + 'px';
            ball.style.transform = 'translate(0,0) scale(1) rotate(0deg)';
        }

        function check(v, el) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            window.speechSynthesis.cancel(); 
            
            const isCorrect = v === state.questions[state.questionIndex].ans;
            
            const hoopRect = document.getElementById('hoop-rim').getBoundingClientRect();
            const ballRect = ball.getBoundingClientRect();
            const containerRect = document.getElementById('game-container').getBoundingClientRect();

            const hoopCenterX = hoopRect.left - containerRect.left + hoopRect.width / 2;
            const ballCenterX = ballRect.left - containerRect.left + ballRect.width / 2;
            const dx = hoopCenterX - ballCenterX;
            const dy = (hoopRect.top - containerRect.top) - (ballRect.top - containerRect.top) - (ballRect.height/2);

            if (isCorrect) {
                ball.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
                ball.style.transform = `translate(${dx}px, ${dy}px) scale(0.6) rotate(360deg)`;
                
                setTimeout(() => {
                    playSound('swish');
                    ball.style.transition = 'transform 0.4s ease-in';
                    ball.style.transform = `translate(${dx}px, ${dy + 150}px) scale(0.6) rotate(540deg)`;
                    
                    setTimeout(() => {
                        ball.style.transition = 'transform 0.3s ease-out';
                        ball.style.transform = `translate(${dx + (Math.random()*40-20)}px, ${dy + 100}px) scale(0.6) rotate(600deg)`;
                        playSound('correct');
                        showFeedback('⭐'); 
                        
                        if (!state.wasWrong) {
                            state.stars += 3;
                            starCountDisplay.textContent = state.stars;
                            starCountDisplay.style.transform = 'scale(1.5)';
                            setTimeout(()=> starCountDisplay.style.transform = 'scale(1)', 300);
                        }
                        
                        state.questionIndex++;
                        setTimeout(loadQ, 800);
                    }, 400);
                }, 600);
            } else {
                state.wasWrong = true;
                const missDx = dx * 0.8;
                const missDy = dy - 20;
                ball.style.transition = 'transform 0.5s ease-out';
                ball.style.transform = `translate(${missDx}px, ${missDy}px) scale(0.8) rotate(180deg)`;
                
                setTimeout(() => {
                    ball.style.transition = 'transform 0.6s ease-in';
                    ball.style.transform = `translate(${missDx - 100}px, 400px) scale(0.8) rotate(-90deg)`;
                    playSound('wrong');
                    showFeedback('❌');
                    
                    setTimeout(() => {
                        state.isAnimating = false;
                        resetBallPosition();
                        el.style.opacity = "0.4";
                        el.style.transform = "scale(0.9)";
                        el.style.pointerEvents = "none";
                        el.style.boxShadow = "none";
                    }, 800);
                }, 500);
            }
        }

        function showFeedback(emoji) {
            const o = document.getElementById('feedback-overlay');
            const c = document.getElementById('feedback-content');
            c.textContent = emoji; o.style.opacity = '1';
            c.style.transform = 'scale(1.5)';
            setTimeout(() => { o.style.opacity = '0'; c.style.transform = 'scale(0.5)'; }, 1000);
        }

        // --- MINI GAME: BREAKOUT CANDY ---
        function startMiniGame() {
            playSound('yay');
            state.minigameScore = 0;
            state.minigameLevel = 1;
            showScreen('screen-minigame');
            document.getElementById('minigame-over').classList.add('hidden');
            document.getElementById('minigame-level').textContent = "LEVEL 1";
            document.getElementById('minigame-score').textContent = "0";
            
            const cv = document.getElementById('minigame-canvas');
            const ct = document.getElementById('minigame-canvas-container');
            cv.width = ct.clientWidth; cv.height = ct.clientHeight;
            
            window.addEventListener('resize', resizeCanvas);
            function resizeCanvas() {
                if(!document.getElementById('screen-minigame').classList.contains('hidden')) {
                    const activeCanvas = document.getElementById('minigame-canvas');
                    if(activeCanvas) {
                        activeCanvas.width = ct.clientWidth; 
                        activeCanvas.height = ct.clientHeight;
                    }
                }
            }

            initBreakout(cv, 1);
        }

        function initBreakout(oldCanvas, level) {
            // SỬA LỖI MINI-GAME CHÍNH TẠI ĐÂY
            // Nhân bản (clone) canvas TRƯỚC khi lấy Context để vẽ
            const canvas = oldCanvas.cloneNode(true);
            canvas.id = 'minigame-canvas'; // Đảm bảo ID đúng
            oldCanvas.parentNode.replaceChild(canvas, oldCanvas);
            
            const ctx = canvas.getContext('2d');
            
            const baseSpeed = canvas.width < 600 ? 4 : 5; 
            const ballSpeed = baseSpeed + (level * 1);
            let b = { x: canvas.width/2, y: canvas.height - 120, dx: ballSpeed * (Math.random()>0.5?1:-1), dy: -ballSpeed, r: canvas.width < 600 ? 10 : 14 };
            let p = { w: canvas.width < 600 ? 120 : 180, h: 25, x: canvas.width/2 - 60 };
            let drops = [];
            
            const rows = 3 + (level > 1 ? 1 : 0); 
            const cols = canvas.width < 600 ? 5 : 8; 
            const pad = canvas.width < 600 ? 8 : 15; 
            const offT = canvas.height * 0.1;
            const w = (canvas.width - (cols + 1) * pad) / cols;
            const h = canvas.width < 600 ? 30 : 45;
            let bricks = [];
            let activeBricks = 0;

            for (let c = 0; c < cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < rows; r++) {
                    const hue = (r * 45 + c * 15 + (level * 50)) % 360;
                    bricks[c][r] = { x: 0, y: 0, s: 1, c: `hsl(${hue}, 85%, 65%)` };
                    activeBricks++;
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                const grd = ctx.createRadialGradient(b.x-b.r/3, b.y-b.r/3, b.r/4, b.x, b.y, b.r);
                grd.addColorStop(0, "#ffb3d9");
                grd.addColorStop(1, "#ff1a8c");
                ctx.fillStyle = grd; ctx.fill(); 
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();

                ctx.fillStyle = '#4299e1'; 
                ctx.beginPath(); ctx.roundRect(p.x, canvas.height - 50, p.w, p.h, 15); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.roundRect(p.x + 5, canvas.height - 48, p.w - 10, p.h/3, 10); ctx.fill(); 

                activeBricks = 0;
                for (let c = 0; c < cols; c++) {
                    for (let r = 0; r < rows; r++) {
                        let br = bricks[c][r];
                        if (br.s === 1) {
                            br.x = c * (w + pad) + pad; br.y = r * (h + pad) + offT;
                            ctx.fillStyle = br.c; 
                            ctx.beginPath(); ctx.roundRect(br.x, br.y, w, h, 8); ctx.fill();
                            
                            ctx.fillStyle = 'rgba(255,255,255,0.4)';
                            ctx.beginPath(); ctx.roundRect(br.x + 4, br.y + 4, w - 8, h/3, 4); ctx.fill();
                            
                            ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.stroke();
                            activeBricks++;
                        }
                    }
                }

                if (activeBricks === 0) {
                    cancelAnimationFrame(state.cleanup);
                    playSound('yay');
                    if (level === 1) {
                        state.minigameLevel = 2;
                        document.getElementById('minigame-level').textContent = "LEVEL 2";
                        const msg = document.getElementById('level-up-msg');
                        msg.classList.remove('hidden');
                        setTimeout(() => {
                            msg.classList.add('hidden');
                            initBreakout(canvas, 2);
                        }, 2500);
                        return;
                    } else {
                        gameOver(true); 
                        return;
                    }
                }

                drops.forEach((d, idx) => {
                    d.x += d.vx; d.y += d.vy; d.vy += 0.1; 
                    ctx.save();
                    const fontSize = canvas.width < 600 ? 24 : 36;
                    ctx.font = `${fontSize}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    let emoji = d.type === 'bomb' ? '💣' : (d.type === 'star' ? '⭐' : '🍬');
                    
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "rgba(0,0,0,0.3)";
                    ctx.shadowOffsetY = 4;
                    
                    ctx.fillText(emoji, d.x, d.y);
                    ctx.restore();

                    if (d.y + fontSize/2 > canvas.height - 50 && d.y < canvas.height && d.x > p.x && d.x < p.x + p.w) {
                        if (d.type === 'candy') { 
                            state.minigameScore += 50; playSound('hit'); 
                        } else if (d.type === 'star') {
                            state.minigameScore += 100; playSound('correct');
                            p.w = Math.min(canvas.width - 20, p.w + 30); 
                        } else if (d.type === 'bomb') { 
                            state.minigameScore = Math.max(0, state.minigameScore - 50); 
                            p.w = Math.max(60, p.w - 30); playSound('wrong'); 
                        }
                        drops.splice(idx, 1);
                        document.getElementById('minigame-score').textContent = state.minigameScore;
                    }
                    if (d.y > canvas.height + 50) drops.splice(idx, 1);
                });

                if (b.x + b.dx > canvas.width - b.r || b.x + b.dx < b.r) { b.dx = -b.dx; playSound('hit'); }
                if (b.y + b.dy < b.r) { b.dy = -b.dy; playSound('hit'); }
                
                if (b.y + b.dy > canvas.height - 50 - b.r && b.y < canvas.height - 20) {
                    if (b.x > p.x - b.r && b.x < p.x + p.w + b.r) { 
                        b.dy = -Math.abs(b.dy); 
                        let hitPoint = b.x - (p.x + p.w/2);
                        b.dx = hitPoint * 0.15; 
                        playSound('hit'); 
                        
                        if(Math.abs(b.dx) < 1) b.dx = b.dx < 0 ? -2 : 2;
                    }
                }
                
                if (b.y > canvas.height) { 
                    playSound('wrong');
                    gameOver(false); 
                    return; 
                }

                let hitBrick = false;
                for (let c = 0; c < cols; c++) {
                    for (let r = 0; r < rows; r++) {
                        let br = bricks[c][r];
                        if (br.s === 1 && !hitBrick) {
                            let closestX = Math.max(br.x, Math.min(b.x, br.x + w));
                            let closestY = Math.max(br.y, Math.min(b.y, br.y + h));
                            
                            let distanceX = b.x - closestX;
                            let distanceY = b.y - closestY;
                            let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);
                            
                            if (distanceSquared < (b.r * b.r)) {
                                br.s = 0; hitBrick = true;
                                state.minigameScore += 10;
                                document.getElementById('minigame-score').textContent = state.minigameScore;
                                playSound('hit');
                                
                                if (Math.abs(distanceX) > Math.abs(distanceY)) {
                                    b.dx = -b.dx;
                                } else {
                                    b.dy = -b.dy;
                                }
                                
                                const rand = Math.random();
                                if(rand < 0.4) {
                                    let type = 'candy'; 
                                    if(rand < 0.1) type = 'bomb'; 
                                    else if(rand < 0.15) type = 'star'; 
                                    
                                    drops.push({ 
                                        x: br.x + w/2, y: br.y + h/2, 
                                        vx: (Math.random() - 0.5) * 4, vy: -2 - Math.random() * 2, 
                                        type: type
                                    });
                                }
                            }
                        }
                    }
                }
                
                b.x += b.dx; b.y += b.dy;
                state.cleanup = requestAnimationFrame(draw);
            }

            const move = (e) => {
                const r = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                if(clientX) {
                    const x = clientX - r.left;
                    p.x = Math.max(0, Math.min(canvas.width - p.w, x - p.w/2));
                }
            };
            
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, {passive:false});
            
            draw();
        }

        function gameOver(isWin) {
            cancelAnimationFrame(state.cleanup);
            const title = document.querySelector('#minigame-over h3');
            title.textContent = isWin ? "YOU WON!" : "GOOD JOB!";
            title.className = isWin ? "text-6xl md:text-8xl text-green-500 math-font mb-4 drop-shadow-md" : "text-6xl md:text-8xl text-red-500 math-font mb-4 drop-shadow-md";
            
            document.getElementById('minigame-over').classList.remove('hidden');
            document.getElementById('final-score-text').textContent = state.minigameScore;
            
            if(isWin) playSound('yay');
        }

        function summary() { 
            showScreen('screen-summary'); 
            
            document.querySelector('#summary-stars span').textContent = state.stars;
            document.getElementById('summary-final-score').textContent = state.minigameScore;
            
            playSound('yay');
            fireworks('summary-fireworks', 40); 
        }

        function resetGame() { 
            showScreen('screen-menu'); 
        }
        
        function showScreen(id) {
            if (state.cleanup) { cancelAnimationFrame(state.cleanup); state.cleanup = null; }
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id !== 'screen-game') ball.style.opacity = '0';
        }

        function fireworks(targetId, count = 15) {
            const container = document.getElementById(targetId);
            container.innerHTML = '';
            
            const colors = ['#FF1461', '#18FF92', '#5A87FF', '#FBF38C', '#FF8A00'];
            
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * (window.innerHeight * 0.7); 
                    
                    if(targetId === 'summary-fireworks' && i % 3 === 0) playSound('hit');

                    for(let j=0; j<30; j++) {
                        const f = document.createElement('div');
                        const col = colors[Math.floor(Math.random() * colors.length)];
                        const size = Math.random() * 8 + 4;
                        
                        f.style.cssText = `position:absolute;width:${size}px;height:${size}px;border-radius:50%;left:${x}px;top:${y}px;background:${col};z-index:2000;box-shadow:0 0 10px ${col};`;
                        container.appendChild(f);
                        
                        const a = Math.random() * Math.PI * 2; 
                        const d = Math.random() * 150 + 50;
                        
                        f.animate([
                            {transform:'translate(0,0) scale(1)', opacity:1}, 
                            {transform:`translate(${Math.cos(a)*d}px, ${Math.sin(a)*d + 100}px) scale(0)`, opacity:0}
                        ], {
                            duration: Math.random() * 1000 + 1000, 
                            easing:'cubic-bezier(0.25, 1, 0.5, 1)',
                            fill: 'forwards'
                        });
                        
                        setTimeout(() => f.remove(), 2500);
                    }
                }, i * 300);
            }
        }

        ttsBtn.onclick = (e) => { 
            e.stopPropagation();
            speak(); 
        };
        
        window.onload = () => {
            window.addEventListener('click', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
            showScreen('screen-menu');
        };
    </script>
</body>
