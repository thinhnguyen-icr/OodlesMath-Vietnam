<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tens and Ones Game</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tone.js for Audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <!-- Canvas Confetti for Fireworks -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Google Font 'Poppins' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Responsive sizes for cubes */
            --cube-size: 26px; 
            --rod-width: calc(var(--cube-size) * 10);
        }
        @media (min-width: 768px) {
            :root {
                --cube-size: 32px;
            }
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Animated Candy Gradient Background */
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            touch-action: none;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Bubbles Effect */
        .bubbles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }
        @keyframes rise {
            0% { bottom: -20px; transform: translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { bottom: 1080px; transform: translateX(-200px); opacity: 0; }
        }

        #game-container {
            max-width: 900px;
            max-height: 98vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            background-color: rgba(255, 255, 255, 0.95);
            border: 4px solid #fff;
            backdrop-filter: blur(10px);
        }

        /* Fun Text Gradient */
        .kid-title {
            background: linear-gradient(to right, #ff416c, #ff4b2b, #f6d365, #fda085);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            letter-spacing: 1px;
        }

        /* -- Drag & Drop Area -- */
        .tens-and-ones-frame {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 6px solid #8B5CF6;
            border-radius: 16px;
            background-color: #FDF4FF;
            min-height: 180px; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }
        
        .dropzone {
            min-height: 150px; 
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center; /* Center to make blocks perfectly neat */
            gap: 6px;
            position: relative;
        }
        
        .dropzone-tens {
            border-right: 6px dashed #C4B5FD;
            background-color: #F5F3FF;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }
        .dropzone-ones {
            background-color: #EFF6FF;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* -- 3D Realistic Unifix Cubes -- */
        .cube {
            cursor: pointer; /* Change to pointer to show it's clickable */
            user-select: none;
            border-radius: 6px;
            transition: transform 0.1s ease-out;
            touch-action: none; /* Crucial for mobile drag */
        }
        .cube:active {
            transform: scale(1.1);
            z-index: 50;
        }
        
        /* One Cube (Blue) */
        .one-cube {
            width: var(--cube-size); 
            height: var(--cube-size);
            background: radial-gradient(circle at 30% 30%, #60A5FA, #2563EB);
            border: 2px solid #1E3A8A;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), 
                        inset 2px 2px 4px rgba(255,255,255,0.5), 
                        2px 2px 5px rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        
        /* Ten Rod (Red) */
        .ten-rod {
            width: var(--rod-width);
            height: var(--cube-size);
            background: radial-gradient(circle at 50% 30%, #F87171, #DC2626);
            border: 2px solid #991B1B;
            display: flex;
            flex-direction: row;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), 
                        inset 2px 2px 4px rgba(255,255,255,0.4), 
                        3px 3px 6px rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden; /* Keep segments inside border */
        }
        .ten-rod-segment {
            width: var(--cube-size);
            height: 100%;
            border-right: 1px solid rgba(153, 27, 27, 0.6);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
        }
        .ten-rod-segment:last-child { border-right: none; }
        .ten-rod-segment:first-child { border-left: none; }

        /* -- Playful Flashcard -- */
        #flashcard-deck {
            width: 100px; 
            height: 120px; 
            position: relative; 
            cursor: pointer;
            perspective: 1000px;
            margin: 0 auto;
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 4px solid white;
        }
        .card-back {
            background: repeating-linear-gradient(45deg, #A78BFA, #A78BFA 10px, #8B5CF6 10px, #8B5CF6 20px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem; 
            font-weight: 900;
            text-shadow: 2px 2px 0px #5B21B6;
            transform: rotateY(0deg);
        }
        .card-front {
            background: #FFFBEB;
            color: #D97706;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem; 
            font-weight: 900;
            transform: rotateY(180deg);
            background-image: radial-gradient(#FDE68A 10%, transparent 10%);
            background-size: 10px 10px;
        }
        
        #flashcard-deck.is-flipped .card-back { transform: rotateY(-180deg); }
        #flashcard-deck.is-flipped .card-front { transform: rotateY(0deg); }
        
        /* -- Drag Clone -- */
        .drag-clone {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.9;
            transform: translate(-50%, -50%) scale(1.2);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px) rotate(-1deg); } 
            20%, 40%, 60%, 80% { transform: translateX(8px) rotate(1deg); }
        }
        .shake { animation: shake 0.5s ease-in-out; }

        @keyframes bounce-in {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .bounce-in { animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Kid-Friendly Chunky Buttons */
        .chunky-btn {
            transition: all 0.1s;
            border-bottom: 6px solid rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chunky-btn:active {
            transform: translateY(6px);
            border-bottom: 0px solid rgba(0,0,0,0.2);
            margin-top: 6px;
        }

        /* Mystery Box */
        .mystery-box {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
        }
        .mystery-box:hover {
            transform: scale(1.15) rotate(5deg);
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3));
            animation: none;
        }
        
        /* Headers for columns */
        .col-header {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 900;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }

    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 sm:p-4">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Decorative Background Bubbles -->
    <div class="bubbles" id="bubbles"></div>

    <div id="game-container" class="w-full rounded-3xl p-4 md:p-8 relative">
        
        <!-- Score Display -->
        <div class="absolute top-4 right-4 bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-black text-lg md:text-xl shadow-lg border-2 border-yellow-200 z-10 flex items-center gap-2">
            ⭐ <span id="score">Score: 0</span>
        </div>

        <!-- Title and Cards Area -->
        <div class="flex flex-col items-center pt-8 md:pt-0">
            <h1 class="text-3xl md:text-5xl font-black kid-title text-center mb-6">Tens & Ones Game</h1>
            
            <div class="flex flex-col md:flex-row justify-center items-center w-full gap-8"> 
                
                <!-- Deck Area -->
                <div class="text-center flex flex-col items-center">
                    <div id="flashcard-deck" title="Click to draw a new number!">
                        <div id="card-face-back" class="card-face card-back">?</div>
                        <div id="card-face-front" class="card-face card-front"></div>
                    </div>
                    <h2 class="text-lg font-bold text-gray-500 mt-4 animate-pulse">Tap the card!</h2>
                </div>

                <!-- Source Bank -->
                <div class="flex flex-col sm:flex-row items-center justify-center gap-6 p-4 md:p-6 bg-white border-4 border-blue-200 rounded-2xl shadow-inner relative w-full md:w-auto">
                    
                    <div id="tens-first-warning" class="text-sm md:text-base text-white font-bold hidden absolute -top-12 bg-red-500 px-4 py-2 rounded-full shadow-lg border-2 border-white bounce-in">
                        Oops! Put Tens first! 🦒
                        <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-8 border-r-8 border-t-8 border-transparent border-t-red-500"></div>
                    </div>
                    
                    <!-- Ten Rod Source -->
                    <div class="text-center flex flex-col items-center">
                        <p class="font-black text-xl text-red-500 mb-2">Ten Rod</p>
                        <div id="source-ten-rod" class="cube ten-rod hover:scale-105" data-type="ten" title="Click or Drag">
                            <script>
                                for(let i = 0; i < 10; i++) {
                                    document.write('<div class="ten-rod-segment"></div>');
                                }
                            </script>
                        </div>
                    </div>
                    
                    <!-- One Cube Source -->
                    <div class="text-center flex flex-col items-center">
                        <p class="font-black text-xl text-blue-500 mb-2">One Cube</p>
                        <div id="source-one-cube" class="cube one-cube hover:scale-105" data-type="one" title="Click or Drag"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- NEW: Instruction Block updated -->
        <div class="w-full flex justify-center my-4">
            <div class="bg-white bg-opacity-80 px-6 py-2 rounded-full shadow-sm border-2 border-purple-200 text-center animate-bounce" style="animation-duration: 2s;">
                <p class="text-purple-600 font-bold text-base md:text-lg">
                    ✨ Click or drag the rods and cubes into the boxes below! 👇
                </p>
            </div>
        </div>

        <!-- Working Area (Dropzones) -->
        <div class="w-full">
            <div class="tens-and-ones-frame">
                <div class="flex flex-col border-r-4 border-dashed border-purple-300">
                    <div class="col-header text-red-600 bg-red-100 mx-2 mt-2">TENS</div>
                    <div id="tens-column" class="dropzone dropzone-tens flex-grow"></div>
                </div>
                <div class="flex flex-col">
                    <div class="col-header text-blue-600 bg-blue-100 mx-2 mt-2">ONES</div>
                    <div id="ones-column" class="dropzone dropzone-ones flex-grow"></div>
                </div>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="flex justify-center items-center gap-4 mt-8">
            <button id="reset-board-button" class="chunky-btn px-6 py-3 bg-gray-300 text-gray-700 text-lg font-bold rounded-2xl hover:bg-gray-400">
                Clear Board
            </button>
            <button id="submit-button" class="chunky-btn px-10 py-3 bg-green-500 text-white text-2xl font-black rounded-2xl hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed disabled:border-b-0 disabled:translate-y-[6px]">
                CHECK! ✓
            </button>
        </div>

    </div>

    <!-- Feedback Modal (Correct/Incorrect) -->
    <div id="feedback-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm flex items-center justify-center z-50">
        <div id="feedback-content" class="text-6xl md:text-8xl font-black text-white p-10 rounded-3xl border-8 shadow-2xl bounce-in flex flex-col items-center text-center">
            <!-- Dynamic Content -->
        </div>
    </div>
    
    <!-- Bonus Round Modal -->
    <div id="bonus-modal" class="hidden fixed inset-0 bg-gradient-to-br from-purple-500 via-pink-500 to-orange-500 flex flex-col items-center justify-center z-50 p-4">
        <h2 class="text-6xl md:text-8xl font-black text-yellow-300 mb-2 kid-title text-center shadow-none animate-pulse">BONUS TIME!</h2>
        <p class="text-2xl md:text-3xl font-bold text-white mb-10 text-center">Tap a magic gift box! ✨</p>
        
        <div id="box-container" class="flex flex-wrap justify-center gap-8 md:gap-12 mb-8">
            <!-- Boxes injected via JS -->
        </div>
        <div id="bonus-result" class="text-4xl md:text-5xl text-white font-black mt-8 hidden bounce-in bg-black bg-opacity-30 px-8 py-4 rounded-full"></div>
    </div>
    
    <!-- Game Over Modal -->
    <div id="game-over-modal" class="hidden fixed inset-0 bg-gradient-to-br from-blue-500 to-purple-600 flex flex-col items-center justify-center z-50 p-4 text-center">
        <h2 class="text-7xl md:text-9xl font-black text-white mb-4 bounce-in" style="text-shadow: 0 10px 20px rgba(0,0,0,0.3)">AMAZING!</h2>
        <p class="text-3xl md:text-4xl font-bold text-blue-100 mb-8">You finished all the cards!</p>
        
        <div class="bg-white p-8 rounded-3xl shadow-2xl border-8 border-yellow-400 mb-10 transform rotate-2">
            <p class="text-2xl text-gray-500 font-bold mb-2">Your Final Score</p>
            <p id="final-score" class="text-6xl md:text-8xl text-orange-500 font-black kid-title shadow-none">0</p>
        </div>

        <button id="play-again-button" class="chunky-btn px-10 py-4 bg-yellow-400 text-yellow-900 border-yellow-600 text-3xl font-black rounded-full shadow-xl hover:bg-yellow-300">
            PLAY AGAIN 🚀
        </button>
    </div>

    <script>
        // -- Create Background Bubbles --
        const bubblesContainer = document.getElementById('bubbles');
        for (let i = 0; i < 15; i++) {
            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            let size = Math.random() * 60 + 20 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            bubblesContainer.appendChild(bubble);
        }

        // --- DOM Elements ---
        let gameContainer, scoreEl, cardDeckEl, cardBackEl, cardFrontEl, 
            submitButton, resetButton, feedbackModal, feedbackContent, 
            tensFirstWarning, bonusModal, boxContainer, bonusResult, 
            gameOverModal, finalScoreEl, playAgainButton, sourceTenRod, 
            sourceOneCube, tensColumn, onesColumn;
        
        // --- Game State ---
        let score = 0;
        let currentNumber = 0;
        let cardDeck = [];
        let isChecking = false;
        let isBonusChecking = false;
        let isDragging = false;
        let hasMoved = false; // Flag to check if drag or click
        let startPos = { x: 0, y: 0 };
        let dragClone = null;
        let dragSourceType = ''; 
        let audioInitialized = false;
        
        // --- Audio Synths (Tone.js) ---
        let popSynth, winChime, wrongSynth, cardSynth, dragSynth, dropSynth, bonusSynth, bigWinSynth;
        
        async function initAudio() {
            if (!audioInitialized) {
                await Tone.start();
                audioInitialized = true;
                
                // Kid-friendly sounds
                popSynth = new Tone.MembraneSynth({ pitchDecay: 0.05, envelope: { attack: 0.001, decay: 0.2, sustain: 0 } }).toDestination();
                winChime = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'triangle' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
                wrongSynth = new Tone.Synth({ oscillator: { type: 'fmsawtooth', modulationType: 'sine' }, envelope: { attack: 0.1, decay: 0.2, sustain: 0.1, release: 0.2 } }).toDestination();
                cardSynth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } }).toDestination();
                dragSynth = new Tone.FMSynth({ harmonicity: 2, modulationIndex: 5, oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.2 } }).toDestination();
                dropSynth = new Tone.PluckSynth({ attackNoise: 1, dampening: 2000, resonance: 0.8 }).toDestination();
                bonusSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'square' } }).toDestination();
                bigWinSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'triangle' }, envelope: { attack: 0.05, decay: 0.3, sustain: 0.4, release: 1.5 } }).toDestination();
            }
        }
        
        // Ensure Audio starts on first interaction
        document.body.addEventListener('pointerdown', async () => {
            if(!audioInitialized) await initAudio();
        }, { once: true });

        // --- Core Logic ---
        
        function initGame() {
            // Assign DOM
            gameContainer = document.getElementById('game-container');
            scoreEl = document.getElementById('score');
            cardDeckEl = document.getElementById('flashcard-deck');
            cardBackEl = document.getElementById('card-face-back');
            cardFrontEl = document.getElementById('card-face-front');
            submitButton = document.getElementById('submit-button');
            resetButton = document.getElementById('reset-board-button');
            feedbackModal = document.getElementById('feedback-modal');
            feedbackContent = document.getElementById('feedback-content');
            tensFirstWarning = document.getElementById('tens-first-warning');
            bonusModal = document.getElementById('bonus-modal');
            boxContainer = document.getElementById('box-container');
            bonusResult = document.getElementById('bonus-result');
            gameOverModal = document.getElementById('game-over-modal');
            finalScoreEl = document.getElementById('final-score');
            playAgainButton = document.getElementById('play-again-button');
            sourceTenRod = document.getElementById('source-ten-rod'); 
            sourceOneCube = document.getElementById('source-one-cube');
            tensColumn = document.getElementById('tens-column');
            onesColumn = document.getElementById('ones-column');
            
            score = 0;
            updateScore(); 
            shuffleDeck();
            drawCard();
            setupDragEvents(); 
            
            // Clean & re-add listeners
            submitButton.removeEventListener('click', handleSubmit);
            resetButton.removeEventListener('click', resetBoard);
            cardDeckEl.removeEventListener('click', drawCard);
            playAgainButton.removeEventListener('click', initGame);

            submitButton.addEventListener('click', handleSubmit);
            resetButton.addEventListener('click', resetBoard);
            cardDeckEl.addEventListener('click', drawCard);
            playAgainButton.addEventListener('click', initGame);

            gameOverModal.classList.add('hidden');
            bonusModal.classList.add('hidden');
        }

        function shuffleDeck() {
            // Array from 11 to 20 for 4-5yo
            cardDeck = Array.from({ length: 10 }, (_, i) => i + 11);
            for (let i = cardDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardDeck[i], cardDeck[j]] = [cardDeck[j], cardDeck[i]];
            }
        }

        function drawCard() {
            if (isChecking || isBonusChecking) return;
            
            if (cardDeck.length === 0) {
                showGameEnd();
                return;
            }
            
            cardDeckEl.classList.remove('is-flipped');
            submitButton.disabled = true;
            tensFirstWarning.classList.add('hidden'); 
            
            setTimeout(() => {
                currentNumber = cardDeck.pop();
                cardFrontEl.textContent = currentNumber;
                cardBackEl.textContent = "?"; 
                
                cardDeckEl.classList.add('is-flipped');
                if(audioInitialized) cardSynth.triggerAttackRelease("E5", "16n");
                
                resetBoard();
                submitButton.disabled = false;
            }, 300);
        }
        
        function resetBoard() {
            tensColumn.innerHTML = '';
            onesColumn.innerHTML = '';
            tensFirstWarning.classList.add('hidden');
            if(audioInitialized && !isChecking) dropSynth.triggerAttackRelease("C2", "16n");
        }

        function updateScore() {
            if (scoreEl) {
                scoreEl.textContent = `Score: ${score}`;
                // Pop animation
                scoreEl.parentElement.classList.remove('bounce-in');
                void scoreEl.parentElement.offsetWidth; // trigger reflow
                scoreEl.parentElement.classList.add('bounce-in');
            }
        }
        
        function handleSubmit() {
            if (isChecking || !currentNumber) return;
            
            const targetTens = Math.floor(currentNumber / 10);
            const targetOnes = currentNumber % 10;
            
            const placedTens = tensColumn.querySelectorAll('.ten-rod').length;
            const placedOnes = onesColumn.querySelectorAll('.one-cube').length;
            
            if (placedTens === targetTens && placedOnes === targetOnes) {
                handleCorrectAnswer();
            } else {
                handleIncorrectAnswer();
            }
        }

        function handleCorrectAnswer() {
            isChecking = true;
            if(audioInitialized) winChime.triggerAttackRelease(["C5", "E5", "G5", "C6"], "0.5");
            
            // Bắn pháo giấy từ 2 góc 
            const confettiColors = ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff'];
            
            // Từ bên trái qua phải
            confetti({
                particleCount: 60,
                spread: 80,
                angle: 60,
                origin: { x: 0, y: 0.6 },
                colors: confettiColors
            });
            
            // Từ bên phải qua trái
            confetti({
                particleCount: 60,
                spread: 80,
                angle: 120,
                origin: { x: 1, y: 0.6 },
                colors: confettiColors
            });

            showFeedback("YAY! Correct! 🎉", "bg-green-500", "border-green-300");
            
            setTimeout(() => {
                feedbackModal.classList.add('hidden');
                // 30% chance for a bonus round to keep it exciting
                if (Math.random() < 0.4) {
                    showBonusRound(); 
                } else {
                    score += 10;
                    updateScore();
                    isChecking = false;
                    drawCard();
                }
            }, 1800); 
        }

        function handleIncorrectAnswer() {
            isChecking = true;
            if(audioInitialized) wrongSynth.triggerAttackRelease("D3", "0.3");
            
            gameContainer.classList.add('shake');
            showFeedback("Oops! Try Again! 🤔", "bg-red-500", "border-red-300");
            
            setTimeout(() => {
                gameContainer.classList.remove('shake');
                feedbackModal.classList.add('hidden');
                isChecking = false;
            }, 1500);
        }

        function showFeedback(message, bgColor, borderColor) {
            feedbackContent.innerHTML = message;
            feedbackContent.className = `text-5xl md:text-7xl font-black text-white p-8 md:p-12 rounded-3xl border-8 shadow-2xl bounce-in flex flex-col items-center text-center ${bgColor} ${borderColor}`;
            feedbackModal.classList.remove('hidden');
        }
        
        // --- BONUS ROUND (Mystery Boxes) ---
        const doorPrizes = [5, 10, 15, 20]; 
        
        function showBonusRound() {
            isBonusChecking = true;
            bonusModal.classList.remove('hidden');
            bonusResult.classList.add('hidden');
            
            const shuffledPrizes = [...doorPrizes].sort(() => Math.random() - 0.5).slice(0,3);
            
            boxContainer.innerHTML = ''; 
            
            shuffledPrizes.forEach((prize) => {
                const box = document.createElement('div');
                box.className = 'mystery-box';
                box.innerHTML = `🎁`;
                box.dataset.prize = prize;
                box.addEventListener('click', handleBoxClick, { once: true });
                boxContainer.appendChild(box);
            });
            if(audioInitialized) winChime.triggerAttackRelease(["C5", "F5"], "0.3");
        }
        
        function handleBoxClick(e) {
            if (!isBonusChecking) return;
            
            const clickedBox = e.currentTarget;
            const prize = parseInt(clickedBox.dataset.prize);
            
            score += prize + 10; // Prize + base 10 points for correct answer
            updateScore();
            
            if(audioInitialized) bonusSynth.triggerAttackRelease(["C5", "E5", "G5"], "0.3");

            // Confetti burst on the clicked box
            const rect = clickedBox.getBoundingClientRect();
            const x = (rect.left + rect.width / 2) / window.innerWidth;
            const y = (rect.top + rect.height / 2) / window.innerHeight;
            confetti({ particleCount: 60, spread: 70, origin: { x, y } });

            const allBoxes = boxContainer.querySelectorAll('.mystery-box');
            allBoxes.forEach(box => {
                const boxPrize = parseInt(box.dataset.prize);
                box.style.animation = 'none'; // Stop floating
                
                if (box !== clickedBox) {
                    box.innerHTML = `<span class="text-3xl font-bold text-white bg-gray-500 bg-opacity-50 p-4 rounded-full shadow-inner block">+${boxPrize}</span>`;
                    box.style.transform = 'scale(0.8)';
                    box.style.opacity = '0.7';
                } else {
                    box.innerHTML = `<span class="text-6xl font-black text-yellow-300 drop-shadow-lg block bounce-in">+${boxPrize}</span>`;
                    box.style.transform = 'scale(1.2)';
                }
            });
            
            bonusResult.innerHTML = `Awesome! <span class="text-yellow-300">+${prize}</span> Bonus Points!`;
            bonusResult.classList.remove('hidden');
            
            setTimeout(() => {
                bonusModal.classList.add('hidden');
                isChecking = false;
                isBonusChecking = false;
                drawCard(); 
            }, 2500);
        }
        
        // --- GAME OVER & FIREWORKS ---
        function showGameEnd() {
            finalScoreEl.textContent = score;
            gameOverModal.classList.remove('hidden');
            
            if(audioInitialized) {
                const now = Tone.now();
                bigWinSynth.triggerAttackRelease(["C4", "E4", "G4"], "8n", now);
                bigWinSynth.triggerAttackRelease(["E4", "G4", "C5"], "8n", now + 0.2);
                bigWinSynth.triggerAttackRelease(["G4", "C5", "E5"], "8n", now + 0.4);
                bigWinSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "2n", now + 0.6);
            }

            fireworksSequence();
        }

        function fireworksSequence() {
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 60 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                // since particles fall down, start a bit higher than random
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // --- DRAG AND DROP & CLICK LOGIC ---
        
        function setupDragEvents() {
            [sourceTenRod, sourceOneCube].forEach(source => {
                source.addEventListener('mousedown', startDrag);
                source.addEventListener('touchstart', startDrag, { passive: false });
            });
            
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, { passive: false });
            
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }
        
        function startDrag(e) {
            if(e.type === 'touchstart') e.preventDefault();
            
            if (isChecking || isBonusChecking) return;
            
            isDragging = true;
            hasMoved = false;
            startPos = getEventPosition(e);
            
            const sourceEl = e.currentTarget;
            dragSourceType = sourceEl.dataset.type; 
            
            dragClone = sourceEl.cloneNode(true);
            if (dragSourceType === 'ten') {
                dragClone.innerHTML = sourceEl.innerHTML; 
            }
            
            dragClone.classList.add('drag-clone');
            document.body.appendChild(dragClone);
            
            // Ban đầu để clone ngay tại chuột/tay
            updateClonePosition(startPos.x, startPos.y);
            
            if(audioInitialized) dragSynth.triggerAttackRelease("C5", "16n"); 
        }
        
        function dragMove(e) {
            if (!isDragging || isBonusChecking) return;
            if(e.type === 'touchmove') e.preventDefault(); // Dừng cuộn trang khi đang kéo
            
            const pos = getEventPosition(e);
            
            // Tính toán khoảng cách di chuyển để phân biệt Click và Kéo
            if (!hasMoved) {
                const dx = pos.x - startPos.x;
                const dy = pos.y - startPos.y;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                    hasMoved = true;
                }
            }
            
            updateClonePosition(pos.x, pos.y);
        }
        
        function updateClonePosition(x, y) {
            if (!dragClone) return;
            dragClone.style.left = `${x}px`;
            dragClone.style.top = `${y}px`;
        }

        function endDrag(e) {
            if (!isDragging || !dragClone || isBonusChecking) return;
            
            isDragging = false;
            dragClone.style.display = 'none'; // Ẩn ngay để hàm lấy đúng element bên dưới
            
            const pos = getEventPosition(e);
            const dropTarget = document.elementFromPoint(pos.x, pos.y);
            
            document.body.removeChild(dragClone);
            dragClone = null;
            
            // Xử lý Click (nếu không có sự di chuyển chuột/tay)
            if (!hasMoved) {
                handleClickPlace(dragSourceType);
                return;
            }
            
            // Xử lý Thả (Drop)
            if (!dropTarget) {
                if(audioInitialized) dropSynth.triggerAttackRelease("C2", "16n");
                return;
            }

            const isTensDrop = tensColumn.contains(dropTarget) || tensColumn === dropTarget;
            const isOnesDrop = onesColumn.contains(dropTarget) || onesColumn === dropTarget;

            if (dragSourceType === 'ten' && isTensDrop) {
                handleClickPlace('ten');
            } else if (dragSourceType === 'one' && isOnesDrop) {
                handleClickPlace('one');
            } else {
                if(audioInitialized) dropSynth.triggerAttackRelease("C2", "16n"); // Dropped outside
            }
        }
        
        // Hàm dùng chung cho Click và Drop thành công
        function handleClickPlace(type) {
            if (type === 'ten') {
                placeCube('ten');
                if(audioInitialized) popSynth.triggerAttackRelease("G3", "8n");
            } else if (type === 'one') {
                const targetTens = Math.floor(currentNumber / 10);
                const placedTens = tensColumn.querySelectorAll('.ten-rod').length;
                
                if (placedTens < targetTens) {
                    tensFirstWarning.classList.remove('hidden');
                    if(audioInitialized) wrongSynth.triggerAttackRelease("C3", "8n");
                    gameContainer.classList.add('shake');
                    setTimeout(() => gameContainer.classList.remove('shake'), 500);
                } else {
                    tensFirstWarning.classList.add('hidden');
                    placeCube('one');
                    if(audioInitialized) popSynth.triggerAttackRelease("C4", "8n");
                }
            }
        }
        
        function placeCube(type) {
            let newCube;
            if (type === 'ten') {
                newCube = sourceTenRod.cloneNode(true);
                newCube.innerHTML = sourceTenRod.innerHTML; 
                tensColumn.appendChild(newCube);
            } else {
                newCube = sourceOneCube.cloneNode(true);
                onesColumn.appendChild(newCube);
            }
            
            // Chỉ thêm hiệu ứng nảy (không random xoay nghiêng nữa để block nằm hoàn toàn ngay ngắn)
            newCube.classList.add('bounce-in');
            
            // Click to remove
            newCube.addEventListener('click', () => {
                if(isChecking) return;
                newCube.style.transform = 'scale(0)';
                setTimeout(() => newCube.remove(), 100);
                if(audioInitialized) dropSynth.triggerAttackRelease("G2", "16n");
                if(type === 'ten') {
                    tensFirstWarning.classList.add('hidden');
                }
            });
        }
        
        function getEventPosition(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            if (e.changedTouches && e.changedTouches.length > 0) {
                return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }
        
        document.addEventListener('DOMContentLoaded', initGame);

    </script>
</body>
