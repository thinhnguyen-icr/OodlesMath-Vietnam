<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time of Day Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-dark: #334155;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Poppins', sans-serif;
            /* Animated pastel kid-friendly background */
            background: linear-gradient(-45deg, #ffb3ba, #ffdfba, #ffffba, #baffc9, #bae1ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
        }

        /* Cute polka dot overlay pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255,255,255,0.45) 4px, transparent 4px);
            background-size: 45px 45px;
            pointer-events: none;
            z-index: -1;
        }

        .hidden { display: none !important; }
        .flex { display: flex; }
        .justify-center { justify-content: center; }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }

        #app-container {
            width: 100%;
            max-width: 550px;
            background: var(--white);
            border-radius: clamp(20px, 5vw, 30px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 8px rgba(255,255,255,0.4);
            border: 4px solid #ffffff;
            padding: clamp(15px, 4vw, 25px);
            position: relative;
            overflow: hidden;
            min-height: clamp(480px, 85vh, 650px);
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(5%); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg); } 100% { transform: translateY(-120vh) rotate(10deg); } }
        @keyframes popExplode { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        @keyframes fireworks { 0% { transform: translate(0, 0) scale(0); opacity: 1; } 50% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; } }
        @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        
        .animate-bounce { animation: bounce 2s infinite ease-in-out; }
        .animate-spin-slow { animation: spin-slow 15s linear infinite; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-sway { transform-origin: bottom center; animation: sway 3s infinite ease-in-out; }

        .welcome-card { background: white; padding: clamp(20px, 5vw, 40px) 20px; border-radius: 24px; border: 4px solid #4ade80; text-align: center; width: 100%; }
        .title { font-size: clamp(2rem, 8vw, 2.5rem); color: #16a34a; font-weight: 900; margin-bottom: 20px; text-shadow: 2px 2px 0px #dcfce7; line-height: 1.2;}
        .btn-start { background: #22c55e; color: white; font-family: 'Poppins', sans-serif; font-weight: 800; font-size: clamp(1.2rem, 5vw, 1.5rem); padding: 15px 40px; border-radius: 16px; border: none; border-bottom: 6px solid #15803d; cursor: pointer; width: 100%; margin-top: 20px; transition: all 0.1s; }
        .btn-start:active { transform: translateY(4px); border-bottom: 2px solid #15803d; }

        .header-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 800; color: #64748b; font-size: clamp(0.9rem, 3vw, 1rem); }
        .level-badge { background: #3b82f6; color: white; padding: 4px 12px; border-radius: 999px; }
        .progress-bar-bg { width: 100%; height: 10px; background: #f1f5f9; border-radius: 999px; margin-bottom: clamp(10px, 3vw, 20px); overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #4ade80; width: 0%; transition: width 0.5s ease; }

        .prompt-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: clamp(10px, 3vw, 16px); }
        .prompt-text { font-size: clamp(1.1rem, 4vw, 1.25rem); font-weight: 800; color: #334155; text-align: center; }
        .speaker-btn { background: #e0f2fe; border: none; color: #0284c7; padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;}
        .speaker-btn:hover { transform: scale(1.1); }

        #scene-area { 
            width: 100%; 
            height: clamp(180px, 35vh, 280px); 
            margin-bottom: clamp(10px, 3vw, 20px); 
            border-radius: 16px;
            overflow: hidden; 
            box-shadow: inset 0 0 0 4px rgba(0,0,0,0.05);
            position: relative;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .scene-svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(8px, 2vw, 12px); width: 100%; flex-grow: 1; }
        .option-btn { padding: clamp(10px, 3vw, 16px); font-family: 'Poppins', sans-serif; border-radius: 16px; font-size: clamp(0.9rem, 3.5vw, 1.1rem); font-weight: 800; border: none; border-bottom: 4px solid rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.1s; }
        .option-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        
        .btn-morning { background: #fef9c3; color: #854d0e; border-color: #facc15; }
        .btn-afternoon { background: #dbeafe; color: #1e40af; border-color: #60a5fa; }
        .btn-evening { background: #ffedd5; color: #9a3412; border-color: #fb923c; }
        .btn-night { background: #e0e7ff; color: #3730a3; border-color: #818cf8; }

        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; border-radius: clamp(16px, 4vw, 24px); }
        .feedback-content { text-align: center; animation: bounce 1s ease-in-out; z-index: 55; position: relative;}
        .btn-next { background: #a855f7; font-family: 'Poppins', sans-serif; font-weight: 800; color: white; padding: 12px 30px; font-size: clamp(1.1rem, 4vw, 1.25rem); border-radius: 999px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.4); animation: pulse 1.5s infinite; transition: transform 0.2s;}
        .btn-next:active { transform: scale(0.95); }
        
        .incorrect-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ef4444; color: white; padding: 10px 30px; border-radius: 999px; font-size: clamp(1.2rem, 5vw, 1.5rem); font-weight: 800; border: 4px solid white; z-index: 60; pointer-events: none; }

        .teacher-toggle { position: absolute; top: 10px; right: 10px; opacity: 0.3; cursor: pointer; z-index: 100; font-size: 1.2rem;}
        .teacher-panel { background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 2px solid #cbd5e1; font-weight: 700;}
        .teacher-btn { background: white; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 0.8rem; }
        
        #bonus-game { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224, 242, 254, 0.95); z-index: 70; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; }
        
        .balloon { 
            position: absolute; bottom: -150px; width: clamp(60px, 15vw, 80px); height: clamp(75px, 18vw, 100px); border-radius: 50%; cursor: pointer; display: flex; justify-content: center; transition: transform 0.1s ease-out; -webkit-tap-highlight-color: transparent;
        }
        .balloon:active { transform: scale(0.9); }
        .balloon::after { content: ''; position: absolute; bottom: -40px; width: 2px; height: 40px; background: rgba(0,0,0,0.2); }
        .balloon::before { content: ''; position: absolute; bottom: -4px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 6px solid currentColor; }
        .balloon-pop-text { font-size: clamp(30px, 8vw, 50px); position: absolute; color: white; font-weight: bold; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); animation: popExplode 0.3s ease-out forwards; }

        #fireworks-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 51; overflow: hidden; }
        .firework-particle { position: absolute; font-size: 2rem; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        @media (max-height: 600px) {
            .welcome-card { padding: 20px 10px; }
            .title { margin-bottom: 10px; }
            #scene-area { height: 160px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div id="app-container">
        <div class="teacher-toggle" onclick="toggleTeacherMode()">⚙️</div>

        <!-- WELCOME SCREEN -->
        <div id="welcome-screen" class="screen justify-center" style="display:flex; flex-direction:column; height:100%; align-items:center; flex-grow: 1;">
            <div class="welcome-card">
                <h1 class="title">Time of Day Game!</h1>
                <div class="flex justify-center" style="gap: 20px; margin-bottom: 20px;">
                    <!-- Cute Sun Icon -->
                    <svg width="60" height="60" viewBox="0 0 100 100" class="animate-spin-slow">
                        <circle cx="50" cy="50" r="30" fill="#FEF08A"/>
                        <circle cx="50" cy="50" r="24" fill="#FACC15"/>
                        <path d="M50 5 L50 15 M50 85 L50 95 M5 50 L15 50 M85 50 L95 50 M18 18 L25 25 M75 75 L82 82 M18 82 L25 75 M75 18 L82 25" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
                    </svg>
                    <!-- Fixed Cute Moon Icon -->
                    <svg width="60" height="60" viewBox="0 0 100 100" class="animate-bounce">
                        <path d="M 50 10 A 40 40 0 1 0 90 50 A 30 30 0 0 1 50 10 Z" fill="#818CF8"/>
                    </svg>
                </div>
                <button class="btn-start" onclick="startGame()">Start Game ▶</button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="hidden" style="width:100%; height:100%;">
            <div class="header-info">
                <span class="level-badge" id="level-display">Level 1</span>
                <span id="question-counter">1 / 4</span>
            </div>

            <div id="teacher-panel" class="w-full teacher-panel hidden">
                <span>Teacher Mode</span>
                <div class="flex" style="gap: 5px;">
                    <button class="teacher-btn" onclick="toggleSound()">🔊 Sound</button>
                    <button class="teacher-btn" onclick="resetGame()">↻ Reset</button>
                    <button class="teacher-btn" onclick="skipLevel()">Skip ⏭</button>
                </div>
            </div>

            <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>

            <div class="prompt-container">
                <div id="prompt-text" class="prompt-text">Look at the picture.</div>
                <button class="speaker-btn" onclick="readPrompt()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
            </div>

            <!-- Beautiful Pure SVG Scenes Container -->
            <div id="scene-area"></div>

            <div class="options-grid">
                <button class="option-btn btn-morning" onclick="handleAnswer('Morning')">
                    <svg width="20" height="20" viewBox="0 0 100 100"><circle cx="50" cy="50" r="25" fill="#FBBF24"/><path d="M50 10 L50 20 M50 80 L50 90 M10 50 L20 50 M80 50 L90 50 M22 22 L29 29 M71 71 L78 78 M22 78 L29 71 M71 22 L78 29" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/></svg>
                    Morning
                </button>
                <button class="option-btn btn-afternoon" onclick="handleAnswer('Afternoon')">
                    <svg width="24" height="20" viewBox="0 0 120 100"><path d="M30 60 A20 20 0 0 1 70 60 A25 25 0 0 1 100 80 L20 80 A15 15 0 0 1 30 60" fill="#3B82F6"/></svg>
                    Afternoon
                </button>
                <button class="option-btn btn-evening" onclick="handleAnswer('Evening')">
                    <svg width="20" height="20" viewBox="0 0 100 100"><circle cx="50" cy="60" r="30" fill="#F97316"/><path d="M20 60 L80 60" stroke="#78350F" stroke-width="6"/></svg>
                    Evening
                </button>
                <button class="option-btn btn-night" onclick="handleAnswer('Night')">
                    <svg width="20" height="20" viewBox="0 0 100 100"><path d="M 50 10 A 40 40 0 1 0 90 50 A 30 30 0 0 1 50 10 Z" fill="#6366F1"/></svg>
                    Night
                </button>
            </div>
        </div>

        <!-- FEEDBACK OVERLAY -->
        <div id="feedback-overlay" class="overlay hidden">
            <div id="fireworks-container"></div>
            
            <div class="feedback-content">
                <svg id="feedback-icon" width="80" height="80" viewBox="0 0 100 100" style="margin: 0 auto 10px;">
                    <polygon points="50,10 61,39 92,39 67,58 76,88 50,70 24,88 33,58 8,39 39,39" fill="#FBBF24" stroke="#F59E0B" stroke-width="4"/>
                </svg>
                <h2 id="feedback-title" style="font-size: clamp(2rem, 6vw, 2.5rem); color:#16a34a; margin:0; font-weight: 900;">Great Job!</h2>
                <p id="feedback-sub" style="font-size: clamp(1.2rem, 4vw, 1.5rem); color:#475569; font-weight: 700;">It is Morning!</p>
                <p id="total-score-display" class="hidden" style="font-size: 1.25rem; color: #9333ea; font-weight: 800; background: #f3e8ff; padding: 10px; border-radius: 12px; margin-bottom: 20px;">Score: 0</p>
                
                <button id="btn-feedback-action" class="btn-next hidden" onclick="handleFeedbackAction()">Next ▶</button>
            </div>
        </div>

        <!-- INCORRECT TOAST -->
        <div id="incorrect-toast" class="incorrect-msg animate-shake hidden">Try Again!</div>

        <!-- BONUS GAME -->
        <div id="bonus-game" class="hidden">
            <h2 class="animate-bounce" style="color:#9333ea; font-size:clamp(1.5rem, 6vw, 2rem); font-weight: 900; margin:0; text-shadow: 2px 2px 0px #e9d5ff; text-align: center;">POP BALLOONS!</h2>
            <div style="font-size:clamp(1rem, 4vw, 1.25rem); font-weight:800; color:#475569; margin-top:10px; background: white; padding: 5px 20px; border-radius: 999px; border: 2px solid #cbd5e1;">
                ⏳ <span id="bonus-timer" style="color: #ef4444;">10</span>s &nbsp;|&nbsp; ⭐ <span id="bonus-score" style="color: #3b82f6;">0</span>
            </div>
            <div id="balloon-container" style="width:100%; height:100%; position:relative;"></div>
        </div>
    </div>

    <script>
        // --- STUNNING PURE SVG SCENES ---
        
        const scenes = {
            // LEVEL 1
            'Morning': `
                <svg class="scene-svg" viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="m-sky" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#7DD3FC" />
                            <stop offset="100%" stop-color="#BAE6FD" />
                        </linearGradient>
                    </defs>
                    <rect width="400" height="250" fill="url(#m-sky)" />
                    <!-- Cute Sun -->
                    <g transform="translate(180, 100)">
                        <circle cx="0" cy="0" r="50" fill="#FEF08A" class="animate-pulse"/>
                        <circle cx="0" cy="0" r="40" fill="#FACC15" />
                        <!-- Face -->
                        <circle cx="-12" cy="-5" r="5" fill="#334155" />
                        <circle cx="12" cy="-5" r="5" fill="#334155" />
                        <path d="M -10 10 Q 0 20 10 10" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" />
                        <circle cx="-20" cy="5" r="5" fill="#F87171" opacity="0.6"/>
                        <circle cx="20" cy="5" r="5" fill="#F87171" opacity="0.6"/>
                    </g>
                    <!-- Birds -->
                    <path d="M 80 80 Q 90 70 100 80 Q 110 70 120 80" fill="none" stroke="#334155" stroke-width="2" />
                    <path d="M 280 60 Q 290 50 300 60 Q 310 50 320 60" fill="none" stroke="#334155" stroke-width="2" />
                    <!-- Mountains/Hills -->
                    <path d="M -50 250 Q 50 150 150 250 Z" fill="#4ADE80" />
                    <path d="M 100 250 Q 250 100 450 250 Z" fill="#22C55E" />
                    <!-- Foreground -->
                    <rect y="220" width="400" height="30" fill="#16A34A" />
                </svg>
            `,
            'Afternoon': `
                <svg class="scene-svg" viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="a-sky" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#3B82F6" />
                            <stop offset="100%" stop-color="#93C5FD" />
                        </linearGradient>
                    </defs>
                    <rect width="400" height="250" fill="url(#a-sky)" />
                    <!-- High Cute Sun -->
                    <g transform="translate(300, 70)">
                        <!-- Rays -->
                        <g class="animate-spin-slow" transform-origin="0 0">
                            <line x1="0" y1="-55" x2="0" y2="-40" stroke="#FACC15" stroke-width="6" stroke-linecap="round" />
                            <line x1="0" y1="40" x2="0" y2="55" stroke="#FACC15" stroke-width="6" stroke-linecap="round" />

                            <line x1="40" y1="0" x2="55" y2="0" stroke="#FACC15" stroke-width="6" stroke-linecap="round" />
                            <line x1="-39" y1="-39" x2="-28" y2="-28" stroke="#FACC15" stroke-width="6" stroke-linecap="round" />
                            <line x1="39" y1="39" x2="28" y2="28" stroke="#FACC15" stroke-width="6" stroke-linecap="round" />
                            <line x1="-39" y1="39" x2="-28" y2="28" stroke="#FACC15" stroke-width="6" stroke-linecap="round" />
                            <line x1="39" y1="-39" x2="28" y2="-28" stroke="#FACC15" stroke-width="6" stroke-linecap="round" />
                        </g>
                        <!-- Body -->
                        <circle cx="0" cy="0" r="30" fill="#FDE047" />
                        <!-- Eyes -->
                        <circle cx="-10" cy="-5" r="4" fill="#334155" />
                        <circle cx="10" cy="-5" r="4" fill="#334155" />
                        <!-- Smile -->
                        <path d="M -8 5 Q 0 15 8 5" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" />
                        <!-- Cheeks -->
                        <circle cx="-15" cy="5" r="4" fill="#F87171" opacity="0.6"/>
                        <circle cx="15" cy="5" r="4" fill="#F87171" opacity="0.6"/>
                    </g>
                    <!-- Clouds -->
                    <path d="M 30 90 A 20 20 0 0 1 70 90 A 30 30 0 0 1 120 110 L 10 110 A 15 15 0 0 1 30 90" fill="#FFFFFF" opacity="0.9" class="animate-sway" />
                    <!-- Grass -->
                    <rect y="170" width="400" height="80" fill="#4ADE80" />
                    <path d="M 0 170 Q 200 150 400 170 Z" fill="#22C55E" />
                    
                    <!-- 2 Kids Playing Football -->
                    <!-- Boy 1 (Left) -->
                    <g transform="translate(110, 125)">
                        <path d="M 15 35 L 5 45" stroke="#FDBA74" stroke-width="6" stroke-linecap="round" />

                        <path d="M 25 50 L 35 65" stroke="#FDBA74" stroke-width="6" stroke-linecap="round" />

                        <path d="M 5 15 Q 20 -5 35 15 Q 20 5 5 15" fill="#475569" />
                        <circle cx="15" cy="13" r="2" fill="#334155" />
                        <circle cx="25" cy="13" r="2" fill="#334155" />
                        <path d="M 17 18 Q 20 22 23 18" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" />
                    </g>
                    <!-- Boy 2 (Right, kicking) -->
                    <g transform="translate(230, 115)">
                        <path d="M 25 35 L 35 45" stroke="#FDBA74" stroke-width="6" stroke-linecap="round" />
                        <path d="M 25 50 L 30 75" stroke="#FDBA74" stroke-width="6" stroke-linecap="round" />
                        <path d="M 15 50 L -5 60" stroke="#FDBA74" stroke-width="6" stroke-linecap="round" />
                        <circle cx="30" cy="77" r="5" fill="#334155" />
                        <circle cx="-7" cy="62" r="5" fill="#EF4444" />
                        <rect x="10" y="25" width="20" height="28" fill="#3B82F6" rx="6" />
                        <rect x="10" y="45" width="20" height="10" fill="#EF4444" rx="2" />
                        <path d="M 15 35 L 5 30" stroke="#FDBA74" stroke-width="6" stroke-linecap="round" />
                        <circle cx="20" cy="15" r="14" fill="#FDBA74" />
                        <path d="M 5 15 Q 20 -5 35 15 Q 20 5 5 15" fill="#16A34A" />
                        <circle cx="15" cy="13" r="2" fill="#334155" />

                        <path d="M 17 18 Q 20 22 23 18" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" />
                    </g>
                    <!-- Football -->
                    <g transform="translate(195, 175)" class="animate-bounce">

        const Level1Data = [
            { id: 'l1-1', type: 'Morning', sceneKey: 'Morning', prompt: "The sun comes up. Breakfast time." },
            { id: 'l1-2', type: 'Afternoon', sceneKey: 'Afternoon', prompt: "The sun is high. Play time." },
            { id: 'l1-3', type: 'Evening', sceneKey: 'Evening', prompt: "Sun goes down. Dinner time." },
            { id: 'l1-4', type: 'Night', sceneKey: 'Night', prompt: "It is dark. Sleep time." },
        ];

        const Level2Data = [
            { id: 'l2-1', type: 'Morning', sceneKey: 'MorningL2', prompt: "Wake up! The alarm rings." },
            { id: 'l2-2', type: 'Afternoon', sceneKey: 'AfternoonL2', prompt: "School is over. Let's play!" },
            { id: 'l2-3', type: 'Evening', sceneKey: 'EveningL2', prompt: "Time to relax on the sofa." },
            { id: 'l2-4', type: 'Night', sceneKey: 'NightL2', prompt: "The owl is awake. It is dark." },
        ];

        let gameState = { 
            started: false, 
            level: 1, 
            questions: [], 
            currentIndex: 0, 
            soundEnabled: true, 
            isBonusRound: false,
            totalScore: 0
        };
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!gameState.soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.linearRampToValueAtTime(783.99, now + 0.2); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.start(); osc.stop(now + 0.5);
            } else if (type === 'incorrect') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(100, now + 0.2); gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2);
            } else if (type === 'pop') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(); osc.stop(now + 0.15);
            } else if (type === 'start') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(440, now); 
                osc.frequency.setValueAtTime(554.37, now + 0.15); 
                osc.frequency.setValueAtTime(659.25, now + 0.3); 
                osc.frequency.setValueAtTime(880, now + 0.45); 
                gain.gain.setValueAtTime(0.3, now); 
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0); 
                osc.start(); osc.stop(now + 1.0);
            }
        }

        function speak(text, force = false) {
            if (!gameState.soundEnabled && !force) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; utterance.pitch = 1.1;
            utterance.lang = "en-US";
            window.speechSynthesis.speak(utterance);
        }

        // DOM Elements
        const els = {
            welcome: document.getElementById('welcome-screen'),
            game: document.getElementById('game-screen'),
            level: document.getElementById('level-display'),
            counter: document.getElementById('question-counter'),
            progress: document.getElementById('progress-fill'),
            prompt: document.getElementById('prompt-text'),
            scene: document.getElementById('scene-area'),
            feedback: document.getElementById('feedback-overlay'),
            fIcon: document.getElementById('feedback-icon'),
            fTitle: document.getElementById('feedback-title'),
            fSub: document.getElementById('feedback-sub'),
            fBtn: document.getElementById('btn-feedback-action'),
            totalScoreDisplay: document.getElementById('total-score-display'),
            toast: document.getElementById('incorrect-toast'),
            teacher: document.getElementById('teacher-panel'),
            bonus: document.getElementById('bonus-game'),
            balloons: document.getElementById('balloon-container'),
            bTimer: document.getElementById('bonus-timer'),
            bScore: document.getElementById('bonus-score'),
            fireworks: document.getElementById('fireworks-container')
        };

        function startGame() {
            initAudio(); 
            gameState.started = true; 
            gameState.totalScore = 0; 
            loadLevel(1);
            els.welcome.classList.add('hidden'); 
            els.game.classList.remove('hidden'); 
            els.game.style.display = 'flex'; 
            els.game.style.flexDirection = 'column';
            playSound('start'); speak("Level One. Look at the picture. What time is it?");
        }

        function loadLevel(lvl) {
            gameState.level = lvl; gameState.currentIndex = 0;
            gameState.questions = (lvl === 1) ? [...Level1Data] : [...Level2Data].sort(() => Math.random() - 0.5);
            updateUI();
        }

        function updateUI() {
            if (gameState.currentIndex >= gameState.questions.length) return;
            const currentQ = gameState.questions[gameState.currentIndex];
            els.level.textContent = `Level ${gameState.level}`;
            els.counter.textContent = `${gameState.currentIndex + 1} / ${gameState.questions.length}`;
            els.progress.style.width = `${(gameState.currentIndex / gameState.questions.length) * 100}%`;
            els.prompt.textContent = currentQ.prompt;
            els.scene.innerHTML = scenes[currentQ.sceneKey];
        }

        function readPrompt() { speak(gameState.questions[gameState.currentIndex].prompt, true); }

        function handleAnswer(ans) {
            if (!els.feedback.classList.contains('hidden')) return;
            const currentQ = gameState.questions[gameState.currentIndex];
            if (ans === currentQ.type) {
                playSound('correct'); 
                showFeedback(true, currentQ.type);
            } else {
                playSound('incorrect'); 
                showIncorrectToast();
            }
        }

        function showFeedback(isCorrect, text) {
            if (isCorrect) {
                els.fIcon.innerHTML = `<polygon points="50,10 61,39 92,39 67,58 76,88 50,70 24,88 33,58 8,39 39,39" fill="#FBBF24" stroke="#F59E0B" stroke-width="4"/>`;
                els.fTitle.textContent = "Great Job!"; 
                els.fTitle.style.color = "#16a34a";
                els.fSub.textContent = `It is ${text}!`;
                els.fBtn.classList.add('hidden'); 
                els.totalScoreDisplay.classList.add('hidden');
                els.fireworks.innerHTML = ''; 
                els.feedback.classList.remove('hidden');

                setTimeout(() => {
                    startBonusRound();
                }, 1500);
            }
        }

        function nextQuestion() {
            gameState.currentIndex++;
            if (gameState.currentIndex < gameState.questions.length) {
                updateUI(); speak("Look at the picture.");
            } else {
                if (gameState.level === 1) {
                    els.fIcon.innerHTML = `<circle cx="50" cy="50" r="40" fill="#3B82F6"/><path d="M30 50 L45 65 L70 35" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>`;
                    els.fTitle.textContent = "Level 1 Complete!"; 
                    els.fTitle.style.color = "#2563eb";
                    els.fSub.textContent = "Ready for Level 2?";
                    els.fBtn.textContent = "Start Level 2 ▶";
                    els.fBtn.classList.remove('hidden');
                    els.totalScoreDisplay.classList.add('hidden');
                    els.fBtn.onclick = () => { els.feedback.classList.add('hidden'); loadLevel(2); speak("Level Two. Get ready!"); };
                    els.feedback.classList.remove('hidden'); 
                    playSound('win');
                } else {
                    els.fIcon.innerHTML = `<path d="M20 30 Q10 30 10 40 Q10 60 30 70 L45 90 L55 90 L70 70 Q90 60 90 40 Q90 30 80 30 Z" fill="#FBBF24" stroke="#F59E0B" stroke-width="4"/><rect x="40" y="30" width="20" height="60" fill="#F59E0B"/>`;
                    els.fTitle.textContent = "YOU WON!"; 
                    els.fTitle.style.color = "#d97706";
                    els.fSub.textContent = "You are a superstar!";
                    
                    els.totalScoreDisplay.textContent = `Total Balloons Popped: ${gameState.totalScore} 🎈`;
                    els.totalScoreDisplay.classList.remove('hidden');

                    els.fBtn.textContent = "Play Again ↻";
                    els.fBtn.classList.remove('hidden');
                    els.fBtn.onclick = () => { els.feedback.classList.add('hidden'); resetGame(); };
                    
                    els.feedback.classList.remove('hidden'); 
                    playSound('win');
                    startFireworks();
                }
            }
        }

        function showIncorrectToast() {
            els.toast.classList.remove('hidden'); els.toast.classList.remove('animate-shake');
            void els.toast.offsetWidth; els.toast.classList.add('animate-shake');
            setTimeout(() => { els.toast.classList.add('hidden'); }, 1500);
        }

        let bonusInterval;
        let balloonSpawner;

        function startBonusRound() {
            els.feedback.classList.add('hidden'); els.bonus.classList.remove('hidden');
            gameState.isBonusRound = true; speak("Pop the balloons!");
            
            let timeLeft = 10; 
            els.bTimer.textContent = timeLeft; 
            els.bScore.textContent = gameState.totalScore; 
            els.balloons.innerHTML = '';

            spawnBalloon();
            balloonSpawner = setInterval(() => {
                if(timeLeft > 1) spawnBalloon();
            }, 600);

            bonusInterval = setInterval(() => {
                timeLeft--; 
                els.bTimer.textContent = timeLeft;
                if(timeLeft <= 0) endBonusRound();
            }, 1000);
        }

        function spawnBalloon() {
            const colors = [
                {bg: 'radial-gradient(circle at 30% 30%, #fca5a5, #ef4444)', border: '#b91c1c'},
                {bg: 'radial-gradient(circle at 30% 30%, #93c5fd, #3b82f6)', border: '#1d4ed8'},
                {bg: 'radial-gradient(circle at 30% 30%, #86efac, #22c55e)', border: '#15803d'},
                {bg: 'radial-gradient(circle at 30% 30%, #fde047, #eab308)', border: '#a16207'},
                {bg: 'radial-gradient(circle at 30% 30%, #d8b4fe, #a855f7)', border: '#7e22ce'},
                {bg: 'radial-gradient(circle at 30% 30%, #f9a8d4, #ec4899)', border: '#be185d'}
            ];
            
            const colorObj = colors[Math.floor(Math.random() * colors.length)];
            const b = document.createElement('div'); 
            b.className = 'balloon';
            b.style.background = colorObj.bg;
            b.style.color = colorObj.border; 
            b.style.left = (Math.random() * 80 + 10) + '%';
            
            const duration = Math.random() * 3 + 4;
            b.style.animation = `floatUp ${duration}s linear forwards`;
            
            const popBalloon = function(e) {
                e.preventDefault();
                if(b.dataset.popped) return; 
                b.dataset.popped = "true";
                
                gameState.totalScore++; 
                els.bScore.textContent = gameState.totalScore; 
                playSound('pop');
                
                b.style.background = 'transparent';
                b.style.color = 'transparent';

                const pt = document.createElement('div'); 
                pt.className = 'balloon-pop-text'; 
                const popIcons = ['💥', '✨', '⭐', '🎈'];
                pt.textContent = popIcons[Math.floor(Math.random()*popIcons.length)]; 
                b.appendChild(pt);

                setTimeout(() => { if(b.parentNode) b.remove(); }, 300);
            };

            b.addEventListener('mousedown', popBalloon);
            b.addEventListener('touchstart', popBalloon, {passive: false});
            
            setTimeout(() => { if(b.parentNode) b.remove(); }, duration * 1000);
            els.balloons.appendChild(b);
        }

        function endBonusRound() {
            clearInterval(bonusInterval); 
            clearInterval(balloonSpawner);
            gameState.isBonusRound = false; 
            els.bonus.classList.add('hidden'); 
            nextQuestion();
        }

        function startFireworks() {
            els.fireworks.innerHTML = '';
            const particles = 40;
            const colors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7'];
            const icons = ['✨', '🎇', '🎉', '🎊', '⭐'];
            
            for(let i=0; i<particles; i++) {
                let p = document.createElement('div');
                p.textContent = icons[Math.floor(Math.random()*icons.length)];
                p.className = 'firework-particle';
                
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * (window.innerWidth / 2) + 50;
                
                p.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                p.style.color = colors[Math.floor(Math.random()*colors.length)];
                p.style.animation = `fireworks ${1 + Math.random()}s ease-out forwards`;
                
                els.fireworks.appendChild(p);
            }
        }

        function toggleTeacherMode() { els.teacher.classList.toggle('hidden'); }
        function toggleSound() { gameState.soundEnabled = !gameState.soundEnabled; alert(`Sound is now ${gameState.soundEnabled ? 'ON' : 'OFF'}`); }
        function resetGame() {
            gameState.started = false; els.welcome.classList.remove('hidden'); els.game.classList.add('hidden');
            els.feedback.classList.add('hidden'); els.bonus.classList.add('hidden'); els.teacher.classList.add('hidden');
        }
        function skipLevel() { if(gameState.level === 1) { loadLevel(2); speak("Skipping to Level 2"); } else { nextQuestion(); } }
    </script>
</body>
</html>
