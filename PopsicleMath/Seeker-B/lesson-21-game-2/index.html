<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Math Stories!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            background-color: #a1c4fd;
        }

        /* --- MAGIC ANIMATED BACKGROUND --- */
        .magic-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 40%, #fdcbf1 80%, #a1c4fd 100%);
            background-size: 300% 300%;
            animation: gradientMove 15s ease infinite;
            z-index: -2;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- FLOATING BUBBLES --- */
        .bubbles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            margin: 0; padding: 0;
        }
        .bubbles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: floatUp 25s linear infinite;
            bottom: -150px;
        }
        .bubbles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bubbles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bubbles li:nth-child(3) { left: 70%; width: 40px; height: 40px; animation-delay: 4s; }
        .bubbles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bubbles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .bubbles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bubbles li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bubbles li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bubbles li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bubbles li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 40%; }
        }

        /* --- GAME INPUTS --- */
        .game-input {
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            font-weight: 900;
            text-align: center;
            border-radius: 16px;
            border: 4px dashed #9ca3af;
            background-color: rgba(255, 255, 255, 0.9);
            color: #374151;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            -moz-appearance: textfield;
            caret-color: transparent; /* Ẩn con trỏ nhấp nháy trên mobile cho đẹp */
        }
        @media (min-width: 640px) {
            .game-input {
                width: 60px; height: 60px; font-size: 1.8rem;
            }
        }
        
        .game-input::-webkit-outer-spin-button,
        .game-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .game-input:focus {
            border-style: solid;
            border-color: #3b82f6;
            transform: scale(1.15) translateY(-4px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.3);
            background-color: #fff;
        }

        .game-input.correct {
            border-style: solid;
            border-color: #22c55e;
            background-color: #f0fdf4;
            color: #16a34a;
            pointer-events: none;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-input.wrong {
            border-style: solid;
            border-color: #ef4444;
            background-color: #fef2f2;
            color: #dc2626;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-5deg); }
            75% { transform: translateX(8px) rotate(5deg); }
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .pop-in {
            animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.4) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        canvas#fireworks {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .bond-input {
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            background: transparent;
            text-align: center;
            font-size: 2rem;
            font-weight: 900;
            outline: none;
            border: none;
            caret-color: transparent;
        }
        @media (min-width: 640px) {
            .bond-input { font-size: 2.5rem; }
        }

        /* Nút bấm Jelly (Thạch) */
        .btn-jelly {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-jelly:hover {
            transform: translateY(-4px) scale(1.02);
            filter: brightness(1.1);
        }
        .btn-jelly:active {
            transform: translateY(4px) scale(0.95);
            box-shadow: 0 0px 0 #3730a3 !important; /* Xóa bóng khi bấm xuống */
        }
    </style>
</head>

            mouse: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Mouse%20face/3D/mouse_face_3d.png",
            cheese: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Cheese%20wedge/3D/cheese_wedge_3d.png",

        // --- ÂM THANH (Đã bổ sung tiếng Tap/Pop) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSound(type) {
            initAudio();
            if (type === 'correct') {
                playTone(523.25, 'sine', 0.15); 
                setTimeout(() => playTone(659.25, 'sine', 0.15), 100); 
                setTimeout(() => playTone(783.99, 'sine', 0.3), 200); 
            } else if (type === 'wrong') {
                playTone(250, 'sawtooth', 0.3, 0.05);
                setTimeout(() => playTone(200, 'sawtooth', 0.4, 0.05), 150);
            } else if (type === 'win') {
                playTone(440, 'square', 0.1, 0.05);
                setTimeout(() => playTone(440, 'square', 0.1, 0.05), 150);
                setTimeout(() => playTone(523.25, 'square', 0.1, 0.05), 300);
                setTimeout(() => playTone(659.25, 'square', 0.4, 0.08), 450);
            } else if (type === 'pop') {
                // Tiếng bụp dễ thương khi nhấn vào ô nhập liệu
                playTone(700, 'sine', 0.05, 0.03);
                setTimeout(() => playTone(1000, 'sine', 0.05, 0.03), 30);
            } else if (type === 'click') {
                playTone(600, 'triangle', 0.1, 0.05);
            }
        }

            const inputs = document.querySelectorAll('.game-input:not([readonly]), .bond-input:not([readonly])');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    playSound('pop');
                });
            });
        }

                    </h1>
                    <p class="text-xl sm:text-2xl text-slate-600 font-medium mb-8 md:mb-12">Let's solve fun math puzzles together!</p>
                    
                    <button onclick="playSound('click'); startGame()" class="btn-jelly bg-gradient-to-r from-green-400 to-emerald-500 text-white font-black text-2xl sm:text-3xl py-4 sm:py-5 px-10 sm:px-14 rounded-full shadow-[0_8px_0_#047857,0_15px_20px_rgba(4,120,87,0.4)]">
                        PLAY NOW 🚀
                    </button>
                </div>
            `;
        }

        function renderLevel() {
            if (currentLevelIndex >= levels.length) {
                renderEndScreen();
                return;
            }

            const level = levels[currentLevelIndex];
            appDiv.innerHTML = `
                <div class="w-full max-w-6xl pop-in pb-10">
                    <!-- Header -->
                    <div class="flex justify-between items-center mb-4 sm:mb-6 px-2 sm:px-4">
                        <div class="text-lg sm:text-xl font-bold text-slate-500 bg-white/90 backdrop-blur-sm px-4 sm:px-5 py-2 rounded-full shadow-sm border border-gray-100">Level ${currentLevelIndex + 1}/${levels.length}</div>
                        <div class="text-xl sm:text-2xl font-black text-yellow-600 bg-yellow-100 px-5 sm:px-6 py-2 rounded-full shadow-sm border-2 border-yellow-200 flex items-center gap-2">
                            ⭐ <span id="scoreDisplay">${score}</span>
                        </div>
                    </div>

                    <!-- Main Card -->
                    <div class="bg-white/95 backdrop-blur-md p-5 sm:p-8 md:p-12 rounded-[2.5rem] sm:rounded-[3rem] shadow-2xl border-4 ${level.theme} relative">
                        <h2 class="text-3xl sm:text-4xl md:text-5xl font-black text-center mb-8 md:mb-10 ${level.titleColor} drop-shadow-sm">
                            ${level.title}
                        </h2>
                        
                        ${level.visuals}
                        
                        <div class="flex justify-center w-full">
                            ${level.content}
                        </div>

                        <!-- Action Area -->
                        <div class="mt-8 sm:mt-12 text-center flex flex-col items-center gap-4">
                            <div id="feedbackMsg" class="h-8 text-xl sm:text-2xl font-bold transition-opacity duration-300 opacity-0"></div>
                            <button id="checkBtn" onclick="playSound('click'); checkAnswers()" class="btn-jelly bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black text-2xl sm:text-3xl py-4 sm:py-5 px-10 sm:px-16 rounded-full shadow-[0_8px_0_#3730a3,0_15px_20px_rgba(55,48,163,0.3)]">
                                Check ✨
                            </button>
                        </div>
                    </div>
                </div>
            `;

            attachInputSounds();

            const inputs = document.querySelectorAll('.game-input:not([readonly]), .bond-input:not([readonly])');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    e.target.classList.remove('wrong');
                    
                    if (e.target.value.length >= e.target.dataset.ans.length) {
                         if (index < inputs.length - 1) {
                             inputs[index+1].focus();
                         }
                    }
                });
            });
        }

        function renderEndScreen() {
            playSound('win');
            startFireworks();
            
            appDiv.innerHTML = `
                <div class="bg-white/95 backdrop-blur-xl p-8 sm:p-12 md:p-16 rounded-[3.5rem] shadow-2xl text-center max-w-2xl border-8 border-yellow-300 pop-in z-10 relative mt-10 w-[90%] mx-auto">
                    <img src="${ASSETS.trophy}" class="w-32 h-32 sm:w-40 sm:h-40 mx-auto mb-6 drop-shadow-2xl float-anim">
                    <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-4 drop-shadow-sm">
                        Awesome Job!
                    </h1>
                    <p class="text-2xl sm:text-3xl font-bold text-slate-600 mb-8">
                        You scored <span class="text-blue-600 text-5xl sm:text-6xl mx-2 font-black">${score}</span> stars!
                    </p>
                    <p class="text-xl sm:text-2xl text-slate-500 mb-10 font-medium">You are a Math Superstar! 🌟</p>
                    
                    <button onclick="playSound('click'); resetGame()" class="btn-jelly bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black text-2xl sm:text-3xl py-4 sm:py-5 px-10 sm:px-14 rounded-full shadow-[0_8px_0_#be123c,0_15px_20px_rgba(190,18,60,0.3)] w-full sm:w-auto">
                        Play Again 🔄
                    </button>
                </div>
            `;
        }

        // --- LOGIC GAME ---
        function startGame() {
            initAudio();
            currentLevelIndex = 0;
            score = 0;
            renderLevel();
        }

        function resetGame() {
            stopFireworks();
            startGame();
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('input[data-ans]:not([readonly])');
            let allCorrect = true;
            let firstWrongInput = null;

            inputs.forEach(input => {
                input.classList.remove('wrong', 'correct');
                const userVal = input.value.trim();
                const correctVal = input.dataset.ans;

                if (userVal === correctVal) {
                    input.classList.add('correct');
                } else {
                    input.classList.add('wrong');
                    allCorrect = false;
                    if (!firstWrongInput) firstWrongInput = input;
                }
            });

            const feedback = document.getElementById('feedbackMsg');
            const checkBtn = document.getElementById('checkBtn');

            if (allCorrect) {
                playSound('correct');
                score += 10;
                document.getElementById('scoreDisplay').innerText = score;
                
                feedback.innerText = "Excellent! 🌟";
                feedback.className = "h-8 text-2xl sm:text-3xl font-black text-green-500 transition-opacity duration-300 opacity-100 animate-bounce";
                
                checkBtn.style.display = 'none';

                fireParticles(window.innerWidth/2, window.innerHeight/2);

                setTimeout(() => {
                    currentLevelIndex++;
                    renderLevel();
                }, 2000);
            } else {
                playSound('wrong');
                feedback.innerText = "Oops! Try again. 🤔";
                feedback.className = "h-8 text-xl sm:text-2xl font-bold text-red-500 transition-opacity duration-300 opacity-100";
                if (firstWrongInput) firstWrongInput.focus();
                
                setTimeout(() => {
                    feedback.style.opacity = '0';
                }, 2000);
            }
        }

        // --- HỆ THỐNG PHÁO HOA ---
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fireworksAnimId;
        let isFireworksActive = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
                this.size = Math.random() * 6 + 3;
            }
            update() {
                this.vy += 0.15;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.life})`;
                ctx.fill();
            }
        }

        const colors = ['255, 99, 132', '54, 162, 235', '255, 206, 86', '75, 192, 192', '153, 102, 255', '255, 159, 64'];

        function fireParticles(x, y, count=50) {
            playSound('pop'); // Mượn tiếng pop làm pháo nổ nhỏ
            for(let i=0; i<count; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, color));
            }
        }

        function loopFireworks() {
            if(!isFireworksActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (Math.random() < 0.05) {
                fireParticles(Math.random() * canvas.width, Math.random() * canvas.height/2);
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if(p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            fireworksAnimId = requestAnimationFrame(loopFireworks);
        }

        function startFireworks() {
            isFireworksActive = true;
            resizeCanvas();
            loopFireworks();
            fireParticles(canvas.width/2, canvas.height/3, 100);
        }

        function stopFireworks() {
            isFireworksActive = false;
            cancelAnimationFrame(fireworksAnimId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
        }

        renderStartScreen();
    </script>
</body>
</html>
