<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Graphing Adventure V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* Animated Background Elements */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.6;
            z-index: -1;
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        .bubbly-title {
            text-shadow: 3px 3px 0px #fff, 6px 6px 0px rgba(0,0,0,0.05);
            color: #2563eb;
        }

        .playground {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 6px dashed #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* Base Premium Icon */
        .premium-icon {
            display: inline-block;
            filter: drop-shadow(0px 6px 8px rgba(0, 0, 0, 0.25)) saturate(1.2) contrast(1.1);
            transform: translateZ(0);
        }

        /* Lively Animated Icon for Extra Cuteness */
        .lively-icon {
            display: inline-block;
            filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.3)) saturate(1.3) contrast(1.1);
            animation: wiggle 3s ease-in-out infinite;
            transform-origin: center bottom;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-6deg) scale(1); }
            50% { transform: rotate(6deg) scale(1.08); }
        }

        .item-pop {
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }

        .item-pop:hover .lively-icon {
            animation-play-state: paused;
            transform: scale(1.15) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .item-pop.clicked {
            filter: grayscale(1) opacity(0.3);
            transform: scale(0.7);
            animation: none;
            pointer-events: none;
        }

        .graph-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 3rem;
            border: 8px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .graph-card.selected-correct {
            border-color: #4ade80;
            background-color: #f0fdf4;
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.5);
        }

        .graph-card.selected-wrong {
            border-color: #f87171;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px); }
            40%, 80% { transform: translateX(15px); }
        }

        .graph-cell {
            width: 54px;
            height: 32px;
            margin: 2px;
            border-radius: 8px;
            background-color: #f1f5f9;
        }

        .cell-fill {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), inset 0 4px 0 rgba(255,255,255,0.2);
            animation: cellPop 0.4s ease-out;
        }

        @keyframes cellPop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .y-axis-label {
            height: 36px; /* 32px cell + 4px total margin */
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-weight: 900;
            color: #64748b;
            font-size: 1.1rem;
        }

        .axis-spacer {
            height: 60px; /* Aligns with the icon row */
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
        }

        .score-badge {
            background: linear-gradient(135deg, #FFD93D 0%, #FF8400 100%);
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(255, 132, 0, 0.3);
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .graph-cell { width: 40px; height: 26px; }
            .y-axis-label { height: 30px; font-size: 0.9rem; padding-right: 8px; }
            .axis-spacer { height: 50px; }
            .graph-card { padding: 1.5rem; border-radius: 2rem; border-width: 6px; }
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <canvas id="fireworks-canvas"></canvas>

    <!-- Background Clouds -->
    <div class="cloud w-32 h-12 top-20 left-0" style="animation-duration: 25s; opacity: 0.4;"></div>
    <div class="cloud w-48 h-16 top-40 right-0" style="animation-duration: 35s; animation-delay: -5s; opacity: 0.3;"></div>

    <!-- Start Overlay -->
    <div id="start-overlay" class="fixed inset-0 bg-gradient-to-br from-blue-400 to-purple-500 z-[200] flex flex-col items-center justify-center text-white p-6 text-center">
        <div class="text-9xl mb-6 animate-bounce premium-icon">🎨</div>
        <h1 class="text-6xl md:text-7xl font-black mb-4 bubbly-title text-white">Counting Quest!</h1>
        <p class="text-2xl mb-10 font-bold drop-shadow-md">Can you find the matching graph?</p>
        <button onclick="startGame()" class="bg-yellow-400 text-blue-900 px-16 py-6 rounded-full font-black text-3xl shadow-[0_12px_0_#b45309] active:translate-y-2 active:shadow-none transition-all">
            GO! 🚀
        </button>
    </div>

    <div class="max-w-6xl mx-auto relative z-10">
        
        <!-- Header Centered: Contains Title & Score -->
        <header class="flex flex-col items-center justify-center mb-10 gap-5 text-center">
            <div>
                <h1 class="text-5xl md:text-6xl font-black bubbly-title">Level <span id="level-num">1</span></h1>
                <p class="text-blue-700 font-extrabold text-xl mt-2 drop-shadow-sm">Click the items, then count them! 🔍</p>
            </div>
            <div class="score-badge px-10 py-3 rounded-full text-white font-black text-2xl flex items-center gap-3 w-max">
                <span class="premium-icon">⭐</span>
                <span>SCORE:</span>
                <span id="score-val" class="text-3xl">0</span>
            </div>
        </header>

        <div id="playground" class="playground rounded-[3rem] p-8 flex flex-wrap gap-4 sm:gap-8 justify-center items-center mb-10"></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-10">
            <!-- Option A -->
            <div id="option-a" class="graph-card p-6 sm:p-10 cursor-pointer relative flex flex-col items-center" onclick="checkAnswer('a')">
                <div class="absolute -top-6 bg-indigo-600 text-white px-8 py-2 rounded-full font-black shadow-lg z-10 text-lg">GRAPH 1</div>
                <div class="flex justify-center items-end gap-1 sm:gap-3 w-full mt-4">
                    <div id="y-axis-a" class="flex flex-col-reverse shrink-0">
                        <!-- Labels will be injected here -->
                    </div>
                    <div id="graph-a-content" class="flex justify-center items-end gap-2 sm:gap-4 shrink-0"></div>
                </div>
            </div>

            <!-- Option B -->
            <div id="option-b" class="graph-card p-6 sm:p-10 cursor-pointer relative flex flex-col items-center" onclick="checkAnswer('b')">
                <div class="absolute -top-6 bg-pink-600 text-white px-8 py-2 rounded-full font-black shadow-lg z-10 text-lg">GRAPH 2</div>
                <div class="flex justify-center items-end gap-1 sm:gap-3 w-full mt-4">
                    <div id="y-axis-b" class="flex flex-col-reverse shrink-0">
                        <!-- Labels will be injected here -->
                    </div>
                    <div id="graph-b-content" class="flex justify-center items-end gap-2 sm:gap-4 shrink-0"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="fixed inset-0 bg-blue-900/40 backdrop-blur-md hidden flex items-center justify-center p-4 z-[150]">
        <div class="bg-white rounded-[4rem] p-12 max-w-md w-full text-center shadow-2xl">
            <div class="text-9xl mb-6 premium-icon">🏆</div>
            <h2 class="text-5xl font-black text-blue-600 mb-4">YOU WON!</h2>
            <p class="text-slate-500 text-xl font-bold mb-10">You are a Math Superstar! 🌟</p>
            <button onclick="nextLevel()" class="bg-gradient-to-r from-green-400 to-emerald-600 text-white w-full py-6 rounded-3xl font-black text-3xl shadow-[0_10px_0_#065f46] active:translate-y-2 active:shadow-none transition-all">
                NEXT LEVEL ➔
            </button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, now + i * 0.1);
                    g.gain.setValueAtTime(0.1, now + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                    o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.3);
                });
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        // Updated with cuter, more vibrant emojis
        const ALL_ITEMS = [
            { emoji: '🐼', color: 'bg-teal-400' },
            { emoji: '🍓', color: 'bg-red-500' },
            { emoji: '🐢', color: 'bg-green-500' }, 
            { emoji: '🦊', color: 'bg-orange-500' },
            { emoji: '🍩', color: 'bg-pink-400' }, 
            { emoji: '🐠', color: 'bg-cyan-400' },
            { emoji: '🚀', color: 'bg-indigo-500' },
            { emoji: '🐙', color: 'bg-purple-500' }
        ];

        let state = {
            score: 0,
            level: 1,
            correctOption: '',
            currentItems: [],
            actualCounts: []
        };

        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            if (audioCtx.state === 'suspended') audioCtx.resume();
            initLevel();
        }

        function initLevel() {
            const container = document.getElementById('playground');
            container.innerHTML = '';
            
            const numCats = Math.min(4, 2 + Math.floor(state.level / 5));
            const shuffled = [...ALL_ITEMS].sort(() => 0.5 - Math.random());
            state.currentItems = shuffled.slice(0, numCats);
            state.actualCounts = state.currentItems.map(() => Math.floor(Math.random() * 5) + 2);

            let pool = [];
            state.currentItems.forEach((item, idx) => {
                for (let i = 0; i < state.actualCounts[idx]; i++) pool.push({...item});
            });
            pool.sort(() => 0.5 - Math.random());

            pool.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'item-pop text-6xl md:text-7xl p-2 select-none';
                // Slight delay offset so they don't float and wiggle exactly at the same time
                el.style.animationDelay = `${idx * 0.1}s`; 
                
                el.innerHTML = `<div class="lively-icon" style="animation-delay: ${idx * 0.15}s">${item.emoji}</div>`;
                el.onclick = () => { el.classList.add('clicked'); playSound('click'); };
                container.appendChild(el);
            });

            state.correctOption = Math.random() > 0.5 ? 'a' : 'b';
            let wrongCounts = [...state.actualCounts];
            const changeIdx = Math.floor(Math.random() * numCats);
            wrongCounts[changeIdx] += (Math.random() > 0.5 ? 1 : -1);
            if (wrongCounts[changeIdx] < 1) wrongCounts[changeIdx] = 3;
            if (wrongCounts[changeIdx] === state.actualCounts[changeIdx]) wrongCounts[changeIdx]++;

            const maxDisplay = Math.max(...state.actualCounts, ...wrongCounts) + 1;

            renderGraph('a', state.correctOption === 'a' ? state.actualCounts : wrongCounts, maxDisplay);
            renderGraph('b', state.correctOption === 'b' ? state.actualCounts : wrongCounts, maxDisplay);
        }

        function renderGraph(prefix, data, maxY) {
            const container = document.getElementById(`graph-${prefix}-content`);
            const yAxis = document.getElementById(`y-axis-${prefix}`);
            
            container.innerHTML = '';
            yAxis.innerHTML = '';

            // 1. Build Y-Axis Labels
            const spacer = document.createElement('div');
            spacer.className = 'axis-spacer';
            yAxis.appendChild(spacer);

            for (let i = 1; i <= maxY; i++) {
                const label = document.createElement('div');
                label.className = 'y-axis-label';
                label.innerText = i;
                yAxis.appendChild(label);
            }

            // 2. Build Columns
            state.currentItems.forEach((item, idx) => {
                const col = document.createElement('div');
                col.className = 'flex flex-col items-center';
                
                const stack = document.createElement('div');
                stack.className = 'flex flex-col-reverse';

                for (let i = 1; i <= maxY; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'graph-cell';
                    if (i <= data[idx]) {
                        cell.innerHTML = `<div class="cell-fill ${item.color}"></div>`;
                    }
                    stack.appendChild(cell);
                }

                // Inject lively icon at the bottom of each column
                const icon = document.createElement('div');
                icon.className = 'text-3xl sm:text-4xl mt-4 h-10 flex items-center justify-center lively-icon';
                icon.innerHTML = item.emoji;

                col.appendChild(stack);
                col.appendChild(icon);
                container.appendChild(col);
            });
        }

        function checkAnswer(choice) {
            const card = document.getElementById(`option-${choice}`);
            if (choice === state.correctOption) {
                playSound('correct');
                card.classList.add('selected-correct');
                state.score += 10;
                document.getElementById('score-val').innerText = state.score;
                startFireworks();
                setTimeout(() => document.getElementById('win-modal').classList.remove('hidden'), 1000);
            } else {
                playSound('wrong');
                card.classList.add('selected-wrong');
                setTimeout(() => card.classList.remove('selected-wrong'), 500);
            }
        }

        function nextLevel() {
            state.level++;
            document.getElementById('level-num').innerText = state.level;
            document.getElementById('win-modal').classList.add('hidden');
            document.getElementById('option-a').className = 'graph-card p-6 sm:p-10 cursor-pointer relative flex flex-col items-center';
            document.getElementById('option-b').className = 'graph-card p-6 sm:p-10 cursor-pointer relative flex flex-col items-center';
            initLevel();
        }

        // Simple Fireworks
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resizeCanvas; resizeCanvas();

        class Particle {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.vx = (Math.random() - 0.5) * 25;
                this.vy = (Math.random() - 0.5) * 25;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.size = Math.random() * 6 + 4;
                this.life = 100;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 1.5; this.size *= 0.96; }
        }

        function startFireworks() {
            particles = [];
            for (let i = 0; i < 150; i++) particles.push(new Particle());
            animate();
        }

        function animate() {
            if (particles.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0 || p.size <= 0.1) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
