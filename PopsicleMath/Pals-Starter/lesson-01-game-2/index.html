<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sticky Ball Toss V6</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config to use Poppins -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* Animations */
    @keyframes firework {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    .particle {
      animation: firework 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes spin-slow {
      100% { transform: rotate(360deg); }
    }
    
    @keyframes bounce-custom {
      0%, 100% { transform: translateY(-10%); }
      50% { transform: translateY(0); }
    }
    .animate-bounce-custom {
      animation: bounce-custom 1s infinite;
    }

    @keyframes pulse-custom {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .8; transform: scale(1.05); }
    }
    .animate-pulse-custom {
      animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .sunburst {
      position: absolute;
      top: 50%; left: 50%;
      width: 200vw; height: 200vw;
      margin-left: -100vw; margin-top: -100vw;
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255, 255, 255, 0.08) 0deg 15deg,
        transparent 15deg 30deg
      );
      animation: spin-slow 30s linear infinite;
    }

    /* Text Strokes */
    .text-stroke-title { -webkit-text-stroke: 3px #312e81; }
    .text-stroke-score { -webkit-text-stroke: 4px #b45309; }
    .text-stroke-white { -webkit-text-stroke: 2px #ffffff; }

    /* Transitions */
    .fade-enter { opacity: 0; transform: scale(0.9); transition: all 0.5s ease-out; }
    .fade-enter-active { opacity: 1; transform: scale(1); }
    .fade-exit { opacity: 1; transform: scale(1); transition: all 0.3s ease-in; }
    .fade-exit-active { opacity: 0; transform: scale(0.9); pointer-events: none; }

    /* BUG FIX: Added calc(-50% + offset) to maintain perfect centering before shifting */
    .ball-move-even { transform: translate(calc(-50% + 20vw), -50%) scale(1.1) !important; }
    .ball-move-odd { transform: translate(calc(-50% - 20vw), -50%) scale(1.1) !important; }
    
    @media (max-width: 1024px) {
      .ball-move-even { transform: translate(calc(-50% + 15vw), -50%) scale(1.05) !important; }
      .ball-move-odd { transform: translate(calc(-50% - 15vw), -50%) scale(1.05) !important; }
    }

    @media (max-width: 768px) {
      .ball-move-even { transform: translate(calc(-50% + 12vw), -50%) scale(1) !important; }
      .ball-move-odd { transform: translate(calc(-50% - 12vw), -50%) scale(1) !important; }
    }

    /* Realistic Trophy Glow */
    .realistic-trophy {
      font-size: 180px;
      line-height: 1;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)) drop-shadow(0 0 60px rgba(250, 204, 21, 0.8));
      z-index: 10;
    }
  </style>
</head>
<body class="w-screen h-screen bg-indigo-950 font-sans relative flex flex-col">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
  <!-- TOP LEFT ROUND COUNTER -->
  <div id="roundCounter" class="hidden absolute top-4 left-4 md:top-6 md:left-6 z-50 pointer-events-none transition-opacity duration-300">
    <div class="flex items-center gap-2 md:gap-3 bg-white/25 backdrop-blur-xl px-4 md:px-6 py-2 md:py-3 rounded-full border-[3px] border-white/50 shadow-[0_10px_20px_rgba(0,0,0,0.2)]">
      <i data-lucide="star" class="text-yellow-300 fill-yellow-300 animate-pulse-custom drop-shadow-md w-5 h-5 md:w-7 md:h-7"></i>
      <span class="text-white font-black text-lg md:text-2xl drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
        ROUND <span id="currentRoundText">1</span> <span class="text-white/70 text-sm md:text-lg">/ 20</span>
      </span>
    </div>
  </div>

  <!-- INSTRUCTION BANNER -->
  <div id="instructionBanner" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none animate-bounce-custom transition-opacity duration-300">
    <div class="bg-gradient-to-r from-amber-300 to-yellow-400 text-indigo-900 px-6 md:px-8 py-2 md:py-3 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.3)] font-black text-lg md:text-2xl border-[3px] border-white whitespace-nowrap">
      CHOOSE ODD OR EVEN!
    </div>
  </div>

  <!-- MAIN GAME AREA (Always visible, handles backgrounds) -->
  <div id="gameArea" class="relative flex-1 flex w-full h-full opacity-0 transition-opacity duration-500 hidden">
    
    <!-- ODD SIDE (LEFT) -->
    <div id="oddSide" class="flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-rose-400 to-rose-500 hover:from-rose-400 hover:to-rose-600 active:brightness-90 group" onclick="handleGuess('odd')">
      <h1 class="text-[12vw] font-black text-white/90 tracking-tighter drop-shadow-[0_10px_20px_rgba(0,0,0,0.3)] z-0 transition-transform group-hover:scale-110">ODD</h1>
    </div>

    <!-- EVEN SIDE (RIGHT) -->
    <div id="evenSide" class="flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-cyan-400 to-cyan-500 hover:from-cyan-400 hover:to-cyan-600 active:brightness-90 group" onclick="handleGuess('even')">
      <h1 class="text-[12vw] font-black text-white/90 tracking-tighter drop-shadow-[0_10px_20px_rgba(0,0,0,0.3)] z-0 transition-transform group-hover:scale-110">EVEN</h1>
    </div>

    <!-- CENTER DIVIDER -->
    <div class="absolute top-0 bottom-0 left-1/2 w-3 md:w-4 bg-white/30 -translate-x-1/2 z-20 backdrop-blur-md rounded-full shadow-[0_0_15px_rgba(0,0,0,0.2)] pointer-events-none"></div>

    <!-- CENTER BALL & TEN FRAMES -->
    <!-- Default position is perfectly centered via left-1/2 and -translate-x-1/2 -->
    <div id="centerContainer" class="absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 flex flex-col items-center justify-center transition-all duration-[800ms] ease-[cubic-bezier(0.34,1.56,0.64,1)] z-30 pointer-events-none w-max">
      
      <!-- Main Number Ball -->
      <div id="mainBall" class="relative w-40 h-40 sm:w-48 sm:h-48 md:w-60 md:h-60 lg:w-72 lg:h-72 bg-white rounded-full shadow-[0_30px_60px_rgba(0,0,0,0.5)] border-[8px] md:border-[14px] border-indigo-200 flex items-center justify-center mb-4 md:mb-8 transition-colors duration-500 shrink-0">
        <!-- Status Pill -->
        <div id="statusPill" class="hidden absolute -top-4 md:-top-6 left-1/2 -translate-x-1/2 px-4 md:px-6 py-1 md:py-2 rounded-full text-white font-black text-base md:text-2xl uppercase tracking-wider animate-bounce-custom shadow-xl border-2 md:border-4 border-white z-40">
          AWESOME!
        </div>
        <span id="ballNumber" class="text-[6rem] sm:text-[8rem] md:text-[10rem] lg:text-[12rem] font-black leading-none pb-1 md:pb-4 tracking-tighter transition-colors duration-500 text-indigo-800">
          ?
        </span>
      </div>
      
      <!-- Ten Frames Container -->
      <div id="tenFramesContainer" class="flex flex-col gap-3 md:gap-6 items-center transition-all duration-500 opacity-0 transform scale-90 w-max">
        <!-- Generated via JS -->
      </div>

    </div>

    <!-- NEXT BUTTON -->
    <div id="nextButtonContainer" class="hidden absolute bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 z-50 transition-opacity duration-300">
      <button onclick="nextRound()" class="bg-white text-indigo-700 py-3 md:py-4 px-10 md:px-14 rounded-full text-xl md:text-3xl font-black hover:bg-indigo-50 transition-transform active:scale-95 shadow-[0_10px_30px_rgba(0,0,0,0.5)] border-4 border-indigo-200 flex items-center gap-2 md:gap-3 animate-pulse-custom pointer-events-auto">
        NEXT <i data-lucide="arrow-right" class="text-indigo-500 w-6 h-6 md:w-8 md:h-8"></i>
      </button>
    </div>
  </div>

  <!-- MENU SCREEN -->
  <div id="screenMenu" class="absolute inset-0 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 z-40 flex flex-col items-center justify-center pointer-events-auto overflow-hidden transition-opacity duration-500">
    <div class="sunburst opacity-50"></div>
    <div class="relative z-10 bg-white/90 backdrop-blur-xl p-8 md:p-14 rounded-[2rem] md:rounded-[3rem] shadow-[0_30px_60px_-10px_rgba(0,0,0,0.6)] border-[6px] md:border-[10px] border-white text-center max-w-[90%] md:max-w-3xl transform transition-transform hover:scale-105 mx-auto">
      <i data-lucide="sparkles" class="mx-auto mb-4 text-amber-400 fill-amber-400 animate-pulse-custom w-12 h-12 md:w-16 md:h-16"></i>
      
      <h1 class="text-4xl sm:text-5xl md:text-7xl font-black mb-4 md:mb-6 tracking-tight uppercase text-stroke-title bg-clip-text text-transparent bg-gradient-to-r from-yellow-300 via-orange-400 to-rose-400 drop-shadow-sm leading-tight">
        Odd or Even?
      </h1>
      <p class="text-lg md:text-3xl text-indigo-600 font-extrabold mb-8 md:mb-10 drop-shadow-sm">
        Help the ball find its home!
      </p>
      
      <button onclick="startGame()" class="group relative inline-flex items-center justify-center gap-3 md:gap-4 bg-gradient-to-b from-green-400 to-green-600 hover:from-green-400 hover:to-green-500 text-white py-4 md:py-6 px-10 md:px-16 rounded-full text-2xl md:text-4xl font-black transition-all shadow-[0_8px_0_rgb(21,128,61),0_15px_20px_rgba(0,0,0,0.4)] md:shadow-[0_12px_0_rgb(21,128,61),0_20px_30px_rgba(0,0,0,0.4)] active:translate-y-2 active:shadow-none border-[3px] md:border-4 border-green-300 pointer-events-auto">
        <i data-lucide="play-circle" class="w-8 h-8 md:w-10 md:h-10 group-hover:scale-110 transition-transform"></i>
        START GAME
      </button>
    </div>
  </div>

  <!-- COUNTDOWN SCREEN -->
  <div id="screenCountdown" class="hidden absolute inset-0 z-50 flex items-center justify-center pointer-events-none bg-indigo-900/60 backdrop-blur-md transition-opacity duration-300 opacity-0">
    <div id="countdownText" class="text-[40vw] font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-amber-500 drop-shadow-[0_30px_50px_rgba(0,0,0,0.8)] animate-bounce-custom text-stroke-white" style="-webkit-text-stroke: 10px white;">
      3
    </div>
  </div>

  <!-- FINISHED SCREEN -->
  <div id="screenFinished" class="hidden absolute inset-0 bg-gradient-to-b from-indigo-900 via-purple-900 to-indigo-950 z-50 flex flex-col items-center justify-center pointer-events-auto overflow-hidden transition-opacity duration-500 opacity-0">
    <div class="sunburst opacity-70"></div>
    <div id="fireworksContainer" class="absolute inset-0 pointer-events-none z-0"></div>
    
    <div class="relative z-10 flex flex-col items-center fade-enter-active">
      
      <!-- Realistic Trophy -->
      <div class="relative flex justify-center items-center w-48 h-48 md:w-80 md:h-80 mb-2">
        <div class="realistic-trophy animate-bounce-custom" style="font-size: clamp(100px, 20vw, 180px);">🏆</div>
        <i data-lucide="star" class="absolute top-10 left-4 text-white fill-white animate-spin-slow z-20 w-8 h-8 md:w-10 md:h-10"></i>
        <i data-lucide="star" class="absolute bottom-16 right-4 text-yellow-200 fill-yellow-200 animate-pulse-custom z-20 w-10 h-10 md:w-12 md:h-12"></i>
        <i data-lucide="sparkles" class="absolute top-16 right-0 text-white animate-pulse-custom z-20 w-10 h-10 md:w-14 md:h-14"></i>
      </div>
      
      <h1 class="text-5xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-300 to-amber-600 mb-6 md:mb-8 tracking-tight text-center drop-shadow-2xl text-stroke-white uppercase">
        CHAMPION!
      </h1>
      
      <div class="relative bg-gradient-to-br from-white/95 to-white/80 backdrop-blur-2xl px-10 md:px-16 py-8 md:py-10 rounded-[2rem] md:rounded-[3rem] border-4 md:border-8 border-yellow-400 shadow-[0_20px_60px_rgba(0,0,0,0.6),inset_0_0_30px_rgba(255,255,255,1)] mb-8 md:mb-12 text-center transform hover:scale-105 transition-transform duration-500 w-[80%] md:w-auto">
        <p class="text-xl md:text-4xl font-black text-indigo-400 mb-2 uppercase tracking-widest drop-shadow-sm">
          Your Score
        </p>
        <div class="text-[5rem] md:text-[9rem] font-black text-yellow-500 drop-shadow-xl text-stroke-score leading-none">
          <span id="finalScore">0</span> <span class="text-[3rem] md:text-[4rem] text-indigo-300" style="-webkit-text-stroke: 2px #a5b4fc">/ 20</span>
        </div>
      </div>

      <button onclick="resetGameToMenu()" class="group flex items-center gap-3 bg-gradient-to-b from-green-400 to-green-600 text-white py-4 md:py-6 px-12 md:px-16 rounded-full text-2xl md:text-4xl font-black hover:from-green-500 hover:to-green-700 transition-all active:translate-y-2 shadow-[0_8px_0_rgb(21,128,61)] md:shadow-[0_10px_0_rgb(21,128,61)] border-[3px] md:border-4 border-green-300">
        PLAY AGAIN
      </button>
    </div>
  </div>

  <script>
    // --- Initialize Icons ---
    lucide.createIcons();

    // --- Web Audio API for Sound Effects ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();

    const playTone = (freq, type, duration, vol = 0.1) => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + duration);
    };

    const playCountdownBeep = () => playTone(523.25, 'sine', 0.4, 0.1); 
    const playGoBeep = () => playTone(1046.50, 'sine', 0.6, 0.15); 
    const playCorrect = () => {
      playTone(659.25, 'triangle', 0.15, 0.1); 
      setTimeout(() => playTone(880.00, 'triangle', 0.3, 0.15), 100); 
    };
    const playWrong = () => {
      playTone(300, 'sawtooth', 0.4, 0.1); 
    };
    const playWinChime = () => {
      playTone(523.25, 'square', 0.2, 0.1);
      setTimeout(() => playTone(659.25, 'square', 0.2, 0.1), 150);
      setTimeout(() => playTone(783.99, 'square', 0.2, 0.1), 300);
      setTimeout(() => playTone(1046.50, 'square', 0.6, 0.1), 450);
    };

    // --- Game State ---
    const TOTAL_ROUNDS = 20;
    let state = {
      mode: 'menu', // menu, countdown, guessing, reveal, finished
      numbers: [],
      currentIndex: 0,
      score: 0,
      countdownVal: 3
    };

    // --- DOM Elements ---
    const elScreenMenu = document.getElementById('screenMenu');
    const elScreenCountdown = document.getElementById('screenCountdown');
    const elCountdownText = document.getElementById('countdownText');
    const elGameArea = document.getElementById('gameArea');
    const elScreenFinished = document.getElementById('screenFinished');
    
    const elRoundCounter = document.getElementById('roundCounter');
    const elCurrentRoundText = document.getElementById('currentRoundText');
    const elInstructionBanner = document.getElementById('instructionBanner');
    
    const elOddSide = document.getElementById('oddSide');
    const elEvenSide = document.getElementById('evenSide');
    const elCenterContainer = document.getElementById('centerContainer');
    const elMainBall = document.getElementById('mainBall');
    const elBallNumber = document.getElementById('ballNumber');
    const elStatusPill = document.getElementById('statusPill');
    const elTenFramesContainer = document.getElementById('tenFramesContainer');
    const elNextButtonContainer = document.getElementById('nextButtonContainer');
    
    const elFinalScore = document.getElementById('finalScore');
    const elFireworksContainer = document.getElementById('fireworksContainer');

    // --- Helpers ---
    function generateNumbers() {
      let arr = Array.from({ length: 20 }, (_, i) => i + 1);
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // --- View Logic ---
    function hideAll() {
      elScreenMenu.classList.add('hidden', 'opacity-0');
      elScreenCountdown.classList.add('hidden', 'opacity-0');
      elGameArea.classList.add('hidden', 'opacity-0');
      elScreenFinished.classList.add('hidden', 'opacity-0');
      
      elRoundCounter.classList.add('hidden');
      elInstructionBanner.classList.add('hidden');
      elNextButtonContainer.classList.add('hidden');
      elStatusPill.classList.add('hidden');
      elTenFramesContainer.classList.remove('opacity-100', 'scale-100');
      elTenFramesContainer.classList.add('opacity-0', 'scale-90');
      
      // Reset backgrounds
      elOddSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-rose-400 to-rose-500 hover:from-rose-400 hover:to-rose-600 active:brightness-90 group";
      elEvenSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-cyan-400 to-cyan-500 hover:from-cyan-400 hover:to-cyan-600 active:brightness-90 group";
      
      // Reset center
      elCenterContainer.classList.remove('ball-move-even', 'ball-move-odd');
      
      // Reset main ball classes mapping
      elMainBall.className = "relative w-40 h-40 sm:w-48 sm:h-48 md:w-60 md:h-60 lg:w-72 lg:h-72 bg-white rounded-full shadow-[0_30px_60px_rgba(0,0,0,0.5)] border-[8px] md:border-[14px] border-indigo-200 flex items-center justify-center mb-4 md:mb-8 transition-colors duration-500 shrink-0";
      elBallNumber.className = "text-[6rem] sm:text-[8rem] md:text-[10rem] lg:text-[12rem] font-black leading-none pb-1 md:pb-4 tracking-tighter transition-colors duration-500 text-indigo-800";
    }

    function startGame() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      state.numbers = generateNumbers();
      state.currentIndex = 0;
      state.score = 0;
      
      hideAll();
      elGameArea.classList.remove('hidden');
      setTimeout(() => elGameArea.classList.remove('opacity-0'), 50);
      
      startCountdown();
    }

    function startCountdown() {
      state.mode = 'countdown';
      state.countdownVal = 3;
      elScreenCountdown.classList.remove('hidden');
      setTimeout(() => elScreenCountdown.classList.remove('opacity-0'), 50);
      
      const tick = () => {
        elCountdownText.innerText = state.countdownVal > 0 ? state.countdownVal : "GO!";
        
        if (state.countdownVal > 0) {
          playCountdownBeep();
          state.countdownVal--;
          setTimeout(tick, 1000);
        } else {
          playGoBeep();
          setTimeout(() => {
            elScreenCountdown.classList.add('opacity-0');
            setTimeout(() => {
              elScreenCountdown.classList.add('hidden');
              enterGuessingState();
            }, 300);
          }, 800);
        }
      };
      tick();
    }

    function enterGuessingState() {
      state.mode = 'guessing';
      const currentNumber = state.numbers[state.currentIndex];
      
      elCurrentRoundText.innerText = state.currentIndex + 1;
      elBallNumber.innerText = currentNumber;
      
      elRoundCounter.classList.remove('hidden');
      elInstructionBanner.classList.remove('hidden');
      
      // Clear ten frames
      elTenFramesContainer.innerHTML = '';
      elTenFramesContainer.classList.remove('opacity-100', 'scale-100');
      elTenFramesContainer.classList.add('opacity-0', 'scale-90');
      
      // Reset Center position
      elCenterContainer.classList.remove('ball-move-even', 'ball-move-odd');
      elMainBall.classList.remove('border-cyan-300', 'border-rose-300');
      elMainBall.classList.add('border-indigo-200');
      elBallNumber.classList.remove('text-cyan-600', 'text-rose-600');
      elBallNumber.classList.add('text-indigo-800');
      
      // Enable hover effects on sides
      elOddSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-rose-400 to-rose-500 hover:from-rose-400 hover:to-rose-600 active:brightness-90 group";
      elEvenSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-cyan-400 to-cyan-500 hover:from-cyan-400 hover:to-cyan-600 active:brightness-90 group";
    }

    function handleGuess(guessType) {
      if (state.mode !== 'guessing') return;
      state.mode = 'reveal';
      
      const currentNumber = state.numbers[state.currentIndex];
      const isEven = currentNumber % 2 === 0;
      const isGuessCorrect = (guessType === 'even' && isEven) || (guessType === 'odd' && !isEven);

      if (isGuessCorrect) {
        state.score++;
        playCorrect();
        elStatusPill.innerText = 'AWESOME!';
        elStatusPill.className = "absolute -top-4 md:-top-6 left-1/2 -translate-x-1/2 px-4 md:px-6 py-1 md:py-2 rounded-full text-white font-black text-base md:text-2xl uppercase tracking-wider animate-bounce-custom shadow-xl border-2 md:border-4 border-white z-40 bg-gradient-to-r from-green-400 to-green-600";
      } else {
        playWrong();
        elStatusPill.innerText = 'TRY AGAIN!';
        elStatusPill.className = "absolute -top-4 md:-top-6 left-1/2 -translate-x-1/2 px-4 md:px-6 py-1 md:py-2 rounded-full text-white font-black text-base md:text-2xl uppercase tracking-wider animate-bounce-custom shadow-xl border-2 md:border-4 border-white z-40 bg-gradient-to-r from-red-500 to-rose-600";
      }

      elInstructionBanner.classList.add('hidden');
      elStatusPill.classList.remove('hidden');

      // Update Sides Visuals
      if (isEven) {
        elEvenSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-cyan-400 to-cyan-600 shadow-[inset_0_0_150px_rgba(255,255,255,0.4)] brightness-110 z-10";
        elOddSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-rose-900 brightness-50 opacity-90";
        elCenterContainer.classList.add('ball-move-even');
        elMainBall.classList.replace('border-indigo-200', 'border-cyan-300');
        elBallNumber.classList.replace('text-indigo-800', 'text-cyan-600');
      } else {
        elOddSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-gradient-to-b from-rose-400 to-rose-600 shadow-[inset_0_0_150px_rgba(255,255,255,0.4)] brightness-110 z-10";
        elEvenSide.className = "flex-1 flex flex-col items-center justify-center transition-all duration-500 overflow-hidden relative cursor-pointer bg-cyan-900 brightness-50 opacity-90";
        elCenterContainer.classList.add('ball-move-odd');
        elMainBall.classList.replace('border-indigo-200', 'border-rose-300');
        elBallNumber.classList.replace('text-indigo-800', 'text-rose-600');
      }

      // Render Ten Frames
      renderTenFramesHTML(currentNumber, !isEven);

      // Show Next Button after a delay
      setTimeout(() => {
        elNextButtonContainer.classList.remove('hidden');
      }, 500);
    }

    function renderTenFramesHTML(num, isOddTotal) {
      const fullFrames = Math.floor(num / 10);
      const remainder = num % 10;
      const frames = [];

      for (let i = 0; i < fullFrames; i++) frames.push(10);
      if (remainder > 0) frames.push(remainder);

      const fillSequence = [0, 5, 1, 6, 2, 7, 3, 8, 4, 9];
      let html = '';

      frames.forEach((count, frameIndex) => {
        const isLastFrame = frameIndex === frames.length - 1;
        const filledIndices = fillSequence.slice(0, count);
        const oddDotIndex = (isLastFrame && isOddTotal) ? fillSequence[count - 1] : -1;

        // Container adjustments for strict resizing on mobile
        let frameHtml = `<div class="grid grid-cols-5 grid-rows-2 gap-1 sm:gap-2 md:gap-3 p-2 sm:p-3 md:p-4 bg-white/20 backdrop-blur-md border-[3px] md:border-[4px] border-white/60 rounded-xl md:rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.3)] w-max">`;
        
        for (let i = 0; i < 10; i++) {
          const isFilled = filledIndices.includes(i);
          const isOddOneOut = i === oddDotIndex;
          
          // Cell adjustments
          frameHtml += `<div class="w-6 h-6 sm:w-8 sm:h-8 md:w-12 md:h-12 lg:w-14 lg:h-14 rounded-md md:rounded-xl border-2 md:border-[3px] border-white/30 bg-black/20 flex items-center justify-center shadow-inner relative overflow-hidden">`;
          
          if (isFilled) {
            // Highlight the ODD dot with distinct LIME GREEN color
            const bgClass = isOddOneOut 
              ? 'bg-gradient-to-br from-lime-300 to-green-500 border-[3px] md:border-4 border-white animate-bounce-custom z-10' 
              : 'bg-gradient-to-br from-amber-300 to-orange-500 border-2 md:border-[3px] border-white/80';
              
            frameHtml += `
              <div class="w-[80%] h-[80%] rounded-full absolute shadow-[0_5px_15px_rgba(0,0,0,0.5)] ${bgClass}">
                <div class="absolute top-[15%] left-[15%] w-[30%] h-[30%] bg-white/70 rounded-full blur-[1px]"></div>
              </div>
            `;
          }
          frameHtml += `</div>`;
        }
        frameHtml += `</div>`;
        html += frameHtml;
      });

      elTenFramesContainer.innerHTML = html;
      
      // Fade in ten frames
      setTimeout(() => {
        elTenFramesContainer.classList.remove('opacity-0', 'scale-90');
        elTenFramesContainer.classList.add('opacity-100', 'scale-100');
      }, 300);
    }

    function nextRound() {
      elNextButtonContainer.classList.add('hidden');
      elStatusPill.classList.add('hidden');
      
      if (state.currentIndex + 1 < TOTAL_ROUNDS) {
        state.currentIndex++;
        enterGuessingState();
      } else {
        showFinishedScreen();
      }
    }

    function createFireworks() {
      const colors = ['#f43f5e', '#3b82f6', '#fbbf24', '#10b981', '#a855f7', '#06b6d4', '#ec4899', '#ffffff'];
      let html = '<div class="relative w-full h-full flex items-center justify-center">';
      
      for(let i=0; i<100; i++) {
        const angle = (Math.random() * 360) * (Math.PI / 180);
        const velocity = 80 + Math.random() * 200;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const delay = Math.random() * 1.2;
        
        html += `<div class="particle absolute w-3 h-3 md:w-5 md:h-5 rounded-full shadow-[0_0_20px_rgba(255,255,255,1)]" 
                      style="background-color: ${color}; --tx: ${tx}px; --ty: ${ty}px; animation-delay: ${delay}s"></div>`;
      }
      html += '</div>';
      elFireworksContainer.innerHTML = html;
    }

    function showFinishedScreen() {
      hideAll();
      playWinChime();
      
      elFinalScore.innerText = state.score;
      createFireworks();
      
      elScreenFinished.classList.remove('hidden');
      setTimeout(() => elScreenFinished.classList.remove('opacity-0'), 50);
    }

    function resetGameToMenu() {
      hideAll();
      elScreenMenu.classList.remove('hidden');
      setTimeout(() => elScreenMenu.classList.remove('opacity-0'), 50);
    }

    // Initialize Menu
    resetGameToMenu();

  </script>
</body>
</html>
