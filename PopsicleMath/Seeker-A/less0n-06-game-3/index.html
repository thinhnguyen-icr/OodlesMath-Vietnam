<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Garage Math Game</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #38BDF8;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Animations --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(8px) rotate(3deg); }
            60% { transform: translateX(-8px) rotate(-3deg); }
            80% { transform: translateX(8px) rotate(3deg); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes drift {
            from { transform: translateX(0); }
            to { transform: translateX(120vw); }
        }
        .animate-drift { animation-name: drift; }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 40s linear infinite; }

        @keyframes bounce-short {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg) rotateX(0deg); opacity: 1; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) rotateX(360deg); opacity: 0; }
        }
        .animate-confetti-fall {
            animation-name: confetti-fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        /* Hiệu ứng chớp mắt cho xe ô tô */
        @keyframes blinkAnim {
            0%, 96%, 100% { transform: scaleY(1); }
            98% { transform: scaleY(0.1); }
        }
        .blink { animation: blinkAnim 4s infinite; }

        /* Nút bấm Clicky */
        .btn-clicky {
            transition: all 0.1s;
        }
        .btn-clicky:active {
            border-bottom-width: 0px !important;
            transform: translateY(8px);
            margin-bottom: 8px; /* Bù đắp để layout không bị giật */
        }
        
        .btn-option:active {
            border-bottom-width: 2px !important;
            transform: translateY(6px);
        }
    </style>
</head>
<body>
  <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div id="app" class="min-h-screen flex flex-col relative"></div>

    <script>
        // --- TRẠNG THÁI TRÒ CHƠI (GAME STATE) ---
        let round = 0;
        const totalRounds = 10;
        let levelData = null;
        let gameState = 'start'; // 'start', 'playing', 'success', 'end'
        let mistakes = 0;
        let soundEnabled = true;
        let wrongAnswer = null;

        // Bảng màu xe
        const carColors = ['#FF4B4B', '#FFC800', '#1CB0F6', '#CE82FF', '#58CC02'];

        // --- HÀM TẠO SVG (SVG GENERATORS) ---

        // Hàm vẽ xe ô tô (Icon được cải tiến siêu đẹp, chớp mắt, nhả khói)
        function getCarSVG(color) {
            return `
            <svg viewBox="0 0 130 100" class="w-full h-full drop-shadow-md" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Bóng dưới gầm xe -->
                <ellipse cx="65" cy="90" rx="55" ry="8" fill="#1F2937" opacity="0.15" />
                
                <!-- Khói ống xả -->
                <circle cx="15" cy="80" r="8" fill="white" opacity="0.8" />
                <circle cx="8" cy="72" r="5" fill="white" opacity="0.5" />

                <!-- Thân xe mập mạp (Chubby Body) -->
                <path d="M 20 60 C 20 25, 40 18, 70 18 C 105 18, 115 35, 115 65 C 115 85, 100 88, 85 88 L 40 88 C 20 88, 20 75, 20 60 Z" fill="${color}" stroke="#1F2937" stroke-width="5" stroke-linejoin="round"/>
                
                <!-- Hiệu ứng bóng sơn xe (Gloss/Highlight) -->
                <path d="M 32 30 C 50 22, 80 24, 100 42" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.4" />

                <!-- Cửa kính -->
                <path d="M 38 28 L 80 28 C 92 28, 103 40, 103 52 L 26 52 C 26 40, 34 28, 38 28 Z" fill="#E0F2FE" stroke="#1F2937" stroke-width="4" stroke-linejoin="round"/>
                <path d="M 58 28 L 58 52" stroke="#1F2937" stroke-width="4" stroke-linecap="round" /> <!-- Vạch chia kính -->
                
                <!-- Bóng phản quang trên kính -->
                <path d="M 82 34 L 92 34 L 86 46 L 76 46 Z" fill="#FFFFFF" opacity="0.7" />
                <path d="M 40 34 L 48 34 L 44 46 L 36 46 Z" fill="#FFFFFF" opacity="0.7" />

                <!-- Khuôn mặt đáng yêu (Nằm ở mui xe trước) -->
                <g class="blink" transform-origin="93 72">
                    <!-- Mắt -->
                    <circle cx="90" cy="70" r="5" fill="#1F2937" />
                    <circle cx="91" cy="68" r="2" fill="#FFFFFF" />
                    <circle cx="106" cy="70" r="5" fill="#1F2937" />
                    <circle cx="107" cy="68" r="2" fill="#FFFFFF" />
                </g>
                <!-- Má hồng -->
                <circle cx="82" cy="75" r="4" fill="#FF8A8A" opacity="0.9" />
                <circle cx="114" cy="75" r="4" fill="#FF8A8A" opacity="0.9" />
                <!-- Miệng cười -->
                <path d="M 94 77 Q 98 82 102 77" stroke="#1F2937" stroke-width="3" stroke-linecap="round" fill="none" />

                <!-- Đèn pha trước & sau -->
                <circle cx="110" cy="55" r="6" fill="#FEF08A" stroke="#1F2937" stroke-width="3" />
                <path d="M 20 52 L 20 64 C 14 64, 14 52, 20 52 Z" fill="#FCA5A5" stroke="#1F2937" stroke-width="3" stroke-linejoin="round"/>

                <!-- Bánh xe có vành mâm (Chonky Wheels) -->
                <!-- Bánh sau -->
                <circle cx="40" cy="88" r="16" fill="#374151" stroke="#1F2937" stroke-width="4"/>
                <circle cx="40" cy="88" r="6" fill="#E5E7EB" />
                <!-- Bánh trước -->
                <circle cx="88" cy="88" r="16" fill="#374151" stroke="#1F2937" stroke-width="4"/>
                <circle cx="88" cy="88" r="6" fill="#E5E7EB" />
            </svg>
            `;
        }

        // --- CẢNH VẬT (SCENERY) ---
        function getBackgroundHTML() {
            let clouds = '';
            for(let i=0; i<5; i++) {
                let width = 80 + Math.random() * 80;
                let height = 40 + Math.random() * 30;
                let top = 5 + Math.random() * 30;
                let left = -(20 + Math.random() * 20);
                let duration = 30 + Math.random() * 40;
                let delay = i * 8;
                clouds += `
                <div class="absolute bg-white rounded-full opacity-90 animate-drift drop-shadow-md"
                     style="width: ${width}px; height: ${height}px; top: ${top}%; left: ${left}%; animation-duration: ${duration}s; animation-delay: ${delay}s; animation-iteration-count: infinite; animation-timing-function: linear;">
                    <div class="absolute top-[-40%] left-[10%] w-[60%] h-[120%] bg-white rounded-full"></div>
                    <div class="absolute top-[-20%] right-[15%] w-[40%] h-[90%] bg-white rounded-full"></div>
                </div>`;
            }

            return `
            <div class="absolute inset-0 overflow-hidden pointer-events-none z-0 bg-[#38BDF8]">
                <!-- Mặt trời -->
                <div class="absolute top-10 right-10 animate-spin-slow">
                    <i data-lucide="sun" class="w-32 h-32 text-[#FFC800] fill-[#FFC800] drop-shadow-lg opacity-90 stroke-[1px]"></i>
                </div>
                <!-- Mây bay -->
                ${clouds}
                <!-- Đồi cỏ -->
                <div class="absolute bottom-0 left-0 w-[150%] h-[35%] bg-[#58CC02] rounded-t-[100%] transform -translate-x-[10%] border-t-[8px] border-[#46A302]"></div>
                <div class="absolute bottom-0 right-0 w-[120%] h-[25%] bg-[#A3E635] rounded-t-[100%] transform translate-x-[10%] border-t-[8px] border-[#84CC16]"></div>
            </div>
            `;
        }

        function getConfettiHTML() {
            const colors = ['#FF4B4B', '#1CB0F6', '#58CC02', '#FFC800', '#CE82FF'];
            let confetti = '';
            for(let i=0; i<80; i++) {
                let size = Math.random() * 14 + 10;
                let color = colors[Math.floor(Math.random() * colors.length)];
                let left = Math.random() * 100;
                let delay = Math.random() * 4;
                let duration = Math.random() * 3 + 2.5;
                let borderRadius = Math.random() > 0.3 ? '2px' : '50%';
                let heightMod = Math.random() > 0.5 ? 0.8 : 1.5;
                
                confetti += `
                <div class="absolute animate-confetti-fall"
                     style="left: ${left}%; top: -30px; width: ${size}px; height: ${size * heightMod}px; background-color: ${color}; border-radius: ${borderRadius}; animation-delay: ${delay}s; animation-duration: ${duration}s;">
                </div>`;
            }
            return `<div class="absolute inset-0 pointer-events-none overflow-hidden z-50 flex justify-center">${confetti}</div>`;
        }

        // --- ÂM THANH (AUDIO & TTS) ---
        function speak(text) {
            if (!window.speechSynthesis || !soundEnabled) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            utterance.pitch = 1.3; 
            const voices = window.speechSynthesis.getVoices();
            const kidVoice = voices.find(v => v.name.includes('Google US English') || v.name.includes('Samantha') || v.name.includes('Karen'));
            if (kidVoice) utterance.voice = kidVoice;
            window.speechSynthesis.speak(utterance);
        }

        function playSound(type) {
            if (!soundEnabled) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'success') {
                    [523.25, 659.25, 1046.50].forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.1));
                        gain.gain.setValueAtTime(0, ctx.currentTime + (i * 0.1));
                        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + (i * 0.1) + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i * 0.1) + 0.4);
                        osc.start(ctx.currentTime + (i * 0.1));
                        osc.stop(ctx.currentTime + (i * 0.1) + 0.5);
                    });
                } else if (type === 'error') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'pop') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                }
            } catch (e) {
                console.error("Audio error", e);
            }
        }

        // --- LOGIC TRÒ CHƠI (GAME LOGIC) ---
        function generateLevel(currentRound) {
            let targetMin = 4, targetMax = 6;
            if (currentRound > 3) { targetMin = 6; targetMax = 8; }
            if (currentRound > 6) { targetMin = 8; targetMax = 10; }
            
            const target = Math.floor(Math.random() * (targetMax - targetMin + 1)) + targetMin;
            const parked = Math.floor(Math.random() * (target - 1)) + 1; 
            const needed = target - parked;

            const options = new Set();
            options.add(needed);
            
            while (options.size < 3) {
                let distractor = Math.floor(Math.random() * targetMax) + 1;
                if (distractor !== needed && distractor > 0 && distractor <= 10) {
                    options.add(distractor);
                }
            }

            return {
                target,
                parked,
                needed,
                options: Array.from(options).sort(() => Math.random() - 0.5)
            };
        }

        window.startGame = () => {
            round = 0;
            mistakes = 0;
            wrongAnswer = null;
            gameState = 'playing';
            levelData = generateLevel(0);
            playSound('pop');
            speak(`Let's park the cars! We need ${levelData.target} in total.`);
            renderApp();
        };

        window.nextLevel = () => {
            if (round + 1 >= totalRounds) {
                gameState = 'end';
                playSound('success');
                speak("Amazing job! You finished the game!");
            } else {
                round++;
                levelData = generateLevel(round);
                gameState = 'playing';
                wrongAnswer = null;
                speak(`Next one! Make ${levelData.target}.`);
            }
            renderApp();
        };

        window.handleSelection = (number) => {
            if (gameState !== 'playing') return;

            if (number === levelData.needed) {
                playSound('success');
                speak(["Awesome!", "Great job!", "Perfect!", "You got it!"][Math.floor(Math.random() * 4)]);
                gameState = 'success';
                wrongAnswer = null;
                renderApp();
                setTimeout(window.nextLevel, 2000); 
            } else {
                mistakes++;
                wrongAnswer = number;
                playSound('error');
                speak("Oops, try again!");
                renderApp();
                
                // Clear animation after a bit
                setTimeout(() => {
                    if (gameState === 'playing') {
                        wrongAnswer = null;
                        renderApp();
                    }
                }, 800);
            }
        };

        window.toggleSound = () => {
            soundEnabled = !soundEnabled;
            renderApp();
        };

        window.goHome = () => {
            gameState = 'start';
            renderApp();
        };

        // --- RENDER GIAO DIỆN (UI RENDERING) ---
        function renderStartScreen() {
            return `
            <div class="flex-1 flex flex-col items-center justify-center p-4 relative z-10">
                ${getBackgroundHTML()}
                <div class="z-10 bg-white p-8 md:p-12 rounded-[2.5rem] max-w-lg w-full flex flex-col items-center border-4 border-white shadow-[0_8px_0_0_rgba(0,0,0,0.1)]">
                    <div class="bg-[#FFC800] text-white py-2 px-6 rounded-full font-black uppercase tracking-widest text-sm mb-6 shadow-[0_4px_0_0_#E5B400] transform -rotate-2">
                        Math Game
                    </div>
                    <h1 class="text-5xl md:text-6xl font-black text-[#4B4B4B] mb-8 leading-tight">
                        Car <span class="text-[#1CB0F6]">Garage</span>
                    </h1>
                    <div class="flex justify-center gap-2 md:gap-4 mb-8">
                        <div class="w-24 md:w-32 transform -rotate-6 transition-transform hover:scale-110">${getCarSVG('#FF4B4B')}</div>
                        <div class="w-24 md:w-32 transform translate-y-4 transition-transform hover:scale-110">${getCarSVG('#58CC02')}</div>
                        <div class="w-24 md:w-32 transform rotate-6 transition-transform hover:scale-110">${getCarSVG('#FFC800')}</div>
                    </div>
                    <p class="text-xl text-[#777777] font-bold mb-10 text-center">Park the cars to match the target number!</p>
                    <button onclick="startGame()" class="btn-clicky w-full bg-[#58CC02] hover:bg-[#46A302] text-white text-2xl font-black py-5 px-8 rounded-2xl flex items-center justify-center gap-3 uppercase tracking-wide border-b-[8px] border-[#46A302]">
                        <i data-lucide="play" class="w-8 h-8 fill-current"></i> Play Now
                    </button>
                </div>
            </div>`;
        }

        function renderGameScreen() {
            // Phần hiển thị đáp án
            let optionsHTML = '';
            levelData.options.forEach((opt, idx) => {
                const isWrong = wrongAnswer === opt;
                const wrongClasses = isWrong ? 'animate-shake bg-red-50 border-red-200 border-b-red-300 opacity-80' : 'bg-white border-[#E5E7EB]';
                const wrongTextClasses = isWrong ? 'bg-[#FF4B4B] text-white border-[#C93838]' : 'bg-[#F3F4F6] text-[#4B4B4B] border-[#E5E7EB] group-hover:bg-[#E5E7EB]';
                
                // Vẽ lưới xe thu nhỏ cho nút chọn
                let miniCars = '';
                for(let c=0; c<opt; c++) {
                    const carColor = carColors[idx % carColors.length];
                    const sizeClass = opt > 4 ? "w-8 h-6 sm:w-10 sm:h-8" : "w-10 h-8 sm:w-14 sm:h-10";
                    miniCars += `<div class="${sizeClass}">${getCarSVG(carColor)}</div>`;
                }

                optionsHTML += `
                <button onclick="handleSelection(${opt})" class="btn-option group border-2 rounded-[2rem] p-3 sm:p-5 flex flex-col items-center min-w-[110px] sm:min-w-[140px] transition-all duration-100 border-b-[8px] ${wrongClasses}">
                    <div class="grid gap-1.5 sm:gap-2 mb-4 w-full justify-items-center ${opt > 4 ? 'grid-cols-3' : 'grid-cols-2'}">
                        ${miniCars}
                    </div>
                    <div class="w-[80%] py-1.5 sm:py-2 rounded-2xl text-center font-black text-2xl sm:text-3xl transition-colors border-2 ${wrongTextClasses}">
                        ${opt}
                    </div>
                </button>`;
            });

            // Phần xe đã đỗ trong bãi
            let parkedCarsHTML = '';
            for(let i=0; i<levelData.parked; i++) {
                parkedCarsHTML += `
                <div class="w-full max-w-[80px] aspect-[4/3] bg-[#F3F4F6] rounded-2xl flex items-center justify-center p-1 sm:p-2 border-b-4 border-[#E5E7EB]">
                    ${getCarSVG('#1CB0F6')}
                </div>`;
            }

            // Phần xe còn thiếu
            let neededCarsHTML = '';
            for(let i=0; i<levelData.needed; i++) {
                if(gameState === 'success') {
                    neededCarsHTML += `
                    <div class="w-full max-w-[80px] aspect-[4/3] rounded-2xl flex items-center justify-center p-1 sm:p-2">
                        <div class="animate-bounce w-full h-full">${getCarSVG('#58CC02')}</div>
                    </div>`;
                } else {
                    neededCarsHTML += `
                    <div class="w-full max-w-[80px] aspect-[4/3] rounded-2xl border-4 border-dashed border-[#D1D5DB] bg-[#F9FAFB] flex items-center justify-center p-1 sm:p-2 transition-all duration-300">
                        <span class="text-[#D1D5DB] font-black text-5xl">?</span>
                    </div>`;
                }
            }

            return `
            <!-- Nền trang Game -->
            <div class="absolute inset-0 pointer-events-none z-0">
                <div class="absolute bottom-0 left-0 w-full h-[45%] bg-[#58CC02] border-t-[8px] border-[#46A302]"></div>
            </div>

            <!-- Thanh tiến trình (Progress Bar) -->
            <div class="bg-white/90 backdrop-blur-sm px-4 py-3 sm:py-4 flex justify-between items-center shadow-md z-20 sticky top-0 border-b-[4px] border-[#E5E7EB]">
                <div class="flex-1 max-w-2xl mx-auto flex items-center gap-4">
                    <button onclick="goHome()" class="text-[#AFB6C2] hover:text-[#4B4B4B] transition">
                        <i data-lucide="rotate-ccw" class="w-7 h-7 stroke-[3px]"></i>
                    </button>
                    <div class="flex-1 bg-[#E5E7EB] h-6 sm:h-8 rounded-full overflow-hidden relative border-[3px] border-[#D1D5DB]">
                        <div class="absolute top-0 left-0 h-full bg-[#58CC02] transition-all duration-500 ease-out rounded-full" style="width: ${(round / totalRounds) * 100}%">
                            <div class="absolute top-1 left-2 right-2 h-2 bg-white/40 rounded-full"></div>
                        </div>
                    </div>
                    <button onclick="toggleSound()" class="text-[#AFB6C2] hover:text-[#1CB0F6] transition">
                        ${soundEnabled 
                            ? `<i data-lucide="volume-2" class="w-7 h-7 stroke-[3px]"></i>` 
                            : `<i data-lucide="volume-x" class="w-7 h-7 stroke-[3px]"></i>`
                        }
                    </button>
                </div>
            </div>

            <!-- Khu vực chính -->
            <div class="flex-1 flex flex-col items-center w-full max-w-4xl mx-auto p-4 sm:p-6 z-10 relative">
                
                <!-- TIÊU ĐỀ YÊU CẦU (TARGET) - Đã căn chỉnh cân đối hơn -->
                <div class="flex items-center justify-center gap-4 sm:gap-6 mb-12 sm:mb-16 mt-2">
                    <div class="flex flex-col items-end justify-center">
                        <h2 class="text-white/90 text-xl font-black uppercase tracking-widest drop-shadow-md">Target</h2>
                        <p class="text-3xl sm:text-4xl font-extrabold text-white drop-shadow-md leading-tight">Make Total</p>
                    </div>
                    <div class="bg-[#FFC800] border-[6px] border-white w-24 h-24 sm:w-28 sm:h-28 rounded-[2rem] flex items-center justify-center shadow-[0_6px_0_0_#D97706] transform rotate-3">
                        <span class="text-6xl sm:text-7xl font-black text-white drop-shadow-sm">${levelData.target}</span>
                    </div>
                </div>

                <!-- KHU VỰC BÃI ĐỖ XE (GARAGE) -->
                <div class="w-full relative px-2 sm:px-8 drop-shadow-2xl">
                    <div class="bg-white border-4 border-[#D1D5DB] rounded-t-[2.5rem] p-4 sm:p-8 pt-10 min-h-[180px] sm:min-h-[220px] transition-all duration-300 relative z-10 ${gameState === 'success' ? 'bg-[#D7FFB8] border-[#58CC02]' : ''}">
                        <!-- Biển hiệu Garage (Dạng pill tròn, đè lên viền chuồng xe không chạm phần Target) -->
                        <div class="absolute -top-7 left-1/2 transform -translate-x-1/2 bg-[#FF4B4B] text-white px-10 py-2 rounded-full font-black tracking-widest text-xl sm:text-2xl border-b-[6px] border-[#C93838] shadow-md z-20">
                            GARAGE
                        </div>

                        <!-- Lưới xe -->
                        <div class="grid grid-cols-5 gap-2 sm:gap-4 justify-items-center mt-2">
                            ${parkedCarsHTML}
                            ${neededCarsHTML}
                        </div>
                    </div>

                    <!-- Đường đi -->
                    <div class="w-full h-12 sm:h-16 bg-[#4B4B4B] rounded-b-[2rem] border-b-[8px] border-[#374151] relative z-20 flex items-center justify-center overflow-hidden">
                        <div class="w-[90%] border-t-[6px] border-dashed border-[#FFC800] opacity-90"></div>
                    </div>
                </div>

                <!-- KHU VỰC CHỌN ĐÁP ÁN -->
                <div class="w-full mt-8 sm:mt-12 h-[220px]">
                    ${gameState === 'success' ? `
                        <div class="text-center w-full py-8">
                            <h2 class="text-5xl md:text-6xl font-black text-white animate-bounce drop-shadow-[0_4px_4px_rgba(0,0,0,0.2)]">Perfect!</h2>
                        </div>
                    ` : `
                        <div class="w-full flex flex-col items-center">
                            <div class="h-10 mb-2 sm:mb-4 flex items-center justify-center">
                                ${wrongAnswer !== null 
                                    ? `<div class="bg-[#FF4B4B] text-white px-6 py-2 rounded-full font-black text-xl tracking-widest uppercase animate-pulse border-b-4 border-[#C93838]">Try Again!</div>` 
                                    : `<p class="font-black text-xl uppercase tracking-widest text-white drop-shadow-md">Select the right group</p>`
                                }
                            </div>
                            <div class="flex justify-center gap-4 sm:gap-6 flex-wrap w-full px-2">
                                ${optionsHTML}
                            </div>
                        </div>
                    `}
                </div>
            </div>`;
        }

        function renderEndScreen() {
            let stars = 1;
            if(mistakes === 0) stars = 3;
            else if(mistakes <= 3) stars = 2;

            let starHTML = '';
            [1, 2, 3].forEach(s => {
                let sClass = s <= stars ? 'scale-110' : 'scale-75 opacity-40 grayscale';
                let fill = s <= stars ? '#FFC800' : '#E5E7EB';
                let stroke = s <= stars ? '#D97706' : '#9CA3AF';
                starHTML += `<div class="transition-transform duration-500 delay-${s*100} ${sClass}">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="${fill}" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </div>`;
            });

            return `
            <div class="flex-1 flex flex-col items-center justify-center p-4 relative z-10">
                ${getBackgroundHTML()}
                ${getConfettiHTML()}
                
                <div class="z-10 bg-white p-10 rounded-[2.5rem] shadow-[0_8px_0_0_rgba(0,0,0,0.1)] max-w-lg w-full flex flex-col items-center animate-bounce-short border-4 border-white">
                    <h2 class="text-5xl font-black text-[#FFC800] mb-6 drop-shadow-sm stroke-black">Level Complete!</h2>
                    
                    <div class="flex justify-center gap-4 mb-8">
                        ${starHTML}
                    </div>

                    <div class="bg-[#F3F4F6] w-full rounded-3xl p-6 mb-8 border-4 border-[#E5E7EB]">
                        <div class="flex justify-between items-center text-xl font-bold text-[#777777] mb-2">
                            <span>Cars Parked:</span>
                            <span class="text-[#1CB0F6] text-3xl font-black">${totalRounds}</span>
                        </div>
                        <div class="flex justify-between items-center text-xl font-bold text-[#777777]">
                            <span>Accuracy:</span>
                            <span class="text-2xl font-black ${mistakes === 0 ? 'text-[#58CC02]' : 'text-[#FF4B4B]'}">
                                ${mistakes === 0 ? "Perfect!" : `${totalRounds} / ${totalRounds + mistakes}`}
                            </span>
                        </div>
                    </div>

                    <button onclick="startGame()" class="btn-clicky w-full bg-[#1CB0F6] hover:bg-[#1899D6] text-white text-2xl font-black py-5 px-8 rounded-2xl flex items-center justify-center gap-3 uppercase tracking-wide border-b-[8px] border-[#1899D6] z-10">
                        <i data-lucide="rotate-ccw" class="w-8 h-8 stroke-[3px]"></i> Play Again
                    </button>
                </div>
            </div>`;
        }

        // Hàm cập nhật toàn bộ giao diện dựa vào state hiện tại
        function renderApp() {
            const app = document.getElementById('app');
            if (gameState === 'start') {
                app.innerHTML = renderStartScreen();
            } else if (gameState === 'playing' || gameState === 'success') {
                app.innerHTML = renderGameScreen();
            } else if (gameState === 'end') {
                app.innerHTML = renderEndScreen();
            }
            
            // Re-initialize Lucide Icons sau khi ghi đè DOM
            if(window.lucide) {
                lucide.createIcons();
            }
        }

        // --- KHỞI CHẠY (INITIALIZATION) ---
        // Thiết lập giọng nói chuẩn trước
        if(window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
        
        renderApp();
    </script>
</body>
</html>
