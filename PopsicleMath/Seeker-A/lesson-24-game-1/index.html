<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Count With Me! - Toddler Counting Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            background-color: #7dd3fc; /* Sky blue */
            margin: 0;
            padding: 0;
        }

        /* Animated Sky Background */
        .sky-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #38bdf8 0%, #bae6fd 100%);
            z-index: -3;
        }

        /* Animated Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.8;
            animation: moveClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud1 { width: 120px; height: 40px; top: 10%; left: -150px; animation-duration: 25s; }
        .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud1::after { width: 40px; height: 40px; top: -20px; right: 15px; }
        
        .cloud2 { width: 80px; height: 30px; top: 30%; left: -100px; animation-duration: 35s; animation-delay: 5s; opacity: 0.6; }
        .cloud2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
        .cloud2::after { width: 30px; height: 30px; top: -15px; right: 10px; }

        @keyframes moveClouds {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(120vw); }
        }

        /* Grass Hill & Decorations - FIXED AT BOTTOM */
        .grass-hill {
            position: fixed;
            bottom: -15vh;
            left: -10vw;
            width: 120vw;
            height: 45vh;
            background: #58cc02;
            border-radius: 50% 50% 0 0;
            border-top: 12px solid #46a302;
            z-index: -2;
        }

        .decoration {
            position: absolute;
            z-index: -1;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.15));
        }

        /* Duolingo Style 3D Buttons */
        .btn-3d {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 0 transparent !important;
        }

        /* Premium Jelly Bubbles */
        .bubble-btn {
            box-shadow: 0 8px 0 0 #cbd5e1, 0 15px 15px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(145deg, #ffffff, #e2e8f0);
        }
        .bubble-btn:active:not(.clicked) {
            transform: translateY(8px) scale(0.95);
            box-shadow: 0 0px 0 0 #cbd5e1, 0 5px 5px rgba(0,0,0,0.1);
        }

        .bubble-clicked {
            animation: popIn 0.4s forwards;
            box-shadow: 0 8px 0 0 rgba(0,0,0,0.2) !important;
        }
        .bubble-clicked:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 0 transparent !important;
        }

        /* Striped Candy Progress Bar */
        .striped-bg {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.3) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0.3) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
            animation: moveStripes 1s linear infinite;
        }
        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes wiggle {
            0%, 7% { transform: rotateZ(0); }
            15% { transform: rotateZ(-8deg); }
            20% { transform: rotateZ(12deg); }
            25% { transform: rotateZ(-12deg); }
            30% { transform: rotateZ(8deg); }
            35% { transform: rotateZ(-4deg); }
            40%, 100% { transform: rotateZ(0); }
        }
        .wiggle { animation: wiggle 2.5s linear infinite; }

        /* Confetti */
        .confetti {
            position: absolute;
            z-index: 100;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        /* Text Stroke/Shadow */
        .text-outline {
            text-shadow: 
                -3px -3px 0 #fff,  
                 3px -3px 0 #fff,
                -3px  3px 0 #fff,
                 3px  3px 0 #fff,
                 0px  6px 0 #e2e8f0;
        }
        .text-outline-dark {
            text-shadow: 
                -2px -2px 0 #1e293b,  
                 2px -2px 0 #1e293b,
                -2px  2px 0 #1e293b,
                 2px  2px 0 #1e293b;
        }
        .number-shadow {
            text-shadow: 0 10px 0px rgba(0,0,0,0.15);
        }

        /* Magical Mini-Game Background */
        .magical-sky {
            background: linear-gradient(180deg, #1e1b4b 0%, #4c1d95 60%, #7e22ce 100%);
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
            opacity: 0.2;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px 2px rgba(255,255,255,0.8); }
        }

        /* Falling Fruit Animation */
        @keyframes fallFruit {
            0% { transform: translateY(-100px) rotate(0deg) scale(1); }
            50% { transform: translateY(50vh) rotate(180deg) scale(1.1); }
            100% { transform: translateY(120vh) rotate(360deg) scale(1); }
        }
        .fruit-item {
            animation: fallFruit linear forwards;
            transition: transform 0.1s;
            filter: drop-shadow(0 12px 10px rgba(0,0,0,0.4));
            z-index: 20;
        }
        .fruit-item:active {
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Environment Background -->
    <div class="sky-bg"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    
    <div class="grass-hill">
        <!-- Trees -->
        <div class="decoration text-5xl md:text-7xl" style="top: 12%; left: 15%;">🌳</div>
        <div class="decoration text-4xl md:text-6xl" style="top: 18%; right: 22%;">🌲</div>
        <div class="decoration text-6xl md:text-8xl" style="top: 5%; left: 40%;">🌳</div>
        
        <!-- Flowers -->
        <div class="decoration text-2xl" style="top: 35%; left: 20%;">🌸</div>
        <div class="decoration text-2xl" style="top: 40%; right: 30%;">🌼</div>
        <div class="decoration text-[1.8rem]" style="top: 25%; left: 55%;">🌷</div>
        <div class="decoration text-2xl" style="top: 45%; right: 15%;">🌻</div>
        <div class="decoration text-2xl" style="top: 20%; left: 8%;">🌸</div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center backdrop-blur-sm bg-white/20">
        <div class="bg-white/80 p-8 md:p-12 rounded-[3rem] shadow-2xl flex flex-col items-center text-center max-w-[90%] border-8 border-white">
            <h1 class="text-5xl md:text-7xl font-black text-[#58cc02] mb-4 animate-float text-outline tracking-wide">Count With Me!</h1>
            <div class="text-8xl md:text-9xl mb-10 wiggle font-black text-[#ffc800] number-shadow">123</div>
            
            <button onclick="startGame()" class="btn-3d w-full max-w-xs bg-[#58cc02] text-white text-4xl font-black py-5 px-8 rounded-3xl shadow-[0_8px_0_0_#46a302] hover:bg-[#4dd100] tracking-wider uppercase">
                Play ▶
            </button>
            
            <div class="mt-8 flex items-center justify-center gap-2 bg-blue-100/80 text-blue-500 px-6 py-3 rounded-full font-bold shadow-sm">
                <span class="text-2xl">🔊</span> Turn on sound
            </div>
        </div>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="hidden flex-col items-center w-full h-full p-4 md:p-6 max-w-5xl mx-auto relative z-10">
        
        <!-- Top Bar: Left Progress + Right Logo Area -->
        <div class="w-full flex justify-between items-start mb-4 md:mb-6 z-20">
            
            <!-- Left: Beautiful Progress & Close -->
            <div class="flex items-center gap-3 w-[65%] md:w-[45%] bg-white/85 p-2 md:p-3 rounded-full shadow-lg border-[3px] border-white backdrop-blur-md">
                <!-- Close Button -->
                <button onclick="restartGame()" class="btn-3d shrink-0 bg-red-400 text-white w-10 h-10 md:w-12 md:h-12 rounded-full shadow-[0_4px_0_0_#ef4444] flex items-center justify-center hover:bg-red-500 border-2 border-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-7 md:w-7 font-bold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                
                <!-- Progress Bar -->
                <div class="flex-grow h-6 md:h-8 bg-gray-200 rounded-full overflow-hidden relative border-2 border-gray-100 shadow-inner mr-2">
                    <div id="progress-fill" class="h-full bg-[#ffc800] striped-bg w-0 transition-all duration-700 rounded-full relative shadow-[inset_0_-3px_0_rgba(0,0,0,0.1)]">
                    </div>
                </div>
            </div>
            
            <!-- Right: Logo Area (Empty for user) -->
            <div id="logo-placeholder" class="w-24 h-12 md:w-32 md:h-16 flex items-start justify-end">
                <!-- LOGO PLACEHOLDER: Put your <img> tag here. Example below: -->
                <!-- <img src="your-logo.png" alt="Logo" class="max-h-full max-w-full object-contain drop-shadow-md" /> -->
            </div>

        </div>

        <!-- Instruction & Number Display -->
        <div class="flex flex-col items-center justify-center mb-6 md:mb-10 bg-white/95 px-12 py-6 md:py-8 rounded-[3rem] shadow-xl border-8 border-white transform transition hover:scale-105 z-20">
            <h2 id="instruction-text" class="text-2xl md:text-4xl font-black text-[#afafaf] mb-2 text-center uppercase tracking-widest">
                Find the number
            </h2>
            <div id="target-number" class="text-[120px] md:text-[180px] leading-none font-black text-[#1cb0f6] number-shadow transition-transform duration-300">
                1
            </div>
        </div>

        <!-- Interactive Area -->
        <div id="circles-container" class="flex-grow flex flex-wrap content-start md:content-center justify-center gap-4 md:gap-8 w-full max-w-3xl relative z-10">
            <!-- Bubbles injected by JS -->
        </div>

        <!-- Bottom Status -->
        <div class="h-24 md:h-28 flex items-center justify-center mt-auto w-full mb-4 z-20 pointer-events-none">
            <div id="feedback-text" class="text-5xl md:text-6xl font-black text-[#58cc02] opacity-0 transition-all duration-300 transform scale-50 text-outline">
                Awesome!
            </div>
        </div>
    </div>

    <!-- Mini-Game Overlay -->
    <div id="minigame-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center magical-sky overflow-hidden">
        
        <!-- Animated CSS Stars Container -->
        <div id="stars-container" class="absolute inset-0 z-0 pointer-events-none"></div>

        <!-- Moon/Stars decoration for mini-game -->
        <div class="absolute top-10 right-10 text-7xl text-yellow-200 animate-pulse drop-shadow-[0_0_15px_rgba(253,224,71,0.6)] z-10 pointer-events-none">🌙</div>
        <div class="absolute top-24 left-16 text-5xl text-yellow-100 animate-ping z-10 pointer-events-none">✨</div>
        
        <h2 class="text-5xl md:text-7xl font-black text-white mt-20 text-outline-dark number-shadow z-10 text-center px-4 tracking-wide pointer-events-none">
            Fruit Break!
        </h2>
        <p class="text-[#fde047] text-2xl md:text-3xl font-bold mt-4 z-10 drop-shadow-md pointer-events-none">Tap 10 fruits to continue</p>
        
        <div class="bg-white/95 px-8 py-3 rounded-full mt-6 z-10 border-8 border-[#ffc800] shadow-[0_10px_20px_rgba(0,0,0,0.3)] flex items-center gap-4 pointer-events-none">
            <span class="text-4xl animate-bounce" style="animation-duration: 2s;">🍎</span>
            <span id="fruit-score" class="text-5xl font-black text-[#58cc02]">0</span> 
            <span class="text-3xl font-bold text-gray-400">/ 10</span>
        </div>

        <!-- Container for falling fruits -->
        <div id="fruit-container" class="absolute inset-0 z-20"></div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/40 backdrop-blur-lg">
        <div class="bg-white p-12 md:p-20 rounded-[4rem] shadow-2xl flex flex-col items-center text-center max-w-[95%] border-[12px] border-[#ffc800]">
            <h1 class="text-7xl md:text-8xl font-black text-[#ffc800] mb-4 animate-bounce text-outline number-shadow">Perfect!</h1>
            
            <div class="bg-[#f0f9ff] px-12 py-6 rounded-[2rem] my-8 border-4 border-[#bae6fd]">
                <p class="text-3xl text-gray-400 font-bold uppercase tracking-widest mb-2">Final Score</p>
                <p id="final-score" class="text-7xl md:text-8xl font-black text-[#1cb0f6] number-shadow">10 / 10</p>
            </div>

            <div class="flex gap-6 mb-12">
                <span class="text-8xl wiggle">🌟</span>
                <span class="text-8xl animate-float">🌟</span>
                <span class="text-8xl wiggle">🌟</span>
            </div>
            
            <button onclick="restartGame()" class="btn-3d w-full max-w-md bg-[#1cb0f6] text-white text-4xl font-black py-6 px-10 rounded-3xl shadow-[0_10px_0_0_#1899d6] hover:bg-[#1493d1] uppercase tracking-wider">
                Play Again ↺
            </button>
        </div>
    </div>

    <script>
        // Game State
        const TOTAL_ROUNDS = 10;
        let currentRound = 0;
        let targetNumber = 0;
        let currentCount = 0;
        let gameQuestions = [];
        let canInteract = false;

        // Minigame State
        let fruitsCaught = 0;
        let fruitInterval;

        // Colors pool
        const vibrantColors = [
            { bg: '#58cc02', shadow: '#46a302', border: '#79e02c' }, // Green
            { bg: '#1cb0f6', shadow: '#1899d6', border: '#4dd2ff' }, // Blue
            { bg: '#ff4b4b', shadow: '#ea2b2b', border: '#ff7979' }, // Red
            { bg: '#ffc800', shadow: '#e5b400', border: '#ffe14d' }, // Yellow
            { bg: '#ce82ff', shadow: '#a568cc', border: '#e2afff' }  // Purple
        ];
        
        let roundColorsPool = [];

        // Audio Context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        // --- Audio System ---
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playPopSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }
        
        function playSquishSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playSuccessSound() {
            playTone(523.25, 'sine', 0.4, 0.1); 
            setTimeout(() => playTone(659.25, 'sine', 0.4, 0.1), 80); 
            setTimeout(() => playTone(783.99, 'sine', 0.6, 0.1), 160); 
            setTimeout(() => playTone(1046.50, 'sine', 0.6, 0.15), 240); 
        }

        function playWinSound() {
            [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'triangle', 0.6, 0.15), i * 120);
            });
        }

        // --- Voice System ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.3; 
                
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(voice => voice.name.includes("Female") || voice.name.includes("Google US English"));
                if (preferredVoice) utterance.voice = preferredVoice;

                window.speechSynthesis.speak(utterance);
            }
        }

        // --- Generate Magic Stars for Minigame ---
        function generateStars() {
            const container = document.getElementById('stars-container');
            container.innerHTML = '';
            for(let i=0; i<30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 4 + 2; 
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 2 + 1}s`);
                container.appendChild(star);
            }
        }

        // --- Game Logic ---
        function generateQuestions() {
            let questions = [];
            let lastNumber = -1;
            
            for(let i = 0; i < TOTAL_ROUNDS; i++) {
                let nextNumber;
                do {
                    nextNumber = Math.floor(Math.random() * 5) + 1; // 1 to 5
                } while (nextNumber === lastNumber);
                
                questions.push(nextNumber);
                lastNumber = nextNumber;
            }
            return questions;
        }

        function startGame() {
            initAudio();
            generateStars(); 
            
            currentRound = 0;
            gameQuestions = generateQuestions();
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('minigame-screen').classList.add('hidden');
            
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('game-ui').classList.add('flex');
            
            updateProgressBar();
            loadRound();
        }

        function updateProgressBar() {
            const progressFill = document.getElementById('progress-fill');
            const percentage = (currentRound / TOTAL_ROUNDS) * 100;
            progressFill.style.width = `${percentage}%`;
        }

        function loadRound() {
            targetNumber = gameQuestions[currentRound];
            currentCount = 0;
            canInteract = false;
            
            // Shuffle colors for this round to ensure unique bubble colors
            roundColorsPool = [...vibrantColors].sort(() => Math.random() - 0.5);

            // Text update
            const numberEl = document.getElementById('target-number');
            numberEl.textContent = targetNumber;
            numberEl.classList.remove('scale-100');
            numberEl.classList.add('scale-50', 'opacity-50');
            setTimeout(() => {
                numberEl.classList.remove('scale-50', 'opacity-50');
                numberEl.classList.add('scale-100');
            }, 50);

            // Hide feedback
            const feedback = document.getElementById('feedback-text');
            feedback.classList.remove('opacity-100', 'scale-100');
            feedback.classList.add('opacity-0', 'scale-50');

            // Setup Bubbles (Always exactly 5)
            const container = document.getElementById('circles-container');
            container.innerHTML = '';

            const totalCirclesToShow = 5; 

            for (let i = 0; i < totalCirclesToShow; i++) {
                const circle = document.createElement('div');
                
                circle.className = `bubble-btn w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center cursor-pointer border-[6px] border-white relative overflow-hidden`;
                circle.dataset.clicked = "false";
                
                const shine = document.createElement('div');
                shine.className = "absolute top-2 left-4 right-10 h-6 bg-white/70 rounded-full rotate-[-15deg]";
                circle.appendChild(shine);

                const numberSpan = document.createElement('span');
                numberSpan.className = "text-white text-5xl md:text-6xl font-black number-shadow hidden z-10";
                circle.appendChild(numberSpan);

                const tapHandler = (e) => {
                    e.preventDefault(); 
                    handleCircleClick(circle, numberSpan);
                };
                
                circle.addEventListener('mousedown', tapHandler);
                circle.addEventListener('touchstart', tapHandler, {passive: false});

                container.appendChild(circle);
            }

            // Voice Prompt
            setTimeout(() => {
                const phrases = [
                    `Find number ${targetNumber}!`,
                    `Can you count to ${targetNumber}?`,
                    `Where is number ${targetNumber}?`
                ];
                speak(phrases[currentRound % 3]);
                canInteract = true;
            }, 600);
        }

        function handleCircleClick(circle, numberSpan) {
            if (!canInteract) return;
            if (circle.dataset.clicked === "true") return;
            if (currentCount >= targetNumber) return;

            circle.dataset.clicked = "true";
            currentCount++;
            
            // Pop a unique color from the shuffled pool, cycle if pool is empty
            if (roundColorsPool.length === 0) {
                 roundColorsPool = [...vibrantColors].sort(() => Math.random() - 0.5);
            }
            const colorTheme = roundColorsPool.pop();
            
            circle.style.background = colorTheme.bg;
            circle.style.borderColor = colorTheme.border;
            circle.style.boxShadow = `0 8px 0 0 ${colorTheme.shadow} !important`;
            circle.classList.add('bubble-clicked');
            
            // Show number
            numberSpan.textContent = currentCount;
            numberSpan.classList.remove('hidden');

            playPopSound();

            if (currentCount === targetNumber) {
                canInteract = false;
                handleSuccess();
            }
        }

        function handleSuccess() {
            setTimeout(playSuccessSound, 300);

            const feedback = document.getElementById('feedback-text');
            const praise = ["Excellent!", "Awesome!", "You did it!", "Super!", "Brilliant!"];
            feedback.textContent = praise[Math.floor(Math.random() * praise.length)];
            feedback.classList.remove('opacity-0', 'scale-50');
            feedback.classList.add('opacity-100', 'scale-100');

            setTimeout(() => speak(feedback.textContent), 400);

            setTimeout(() => {
                currentRound++;
                updateProgressBar();
                
                if (currentRound === 5) {
                    startMiniGame();
                } else if (currentRound < TOTAL_ROUNDS) {
                    loadRound();
                } else {
                    endGame();
                }
            }, 2000);
        }

        // --- Mini Game Logic ---
        function startMiniGame() {
            document.getElementById('minigame-screen').classList.remove('hidden');
            fruitsCaught = 0;
            document.getElementById('fruit-score').textContent = fruitsCaught;
            document.getElementById('fruit-container').innerHTML = ''; 
            
            speak("Break time! Let's catch 10 fruits.");
            
            fruitInterval = setInterval(spawnFruit, 800);
        }

        function spawnFruit() {
            const emojis = ['🍎', '🍌', '🍇', '🍓', '🍊', '🍉', '🍍', '🥭'];
            const container = document.getElementById('fruit-container');
            
            const fruit = document.createElement('div');
            fruit.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            const size = Math.random() * 30 + 80; 
            fruit.style.fontSize = `${size}px`;
            fruit.style.left = `${Math.random() * 80 + 10}%`; 
            fruit.style.position = 'absolute';
            fruit.className = 'fruit-item cursor-pointer select-none';
            
            const duration = Math.random() * 2 + 3.5;
            fruit.style.animationDuration = `${duration}s`;

            const catchHandler = (e) => {
                e.preventDefault();
                playSquishSound();
                fruit.remove();
                fruitsCaught++;
                document.getElementById('fruit-score').textContent = fruitsCaught;
                
                const scoreEl = document.getElementById('fruit-score');
                scoreEl.style.transform = 'scale(1.5)';
                setTimeout(() => scoreEl.style.transform = 'scale(1)', 150);

                if (fruitsCaught >= 10) {
                    endMiniGame();
                }
            };

            fruit.addEventListener('mousedown', catchHandler);
            fruit.addEventListener('touchstart', catchHandler, {passive: false});

            container.appendChild(fruit);

            setTimeout(() => {
                if (fruit.parentNode) fruit.remove();
            }, duration * 1000);
        }

        function endMiniGame() {
            clearInterval(fruitInterval);
            
            speak("Yummy! Back to counting!");
            playSuccessSound();
            
            setTimeout(() => {
                document.getElementById('minigame-screen').classList.add('hidden');
                document.getElementById('fruit-container').innerHTML = ''; 
                loadRound(); 
            }, 2500);
        }

        // --- End Screen Logic ---
        function endGame() {
            playWinSound();
            createConfetti();
            
            document.getElementById('final-score').textContent = `${TOTAL_ROUNDS} / ${TOTAL_ROUNDS}`;
            
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('flex');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('flex');
            
            speak("Perfect score! You are a counting superstar!");
        }

        function restartGame() {
            clearInterval(fruitInterval);
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function createConfetti() {
            const colors = ['#58cc02', '#1cb0f6', '#ff4b4b', '#ffc800', '#ce82ff'];
            
            for (let i = 0; i < 100; i++) {
                const conf = document.createElement('div');
                const isCircle = Math.random() > 0.5;
                
                conf.className = `confetti ${isCircle ? 'rounded-full' : 'rounded-sm'}`;
                
                const sizeW = Math.random() * 12 + 10;
                const sizeH = isCircle ? sizeW : Math.random() * 20 + 10;
                
                conf.style.width = `${sizeW}px`;
                conf.style.height = `${sizeH}px`;
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-50px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 3) + 's';
                conf.style.animationDelay = (Math.random() * 1.5) + 's';
                
                document.body.appendChild(conf);
                
                setTimeout(() => conf.remove(), 6000);
            }
        }

        // Init speech synthesis voices
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }

    </script>
</body>
</html>
