<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Who Comes 1st? - Ver 2</title>
    
    <!-- Load Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        sky: '#87CEEB',
                        grass: '#7CFC00',
                        dirt: '#DEB887',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Animations & Base Setup */
        body {
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* Gradient Text Utility */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 3D Glossy Animal Buttons */
        .animal-btn {
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e8f0fe 40%, #b0c4de 100%);
            box-shadow: 
                inset 2px 2px 5px rgba(255,255,255,0.9),
                inset -3px -3px 8px rgba(0,0,0,0.15),
                0 8px 15px rgba(0,0,0,0.2),
                0 15px 25px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #fff;
        }
        
        .animal-btn:active {
            transform: scale(0.9) translateY(4px);
            box-shadow: 
                inset 2px 2px 5px rgba(255,255,255,0.9),
                inset -3px -3px 8px rgba(0,0,0,0.15),
                0 4px 6px rgba(0,0,0,0.2);
        }

        /* Add depth to emojis to look more realistic */
        .animal-btn span {
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));
        }

        /* Happy Bounce Animation for Correct Answer */
        @keyframes bounce-happy {
            0%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-35px) scale(1.15) rotate(8deg); }
            60% { transform: translateY(-15px) scale(1.05) rotate(-8deg); }
            80% { transform: translateY(-35px) scale(1.15) rotate(8deg); }
        }
        .anim-correct {
            animation: bounce-happy 1s ease infinite;
            border-color: #FFD700;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fffacd 40%, #ffd700 100%);
            box-shadow: 
                0 0 25px rgba(255, 215, 0, 0.8),
                inset 2px 2px 5px rgba(255,255,255,0.9),
                inset -3px -3px 8px rgba(184, 134, 11, 0.3);
        }

        /* Gentle Shake for Wrong Answer */
        @keyframes gentle-shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px) rotate(-5deg); }
            40% { transform: translateX(10px) rotate(5deg); }
            60% { transform: translateX(-10px) rotate(-5deg); }
            80% { transform: translateX(10px) rotate(5deg); }
        }
        .anim-wrong {
            animation: gentle-shake 0.5s ease;
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        /* Checkered Finish Line Pattern */
        .checkered-pattern {
            background-image: 
                linear-gradient(45deg, #222 25%, transparent 25%), 
                linear-gradient(-45deg, #222 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #222 75%), 
                linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            background-color: #fff;
        }

        /* Floating Animation for Start Screen */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Cloud Animation */
        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(120vw); }
        }
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            opacity: 0.8;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.05));
            animation: drift linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .cloud1 { width: 100px; height: 30px; top: 10%; animation-duration: 40s; }
        .cloud1::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud1::after { width: 40px; height: 40px; top: -10px; right: 15px; }
        
        .cloud2 { width: 150px; height: 40px; top: 25%; animation-duration: 55s; animation-delay: -20s; opacity: 0.6; transform: scale(0.8); }
        .cloud2::before { width: 70px; height: 70px; top: -30px; left: 25px; }
        .cloud2::after { width: 50px; height: 50px; top: -15px; right: 25px; }

        /* Modal pop-in */
        @keyframes pop-in {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; }
            80% { transform: scale(1.05) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-pop-in {
            animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Canvas for confetti */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-sky to-blue-200 h-screen w-screen flex flex-col select-none text-gray-800 relative">

    <!-- Background Clouds -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <!-- Fireworks/Confetti Layer -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ==================== START SCREEN ==================== -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-b from-sky via-blue-200 to-green-200 backdrop-blur-sm">
        
        <!-- Beautiful Title with multiple drop shadows for a sticker effect -->
        <h1 class="text-6xl md:text-8xl font-black mb-8 text-center px-4 leading-tight" 
            style="color: #fff; text-shadow: 0px 4px 0px #FF9800, 0px 8px 0px #F57C00, 0px 15px 15px rgba(0,0,0,0.3), -3px -3px 0 #FFb74d, 3px -3px 0 #FFb74d, -3px 3px 0 #F57C00, 3px 3px 0 #F57C00;">
            Who Comes<br>
            <span class="text-yellow-300 text-7xl md:text-9xl">1st?</span>
        </h1>
        
        <!-- Floating Animals -->
        <div class="flex gap-3 md:gap-6 text-6xl md:text-8xl mb-16 animate-float bg-white/30 px-8 py-4 rounded-full shadow-lg border-2 border-white">
            <span style="filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));">🐰</span>
            <span style="filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));" class="mt-4 md:mt-8">🐻</span>
            <span style="filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));">🐱</span>
            <span style="filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));" class="mt-4 md:mt-8">🐘</span>
            <span style="filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));">🦆</span>
        </div>

        <button onclick="startGame()" class="bg-gradient-to-b from-green-400 to-green-600 hover:from-green-300 hover:to-green-500 text-white font-black text-4xl md:text-6xl py-5 px-16 rounded-full border-b-8 border-green-800 active:border-b-0 active:translate-y-2 transition-all shadow-[0_10px_20px_rgba(0,0,0,0.3)] flex items-center gap-4">
            <span>PLAY</span>
            <span class="text-yellow-300 drop-shadow-md">▶️</span>
        </button>
    </div>

    <!-- ==================== GAME SCREEN ==================== -->
    <div id="game-screen" class="hidden flex-col h-full relative">
        
        <!-- Header: Home, Stars and Progress -->
        <div class="flex justify-between items-center p-4 z-20">
            <button onclick="goHome()" class="bg-white/80 hover:bg-white rounded-full w-14 h-14 flex items-center justify-center text-3xl shadow-md border-2 border-blue-200 transition active:scale-90">
                🏠
            </button>
            <div id="stars-container" class="bg-white/80 px-6 py-2 rounded-full shadow-md border-2 border-blue-200 flex gap-2 text-3xl md:text-4xl">
                <!-- Stars will be injected here -->
            </div>
            <div class="w-14 h-14"></div> <!-- Balancer -->
        </div>

        <!-- Question Area -->
        <div class="flex-1 flex flex-col items-center justify-start mt-2 md:mt-6 z-20 px-4">
            <div class="bg-white px-8 md:px-14 py-4 md:py-6 rounded-[2rem] shadow-[0_10px_25px_rgba(0,0,0,0.15)] border-4 border-blue-400 flex items-center gap-4 md:gap-6 cursor-pointer hover:bg-blue-50 transition transform hover:scale-105 active:scale-95" onclick="speakCurrentQuestion()">
                <h2 id="question-text" class="text-4xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 drop-shadow-sm">
                    Who is 1st?
                </h2>
                <div class="bg-gradient-to-br from-blue-100 to-blue-300 rounded-full w-14 h-14 md:w-20 md:h-20 flex items-center justify-center text-3xl md:text-5xl shadow-inner border border-blue-200">
                    🔊
                </div>
            </div>
            <p id="instruction-text" class="text-white text-xl md:text-3xl font-black mt-6 bg-black/30 px-6 py-2 rounded-full backdrop-blur-sm border border-white/20 shadow-lg">
                👆 Tap the correct animal!
            </p>
        </div>

        <!-- Feedback Toast (Wrong Answer) -->
        <div id="wrong-feedback" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-rose-500 text-white font-black text-3xl md:text-5xl px-10 py-5 rounded-full shadow-2xl z-40 hidden opacity-0 transition-opacity duration-300 pointer-events-none text-center border-4 border-rose-300">
            Look again! 👀
        </div>

        <!-- Track & Animals Area -->
        <div class="h-1/2 md:h-3/5 w-full relative flex flex-col justify-end">
            
            <!-- Beautiful Grass / Hills background -->
            <div class="absolute bottom-20 md:bottom-32 w-full h-40 md:h-64 bg-gradient-to-b from-green-400 to-grass rounded-t-[100%] scale-[1.6] md:scale-[1.2] z-0 border-t-8 border-green-500 opacity-90"></div>

            <!-- The Dirt Track -->
            <div class="h-28 md:h-48 w-full bg-gradient-to-b from-yellow-700 to-yellow-800 border-t-[10px] border-yellow-600 relative z-10 shadow-inner flex items-center justify-center">
                
                <!-- Finish Line -->
                <div class="absolute left-0 top-0 bottom-0 w-16 md:w-32 checkered-pattern border-r-[6px] border-gray-900 shadow-[5px_0_15px_rgba(0,0,0,0.5)] z-10">
                    <div class="absolute -top-12 md:-top-20 left-1 md:left-4 bg-red-600 text-white font-black text-sm md:text-2xl px-3 py-1 rounded transform -rotate-12 border-4 border-white shadow-lg">FINISH</div>
                    <div class="w-2 h-14 md:h-24 bg-gradient-to-r from-gray-300 to-gray-400 absolute -top-12 md:-top-20 left-6 md:left-14 border border-gray-500 shadow-sm rounded-t-full"></div>
                </div>

                <!-- Animals Container -->
                <div id="animals-container" class="flex justify-between items-end w-full max-w-6xl mx-auto pl-20 md:pl-40 pr-4 md:pr-16 relative z-20 pb-4 md:pb-8">
                    <!-- Animals generated by JS -->
                </div>
            </div>
            
            <!-- Bottom Grass Trim -->
            <div class="h-6 md:h-8 w-full bg-green-700 relative z-10 border-t border-green-900"></div>
        </div>

        <!-- Correct Answer Modal / Next Button -->
        <div id="correct-modal" class="absolute inset-0 bg-black/50 z-40 hidden flex-col items-center justify-end pb-16 backdrop-blur-md">
            <div class="bg-white rounded-[3rem] p-8 md:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex flex-col items-center animate-pop-in border-[10px] border-green-400 w-11/12 max-w-md text-center relative overflow-hidden">
                <!-- Decorative background elements inside modal -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-green-100 rounded-full opacity-50"></div>
                <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-blue-100 rounded-full opacity-50"></div>
                
                <div class="text-7xl md:text-8xl mb-4 relative z-10 drop-shadow-lg">🌟</div>
                <h2 id="praise-text" class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-500 to-blue-500 mb-8 relative z-10">
                    Awesome!
                </h2>
                <button onclick="nextQuestion()" class="bg-gradient-to-b from-blue-400 to-blue-600 hover:from-blue-300 hover:to-blue-500 text-white font-black text-4xl md:text-5xl py-5 px-12 rounded-full border-b-8 border-blue-800 active:border-b-0 active:translate-y-2 transition-all w-full shadow-xl relative z-10">
                    Next ➡️
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== END SCREEN ==================== -->
    <div id="end-screen" class="hidden absolute inset-0 z-50 flex-col items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">
        
        <div class="bg-white/20 backdrop-blur-md p-10 md:p-16 rounded-[4rem] border-4 border-white/30 shadow-2xl flex flex-col items-center max-w-3xl w-11/12 text-center animate-pop-in">
            <h1 class="text-6xl md:text-8xl font-black text-white drop-shadow-lg mb-6" style="text-shadow: 0 5px 15px rgba(0,0,0,0.3);">
                You Did It!
            </h1>
            
            <h2 class="text-4xl md:text-6xl font-bold text-yellow-300 mb-8 drop-shadow-md">
                Score: <span id="final-score" class="font-black text-white">5</span> / 5
            </h2>

            <div class="flex gap-4 mb-12 text-6xl md:text-8xl drop-shadow-xl" id="final-stars">
                <!-- Stars injected via JS -->
            </div>

            <button onclick="startGame()" class="bg-gradient-to-b from-yellow-300 to-yellow-500 hover:from-yellow-200 hover:to-yellow-400 text-gray-900 font-black text-4xl md:text-5xl py-6 px-16 rounded-full border-b-8 border-yellow-700 active:border-b-0 active:translate-y-2 transition-all shadow-[0_10px_25px_rgba(0,0,0,0.4)] flex items-center gap-4">
                <span>Play Again</span>
                <span class="bg-white rounded-full p-2">🔄</span>
            </button>
        </div>
    </div>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // --- Game Data & State ---
        const ALL_ANIMALS = [
            { id: 'rabbit', icon: '🐰' },
            { id: 'bear', icon: '🐻' },
            { id: 'cat', icon: '🐱' },
            { id: 'elephant', icon: '🐘' },
            { id: 'duck', icon: '🦆' }
        ];

        const ORDINALS = ['1st', '2nd', '3rd', '4th', '5th'];
        const PRAISE_WORDS = ['Great job!', 'Awesome!', 'Well done!', 'You got it!', 'Super!'];
        const ENCOURAGE_WORDS = ['Look again!', 'Try once more!', 'Not quite!', 'Who is it?'];

        let gameState = {
            round: 0,
            score: 0,
            questionOrder: [], // Will hold indices 0 to 4 in random order
            currentAnimalsOrder: [], // How animals are currently lined up
            targetOrdinalIndex: 0, // 0=1st, 1=2nd, etc.
            isInputLocked: false
        };

        // --- Audio Context (Synthesized Sounds) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // Envelope to prevent clicking
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            initAudio();
            // Cheerful ascending arpeggio (C5, E5, G5, C6) - made slightly louder and longer for kids
            playTone(523.25, 'sine', 0.2, 0.15); 
            setTimeout(() => playTone(659.25, 'sine', 0.2, 0.15), 120);
            setTimeout(() => playTone(783.99, 'sine', 0.2, 0.15), 240);
            setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.15), 360);
        }

        function playWrongSound() {
            initAudio();
            // Gentle descending bloop (C4, G3)
            playTone(261.63, 'triangle', 0.25, 0.1);
            setTimeout(() => playTone(196.00, 'triangle', 0.35, 0.1), 180);
        }

        function playWinSound() {
            initAudio();
            // Big Fanfare
            [0, 150, 300].forEach((time, i) => {
                setTimeout(() => playTone(523.25 + (i*100), 'square', 0.2, 0.1), time);
            });
            setTimeout(() => playTone(1046.50, 'square', 0.6, 0.1), 450);
            setTimeout(() => playTone(1318.51, 'square', 0.8, 0.1), 700);
        }

        // --- Speech Synthesis ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.85; // Slower for 4-5 year olds
                utterance.pitch = 1.3; // Higher/friendlier
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakCurrentQuestion() {
            const targetWord = ORDINALS[gameState.targetOrdinalIndex];
            speak(`Who is ${targetWord}?`);
        }

        // --- Utility Functions ---
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // --- Game Logic ---
        function startGame() {
            initAudio(); // Initialize audio context on first user gesture
            
            gameState.round = 0;
            gameState.score = 0;
            // Ask all 5 questions exactly once in random order
            gameState.questionOrder = shuffle([0, 1, 2, 3, 4]); 
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('flex');
            
            loadRound();
        }

        function loadRound() {
            gameState.isInputLocked = false;
            
            // Hide Modals
            document.getElementById('correct-modal').classList.add('hidden');
            document.getElementById('correct-modal').classList.remove('flex');
            document.getElementById('wrong-feedback').classList.add('hidden');
            document.getElementById('wrong-feedback').style.opacity = '0';
            
            // Set up question
            gameState.targetOrdinalIndex = gameState.questionOrder[gameState.round];
            const targetWord = ORDINALS[gameState.targetOrdinalIndex];
            document.getElementById('question-text').innerText = `Who is ${targetWord}?`;
            
            // Set up animals
            gameState.currentAnimalsOrder = shuffle([...ALL_ANIMALS]);
            renderAnimals();
            renderStars();
            
            // Delay reading question slightly for smooth transition
            setTimeout(() => {
                speakCurrentQuestion();
            }, 600);
        }

        function renderStars() {
            const container = document.getElementById('stars-container');
            container.innerHTML = '';
            for(let i = 0; i < 5; i++) {
                if (i < gameState.score) {
                    container.innerHTML += `<span class="transform scale-110 drop-shadow-md text-yellow-400">⭐</span>`;
                } else {
                    container.innerHTML += `<span class="opacity-20 grayscale">⭐</span>`;
                }
            }
        }

        function renderAnimals() {
            const container = document.getElementById('animals-container');
            container.innerHTML = '';
            
            gameState.currentAnimalsOrder.forEach((animal, index) => {
                // Determine layout sizing based on device
                const animalHTML = `
                    <div class="flex flex-col items-center justify-end h-full animal-wrapper" data-index="${index}">
                        <!-- 3D Glossy Animal Button -->
                        <div onclick="handleAnimalClick(${index})" 
                             id="animal-btn-${index}"
                             class="animal-btn cursor-pointer rounded-full 
                                    w-20 h-20 md:w-32 md:h-32 
                                    flex items-center justify-center 
                                    text-[3.5rem] md:text-[5.5rem] relative z-20">
                            <span>${animal.icon}</span>
                        </div>
                        
                        <!-- Ordinal Marker (Hidden initially) -->
                        <div id="marker-${index}" class="ordinal-marker opacity-0 transition-opacity duration-300 
                                    bg-gradient-to-r from-blue-500 to-purple-600 text-white font-black 
                                    text-lg md:text-2xl px-4 md:px-6 py-1 md:py-2 
                                    rounded-full mt-3 md:mt-5 shadow-lg border-2 border-white">
                            ${ORDINALS[index]}
                        </div>
                    </div>
                `;
                container.innerHTML += animalHTML;
            });
        }

        function handleAnimalClick(clickedIndex) {
            if (gameState.isInputLocked) return;

            const btn = document.getElementById(`animal-btn-${clickedIndex}`);
            const marker = document.getElementById(`marker-${clickedIndex}`);
            
            if (clickedIndex === gameState.targetOrdinalIndex) {
                // CORRECT ANSWER
                gameState.isInputLocked = true;
                gameState.score++;
                
                playCorrectSound();
                fireConfetti();
                
                // Visual feedback on animal
                btn.classList.add('anim-correct');
                
                // Show place marker for the correct animal
                marker.classList.remove('opacity-0');
                marker.classList.add('opacity-100');
                
                // Praise Text
                const praise = PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)];
                document.getElementById('praise-text').innerText = praise;
                speak(praise);
                
                // Show Next Modal after a tiny delay so they see the bounce
                setTimeout(() => {
                    renderStars(); // Update star immediately
                    document.getElementById('correct-modal').classList.remove('hidden');
                    document.getElementById('correct-modal').classList.add('flex');
                }, 1200);

            } else {
                // WRONG ANSWER
                playWrongSound();
                
                // Visual feedback
                btn.classList.add('anim-wrong');
                setTimeout(() => btn.classList.remove('anim-wrong'), 500);
                
                // Show text toast
                const encourage = ENCOURAGE_WORDS[Math.floor(Math.random() * ENCOURAGE_WORDS.length)];
                const toast = document.getElementById('wrong-feedback');
                toast.innerText = encourage;
                toast.classList.remove('hidden');
                toast.style.opacity = '1';
                
                // Read encourage text then re-read question
                speak(encourage);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.classList.add('hidden'), 300);
                }, 1800);
            }
        }

        function nextQuestion() {
            gameState.round++;
            
            if (gameState.round >= 5) {
                showEndScreen();
            } else {
                loadRound();
            }
        }

        function showEndScreen() {
            playWinSound();
            fireworks(); // Multi-burst fireworks effect
            
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            
            const endScreen = document.getElementById('end-screen');
            endScreen.classList.remove('hidden');
            endScreen.classList.add('flex');
            
            // Set Final Score Text
            document.getElementById('final-score').innerText = gameState.score;
            
            // Render Final Stars
            const finalStarsContainer = document.getElementById('final-stars');
            finalStarsContainer.innerHTML = '';
            for(let i = 0; i < 5; i++) {
                if (i < gameState.score) {
                    finalStarsContainer.innerHTML += `<span>🌟</span>`;
                } else {
                    finalStarsContainer.innerHTML += `<span class="opacity-30 grayscale">⭐</span>`;
                }
            }

            speak(`You did it! Your score is ${gameState.score} out of 5!`);
        }

        function goHome() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- Enhanced Fireworks / Confetti System ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, isBig, color = null) {
                this.x = x;
                this.y = y;
                this.size = (Math.random() * 12 + 6) * (isBig ? 1.5 : 1);
                this.color = color || `hsl(${Math.random() * 360}, 100%, 60%)`;
                
                // Explode in all directions for fireworks
                const angle = Math.random() * Math.PI * 2;
                const velocity = (Math.random() * 15 + 5) * (isBig ? 1.2 : 1);
                this.speedX = Math.cos(angle) * velocity;
                this.speedY = Math.sin(angle) * velocity - 2; // slight upward bias
                
                this.gravity = 0.3;
                this.friction = 0.95; // slows down over time
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 15 - 7.5;
                this.opacity = 1;
                this.decay = Math.random() * 0.015 + 0.01; // fade out
            }
            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.speedY += this.gravity;
                
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                this.opacity -= this.decay;
            }
            draw() {
                if (this.opacity <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                
                // Mix of circles and squares
                if(this.size % 2 > 1) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size/2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                }
                ctx.restore();
            }
        }

        function fireConfetti(isBig = false) {
            const count = isBig ? 150 : 60;
            const originX = canvas.width / 2;
            const originY = canvas.height / 2;

            for (let i = 0; i < count; i++) {
                particles.push(new Particle(
                    originX + (Math.random() * 100 - 50), 
                    originY + (Math.random() * 100 - 50),
                    isBig
                ));
            }

            if (!animationId) animateConfetti();
        }

        function fireworks() {
            // Trigger multiple bursts with delay
            const burstCount = 5;
            let bursts = 0;
            
            const interval = setInterval(() => {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height / 2); // Top half of screen
                const colorBase = Math.random() * 360;
                
                for (let i = 0; i < 100; i++) {
                    // Create bursts of similar colors
                    const color = `hsl(${colorBase + Math.random() * 40 - 20}, 100%, 60%)`;
                    particles.push(new Particle(x, y, true, color));
                }
                
                if (!animationId) animateConfetti();
                
                bursts++;
                if (bursts >= burstCount) clearInterval(interval);
            }, 500);
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Remove faded or off-screen particles
            particles = particles.filter(p => p.y < canvas.height + 50 && p.opacity > 0); 
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (particles.length > 0) {
                animationId = requestAnimationFrame(animateConfetti);
            } else {
                animationId = null;
            }
        }
    </script>
</body>
