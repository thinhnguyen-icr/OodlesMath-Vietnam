<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Number! - Ver 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #87CEEB; /* Sky Blue */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.4) 0%, transparent 20%);
            background-size: 100% 100%;
            overflow-x: hidden;
            touch-action: manipulation;
            min-height: 100vh;
        }

        /* Cartoon Styles */
        .cartoon-card {
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 24px;
            box-shadow: 8px 8px 0px #000000;
        }

        .cartoon-display {
            background: #E8F8F5; /* Light mint/cyan */
            border: 4px solid #000000;
            border-radius: 20px;
            box-shadow: inset 5px 5px 0px rgba(0,0,0,0.05);
        }

        .cartoon-btn {
            border: 4px solid #000000;
            border-radius: 50px;
            box-shadow: 4px 4px 0px #000000;
            transition: all 0.1s ease;
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .cartoon-btn:active {
            transform: translate(4px, 4px) !important;
            box-shadow: 0px 0px 0px #000000 !important;
        }

        .cartoon-btn:disabled {
            background: #D1D5DB !important; /* Tailwind gray-300 */
            color: #6B7280 !important;
            cursor: not-allowed;
            transform: translate(2px, 2px) !important;
            box-shadow: 2px 2px 0px #000000 !important;
            animation: none !important;
        }

        /* Kid-friendly colorful title */
        .kid-title {
            color: #FFDE00; /* Bright Yellow */
            font-weight: 900;
            text-shadow:
                -3px -3px 0 #FF6B6B,
                3px -3px 0 #FF6B6B,
                -3px 3px 0 #FF6B6B,
                3px 3px 0 #FF6B6B,
                6px 6px 0px #000000;
        }

        /* Range Buttons */
        .range-btn {
            border: 3px solid #000000;
            border-radius: 16px;
            box-shadow: 4px 4px 0px #000000;
            transition: transform 0.1s, box-shadow 0.1s;
            font-weight: 800;
            font-size: 1.5rem;
            color: white;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }
        .range-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000000;
        }

        /* Decorative Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            z-index: -1;
            opacity: 0.9;
            animation: float 25s infinite linear;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(110vw); }
        }

        /* Number Animation */
        @keyframes pop {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .number-pop {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Pulsing Button Animation */
        @keyframes pulse-kid {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .animate-pulse-kid {
            animation: pulse-kid 1.5s infinite;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="flex items-center justify-center relative p-4">

    <!-- Background Clouds -->
    <div class="cloud w-32 h-12 top-10 left-10 before:w-16 before:h-16 before:-top-8 before:left-4 after:w-12 after:h-12 after:-top-4 after:left-14"></div>
    <div class="cloud w-48 h-16 top-1/4 right-5 before:w-24 before:h-24 before:-top-12 before:left-6 after:w-16 after:h-16 after:-top-6 after:left-24" style="animation-duration: 35s; animation-delay: -15s;"></div>
    <div class="cloud w-40 h-14 bottom-20 left-1/4 before:w-20 before:h-20 before:-top-10 before:left-5 after:w-16 after:h-16 after:-top-6 after:left-20" style="animation-duration: 28s; animation-delay: -5s;"></div>

    <!-- MAIN CONTAINER -->
    <div class="cartoon-card p-6 md:p-8 w-full max-w-lg text-center relative z-20 mt-4 mb-4">
        
        <!-- Decoration Star (Top Right Corner) -->
        <div class="absolute -top-6 -right-5 md:-right-6 text-[#FFDE00] transform rotate-12 z-30" style="filter: drop-shadow(4px 4px 0px #000);">
            <svg width="65" height="65" viewBox="0 0 24 24" fill="currentColor" stroke="black" stroke-width="2" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
        </div>

        <!-- ========================================== -->
        <!-- LOGO HERE: REPLACE SRC WITH YOUR LOGO URL  -->
        <!-- ========================================== -->
        <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Logo" class="mx-auto mb-4 w-[240px] md:w-[280px] h-auto max-h-[120px] object-contain bg-transparent">

        <!-- GAME SCREEN -->
        <div id="game-screen" class="block">
            <h1 class="kid-title text-4xl md:text-5xl mb-5 tracking-wide">
                Lucky Number!
            </h1>

            <!-- The Colorful Display Box -->
            <div class="cartoon-display h-48 md:h-52 flex items-center justify-center mb-6 relative overflow-hidden">
                <!-- Result Text -->
                <span id="result-text" class="text-7xl md:text-8xl font-black text-[#2C3E50]" style="text-shadow: 4px 4px 0px #A3E4D7;">?</span>
                
                <!-- Colorful toy-like corner dots -->
                <div class="absolute top-3 left-3 w-4 h-4 rounded-full bg-[#FF6B6B] border-2 border-black"></div>
                <div class="absolute top-3 right-3 w-4 h-4 rounded-full bg-[#4ECDC4] border-2 border-black"></div>
                <div class="absolute bottom-3 left-3 w-4 h-4 rounded-full bg-[#FFE66D] border-2 border-black"></div>
                <div class="absolute bottom-3 right-3 w-4 h-4 rounded-full bg-[#A374D5] border-2 border-black"></div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col gap-4 justify-center">
                <button id="spin-btn" onclick="spin()" class="cartoon-btn animate-pulse-kid px-8 py-4 text-2xl md:text-3xl text-white bg-[#FF4757] w-full flex items-center justify-center gap-3">
                    <span>PLAY NOW!</span>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <!-- Canvas for confetti -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        // DOM Elements
        const gameScreen = document.getElementById('game-screen');
        const resultText = document.getElementById('result-text');
        const spinBtn = document.getElementById('spin-btn');
        
        // Game State
        const ordinals = ['1st', '2nd', '3rd', '4th', '5th', '6th', '7th', '8th', '9th', '10th'];
        let isSpinning = false;

        // --- Sound Effects ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Fun click sound for buttons
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playPopSound(freq = 400, type = 'sine') {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function playWinSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            // Cheerful Arpeggio
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0, now + i*0.1);
                gain.gain.linearRampToValueAtTime(0.3, now + i*0.1 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.5);
            });
        }

        // --- Game Logic ---
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            // Update Button State
            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";
            spinBtn.classList.remove('bg-[#FF4757]', 'bg-[#2ED573]', 'animate-pulse-kid');
            spinBtn.classList.add('bg-gray-400');
            
            resultText.classList.remove('number-pop');
            
            let count = 0;
            const maxShuffles = 25; // How many times numbers flicker
            const speed = 70; // Speed of flicker in ms

            // Vibrant kid-friendly colors for shuffle
            const colors = ['#FF4757', '#1E90FF', '#9B59B6', '#FF9F1C', '#2ED573', '#FF69B4'];

            const interval = setInterval(() => {
                const randomTemp = ordinals[Math.floor(Math.random() * ordinals.length)];
                resultText.innerText = randomTemp;
                resultText.style.color = colors[Math.floor(Math.random() * colors.length)];
                playPopSound(300 + Math.random() * 400, 'square'); 
                
                count++;
                if (count >= maxShuffles) {
                    clearInterval(interval);
                    finalize();
                }
            }, speed);
        }

        function finalize() {
            const finalNumber = ordinals[Math.floor(Math.random() * ordinals.length)];
            
            resultText.innerText = finalNumber;
            resultText.style.color = '#FF4757'; // Strong vibrant red for the final number
            resultText.classList.add('number-pop');
            
            playWinSound();
            fireConfetti();

            // Reset Button
            spinBtn.disabled = false;
            spinBtn.innerText = "PLAY AGAIN!";
            spinBtn.classList.remove('bg-gray-400');
            spinBtn.classList.add('bg-[#2ED573]', 'animate-pulse-kid'); // Green for "Play Again" + pulse

            isSpinning = false;
        }

        // --- Confetti Logic ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function fireConfetti() {
            particles = [];
            const particleCount = 150;
            for(let i=0; i<particleCount; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 25,
                    vy: (Math.random() - 1) * 25,
                    size: Math.random() * 12 + 8,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 15
                });
            }
            requestAnimationFrame(updateConfetti);
        }

        function updateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let activeParticles = false;

            particles.forEach((p) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.6; // Gravity
                p.rotation += p.rotationSpeed;

                if (p.y < canvas.height) {
                    activeParticles = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    
                    // Draw random shapes (circles and squares)
                    if (p.size % 2 > 1) {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.size/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    }
                    
                    ctx.restore();
                }
            });

            if (activeParticles) {
                requestAnimationFrame(updateConfetti);
            }
        }
    </script>
</body>
</html>
