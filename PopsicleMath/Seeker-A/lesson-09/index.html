<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Adventure Math - Ver 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            background: #020617;
            color: white;
        }

        /* Adventure Background */
        .sky-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #0c4a6e 0%, #164e63 50%, #0891b2 100%);
            z-index: -3;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        .moon-surface {
            position: fixed;
            bottom: -50px;
            left: -10%;
            width: 120%;
            height: 220px;
            background: linear-gradient(to bottom, #4d7c0f, #365314);
            border-radius: 50% 50% 0 0;
            z-index: -1;
            box-shadow: inset 0 20px 60px rgba(0,0,0,0.4);
        }

        .crater {
            position: absolute;
            background: #1a2e05;
            border-radius: 50%;
            opacity: 0.3;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            filter: blur(30px);
            border-radius: 50%;
            bottom: 40px;
            animation: drift var(--d) infinite linear;
            z-index: -2;
        }

        @keyframes drift {
            from { transform: translateX(-300px); }
            to { transform: translateX(110vw); }
        }

        /* Glassmorphism Refined */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .btn-fancy {
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-fancy:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .glow-gold { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .glow-green { border-color: #4ade80; box-shadow: 0 0 15px rgba(74, 222, 128, 0.4); }

        .pop-out {
            animation: popOut 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #fireworks-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .hidden { display: none !important; }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .floating { animation: floating 3.2s infinite ease-in-out; }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="sky-bg" id="sky"></div>
    <div class="moon-surface" id="moon"></div>
    <canvas id="fireworks-canvas"></canvas>

    <!-- Start Screen -->
    <div id="screen-start" class="fixed inset-0 flex flex-col items-center justify-center z-50 p-6 text-center">
        <div class="floating mb-12">
            <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-yellow-300 via-orange-400 to-red-500 drop-shadow-2xl uppercase">
                Space<br>Explorer
            </h1>
        </div>
        <p class="text-2xl md:text-4xl text-white font-bold mb-12 drop-shadow-lg text-yellow-100">Rocket Math Adventure!</p>
        <button onclick="startGame()" class="btn-fancy bg-gradient-to-r from-yellow-400 to-orange-600 px-24 py-8 rounded-full text-4xl font-black border-b-8 border-orange-800 uppercase tracking-widest hover:scale-105 transition-all text-white">
            START MISSION
        </button>
    </div>

    <!-- Main Game UI -->
    <div id="screen-game" class="hidden min-h-screen flex flex-col items-center justify-between p-4 max-w-6xl mx-auto">
        <!-- Header (Stats Grouped Left, Instruction Centered) -->
        <div class="w-full flex items-center justify-between py-4 relative">
            <!-- Left Side: Stats -->
            <div class="flex items-center gap-3 z-10">
                <div class="glass glow-gold px-4 md:px-6 py-2 rounded-2xl font-black text-sm md:text-xl flex items-center gap-2">
                    <span class="hidden md:inline">LEVEL</span><span id="level-num" class="text-yellow-400">1</span>
                </div>
                <div class="glass glow-green px-4 md:px-6 py-2 rounded-2xl font-black text-sm md:text-xl flex items-center gap-2">
                    <span class="hidden md:inline">SCORE</span><span id="score-display" class="text-green-400">0</span>
                </div>
            </div>
            
            <!-- Centered: Instruction -->
            <div class="absolute left-1/2 -translate-x-1/2 w-full max-w-[280px] md:max-w-md z-0">
                <div id="instruction-box" class="bg-white text-indigo-950 px-4 py-3 rounded-2xl shadow-2xl font-extrabold text-center text-sm md:text-xl border-b-8 border-indigo-200">
                    <!-- Updated by JS -->
                </div>
            </div>

            <!-- Spacer for alignment balance -->
            <div class="w-24 md:w-48"></div>
        </div>

        <!-- Playground -->
        <div class="flex-1 w-full flex flex-col items-center justify-center gap-8 md:gap-12 py-4">
            <div id="items-container" class="flex flex-wrap justify-center gap-6 md:gap-14 min-h-[150px] md:min-h-[240px]">
                <!-- Items injected here -->
            </div>

            <!-- Equation Area -->
            <div class="glass p-8 md:p-14 rounded-[50px] flex flex-wrap items-center justify-center gap-6 md:gap-14 w-full max-w-4xl bg-gradient-to-br from-indigo-900/40 to-blue-900/40 border-4 border-white/10">
                <div class="flex items-center gap-4 md:gap-12 text-7xl md:text-9xl font-black drop-shadow-2xl">
                    <span id="eq-start" class="text-white">5</span>
                    <span class="text-red-500">-</span>
                    <span id="eq-sub" class="text-yellow-400">2</span>
                    <span class="text-blue-400">=</span>
                    <div id="ans-slot" class="w-28 h-28 md:w-44 md:h-44 rounded-[40px] border-4 border-dashed border-blue-300/50 flex items-center justify-center text-white bg-blue-950/40 transition-all">?</div>
                </div>
            </div>
        </div>

        <!-- Enhanced Number Pad -->
        <div id="input-pad" class="hidden w-full max-w-3xl grid grid-cols-3 sm:grid-cols-6 gap-4 md:gap-6 mb-10">
            <button onclick="submitAnswer(0)" class="btn-fancy bg-gradient-to-b from-blue-400 to-blue-600 py-6 rounded-3xl text-4xl font-black border-b-8 border-blue-800 text-white">0</button>
            <button onclick="submitAnswer(1)" class="btn-fancy bg-gradient-to-b from-emerald-400 to-emerald-600 py-6 rounded-3xl text-4xl font-black border-b-8 border-emerald-800 text-white">1</button>
            <button onclick="submitAnswer(2)" class="btn-fancy bg-gradient-to-b from-orange-400 to-orange-600 py-6 rounded-3xl text-4xl font-black border-b-8 border-orange-800 text-white">2</button>
            <button onclick="submitAnswer(3)" class="btn-fancy bg-gradient-to-b from-pink-400 to-pink-600 py-6 rounded-3xl text-4xl font-black border-b-8 border-pink-800 text-white">3</button>
            <button onclick="submitAnswer(4)" class="btn-fancy bg-gradient-to-b from-purple-400 to-purple-600 py-6 rounded-3xl text-4xl font-black border-b-8 border-purple-800 text-white">4</button>
            <button onclick="submitAnswer(5)" class="btn-fancy bg-gradient-to-b from-red-400 to-red-600 py-6 rounded-3xl text-4xl font-black border-b-8 border-red-800 text-white">5</button>
        </div>
    </div>

    <!-- Success Feedback -->
    <div id="overlay-success" class="hidden fixed inset-0 z-[60] bg-indigo-950/90 flex flex-col items-center justify-center p-6 text-center">
        <div class="floating text-9xl mb-8">✨</div>
        <h2 class="text-7xl md:text-8xl font-black text-yellow-400 mb-12 drop-shadow-2xl">BRILLIANT!</h2>
        <button onclick="nextLevel()" class="btn-fancy bg-gradient-to-r from-green-400 via-emerald-500 to-teal-600 px-20 py-7 rounded-full text-3xl font-black border-b-8 border-teal-900 uppercase text-white">NEXT STAR →</button>
    </div>

    <!-- Final Summary -->
    <div id="screen-end" class="hidden fixed inset-0 z-[70] bg-gradient-to-b from-indigo-950 via-blue-900 to-cyan-900 flex flex-col items-center justify-center p-8 text-center">
        <div class="floating text-9xl mb-8">🏆</div>
        <h2 class="text-6xl md:text-8xl font-black mb-6 text-white uppercase drop-shadow-lg">GALAXY HERO!</h2>
        <p class="text-2xl text-blue-200 mb-10 font-bold uppercase tracking-widest">Mission Successfully Completed</p>
        <div class="glass p-12 rounded-[60px] mb-12 w-full max-w-md border-4 border-yellow-400 bg-white/5">
            <p class="text-xl text-yellow-300 font-black uppercase mb-3">Total Space Points</p>
            <p id="final-score" class="text-9xl font-black text-white drop-shadow-2xl">0</p>
        </div>
        <button onclick="location.reload()" class="btn-fancy bg-gradient-to-r from-red-500 to-rose-600 px-20 py-8 rounded-full text-3xl font-black border-b-8 border-rose-900 uppercase text-white">NEW JOURNEY</button>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'pop') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'success') {
                    [440, 554, 659, 880].forEach((f, i) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.4);
                        o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.4);
                    });
                } else if (type === 'fail') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e){}
        }

        // --- GAME DATA ---

            { s: 3, b: 1, icon: 'rocket', color: 'bg-gradient-to-br from-red-500 to-red-700 border-red-300' },

            { s: 2, b: 2, icon: 'alien', color: 'bg-gradient-to-br from-emerald-400 to-emerald-600 border-emerald-100' },

            { s: 4, b: 1, icon: 'comet', color: 'bg-gradient-to-br from-blue-400 to-blue-600 border-blue-200' },
            { s: 5, b: 3, icon: 'rocket', color: 'bg-gradient-to-br from-red-500 to-red-700 border-red-300' },
            { s: 2, b: 1, icon: 'astronaut', color: 'bg-gradient-to-br from-indigo-100 to-indigo-300 border-indigo-500' },

        let currentLvl = 0;
        let score = 0;
        let itemsRemoved = 0;
        let isLocked = false;

        function setupWorld() {
            const sky = document.getElementById('sky');
            const moon = document.getElementById('moon');
            if(!sky || !moon) return;
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 4 + 1;
                s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*3+2}s;`;
                sky.appendChild(s);
            }
            for (let i = 0; i < 6; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                c.style.cssText = `width:${Math.random()*300+150}px;height:${Math.random()*80+40}px;left:${Math.random()*100}%;bottom:${Math.random()*100}px;--d:${Math.random()*25+20}s;`;
                sky.appendChild(c);
            }
            for (let i = 0; i < 18; i++) {
                const cr = document.createElement('div');
                cr.className = 'crater';
                cr.style.cssText = `width:${Math.random()*60+25}px;height:${Math.random()*25+12}px;left:${Math.random()*100}%;top:${Math.random()*90}px;`;
                moon.appendChild(cr);
            }
        }

        function startGame() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            const l = levels[currentLvl];
            itemsRemoved = 0;
            isLocked = false;
            
            document.getElementById('level-num').innerText = currentLvl + 1;
            document.getElementById('score-display').innerText = score;
            document.getElementById('eq-start').innerText = l.s;
            document.getElementById('eq-sub').innerText = l.b;
            
            const slot = document.getElementById('ans-slot');
            slot.innerText = "?";
            slot.className = "w-28 h-28 md:w-44 md:h-44 rounded-[40px] border-4 border-dashed border-blue-300/50 flex items-center justify-center text-white bg-blue-950/40";
            
            document.getElementById('input-pad').classList.add('hidden');
            const ib = document.getElementById('instruction-box');
            ib.innerHTML = l.b === 0 
                ? "Keep them all! Take away <span class='text-red-600'>0</span>" 
                : `Tap <span class="text-red-600 text-3xl font-black">${l.b}</span> to blast away!`;

            const container = document.getElementById('items-container');
            container.innerHTML = "";
            for (let i = 0; i < l.s; i++) {
                const card = document.createElement('div');
                card.className = `w-28 h-28 md:w-44 md:h-44 p-4 rounded-[40px] border-4 cursor-pointer shadow-2xl transition-all hover:scale-110 flex items-center justify-center ${l.color}`;
                card.innerHTML = svgs[l.icon];
                card.onclick = () => removeItem(card);
                container.appendChild(card);
            }

            if (l.b === 0) setTimeout(showInput, 1200);
        }

        function removeItem(el) {
            if (isLocked) return;
            const l = levels[currentLvl];
            if (itemsRemoved < l.b && !el.classList.contains('pop-out')) {
                playSound('pop');
                el.classList.add('pop-out');
                itemsRemoved++;
                if (itemsRemoved === l.b) {
                    setTimeout(showInput, 600);
                }
            }
        }

        function showInput() {
            document.getElementById('instruction-box').innerHTML = "Count the remaining ones! <span class='text-blue-600'>Choose!</span>";
            document.getElementById('input-pad').classList.remove('hidden');
        }

        function submitAnswer(val) {
            if (isLocked) return;
            const l = levels[currentLvl];
            const correct = l.s - l.b;
            const slot = document.getElementById('ans-slot');
            
            slot.innerText = val;
            if (val === correct) {
                isLocked = true;
                playSound('success');
                score += 100;
                slot.className = "w-28 h-28 md:w-44 md:h-44 rounded-[40px] border-4 border-green-400 flex items-center justify-center text-white bg-green-500 shadow-[0_0_50px_rgba(34,197,94,0.7)]";
                setTimeout(() => {
                    document.getElementById('overlay-success').classList.remove('hidden');
                }, 800);
            } else {
                playSound('fail');
                slot.classList.add('shake');
                slot.classList.replace('text-white', 'text-red-500');
                setTimeout(() => {
                    slot.classList.remove('shake');
                    slot.classList.replace('text-red-500', 'text-white');
                    slot.innerText = "?";
                }, 500);
            }
        }

        function nextLevel() {
            document.getElementById('overlay-success').classList.add('hidden');
            currentLvl++;
            if (currentLvl < levels.length) {
                loadLevel();
            } else {
                showEnd();
            }
        }

        function showEnd() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            startFireworks();
        }

        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Part {
            constructor(x,y,c) {
                this.x=x; this.y=y; this.c=c;
                this.v={x:(Math.random()-0.5)*12, y:(Math.random()-0.5)*12};
                this.a=1;
            }
            draw() { ctx.globalAlpha = this.a; ctx.fillStyle = this.c; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); }
            up() { this.x+=this.v.x; this.y+=this.v.y; this.v.y+=0.12; this.a-=0.012; }
        }
        function startFireworks() {
            function loop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if (Math.random()<0.15) {
                    let x = Math.random()*canvas.width, y = Math.random()*canvas.height*0.5;
                    let c = `hsl(${Math.random()*360}, 100%, 60%)`;
                    for(let i=0; i<40; i++) parts.push(new Part(x,y,c));
                }
                parts.forEach((p,i) => { p.up(); p.draw(); if(p.a<=0) parts.splice(i,1); });
                requestAnimationFrame(loop);
            }
            loop();
        }
        window.onload = setupWorld;
    </script>
</body>
</html>
