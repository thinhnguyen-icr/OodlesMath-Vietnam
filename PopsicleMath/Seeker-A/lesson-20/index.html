<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height & Measurement Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            user-select: none;
            overflow: hidden;
        }

        /* --- BEAUTIFUL SKY & SUN --- */
        .sky-bg {
            background: linear-gradient(to bottom, #0ea5e9 0%, #38bdf8 40%, #bae6fd 100%);
            position: relative;
        }

        .sun {
            position: absolute;
            top: -30px;
            left: -30px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, #fef08a 20%, #facc15 60%, transparent 75%);
            border-radius: 50%;
            box-shadow: 0 0 50px 25px rgba(253, 224, 71, 0.4);
            animation: sun-glow 5s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes sun-glow {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.15); opacity: 1; }
        }

        /* --- ENHANCED FLUFFY CLOUDS --- */
        .cloud-container {
            position: absolute;
            z-index: 0;
            filter: drop-shadow(0 10px 15px rgba(255, 255, 255, 0.3));
        }
        
        /* Float animation for clouds */
        .cloud-float {
            animation: float-h 40s infinite linear;
        }
        .cloud-bob {
            animation: bob 4s infinite alternate ease-in-out;
        }

        @keyframes float-h {
            from { transform: translateX(-250px); }
            to { transform: translateX(100vw); }
        }

        @keyframes bob {
            from { transform: translateY(0px); }
            to { transform: translateY(15px); }
        }

        .pop-in {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .wiggle {
            animation: wiggle 0.4s ease-in-out;
        }

        @keyframes wiggle {
            0% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            50% { transform: translateX(5px) rotate(2deg); }
            75% { transform: translateX(-5px) rotate(-2deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        /* Grass Ground Background */
        .grass-ground {
            background-color: #22c55e;
            background-image: 
                radial-gradient(circle at 10% 20%, #16a34a 2%, transparent 2.5%),
                radial-gradient(circle at 90% 80%, #16a34a 2%, transparent 2.5%);
            background-size: 60px 60px;
        }

        /* Measurement Block Styling */
        .toy-block {
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.3), inset 0 -4px 0 rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .text-stroke-title {
            text-shadow: 0 4px 0 #ca8a04, 0 -4px 0 #ca8a04, 4px 0 0 #ca8a04, -4px 0 0 #ca8a04, 0 8px 10px rgba(0,0,0,0.3);
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .oodles-logo {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 120px;
            z-index: 30;
        }
    </style>
</head>
<body class="sky-bg h-screen w-screen overflow-hidden flex flex-col relative text-slate-800">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo" onerror="this.style.display='none'">
    
    <!-- Background Elements -->
    <div class="sun"></div>
    
    <!-- Enhanced Animated Clouds -->
    <!-- Cloud 1 -->
    <div class="cloud-container cloud-float" style="top: 8%; animation-duration: 50s; opacity: 0.9;">
        <div class="cloud-bob">
            <svg width="180" height="100" viewBox="0 0 180 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="40" cy="60" r="35" fill="white"/>
                <circle cx="85" cy="45" r="45" fill="white"/>
                <circle cx="135" cy="60" r="35" fill="white"/>
                <rect x="40" y="65" width="95" height="30" fill="white"/>
            </svg>
        </div>
    </div>

    <!-- Cloud 2 -->
    <div class="cloud-container cloud-float" style="top: 22%; animation-duration: 35s; animation-delay: -10s; opacity: 0.7;">
        <div class="cloud-bob" style="animation-delay: -1s;">
            <svg width="140" height="80" viewBox="0 0 140 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="30" cy="50" r="25" fill="white"/>
                <circle cx="65" cy="35" r="35" fill="white"/>
                <circle cx="105" cy="50" r="25" fill="white"/>
                <rect x="30" y="55" width="75" height="20" fill="white"/>
            </svg>
        </div>
    </div>

    <!-- Cloud 3 -->
    <div class="cloud-container cloud-float" style="top: 15%; animation-duration: 65s; animation-delay: -25s; opacity: 0.6;">
        <div class="cloud-bob" style="animation-delay: -2s;">
            <svg width="220" height="120" viewBox="0 0 220 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="70" r="40" fill="white"/>
                <circle cx="110" cy="50" r="50" fill="white"/>
                <circle cx="170" cy="70" r="40" fill="white"/>
                <rect x="50" y="75" width="120" height="35" fill="white"/>
            </svg>
        </div>
    </div>

    <!-- Grass Ground Base -->
    <div class="absolute bottom-0 left-0 w-full h-[25vh] grass-ground border-t-8 border-green-500 shadow-[inset_0_10px_20px_rgba(0,0,0,0.1)] z-0"></div>

    <!-- Top Header -->
    <header class="w-full p-4 sm:p-6 flex justify-center items-start z-20 mx-auto relative">
        <div class="flex flex-wrap justify-center items-center gap-3 sm:gap-4">
            <!-- Score -->
            <div class="bg-white/90 backdrop-blur rounded-2xl px-4 py-2 border-4 border-yellow-400 shadow-lg flex items-center gap-2">
                <div class="text-2xl animate-pulse">⭐</div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-none">Score</span>
                    <span id="score-text" class="text-xl font-black text-yellow-600 leading-none">0</span>
                </div>
            </div>
            
            <!-- Level -->
            <div class="bg-indigo-600 text-white px-4 py-2 rounded-2xl border-4 border-indigo-400 shadow-lg flex flex-col items-center justify-center min-w-[80px]">
                <span class="text-[10px] font-bold uppercase tracking-widest leading-none opacity-80">Level</span>
                <span id="level-text" class="text-xl font-black leading-none">1/20</span>
            </div>

            <!-- Question Box & Speaker -->
            <div class="bg-white/90 backdrop-blur-md px-5 py-2 rounded-2xl shadow-lg border-4 border-white flex items-center justify-center gap-3">
                <h2 id="question-box" class="text-lg sm:text-xl font-black text-slate-800 tracking-tight leading-tight">
                    Ready to play?
                </h2>
                <button onclick="readQuestion()" class="w-10 h-10 bg-sky-100 hover:bg-sky-200 rounded-full text-xl flex items-center justify-center shadow-md border-2 border-sky-300 active:scale-95 transition-all shrink-0" title="Read Question">
                    🔊
                </button>
            </div>
        </div>
    </header>

    <!-- Start Screen Overlay -->
    <div id="startScreen" class="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] p-8 max-w-md w-[95%] text-center shadow-2xl border-8 border-indigo-400 pop-in relative overflow-hidden">
            <div class="absolute -top-10 -right-10 text-9xl opacity-20">🗼</div>
            <h1 class="text-4xl sm:text-5xl font-black text-indigo-600 mb-2 relative z-10 leading-tight">Height & Measure</h1>
            <h2 class="text-xl sm:text-2xl font-bold text-orange-500 mb-8 relative z-10">Adventure</h2>
            
            <div class="flex justify-center gap-4 mb-8 text-6xl relative z-10">
                <div class="animate-bounce" style="animation-delay: 0s">🏠</div>
                <div class="animate-bounce" style="animation-delay: 0.1s">🧊</div>
                <div class="animate-bounce" style="animation-delay: 0.2s">🌳</div>
            </div>
            
            <button onclick="startGame()" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl sm:text-3xl font-black py-4 px-6 rounded-2xl shadow-[0_8px_0_rgb(21,128,61)] active:shadow-[0_2px_0_rgb(21,128,61)] active:translate-y-2 transition-all relative z-10">
                PLAY NOW ▶
            </button>
        </div>
    </div>

    <!-- Main Game Area -->
    <main class="flex-1 w-full flex flex-col justify-end relative z-10">
        <div id="play-stage" class="w-full flex items-end justify-center px-4 pb-[25vh] relative max-w-5xl mx-auto h-full">
            <!-- Objects injected here -->
        </div>
    </main>

    <!-- Controls (Measurement Mode) -->
    <div id="measure-controls" class="absolute bottom-[5vh] left-1/2 -translate-x-1/2 w-full flex-wrap justify-center items-center gap-4 sm:gap-6 z-20 hidden px-4">
        <div class="flex gap-4 bg-white/90 backdrop-blur p-3 rounded-3xl border-4 border-slate-200 shadow-xl">
            <button onclick="updateBlocks(-1)" class="w-16 h-16 bg-red-500 hover:bg-red-600 border-b-8 border-red-700 rounded-2xl text-4xl font-black text-white active:border-b-0 active:translate-y-2 transition-all flex items-center justify-center shadow-lg">
                -
            </button>
            <div class="w-16 h-16 bg-slate-100 border-4 border-slate-300 rounded-2xl flex items-center justify-center text-3xl font-black text-slate-700 shadow-inner">
                <span id="block-counter">0</span>
            </div>
            <button onclick="updateBlocks(1)" class="w-16 h-16 bg-green-500 hover:bg-green-600 border-b-8 border-green-700 rounded-2xl text-4xl font-black text-white active:border-b-0 active:translate-y-2 transition-all flex items-center justify-center shadow-lg">
                +
            </button>
        </div>
        
        <button onclick="checkMeasurement()" class="bg-indigo-500 hover:bg-indigo-600 border-b-8 border-indigo-700 text-white text-2xl font-black py-4 px-10 rounded-2xl active:border-b-0 active:translate-y-2 transition-all shadow-xl flex items-center gap-3">
            CHECK <span class="text-3xl">✅</span>
        </button>
    </div>

    <!-- Fireworks Layer -->
    <canvas id="fireworksCanvas"></canvas>

    <script>
        // --- Configuration ---
        const UNIT_SIZE = 55; 
        const MAX_BLOCKS = 7;
        const MAX_QUESTIONS = 20; 
        
        const themes = [
            {
                id: 'objects',
                items: [
                    { name: 'House', emoji: '🏠' },
                    { name: 'Tower', emoji: '🗼' },
                    { name: 'Candle', emoji: '🕯️' },
                    { name: 'Building', emoji: '🏢' },
                    { name: 'Castle', emoji: '🏰' }
                ]
            },
            {
                id: 'nature',
                items: [
                    { name: 'Tree', emoji: '🌳' },
                    { name: 'Sunflower', emoji: '🌻' },
                    { name: 'Cactus', emoji: '🌵' },
                    { name: 'Tulip', emoji: '🌷' },
                    { name: 'Pine Tree', emoji: '🌲' }
                ]
            }
        ];

        // --- Game State ---
        let gameState = {
            score: 0,
            level: 1,
            answer: null,
            currentBlocks: 0,
            busy: false,
            isMeasurementMode: false
        };

        let currentQuestionText = "Ready to play?";

        // --- Audio Context ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); 
                osc.frequency.setValueAtTime(659.25, now + 0.1); 
                osc.frequency.setValueAtTime(783.99, now + 0.2); 
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523, now);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 1.0);
                osc.start(now); osc.stop(now + 1.0);
            }
        }

        // --- Fireworks Logic ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        function animateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.alpha -= 0.015;
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; 
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                if (p.alpha <= 0) particles.splice(index, 1);
            });
            if (Math.random() < 0.08 && particles.length < 400 && gameState.busy) {
                 const x = Math.random() * canvas.width;
                 const y = Math.random() * canvas.height / 2;
                 const colors = ['#3b82f6', '#22c55e', '#eab308', '#ef4444', '#ec4899'];
                 const color = colors[Math.floor(Math.random()*colors.length)];
                 for(let i=0;i<30;i++) {
                     particles.push({x, y, vx: Math.cos(i)*Math.random()*6, vy: Math.sin(i)*Math.random()*6, color, alpha: 1});
                 }
            }
            if (particles.length > 0 || gameState.busy) requestAnimationFrame(animateFireworks);
        }

        // --- TTS Logic ---
        function readQuestion() {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentQuestionText);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        // --- DOM Elements ---
        const DOM = {
            question: document.getElementById('question-box'),
            stage: document.getElementById('play-stage'),
            controls: document.getElementById('measure-controls'),
            score: document.getElementById('score-text'),
            level: document.getElementById('level-text'),
            blockCounter: document.getElementById('block-counter'),
            startScreen: document.getElementById('startScreen')
        };

        // --- Game Logic ---
        function startGame() {
            DOM.startScreen.classList.add('hidden');
            gameState.score = 0;
            gameState.level = 1;
            renderLevel();
        }

        function renderLevel() {
            gameState.busy = false;
            gameState.currentBlocks = 0;
            particles = []; 
            
            DOM.stage.innerHTML = '';
            DOM.controls.classList.add('hidden');
            DOM.blockCounter.innerText = "0";
            
            updateUI();

            const theme = themes[Math.floor(Math.random() * themes.length)];
            const type = gameState.level % 3; 

            if (type === 0) setupCompare(2, theme);
            else if (type === 1) setupCompare(3, theme);
            else setupMeasure(theme);

            setTimeout(readQuestion, 500); 
        }

        function getRandomHeights(count) {
            const heights = [];
            while(heights.length < count) {
                let h = Math.floor(Math.random() * 4) + 2; 
                if (!heights.includes(h)) heights.push(h);
            }
            return heights;
        }

        function setupCompare(count, theme) {
            gameState.isMeasurementMode = false;
            const baseItem = theme.items[Math.floor(Math.random() * theme.items.length)];
            const heights = getRandomHeights(count);
            const targetMax = Math.random() > 0.5;
            const targetVal = targetMax ? Math.max(...heights) : Math.min(...heights);
            gameState.answer = heights.indexOf(targetVal); 
            
            const isTallest = count > 2;
            const adj = targetMax ? (isTallest ? 'tallest' : 'taller') : (isTallest ? 'shortest' : 'shorter');
            const colorClass = targetMax ? 'text-rose-500' : 'text-blue-500';
            
            currentQuestionText = `Find the ${adj}!`;
            DOM.question.innerHTML = `Find the <span class="${colorClass} font-black uppercase underline decoration-4 underline-offset-4">${adj}</span>!`;

            DOM.stage.className = "w-full flex items-end justify-center gap-12 sm:gap-24 pb-[25vh] relative max-w-5xl mx-auto h-full";

            heights.forEach((h, i) => {
                const el = createObjectElement(h, baseItem, true, i);
                DOM.stage.appendChild(el);
            });
        }

        function setupMeasure(theme) {
            gameState.isMeasurementMode = true;
            const h = Math.floor(Math.random() * 4) + 2; 
            const item = theme.items[Math.floor(Math.random() * theme.items.length)];
            gameState.answer = h;

            currentQuestionText = `How many cubes tall is it?`;
            DOM.question.innerHTML = `How many <span class="text-indigo-600 font-black">Cubes</span> tall is it?`;
            DOM.controls.classList.remove('hidden');
            DOM.controls.classList.add('flex');

            DOM.stage.className = "w-full flex items-end justify-center gap-16 pb-[25vh] relative max-w-2xl mx-auto h-full";
            
            const el = createObjectElement(h, item, false, 0);
            DOM.stage.appendChild(el);

            const stackArea = document.createElement('div');
            stackArea.id = "stack-area";
            stackArea.className = "flex flex-col-reverse items-center justify-start min-w-[100px] relative z-10";
            DOM.stage.appendChild(stackArea);

            const guideLine = document.createElement('div');
            guideLine.className = "absolute w-full border-t-4 border-dashed border-red-500 pointer-events-none z-0";
            guideLine.style.bottom = `calc(25vh + ${h * UNIT_SIZE}px - 2px)`; 
            guideLine.style.left = "0";
            DOM.stage.appendChild(guideLine);
        }

        function createObjectElement(heightUnits, data, clickable, index) {
            const container = document.createElement('div');
            const pxHeight = heightUnits * UNIT_SIZE;
            container.className = `flex flex-col items-center justify-end relative transition-transform pop-in ${clickable ? 'cursor-pointer hover:-translate-y-2' : ''} z-10`;
            container.style.animationDelay = `${index * 100}ms`;
            container.style.height = `${pxHeight}px`;
            container.innerHTML = `<span class="filter drop-shadow-xl" style="font-size: ${pxHeight * 0.9}px; line-height: 1;">${data.emoji}</span>`;
            if (clickable) {
                container.onclick = () => handleCompareChoice(index, container);
            }
            return container;
        }

        function handleCompareChoice(index, element) {
            if (gameState.busy) return;
            if (index === gameState.answer) {
                handleCorrect();
            } else {
                playSound('wrong');
                element.classList.add('wiggle');
                setTimeout(() => element.classList.remove('wiggle'), 400);
                const originalText = DOM.question.innerHTML;
                DOM.question.innerHTML = `<span class="text-red-500 font-black">Try again! 🔎</span>`;
                setTimeout(() => { if (!gameState.busy) DOM.question.innerHTML = originalText; }, 1000);
            }
        }

        function updateBlocks(delta) {
            if (gameState.busy) return;
            const newVal = Math.max(0, Math.min(MAX_BLOCKS, gameState.currentBlocks + delta));
            if (newVal === gameState.currentBlocks) return; 
            gameState.currentBlocks = newVal;
            DOM.blockCounter.innerText = gameState.currentBlocks;
            renderStack();
        }

        function renderStack() {
            const stack = document.getElementById('stack-area');
            if (!stack) return;
            stack.innerHTML = '';
            for(let i=1; i <= gameState.currentBlocks; i++) {
                const block = document.createElement('div');
                block.className = "toy-block w-16 rounded-md flex items-center justify-center text-white font-black text-2xl relative pop-in z-10 border-2 border-white/50";
                block.style.height = `${UNIT_SIZE}px`; 
                block.style.animationDuration = "0.2s";
                block.innerHTML = `
                    ${i}
                    <div class="absolute inset-0 bg-white/20 rounded-sm w-full h-1/2 top-0 pointer-events-none"></div>
                `;
                stack.appendChild(block);
            }
        }

        function checkMeasurement() {
            if (gameState.busy) return;
            if (gameState.currentBlocks === 0) {
                const originalText = DOM.question.innerHTML;
                DOM.question.innerHTML = `<span class="text-orange-500 font-black">Add cubes! 🧊</span>`;
                setTimeout(() => { if(!gameState.busy) DOM.question.innerHTML = originalText; }, 1500);
                return;
            }
            if (gameState.currentBlocks === gameState.answer) {
                handleCorrect();
            } else {
                playSound('wrong');
                const stack = document.getElementById('stack-area');
                if(stack) {
                    stack.classList.add('wiggle');
                    setTimeout(() => stack.classList.remove('wiggle'), 400);
                }
                const originalText = DOM.question.innerHTML;
                let hint = gameState.currentBlocks > gameState.answer ? "Too tall!" : "Too short!";
                DOM.question.innerHTML = `<span class="text-red-500 font-black">${hint} Try again! 🔎</span>`;
                setTimeout(() => { if (!gameState.busy) DOM.question.innerHTML = originalText; }, 1500);
            }
        }

        function handleCorrect() {
            gameState.busy = true;
            gameState.score += 20;
            updateUI();
            playSound('win');
            requestAnimationFrame(animateFireworks);

            const feedback = document.createElement('div');
            feedback.className = "absolute inset-0 flex flex-col items-center justify-center z-50 pointer-events-none pb-[25vh]";
            feedback.innerHTML = `
                <div class="text-6xl sm:text-8xl font-black text-yellow-400 text-stroke-title pop-in mb-4">Awesome!</div>
                <div class="text-6xl animate-bounce">🎉</div>
            `;
            document.body.appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
                if (gameState.level >= MAX_QUESTIONS) {
                    showFinalScore();
                } else {
                    gameState.level++;
                    renderLevel();
                }
            }, 1500); 
        }

        function showFinalScore() {
            DOM.stage.innerHTML = '';
            DOM.controls.classList.add('hidden');
            const finalScreen = document.createElement('div');
            finalScreen.className = "absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm";
            finalScreen.innerHTML = `
                <div class="bg-white rounded-[3rem] p-8 max-w-md w-[95%] text-center shadow-2xl border-8 border-green-400 pop-in">
                    <h1 class="text-4xl sm:text-5xl font-black text-green-500 mb-6">Game Complete!</h1>
                    <div class="text-8xl mb-8">🏆</div>
                    <p class="text-2xl font-bold text-slate-600 mb-8">Total Score: <span class="text-yellow-500 text-5xl ml-2">${gameState.score}</span></p>
                    <button onclick="location.reload()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white text-2xl font-black py-4 px-6 rounded-2xl shadow-[0_8px_0_rgb(67,56,202)] active:translate-y-2 transition-all">
                        Play Again ↺
                    </button>
                </div>
            `;
            document.body.appendChild(finalScreen);
            gameState.busy = true; 
            requestAnimationFrame(animateFireworks);
        }

        function updateUI() {
            DOM.score.innerText = gameState.score;
            DOM.level.innerText = `${gameState.level}/${MAX_QUESTIONS}`;
        }

        DOM.startScreen.classList.remove('hidden');
    </script>
</body>
</html>
