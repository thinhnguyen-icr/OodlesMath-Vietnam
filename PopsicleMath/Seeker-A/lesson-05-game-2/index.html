<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Line Math Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --pastel-red: #ff8a80;
            --pastel-orange: #ffd180;
            --pastel-green: #b9f6ca;
            --pastel-blue: #80d8ff;
            --text-color: #455a64;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- UI Elements --- */
        .game-header {
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 4px solid #fff;
        }

        .score-board {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ff5252;
            background: white;
            padding: 8px 25px;
            border-radius: 50px;
            border: 4px solid var(--pastel-red);
            box-shadow: 0 4px 0 var(--pastel-red);
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: white;
            border: 3px solid #eceff1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #eceff1;
        }

        .icon-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 #eceff1; 
        }

        /* --- Screens --- */
        .screen {
            max-width: 900px;
            width: 100%;
            padding: 20px;
            text-align: center;
            flex-grow: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2.8rem; margin-bottom: 5px; color: #1e88e5; text-shadow: 2px 2px 0px #fff; font-weight: 900; }
        p.subtitle { font-size: 1.4rem; color: #546e7a; font-weight: 700; margin-top: 0;}

        /* --- Range Selector --- */
        .range-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .range-btn {
            background: #fff;
            border: 4px solid #4fc3f7;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 2rem;
            font-weight: 900;
            color: #0277bd;
            cursor: pointer;
            box-shadow: 0 6px 0 #4fc3f7;
            transition: all 0.1s;
        }
        .range-btn:hover { background: #e1f5fe; transform: translateY(-3px); box-shadow: 0 9px 0 #4fc3f7; }
        .range-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #4fc3f7; }

        /* --- Number Line Area --- */
        .problem-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            width: 100%;
        }

        .equation-text {
            font-size: 4rem;
            font-weight: 900;
            color: #ffa726;
            text-shadow: 3px 3px 0px #fff;
            background: rgba(255,255,255,0.6);
            padding: 10px 40px;
            border-radius: 30px;
            border: 4px dashed #ffb74d;
        }

        .number-line-container {
            width: 100%;
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.9);
            border: 6px solid #81c784;
            border-radius: 20px;
            padding: 100px 20px 40px 20px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            position: relative;
            scroll-behavior: smooth; /* Cho phép cuộn mượt mà */
        }

        /* Hide scrollbar for cleaner look but keep functionality */
        .number-line-container::-webkit-scrollbar { height: 10px; }
        .number-line-container::-webkit-scrollbar-thumb { background: #81c784; border-radius: 10px; }

        .number-line {
            position: relative;
            height: 80px;
            display: flex;
            align-items: flex-end;
            min-width: max-content;
            padding: 0 50px; 
        }

        .main-line {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            height: 8px;
            background: #b0bec5;
            border-radius: 4px;
            z-index: 1;
        }

        .jump-highlight {
            position: absolute;
            bottom: 30px;
            left: 0;
            height: 8px;
            background: #ff7043; /* Màu cam nổi bật chặng đường đã nhảy */
            border-radius: 4px;
            transition: width 0.5s ease-in-out;
            z-index: 2;
            width: 0; /* Khởi tạo bằng 0 */
        }

        .tick {
            position: relative;
            width: 60px; /* Thu nhỏ khoảng cách giữa các số (cũ: 90px) */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 3;
        }

        .tick::after {
            content: '';
            width: 4px;
            height: 18px;
            background: #455a64;
            position: absolute;
            bottom: 8px;
        }

        .tick-label {
            font-weight: 800;
            font-size: 1.2rem; /* Giảm font size một chút cho vừa vặn */
            color: #37474f;
            transform: translateY(30px);
        }

        /* The Frog */
        .frog {
            position: absolute;
            font-size: 4rem;
            bottom: 35px;
            left: 0;
            transform: translateX(-50%);
            transition: left 0.5s ease-in-out, bottom 0.25s ease-out;
            z-index: 10;
        }

        .frog.jumping {
            bottom: 100px; 
        }

        /* Jump Button */
        .jump-btn {
            background: #66bb6a;
            border: 4px solid #43a047;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #43a047;
            transition: all 0.1s;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .jump-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #43a047; }
        .jump-btn:disabled { background: #bdbdbd; border-color: #9e9e9e; box-shadow: 0 6px 0 #9e9e9e; cursor: not-allowed; }

        /* --- Answers --- */
        .answers-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            opacity: 1;
            transition: opacity 0.3s;
        }
        
        .answers-grid.hidden-answers {
            opacity: 0.3;
            pointer-events: none;
        }

        .answer-btn {
            background-color: #fff;
            border: 5px solid #ab47bc;
            border-radius: 25px;
            padding: 15px 45px;
            font-size: 2.8rem;
            font-weight: 900;
            color: #7b1fa2;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 120px;
            box-shadow: 0 8px 0 #ab47bc;
        }

        .answer-btn:hover { background-color: #f3e5f5; }
        .answer-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #ab47bc; }

        .answer-btn.correct { 
            background-color: #69f0ae; border-color: #00e676; color: #1b5e20; box-shadow: 0 8px 0 #00e676; animation: bounce 0.5s; 
        }
        .answer-btn.wrong { 
            background-color: #ff8a80; border-color: #d50000; color: white; box-shadow: 0 8px 0 #d50000; animation: shake 0.4s; 
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* --- Feedback --- */
        .feedback-text {
            height: 40px;
            margin-top: 10px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #d81b60;
        }

        /* --- Overlays & Fireworks --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }

        .win-card {
            background: white; padding: 40px; border-radius: 30px;
            border: 8px solid #69f0ae; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px; z-index: 1001; position: relative;
        }

        .win-title { font-size: 3.5rem; color: #ff3d00; margin: 0; text-shadow: 2px 2px 0px #ffd54f; font-weight: 900; }
        
        .stats-box { background: #f1f8e9; border: 4px solid #c5e1a5; border-radius: 20px; padding: 20px; margin: 20px 0; text-align: left; }
        .stats-box p { font-size: 1.4rem; font-weight: 700; margin: 8px 0; color: #33691e; display: flex; align-items: center; gap: 10px; }

        #fireworksCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: none; }

        /* --- Bonus Game Styles --- */
        #marioBonus {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e1f5fe; display: none; flex-direction: column; align-items: center;
            z-index: 2000; overflow: hidden; touch-action: none;
        }

        #marioCanvas { display: block; margin: auto; border-radius: 0 0 10px 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .bonus-ui { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 2.2rem; font-weight: 900; text-shadow: 3px 3px 0 #1565c0; pointer-events: none; z-index: 10;}
        .bonus-start-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff59d; font-size: 3rem; font-weight: 900; text-align: center; text-shadow: 4px 4px 0 #d84315; animation: pulse 1s infinite alternate; z-index: 10;}
        .flash-red { animation: flashRed 0.3s; }
        
        @keyframes flashRed { 0%, 100% { background: #e1f5fe; } 50% { background: #ffcdd2; } }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .equation-text { font-size: 3rem; padding: 10px 20px; }
            .jump-btn { font-size: 1.5rem; padding: 10px 20px; }
            .answer-btn { padding: 10px 25px; font-size: 2.2rem; }
            .bonus-ui { font-size: 1.5rem; }
            .bonus-start-msg { font-size: 1.8rem; }
            .tick { width: 40px; } /* Closer ticks on mobile */
            .frog { font-size: 3rem; bottom: 35px; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="game-header">
        <div style="display: flex; align-items: center;">
            <div class="score-board" id="scoreBoard">Score: 0</div>
            <div id="timerDisplay" class="timer-display" style="display:none; margin-left:15px; font-size:1.4rem; font-weight: 900; color: #1e88e5;">⏱ 00:00</div>
        </div>
        <div class="controls">
            <button class="icon-btn" id="soundToggle" title="Toggle Sound">🔊</button>
            <button class="icon-btn" id="timerToggle" title="Toggle Timer">⏱</button>
            <button class="icon-btn" id="resetBtn" title="Change Mode">⚙️</button>
        </div>
    </div>

    <!-- Range Selector Screen -->
    <div class="screen active" id="rangeScreen">
        <h1>Number Line Adventure</h1>
        <p class="subtitle">Choose a maximum number to start jumping!</p>
        <div class="range-grid">
            <button class="range-btn" onclick="startGame(5)">Up to 5</button>
            <button class="range-btn" onclick="startGame(10)">Up to 10</button>
            <button class="range-btn" onclick="startGame(20)">Up to 20</button>
            <button class="range-btn" onclick="startGame(30)">Up to 30</button>
            <button class="range-btn" onclick="startGame(40)">Up to 40</button>
            <button class="range-btn" onclick="startGame(50)">Up to 50</button>
            <button class="range-btn" onclick="startGame(100)">Up to 100</button>
        </div>
    </div>

    <!-- Main Game Screen -->
    <div class="screen" id="mathGameScreen">
        <h1 id="gameTitle">Hop to Add!</h1>
        <p class="subtitle">Help the frog jump to find the answer.</p>

        <div class="problem-display">
            <div class="equation-text" id="equationDisplay">0 + 0 = ?</div>
            
            <button class="jump-btn" id="jumpBtn">🐸 Jump! (<span id="jumpsLeft">0</span> left)</button>

            <div class="number-line-container" id="nlContainer">
                <div class="number-line" id="numberLine">
                    <div class="main-line"></div>
                    <div class="jump-highlight" id="jumpHighlight"></div>
                    <!-- Ticks and Frog inserted via JS -->
                    <div class="frog" id="frogEl">🐸</div>
                </div>
            </div>
        </div>

        <div class="feedback-text" id="feedback"></div>

        <div class="answers-grid hidden-answers" id="answersGrid"></div>
    </div>

    <!-- Fireworks Canvas -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- Win Modal (Used for Milestones) -->
    <div class="overlay" id="winOverlay">
        <div class="win-card">
            <h2 class="win-title">AMAZING! 🏆</h2>
            <p style="font-size: 1.6rem; margin-top: 10px; font-weight: 800; color: #ff9800;">You completed a stage!</p>
            
            <div class="stats-box">
                <p>⭐ <span>Score: <span id="finalScore" style="color:#d32f2f;">0</span></span></p>
                <p>🪙 <span>Bonus Coins: <span id="finalCoins" style="color:#f57c00;">0</span></span></p>
                <p id="finalTimeLine" style="display: none;">⏱ <span>Time: <span id="finalTime" style="color:#1976d2;">00:00</span></span></p>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
                <button class="answer-btn" style="background-color: #b9f6ca; border-color: #69f0ae; color: #1b5e20; box-shadow: 0 8px 0 #69f0ae; font-size: 2rem;" onclick="continueGame()">🌟 Keep Playing 🌟</button>
                <button class="answer-btn" style="background-color: #fff; border-color: #bdbdbd; color: #757575; box-shadow: 0 8px 0 #bdbdbd; font-size: 1.5rem;" onclick="goToMenu()">Change Mode</button>
            </div>
        </div>
    </div>

    <!-- Bonus Game Section -->
    <div id="marioBonus">
        <div class="bonus-ui">
            <div>💰 <span id="bonusCoins">0</span></div>
            <div>⏱ <span id="bonusTime">12</span>s</div>
        </div>
        <div id="bonusMsg" class="bonus-start-msg">Avoid Cactus 🌵 & Collect Coins!</div>
        <canvas id="marioCanvas"></canvas>
    </div>

    <script>
        // --- State ---
        let maxRange = 10;
        let score = 0;
        let questionsCompleted = 0; // Tracks progress for mini-game
        let num1 = 0, num2 = 0, currentCorrectAnswer = 0;
        let jumpsRemaining = 0;
        let currentPos = 0;
        let eligibleForPoints = true;
        
        let isMuted = false;
        let timerActive = false;
        let timerInterval = null;
        let secondsElapsed = 0;
        let totalBonusCoins = 0;
        // Adjusted tick widths for smaller scale
        let tickWidth = window.innerWidth <= 600 ? 40 : 60; 
        let framesSinceLastObstacle = 0;

        // --- DOM Elements ---
        const rangeScreen = document.getElementById('rangeScreen');
        const mathGameScreen = document.getElementById('mathGameScreen');
        const equationDisplay = document.getElementById('equationDisplay');
        const jumpBtn = document.getElementById('jumpBtn');
        const jumpsLeftText = document.getElementById('jumpsLeft');
        const nlContainer = document.getElementById('nlContainer');
        const numberLine = document.getElementById('numberLine');
        const jumpHighlight = document.getElementById('jumpHighlight');
        const frogEl = document.getElementById('frogEl');
        const answersGrid = document.getElementById('answersGrid');
        const scoreBoard = document.getElementById('scoreBoard');
        const feedback = document.getElementById('feedback');
        
        const winOverlay = document.getElementById('winOverlay');
        const marioBonus = document.getElementById('marioBonus');
        
        // --- Audio Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, volume = 0.1) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(800, 'sine', 0.05, 0.05),
            correct: () => { playTone(523, 'sine', 0.2); setTimeout(()=>playTone(659, 'sine', 0.2), 100); setTimeout(()=>playTone(783, 'sine', 0.3), 200); },
            wrong: () => playTone(220, 'sawtooth', 0.3, 0.1),
            hop: () => {
                if (isMuted) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            },
            jump: () => {
                if (isMuted) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            },
            coin: () => { playTone(987, 'sine', 0.1, 0.1); setTimeout(()=>playTone(1318, 'sine', 0.2, 0.1), 50); },
            hit: () => { playTone(150, 'sawtooth', 0.3, 0.2); setTimeout(()=>playTone(100, 'square', 0.4, 0.2), 100); },
            gameOver: () => { [300, 250, 200, 150].forEach((f, i) => setTimeout(() => playTone(f, 'sawtooth', 0.3, 0.1), i * 200)); },
            win: () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.3, 0.15), i * 150)); }
        };

        // --- Game Flow ---
        function goToMenu() {
            sounds.click();
            winOverlay.style.display = 'none';
            mathGameScreen.classList.remove('active');
            rangeScreen.classList.add('active');
            stopFireworks();
        }

        function startGame(range) {
            sounds.click();
            maxRange = range;
            score = 0;
            questionsCompleted = 0;
            totalBonusCoins = 0;
            updateScore();
            
            rangeScreen.classList.remove('active');
            mathGameScreen.classList.add('active');
            
            // Reset timer if active
            if(timerActive) {
                clearInterval(timerInterval);
                secondsElapsed = 0;
                document.getElementById('timerDisplay').textContent = `⏱ 00:00`;
                timerInterval = setInterval(() => { 
                    secondsElapsed++; 
                    document.getElementById('timerDisplay').textContent = `⏱ ${formatTime(secondsElapsed)}`;
                }, 1000);
            }
            generateQuestion();
        }

        function generateQuestion() {
            eligibleForPoints = true;
            feedback.textContent = '';
            answersGrid.classList.add('hidden-answers');
            answersGrid.innerHTML = '';
            
            // Generate valid num1, num2
            num1 = Math.floor(Math.random() * maxRange);
            // Ensure at least 1 jump, and sum <= maxRange
            let maxNum2 = maxRange - num1;
            if (maxNum2 < 1) { // Fallback if num1 = maxRange
                num1 = maxRange - 2; 
                maxNum2 = 2;
            }
            num2 = Math.floor(Math.random() * maxNum2) + 1;
            
            currentCorrectAnswer = num1 + num2;
            jumpsRemaining = num2;
            currentPos = num1;
            
            equationDisplay.textContent = `${num1} + ${num2} = ?`;
            updateJumpBtn();
            
            renderNumberLine();
            generateAnswers();
        }

        function renderNumberLine() {
            // Clear old ticks except main line, highlight and frog
            Array.from(numberLine.children).forEach(c => {
                if(c.id !== 'frogEl' && c.id !== 'jumpHighlight' && !c.classList.contains('main-line')) {
                    numberLine.removeChild(c);
                }
            });

            // Calculate start and end display
            let startTick = Math.max(0, num1 - 2);
            let endTick = Math.min(maxRange, currentCorrectAnswer + 3);
            
            // For small ranges, just show 0 to maxRange
            if(maxRange <= 20) { startTick = 0; endTick = maxRange; }

            for(let i = startTick; i <= endTick; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.textContent = i;
                
                tick.appendChild(label);
                numberLine.insertBefore(tick, frogEl);
            }

            // Adjust width based on number of ticks
            numberLine.style.width = `${(endTick - startTick + 1) * tickWidth + 100}px`;
            
            // Save startTick globally to calculate frog position easily later
            numberLine.dataset.startTick = startTick;

            // Update positions
            updateFrogPosition();
            centerFrog();
        }

        function updateFrogPosition() {
            const startTick = parseInt(numberLine.dataset.startTick);
            
            // Calculate Frog position
            const relativeIndex = currentPos - startTick;
            const leftPos = 50 + (relativeIndex * tickWidth) + (tickWidth/2);
            frogEl.style.left = `${leftPos}px`;

            // Calculate Path Highlight length
            const originIndex = num1 - startTick;
            const originLeftPos = 50 + (originIndex * tickWidth) + (tickWidth/2);
            jumpHighlight.style.left = `${originLeftPos}px`;
            jumpHighlight.style.width = `${(currentPos - num1) * tickWidth}px`;
        }

        function centerFrog() {
            setTimeout(() => {
                // Scroll container to smoothly center the frog
                const targetScroll = frogEl.offsetLeft - nlContainer.clientWidth/2 + 30;
                nlContainer.scrollTo({
                    left: Math.max(0, targetScroll),
                    behavior: 'smooth'
                });
            }, 50);
        }

        function updateJumpBtn() {
            if (jumpsRemaining > 0) {
                jumpBtn.disabled = false;
                jumpsLeftText.textContent = jumpsRemaining;
            } else {
                jumpBtn.disabled = true;
                jumpBtn.textContent = "Great jumping!";
                answersGrid.classList.remove('hidden-answers');
            }
        }

        jumpBtn.onclick = () => {
            if(jumpsRemaining <= 0) return;
            
            jumpsRemaining--;
            currentPos++;
            sounds.hop();
            
            // Animate
            frogEl.classList.add('jumping');
            updateFrogPosition();
            
            // Keep frog in focus smoothly
            centerFrog();
            
            setTimeout(() => {
                frogEl.classList.remove('jumping');
            }, 250);
            
            updateJumpBtn();
        };

        function generateAnswers() {
            let opts = [currentCorrectAnswer];
            while(opts.length < 3) {
                // Generate nearby wrong answers
                let variation = Math.floor(Math.random() * 5) - 2;
                let w = currentCorrectAnswer + variation;
                if(w !== currentCorrectAnswer && w >= 0 && w <= maxRange && !opts.includes(w)) {
                    opts.push(w);
                } else {
                    // Fallback random
                    w = Math.floor(Math.random() * (maxRange+1));
                    if(!opts.includes(w)) opts.push(w);
                }
            }
            
            opts.sort(()=>Math.random()-0.5).forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = val;
                btn.onclick = () => checkAnswer(btn, val);
                answersGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, val) {
            // Prevent clicking if jumps not done
            if (jumpsRemaining > 0) return;

            if(val === currentCorrectAnswer) {
                btn.classList.add('correct');
                equationDisplay.textContent = `${num1} + ${num2} = ${currentCorrectAnswer}`;
                feedback.textContent = `🌟 Awesome! The frog landed on ${currentCorrectAnswer}! 🌟`;
                sounds.correct();
                
                // Disable all buttons
                Array.from(answersGrid.children).forEach(b => b.style.pointerEvents = 'none');
                
                if (eligibleForPoints) score++;
                updateScore();
                questionsCompleted++;
                
                setTimeout(() => {
                    // Milestone & Bonus Check
                    if (questionsCompleted > 0 && questionsCompleted % 10 === 0) {
                        showWinScreen();
                    } else if (questionsCompleted > 0 && questionsCompleted % 3 === 0) {
                        startBonusLevel();
                    } else {
                        generateQuestion();
                    }
                }, 1500);

            } else {
                btn.classList.add('wrong');
                btn.style.pointerEvents = 'none'; // Can't click this wrong one again
                eligibleForPoints = false;
                feedback.textContent = "Oops! Try another number.";
                sounds.wrong();
            }
        }

        function updateScore() { scoreBoard.textContent = `Score: ${score}`; }
        
        document.getElementById('resetBtn').onclick = goToMenu;

        function formatTime(secs) {
            const m = Math.floor(secs/60).toString().padStart(2,'0');
            const s = (secs%60).toString().padStart(2,'0');
            return `${m}:${s}`;
        }

        function showWinScreen() {
            sounds.win();
            winOverlay.style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCoins').textContent = totalBonusCoins;
            if(timerActive) {
                document.getElementById('finalTimeLine').style.display = 'block';
                document.getElementById('finalTime').textContent = formatTime(secondsElapsed);
            } else {
                document.getElementById('finalTimeLine').style.display = 'none';
            }
            startFireworks();
        }

        function continueGame() {
            winOverlay.style.display = 'none';
            stopFireworks();
            generateQuestion();
        }

        // --- Bonus Game Engine (Upgraded) ---
        const canvas = document.getElementById('marioCanvas');
        const ctx = canvas.getContext('2d');
        let bonusActive = false, currentBonusCoins = 0, bonusTimeLeft = 12;
        let marioY = 0, marioVY = 0, groundY = 0;
        let clouds = [], coins = [], obstacles = [];
        let scenery = [];

        function startBonusLevel() {
            sounds.win();
            mathGameScreen.style.opacity = '0';
            marioBonus.style.display = 'flex';
            canvas.width = window.innerWidth;
            canvas.height = Math.min(window.innerHeight * 0.7, 500);
            
            groundY = canvas.height - 50; 
            marioY = groundY;
            
            currentBonusCoins = 0; bonusTimeLeft = 12;
            bonusActive = true;
            framesSinceLastObstacle = 0;
            document.getElementById('bonusMsg').style.display = 'block';
            document.getElementById('bonusMsg').style.color = '#fff59d';
            document.getElementById('bonusMsg').textContent = "Avoid Cactus 🌵 & Collect Coins!";
            marioBonus.classList.remove('flash-red');
            
            coins = []; clouds = []; obstacles = []; scenery = [];
            for(let i=0; i<6; i++) clouds.push({x: Math.random()*canvas.width, y: Math.random()*120 + 20, s: 0.5+Math.random()*1.5});
            // Mountains for parallax
            for(let i=0; i<3; i++) scenery.push({x: i*400, type: 'mountain'});
            
            document.getElementById('bonusCoins').textContent = currentBonusCoins;
            document.getElementById('bonusTime').textContent = bonusTimeLeft;

            const timer = setInterval(() => {
                if(!bonusActive) return clearInterval(timer);
                bonusTimeLeft--;
                document.getElementById('bonusTime').textContent = bonusTimeLeft;
                if(bonusTimeLeft <= 0) endBonus();
            }, 1000);

            requestAnimationFrame(bonusLoop);
        }

        function endBonus() {
            bonusActive = false;
            totalBonusCoins += currentBonusCoins;
            document.getElementById('bonusMsg').textContent = `BONUS OVER! +${currentBonusCoins} Coins! ➔`;
            document.getElementById('bonusMsg').style.display = 'block';
            
            setTimeout(() => {
                marioBonus.style.display = 'none';
                mathGameScreen.style.opacity = '1';
                generateQuestion(); 
            }, 2000);
        }

        function jump(e) {
            if(bonusActive && e.type === 'touchstart') e.preventDefault(); 
            if(marioY >= groundY - 5 && bonusActive) {
                marioVY = -16; 
                sounds.jump();
                document.getElementById('bonusMsg').style.display = 'none';
            }
        }

        window.addEventListener('mousedown', jump);
        window.addEventListener('touchstart', jump, {passive: false});

        function bonusLoop() {
            if(!bonusActive) return;

            // --- Draw Rich Sky ---
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#1976d2");   // Deep blue sky top
            gradient.addColorStop(0.5, "#4fc3f7"); // Vibrant light blue middle
            gradient.addColorStop(1, "#e1f5fe");   // Soft horizon
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- Draw Glowing Sun ---
            const sunX = canvas.width - 90;
            const sunY = 90;
            
            // Soft outer radial glow
            let sunGlow = ctx.createRadialGradient(sunX, sunY, 20, sunX, sunY, 80);
            sunGlow.addColorStop(0, "rgba(255, 238, 88, 1)");
            sunGlow.addColorStop(0.5, "rgba(255, 238, 88, 0.4)");
            sunGlow.addColorStop(1, "rgba(255, 238, 88, 0)");
            ctx.fillStyle = sunGlow;
            ctx.beginPath(); ctx.arc(sunX, sunY, 80, 0, Math.PI*2); ctx.fill();
            
            // Solid inner sun
            ctx.fillStyle = "#fff59d";
            ctx.beginPath(); ctx.arc(sunX, sunY, 35, 0, Math.PI*2); ctx.fill();

            // --- Scenery (Mountains) ---
            ctx.fillStyle = "#81c784";
            scenery.forEach(s => {
                s.x -= 2; // slow parallax
                if(s.x < -400) s.x = canvas.width + 100;
                ctx.beginPath();
                ctx.moveTo(s.x, groundY);
                ctx.lineTo(s.x + 200, groundY - 180);
                ctx.lineTo(s.x + 400, groundY);
                ctx.fill();
            });

            // --- Clouds with beautiful 2-layer shadows ---
            clouds.forEach(c => {
                c.x -= c.s;
                if(c.x < -100) { c.x = canvas.width + 100; c.y = Math.random()*120 + 20; }
                
                // Shadow / Bottom layer
                ctx.fillStyle = "rgba(180, 200, 220, 0.7)";
                ctx.beginPath();
                ctx.arc(c.x, c.y + 5, 30, 0, Math.PI*2);
                ctx.arc(c.x+30, c.y-10, 35, 0, Math.PI*2);
                ctx.arc(c.x+60, c.y + 5, 30, 0, Math.PI*2);
                ctx.fill();

                // Fluffy White Top Layer
                ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
                ctx.beginPath();
                ctx.arc(c.x, c.y, 30, 0, Math.PI*2);
                ctx.arc(c.x+30, c.y-15, 35, 0, Math.PI*2);
                ctx.arc(c.x+60, c.y, 30, 0, Math.PI*2);
                ctx.fill();
            });

            // --- Ground ---
            ctx.fillStyle = "#6d4c41"; // Dirt
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.fillStyle = "#4caf50"; // Grass top
            ctx.fillRect(0, groundY, canvas.width, 20);
            // Grass pattern
            ctx.fillStyle = "#388e3c";
            for(let i=0; i<canvas.width; i+=40) {
                ctx.fillRect((i - (scenery[0].x*3)%40), groundY+5, 10, 5);
            }

            // Gravity
            marioVY += 0.8;
            marioY += marioVY;
            if(marioY > groundY) { marioY = groundY; marioVY = 0; }

            const mx = 80;
            const my = marioY - 50; 

            // --- Obstacles (Cactus) ---
            framesSinceLastObstacle++;
            // Reduced obstacle spawn rate and enforced a minimum distance (frames)
            if(Math.random() < 0.008 && framesSinceLastObstacle > 120) {
                obstacles.push({x: canvas.width + 50, y: groundY - 40, w: 30, h: 40, active: true});
                framesSinceLastObstacle = 0;
            }
            
            obstacles.forEach((ob, i) => {
                ob.x -= 8;
                
                // Draw Cactus
                ctx.fillStyle = "#2e7d32";
                ctx.beginPath(); ctx.roundRect(ob.x, ob.y, ob.w, ob.h, 15); ctx.fill();
                // Cactus arms
                ctx.fillRect(ob.x - 10, ob.y + 10, 15, 8);
                ctx.fillRect(ob.x - 10, ob.y + 2, 8, 15);
                ctx.fillRect(ob.x + ob.w - 5, ob.y + 15, 15, 8);
                ctx.fillRect(ob.x + ob.w + 2, ob.y + 7, 8, 15);

                // Collision with character (approx bounding box)
                if (ob.active && mx + 15 > ob.x && mx - 15 < ob.x + ob.w && my + 45 > ob.y) {
                    ob.active = false; 
                    sounds.gameOver();
                    bonusActive = false; // Trigger Game Over
                    
                    document.getElementById('bonusMsg').textContent = "GAME OVER! 💥";
                    document.getElementById('bonusMsg').style.display = 'block';
                    document.getElementById('bonusMsg').style.color = '#ff5252';
                    marioBonus.classList.add('flash-red');
                    
                    setTimeout(() => {
                        endBonus();
                    }, 2000);
                }
            });
            obstacles = obstacles.filter(o => o.x > -100);

            // --- Coins ---
            if(Math.random() < 0.05) coins.push({x: canvas.width, y: groundY - 50 - Math.random()*130});
            coins.forEach((c, i) => {
                c.x -= 8;
                // Draw Coin
                ctx.fillStyle = "#ffb300";
                ctx.beginPath(); ctx.arc(c.x, c.y, 18, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ffeb3b";
                ctx.beginPath(); ctx.arc(c.x, c.y, 13, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#f57f17"; 
                ctx.font = "bold 18px Poppins"; 
                ctx.fillText("$", c.x-6, c.y+6);

                // Collision
                const dx = c.x - mx; 
                const dy = c.y - (marioY - 25); 
                if(Math.sqrt(dx*dx + dy*dy) < 45) {
                    coins.splice(i, 1);
                    currentBonusCoins++;
                    document.getElementById('bonusCoins').textContent = currentBonusCoins;
                    sounds.coin();
                }
            });
            coins = coins.filter(c => c.x > -50);

            // --- Draw Character ---
            ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.roundRect(mx-14, my+42, 12, 8, 4); ctx.fill(); ctx.beginPath(); ctx.roundRect(mx+2, my+42, 12, 8, 4); ctx.fill();
            ctx.fillStyle = "#1e88e5"; ctx.beginPath(); ctx.roundRect(mx-12, my+25, 24, 20, 6); ctx.fill();
            ctx.fillStyle = "#e53935"; ctx.beginPath(); ctx.roundRect(mx-9, my+20, 18, 15, 6); ctx.fill();
            ctx.fillStyle = "#ffccbc"; ctx.beginPath(); ctx.arc(mx, my+8, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffab91"; ctx.beginPath(); ctx.arc(mx+12, my+10, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(mx+6, my+5, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#e53935"; ctx.beginPath(); ctx.arc(mx, my+3, 15, Math.PI, 0); ctx.fill(); ctx.fillRect(mx-5, my, 22, 5);
            ctx.fillStyle = "#ffccbc"; ctx.beginPath(); ctx.arc(mx+15, my+30, 5, 0, Math.PI*2); ctx.fill();

            requestAnimationFrame(bonusLoop);
        }

        // --- Fireworks System ---
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        let fwParticles = [];
        let fwActive = false;

        function startFireworks() {
            fwCanvas.style.display = 'block';
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            fwActive = true; fwParticles = []; fwLoop();
        }

        function stopFireworks() { fwActive = false; fwCanvas.style.display = 'none'; }

        function createExplosion(x, y) {
            const colors = ['#ff5252', '#ffd740', '#69f0ae', '#40c4ff', '#e040fb'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for(let i=0; i<60; i++) {
                fwParticles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18,
                    life: 1, decay: Math.random() * 0.015 + 0.015,
                    color: color, size: Math.random() * 5 + 2
                });
            }
        }

        function fwLoop() {
            if(!fwActive) return;
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            for(let i = fwParticles.length - 1; i >= 0; i--) {
                let p = fwParticles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay;
                if(p.life <= 0) { fwParticles.splice(i, 1); continue; }
                fwCtx.globalAlpha = p.life; fwCtx.fillStyle = p.color;
                fwCtx.beginPath(); fwCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); fwCtx.fill();
            }
            fwCtx.globalAlpha = 1;
            if(Math.random() < 0.08) createExplosion(Math.random() * fwCanvas.width, Math.random() * (fwCanvas.height / 2));
            requestAnimationFrame(fwLoop);
        }

        // --- Setup Controls ---
        document.getElementById('soundToggle').onclick = function() {
            isMuted = !isMuted; this.textContent = isMuted ? '🔇' : '🔊';
            if(!isMuted && audioCtx.state === 'suspended') audioCtx.resume();
        };
        document.getElementById('timerToggle').onclick = function() {
            timerActive = !timerActive;
            document.getElementById('timerDisplay').style.display = timerActive ? 'block' : 'none';
            if(timerActive && mathGameScreen.classList.contains('active')) {
                secondsElapsed = 0;
                document.getElementById('timerDisplay').textContent = `⏱ 00:00`;
                timerInterval = setInterval(() => { 
                    secondsElapsed++; 
                    document.getElementById('timerDisplay').textContent = `⏱ ${formatTime(secondsElapsed)}`;
                }, 1000);
            } else {
                clearInterval(timerInterval);
            }
        };

        // Resize Canvas dynamically
        window.addEventListener('resize', () => {
            if (bonusActive) {
                canvas.width = window.innerWidth;
                canvas.height = Math.min(window.innerHeight * 0.7, 500);
                groundY = canvas.height - 50;
                if (marioY > groundY) marioY = groundY;
            }
            
            // Recalculate ticks and path based on screen width changes
            tickWidth = window.innerWidth <= 600 ? 40 : 60; 
            if (mathGameScreen.classList.contains('active') && numberLine.children.length > 0) {
                 renderNumberLine();
            }
        });
        
    </script>
</body>
</html>
