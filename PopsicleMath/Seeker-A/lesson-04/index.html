<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Sorter - Number Bonds</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #29b6f6;
            --sky-bottom: #81d4fa;
            --grass-light: #9ccc65;
            --grass-dark: #689f38;
            --basket-base: #d4a373;
            --basket-dark: #8b5a2b;
            --text-main: #2c3e50;
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --bond-border: #feca57;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 45%, var(--grass-light) 45%, var(--grass-dark) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            touch-action: pan-y;
            position: relative;
        }

        /* --- Beautiful Background Elements --- */
        .sun {
            position: absolute;
            top: 20px;
            left: 30px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff700 30%, #ffaa00 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #fff700, 0 0 100px #ffaa00;
            z-index: 0;
            animation: pulse-sun 3s infinite alternate;
        }
        @keyframes pulse-sun {
            0% { transform: scale(1); box-shadow: 0 0 40px #fff700, 0 0 80px #ffaa00; }
            100% { transform: scale(1.05); box-shadow: 0 0 70px #fff700, 0 0 120px #ffaa00; }
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            opacity: 0.95;
            z-index: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        .c1 { width: 130px; height: 40px; top: 6%; left: 15%; animation: float 25s linear infinite; }
        .c1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .c1::after { width: 50px; height: 50px; top: -20px; left: 60px; }
        .c2 { width: 160px; height: 50px; top: 15%; right: -15%; animation: float 35s linear infinite reverse; }
        .c2::before { width: 80px; height: 80px; top: -40px; left: 25px; }
        .c2::after { width: 60px; height: 60px; top: -25px; left: 85px; }

        @keyframes float {
            from { transform: translateX(-150px); }
            to { transform: translateX(110vw); }
        }

        .flower {
            position: absolute;
            width: 50px; height: 50px;
            background-size: contain; background-repeat: no-repeat;
            z-index: 1; opacity: 0.9;
            animation: sway 4s infinite ease-in-out alternate;
        }
        .flower-white { background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50,20 C80,0 80,50 80,50 C100,80 50,80 50,80 C0,80 20,50 20,50 C20,0 50,20 50,20 Z" fill="%23ffffff"/><circle cx="50" cy="53" r="14" fill="%23ffca28"/></svg>'); }
        .flower-pink { background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50,20 C80,0 80,50 80,50 C100,80 50,80 50,80 C0,80 20,50 20,50 C20,0 50,20 50,20 Z" fill="%23ff9ff3"/><circle cx="50" cy="53" r="14" fill="%23ffca28"/></svg>'); }
        
        @keyframes sway { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }

        .f1 { bottom: 8%; left: 8%; transform: scale(0.9); }
        .f2 { bottom: 25%; left: 25%; transform: scale(1.1); animation-delay: 1s; }
        .f3 { bottom: 12%; right: 15%; transform: scale(0.8); animation-delay: 0.5s; }
        .f4 { bottom: 30%; right: 8%; transform: scale(1); animation-delay: 1.5s; }
        .f5 { bottom: 5%; left: 45%; transform: scale(1.2); animation-delay: 0.2s; }
        .f6 { bottom: 20%; right: 35%; transform: scale(0.9); animation-delay: 0.8s; }

        /* --- UI & Header --- */
        header { text-align: center; padding: 10px 20px; z-index: 10; position: relative; }

        h1 {
            color: #fff; font-size: 2.6rem; font-weight: 900; letter-spacing: 2px;
            -webkit-text-stroke: 2px #d32f2f;
            text-shadow: 4px 4px 0 #d32f2f, 0px 8px 15px rgba(0,0,0,0.2); margin-bottom: 5px;
        }

        .controls { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 5px; }

        button {
            background: var(--secondary); color: white; border: 3px solid #fff;
            padding: 10px 25px; border-radius: 30px; font-size: 1.1rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 6px 0 #1aa39a, 0 10px 10px rgba(0,0,0,0.2);
            transition: all 0.1s; text-transform: uppercase; letter-spacing: 1px;
        }

        button:active { transform: translateY(6px); box-shadow: 0 0 0 #1aa39a; }
        .btn-reset { background: #ff9f43; box-shadow: 0 6px 0 #cc7f35, 0 10px 10px rgba(0,0,0,0.2); }
        .btn-reset:active { box-shadow: 0 0 0 #cc7f35; }

        #message-board {
            font-size: 1.5rem; font-weight: 800; color: #fff;
            text-shadow: 2px 2px 0 #2c3e50, -1px -1px 0 #2c3e50, 1px -1px 0 #2c3e50, -1px 1px 0 #2c3e50;
            margin-top: 10px; min-height: 35px; transition: all 0.3s;
        }

        .highlight-msg { color: #feca57 !important; transform: scale(1.1); }

        /* Game Layout */
        .game-container {
            display: flex; flex-direction: column; flex: 1; padding: 10px; gap: 20px;
            position: relative; z-index: 10; align-items: center;
        }

        @media (min-width: 800px) {
            .game-container { flex-direction: row; align-items: flex-start; justify-content: space-evenly; padding: 20px 50px; }
            .play-area { width: 55%; max-width: 550px; }
            .bond-area { width: 40%; max-width: 400px; }
        }

        /* --- Play Area (Tree + Baskets Underneath) --- */
        .play-area { display: flex; flex-direction: column; align-items: center; width: 100%; }

        /* Majestic Tall & Wide Tree Setup */
        .tree-container {
            position: relative; width: 420px; height: 380px; margin-bottom: 5px;
            display: flex; justify-content: center; align-items: center;
        }

        .tree-svg {
            position: absolute; bottom: 0; width: 100%; height: 100%; z-index: 1;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.3));
        }

        .tree-leaves {
            width: 360px; height: 260px; position: absolute; top: 10px; z-index: 2; background: transparent;
        }

        /* Apples */
        .apple {
            width: 45px; height: 45px; position: absolute; cursor: grab; z-index: 100;
            touch-action: none; transition: transform 0.1s; filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.4));
        }

        .apple:active { cursor: grabbing; transform: scale(1.2); filter: drop-shadow(0px 15px 10px rgba(0,0,0,0.5)); }
        .apple.dragging { position: fixed; pointer-events: none; z-index: 9999; transform: scale(1.3); transition: none; }

        /* Baskets Under Tree */
        .baskets-wrapper {
            display: flex; gap: 40px; width: 100%; justify-content: center; position: relative; z-index: 5; margin-top: 10px;
        }

        .basket-container { 
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }
        .basket-container:active .basket {
            transform: scale(0.95);
        }

        .basket {
            width: 150px; height: 110px;
            background: linear-gradient(135deg, #e6b980 25%, transparent 25%) -50px 0, linear-gradient(225deg, #e6b980 25%, transparent 25%) -50px 0, linear-gradient(315deg, #e6b980 25%, transparent 25%), linear-gradient(45deg, #e6b980 25%, transparent 25%);
            background-size: 20px 20px; background-color: var(--basket-base);
            border-radius: 10px 10px 40px 40px; position: relative; border: 6px solid var(--basket-dark);
            border-top: none; display: flex; flex-wrap: wrap; align-content: flex-end; justify-content: center;
            padding: 5px; gap: -15px; box-shadow: 0 15px 20px rgba(0,0,0,0.3); transition: all 0.2s;
        }

        .basket::before {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; height: 20px;
            background: #cd853f; border-radius: 50%; border: 4px solid var(--basket-dark);
            z-index: 12; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3);
        }
        
        .basket::after {
            content: ''; position: absolute; top: -4px; left: 0; right: 0; height: 12px;
            background: rgba(0,0,0,0.4); border-radius: 50%; z-index: 1;
        }

        .basket.highlight { transform: scale(1.1); box-shadow: 0 0 20px #fff, 0 15px 20px rgba(0,0,0,0.3); border-color: #f1c40f; }
        .basket.highlight::before { border-color: #f1c40f; }

        /* Label now at the bottom */
        .basket-label-bottom {
            background: #fff; color: var(--basket-dark); padding: 5px 25px; border-radius: 20px;
            font-weight: 900; font-size: 1.2rem; margin-top: -15px; z-index: 15;
            border: 4px solid var(--basket-dark); box-shadow: 0 4px 0 var(--basket-dark);
        }

        /* --- Bond & Score Area --- */
        .bond-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 10px;}

        /* Number Bond Diagram with SVG Lines */
        .number-bond {
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); position: relative;
            width: 280px; height: 260px; display: flex; flex-direction: column; align-items: center;
            border: 6px solid #fff;
        }

        .bond-title { font-weight: 900; color: #ff6b6b; font-size: 1.4rem; margin-bottom: 10px; text-transform: uppercase;}

        .bond-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }

        .circle {
            width: 75px; height: 75px; border: 6px solid var(--bond-border); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: 900;
            color: var(--text-main); position: absolute; z-index: 2; background: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 8px 10px rgba(0,0,0,0.1);
        }

        .circle-total { top: 50px; border-color: #ff6b6b; color: #ff6b6b; left: calc(50% - 37.5px); }
        .circle-part1 { bottom: 20px; left: 25px; border-color: #4ecdc4; color: #4ecdc4;}
        .circle-part2 { bottom: 20px; right: 25px; border-color: #feca57; color: #feca57;}

        .pop-animation { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }

        /* Score Board */
        .score-board {
            background: #fff; padding: 15px 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); border: 5px solid #feca57; width: 280px;
        }
        .score-text { font-size: 1.2rem; font-weight: 700; color: #576574; }
        .score-val { font-size: 2.2rem; font-weight: 900; color: #ff9f43; margin-top: -5px; }

        /* --- Modals (Setup & End Game) --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); z-index: 5000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            border: 8px solid #ff9f43; transform: scale(0.5); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 90%; max-width: 400px;
        }
        .modal.active .modal-content { transform: scale(1); }
        
        /* Setup Specific */
        .setup-title { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 10px; }
        .setup-desc { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 20px; }
        .setup-input-group {
            display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px;
        }
        .setup-btn {
            width: 50px; height: 50px; border-radius: 50%; font-size: 2rem; display: flex; justify-content: center; align-items: center;
            padding: 0; background: #4ecdc4; border: 4px solid #fff; box-shadow: 0 4px 0 #1aa39a;
        }
        .setup-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #1aa39a; }
        #setup-display {
            font-size: 3rem; font-weight: 900; color: #feca57; width: 80px; text-align: center;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .modal-content h2 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 10px; }
        .modal-content p { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 20px; }
        .btn-large { font-size: 1.5rem; padding: 15px 40px; width: 100%;}

        /* Fireworks */
        .fw-particle {
            position: fixed; width: 12px; height: 12px; border-radius: 50%; z-index: 10000;
            pointer-events: none; opacity: 1; animation: fw-burst 1.5s ease-out forwards;
        }
        @keyframes fw-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* --- Media Queries for Responsive Design (Mobile / Tablet) --- */
        @media (max-width: 480px) {
            .tree-container { transform: scale(0.8); transform-origin: top center; margin-bottom: -70px; }
            .baskets-wrapper { gap: 15px; transform: scale(0.9); transform-origin: top center; margin-top: 0; }
            .number-bond { transform: scale(0.9); transform-origin: top center; margin-bottom: -20px;}
            .score-board { transform: scale(0.9); }
            h1 { font-size: 2rem; }
            #message-board { font-size: 1.2rem; }
            .controls button { font-size: 1rem; padding: 8px 20px; }
        }

        @media (max-width: 380px) {
            .tree-container { transform: scale(0.7); transform-origin: top center; margin-bottom: -110px; }
            .baskets-wrapper { transform: scale(0.8); transform-origin: top center; }
            .number-bond { transform: scale(0.8); transform-origin: top center; margin-bottom: -40px;}
            .score-board { transform: scale(0.8); }
        }

    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Beautiful Background Elements -->
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="flower flower-white f1"></div>
    <div class="flower flower-pink f2"></div>
    <div class="flower flower-white f3"></div>
    <div class="flower flower-pink f4"></div>
    <div class="flower flower-white f5"></div>
    <div class="flower flower-pink f6"></div>

    <header>
        <h1>Apple Sorter</h1>
        <div class="controls">
            <button onclick="resetCurrentGame()" class="btn-reset">Reset</button>
            <button onclick="openSetup()">Setup</button>
        </div>
        <div id="message-board">Drag or click apples to the baskets!</div>
    </header>

    <div class="game-container">
        <!-- Play Area -->
        <div class="play-area">
            <div class="tree-container" id="tree-zone">
                <!-- Gorgeous Tall & Wide Vector Tree -->
                <svg class="tree-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#5C3A21"/>
                            <stop offset="30%" stop-color="#8B5A2B"/>
                            <stop offset="70%" stop-color="#A06935"/>
                            <stop offset="100%" stop-color="#4A2E1B"/>
                        </linearGradient>
                        <radialGradient id="leafGradDark" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#8bc34a"/>
                            <stop offset="60%" stop-color="#4caf50"/>
                            <stop offset="100%" stop-color="#2e7d32"/>
                        </radialGradient>
                        <radialGradient id="leafGradLight" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#dcedc8"/>
                            <stop offset="50%" stop-color="#8bc34a"/>
                            <stop offset="100%" stop-color="#43a047"/>
                        </radialGradient>
                    </defs>
                    
                    <!-- Majestic Tall Trunk -->
                    <path d="M 200 380 C 150 380, 110 395, 70 390 C 120 360, 140 300, 150 200 C 150 140, 120 100, 90 70 C 150 90, 175 140, 185 200 C 200 150, 230 100, 310 70 C 270 100, 240 140, 245 200 C 255 300, 280 360, 330 390 C 290 395, 250 380, 200 380 Z" fill="url(#trunkGrad)"/>
                    
                    <!-- Trunk Wood Bark Textures -->
                    <path d="M 175 180 Q 170 240, 165 300 M 225 180 Q 230 240, 235 300 M 200 200 Q 198 250, 202 320" stroke="#4A2E1B" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round"/>

                    <!-- Fluffy Wide Canopy -->
                    <!-- Back Layer -->
                    <circle cx="100" cy="150" r="70" fill="url(#leafGradDark)"/>
                    <circle cx="300" cy="150" r="70" fill="url(#leafGradDark)"/>
                    <circle cx="200" cy="80" r="80" fill="url(#leafGradDark)"/>
                    <circle cx="60" cy="210" r="50" fill="url(#leafGradDark)"/>
                    <circle cx="340" cy="210" r="50" fill="url(#leafGradDark)"/>
                    
                    <!-- Mid Layer -->
                    <circle cx="140" cy="190" r="60" fill="url(#leafGradLight)"/>
                    <circle cx="260" cy="190" r="60" fill="url(#leafGradLight)"/>
                    <circle cx="200" cy="130" r="75" fill="url(#leafGradLight)"/>
                    <circle cx="90" cy="240" r="45" fill="url(#leafGradLight)"/>
                    <circle cx="310" cy="240" r="45" fill="url(#leafGradLight)"/>

                    <!-- Front Highlights Layer -->
                    <circle cx="200" cy="50" r="55" fill="url(#leafGradLight)"/>
                    <circle cx="130" cy="100" r="55" fill="url(#leafGradLight)"/>
                    <circle cx="270" cy="100" r="55" fill="url(#leafGradLight)"/>
                    <circle cx="200" cy="200" r="50" fill="url(#leafGradLight)"/>
                </svg>

                <div class="tree-leaves" id="tree-leaves"></div>
            </div>

            <div class="baskets-wrapper">
                <div class="basket-container" id="basket-zone-1">
                    <div class="basket" id="basket-1"></div>
                    <div class="basket-label-bottom">Basket 1</div>
                </div>
                <div class="basket-container" id="basket-zone-2">
                    <div class="basket" id="basket-2"></div>
                    <div class="basket-label-bottom">Basket 2</div>
                </div>
            </div>
        </div>

        <!-- Bond & Score Area -->
        <div class="bond-area">
            <div class="number-bond">
                <!-- Perfect SVG connecting lines (Responsive & Exact) -->
                <svg class="bond-svg" viewBox="0 0 280 260">
                    <line x1="140" y1="87" x2="62" y2="202" stroke="#dfe6e9" stroke-width="8" stroke-linecap="round"/>
                    <line x1="140" y1="87" x2="217" y2="202" stroke="#dfe6e9" stroke-width="8" stroke-linecap="round"/>
                </svg>

                <div class="bond-title">Number Bond</div>
                <div class="circle circle-total" id="bond-total">?</div>
                <div class="circle circle-part1" id="bond-part1">0</div>
                <div class="circle circle-part2" id="bond-part2">0</div>
            </div>

            <div class="score-board">
                <div class="score-text">Combos Found</div>
                <div class="score-val" id="combo-display">0 / 6</div>
                <div class="score-text" style="margin-top:10px;">Score: <span id="score-display" style="color:#ff4757">0</span></div>
            </div>
        </div>
    </div>

    <!-- Modal Setup Game -->
    <div class="modal active" id="setup-modal">
        <div class="modal-content">
            <h2 class="setup-title">Apple Sorter</h2>
            <p class="setup-desc">Choose total apples (5 to 20):</p>
            <div class="setup-input-group">
                <button class="setup-btn" onclick="adjustSetupCount(-1)">-</button>
                <div id="setup-display">5</div>
                <button class="setup-btn" onclick="adjustSetupCount(1)">+</button>
            </div>
            <button class="btn-large" onclick="startGameFromSetup()">Start Game!</button>
        </div>
    </div>

    <!-- Modal End Game -->
    <div class="modal" id="end-modal">
        <div class="modal-content">
            <h2>Spectacular!</h2>
            <p>You found <span id="modal-combos" style="color:#4ecdc4">0</span> ways to sort!</p>
            <p>Final Score: <span id="modal-score" style="color:#ff6b6b; font-size:2.5rem;">0</span></p>
            <button class="btn-large" onclick="openSetup()">Play Again!</button>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pickup') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'drop') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'combo') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        const SVG_APPLE = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="appleGrad" cx="35%" cy="35%" r="65%">
                    <stop offset="0%" stop-color="#ff9999"/><stop offset="60%" stop-color="#ff3b30"/><stop offset="100%" stop-color="#c60000"/>
                </radialGradient>
            </defs>
            <path d="M50 15 C 70 0, 100 20, 90 55 C 80 90, 60 95, 50 85 C 40 95, 20 90, 10 55 C 0 20, 30 0, 50 15 Z" fill="url(#appleGrad)"/>
            <path d="M50 15 Q48 5 55 0" fill="none" stroke="#5d4037" stroke-width="4" stroke-linecap="round"/>
            <path d="M55 5 C 65 -5, 80 5, 70 15 C 60 10, 55 10, 55 5 Z" fill="#4caf50"/>
            <ellipse cx="30" cy="35" rx="8" ry="16" fill="#fff" opacity="0.5" transform="rotate(-30 30 35)"/>
        </svg>`;

        let totalApples = 5;
        let setupApples = 5;
        let applesOnTree = 0;
        let basket1Count = 0;
        let basket2Count = 0;
        let foundCombos = new Set();
        let score = 0;
        let currentDraggedApple = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        const elements = {
            treeLeaves: document.getElementById('tree-leaves'),
            basket1: document.getElementById('basket-1'),
            basket2: document.getElementById('basket-2'),
            treeZone: document.getElementById('tree-zone'),
            msgBoard: document.getElementById('message-board'),
            bTotal: document.getElementById('bond-total'),
            bPart1: document.getElementById('bond-part1'),
            bPart2: document.getElementById('bond-part2'),
            comboDisplay: document.getElementById('combo-display'),
            scoreDisplay: document.getElementById('score-display'),
            modalSetup: document.getElementById('setup-modal'),
            modalEnd: document.getElementById('end-modal'),
            setupDisplay: document.getElementById('setup-display')
        };

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        // --- Setup Logic ---
        function openSetup() {
            elements.modalEnd.classList.remove('active');
            elements.modalSetup.classList.add('active');
        }

        function adjustSetupCount(delta) {
            setupApples += delta;
            if (setupApples < 5) setupApples = 5;
            if (setupApples > 20) setupApples = 20;
            elements.setupDisplay.innerText = setupApples;
            playSound('pickup');
        }

        function startGameFromSetup() {
            elements.modalSetup.classList.remove('active');
            totalApples = setupApples;
            initGame();
        }

        function resetCurrentGame() {
            initGame();
        }

        function initGame() {
            applesOnTree = totalApples;
            basket1Count = 0;
            basket2Count = 0;
            foundCombos.clear();
            score = 0;
            
            elements.modalEnd.classList.remove('active');
            elements.treeLeaves.innerHTML = '';
            elements.basket1.innerHTML = '';
            elements.basket2.innerHTML = '';
            
            for (let i = 0; i < totalApples; i++) {
                createApple(i, totalApples);
            }

            updateUI(true);
            elements.msgBoard.innerHTML = "Drag or click apples to the baskets!";
            elements.msgBoard.className = '';
        }

        function createApple(index, total) {
            const apple = document.createElement('div');
            apple.className = 'apple';
            apple.innerHTML = SVG_APPLE;
            apple.dataset.id = index;
            apple.dataset.location = 'tree';
            
            positionAppleOnTree(apple, index, total);
            apple.addEventListener('pointerdown', handleDragStart);
            elements.treeLeaves.appendChild(apple);
        }

        // Even Distribution using Fibonacci Lattice (Golden Angle)
        function positionAppleOnTree(apple, index = -1, total = 1) {
            const centerX = 180, centerY = 130;
            const maxRadiusX = 140, maxRadiusY = 100;
            let rRatio, theta;

            if (index === -1) {
                // Random position when putting an apple back
                rRatio = Math.sqrt(Math.random());
                theta = Math.random() * 2 * Math.PI;
            } else {
                // Evenly distribute based on total apples
                const goldenAngle = 137.508 * (Math.PI / 180);
                rRatio = Math.sqrt((index + 0.5) / total);
                theta = index * goldenAngle;
            }
            
            apple.style.left = `${centerX + rRatio * maxRadiusX * Math.cos(theta) - 22}px`; 
            apple.style.top = `${centerY + rRatio * maxRadiusY * Math.sin(theta) - 22}px`;
            apple.style.position = 'absolute';
            apple.style.transform = `rotate(${getRandomInt(-15, 15)}deg)`;
            apple.style.zIndex = getRandomInt(10, 50);
        }

        // --- Drag and Drop Logic ---
        function handleDragStart(e) {
            e.preventDefault();
            playSound('pickup');
            currentDraggedApple = e.currentTarget;
            
            const rect = currentDraggedApple.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;

            document.body.appendChild(currentDraggedApple);
            currentDraggedApple.classList.add('dragging');
            currentDraggedApple.style.left = `${e.clientX - dragOffsetX}px`;
            currentDraggedApple.style.top = `${e.clientY - dragOffsetY}px`;

            document.addEventListener('pointermove', handleDragMove);
            document.addEventListener('pointerup', handleDragEnd);
        }

        function handleDragMove(e) {
            if (!currentDraggedApple) return;
            currentDraggedApple.style.left = `${e.clientX - dragOffsetX}px`;
            currentDraggedApple.style.top = `${e.clientY - dragOffsetY}px`;
            checkHighlight(e.clientX, e.clientY);
        }

        function checkHighlight(x, y) {
            elements.basket1.classList.remove('highlight');
            elements.basket2.classList.remove('highlight');
            const target = document.elementFromPoint(x, y);
            if (!target) return;
            const b1 = target.closest('#basket-1');
            const b2 = target.closest('#basket-2');
            if (b1) b1.classList.add('highlight');
            if (b2) b2.classList.add('highlight');
        }

        function handleDragEnd(e) {
            if (!currentDraggedApple) return;
            document.removeEventListener('pointermove', handleDragMove);
            document.removeEventListener('pointerup', handleDragEnd);
            
            currentDraggedApple.classList.remove('dragging');
            elements.basket1.classList.remove('highlight');
            elements.basket2.classList.remove('highlight');

            currentDraggedApple.style.display = 'none';
            const target = document.elementFromPoint(e.clientX, e.clientY);
            currentDraggedApple.style.display = 'block';

            let newLocation = 'tree'; 
            let dropZone = target ? target.closest('.basket, #tree-zone') : null;

            if (currentDraggedApple.dataset.location === 'basket1') basket1Count--;
            if (currentDraggedApple.dataset.location === 'basket2') basket2Count--;
            if (currentDraggedApple.dataset.location === 'tree') applesOnTree--;

            if (dropZone && dropZone.id === 'basket-1') {
                newLocation = 'basket1'; basket1Count++;
                placeInBasket(elements.basket1, currentDraggedApple);
                playSound('drop');
            } else if (dropZone && dropZone.id === 'basket-2') {
                newLocation = 'basket2'; basket2Count++;
                placeInBasket(elements.basket2, currentDraggedApple);
                playSound('drop');
            } else {
                applesOnTree++;
                elements.treeLeaves.appendChild(currentDraggedApple);
                positionAppleOnTree(currentDraggedApple); // index=-1 assigns random position
                playSound('drop');
            }

            currentDraggedApple.dataset.location = newLocation;
            currentDraggedApple = null;
            updateUI();
        }

        // Feature: Enhanced Click to move apple
        function moveAppleToBasket(basketNum) {
            if (currentDraggedApple) return;
            
            // Try to get an apple from the tree first
            let sourceApples = Array.from(document.querySelectorAll('.apple')).filter(a => a.dataset.location === 'tree');
            
            // If tree is empty, get from the OTHER basket
            if (sourceApples.length === 0) {
                const otherBasketNum = basketNum === 1 ? 2 : 1;
                sourceApples = Array.from(document.querySelectorAll('.apple')).filter(a => a.dataset.location === `basket${otherBasketNum}`);
            }

            if (sourceApples.length === 0) return; // No apples available to move

            // Pick a random apple from the source for natural feel
            const appleToMove = sourceApples[Math.floor(Math.random() * sourceApples.length)];
            const targetBasket = basketNum === 1 ? elements.basket1 : elements.basket2;

            // Update source count
            if (appleToMove.dataset.location === 'tree') applesOnTree--;
            else if (appleToMove.dataset.location === 'basket1') basket1Count--;
            else if (appleToMove.dataset.location === 'basket2') basket2Count--;

            // Update destination count
            if (basketNum === 1) basket1Count++;
            else basket2Count++;

            appleToMove.dataset.location = `basket${basketNum}`;
            placeInBasket(targetBasket, appleToMove);
            playSound('drop');
            updateUI();
        }

        // Event listeners for clicking baskets
        document.getElementById('basket-zone-1').addEventListener('pointerdown', (e) => {
            if (!currentDraggedApple) moveAppleToBasket(1);
        });
        document.getElementById('basket-zone-2').addEventListener('pointerdown', (e) => {
            if (!currentDraggedApple) moveAppleToBasket(2);
        });

        function placeInBasket(basket, apple) {
            basket.appendChild(apple);
            apple.style.position = 'relative';
            apple.style.left = 'auto';
            apple.style.top = 'auto';
            apple.style.margin = '-5px -8px';
            apple.style.transform = `rotate(${getRandomInt(-30, 30)}deg)`;
            apple.style.zIndex = getRandomInt(10, 50);
        }

        function updateUI(isInit = false) {
            // Hide Total (Show '?') if apples are not fully sorted
            if (applesOnTree === 0) {
                if (elements.bTotal.innerText != totalApples) {
                    elements.bTotal.innerText = totalApples;
                    if(!isInit) triggerPop(elements.bTotal);
                }
            } else {
                elements.bTotal.innerText = '?';
            }
            
            if (elements.bPart1.innerText != basket1Count) {
                elements.bPart1.innerText = basket1Count;
                if(!isInit) triggerPop(elements.bPart1);
            }
            if (elements.bPart2.innerText != basket2Count) {
                elements.bPart2.innerText = basket2Count;
                if(!isInit) triggerPop(elements.bPart2);
            }

            elements.comboDisplay.innerText = `${foundCombos.size} / ${totalApples + 1}`;
            elements.scoreDisplay.innerText = score;

            if (!isInit && applesOnTree === 0) {
                handleComboCheck();
            } else if (!isInit && applesOnTree > 0) {
                elements.msgBoard.innerHTML = "Keep going! Apples are still on the tree.";
                elements.msgBoard.className = '';
            }
        }

        function triggerPop(el) {
            el.classList.remove('pop-animation');
            void el.offsetWidth;
            el.classList.add('pop-animation');
        }

        function handleComboCheck() {
            const comboString = `${basket1Count}-${basket2Count}`;
            const eqStr = `${totalApples} = <span style="color:#4ecdc4">${basket1Count}</span> + <span style="color:#feca57">${basket2Count}</span>`;
            
            if (!foundCombos.has(comboString)) {
                foundCombos.add(comboString);
                score += 100;
                playSound('combo');
                createFireworks(e = null, 20); 
                elements.msgBoard.innerHTML = `Awesome! You found: ${eqStr}`;
                elements.msgBoard.className = 'highlight-msg';
                elements.comboDisplay.innerText = `${foundCombos.size} / ${totalApples + 1}`;
                elements.scoreDisplay.innerText = score;
                triggerPop(elements.scoreDisplay);
                
                if(foundCombos.size === totalApples + 1) {
                    setTimeout(showEndGame, 1000);
                }
            } else {
                playSound('pickup');
                elements.msgBoard.innerHTML = `Good! You made: ${eqStr}`;
                elements.msgBoard.className = '';
            }
        }

        function showEndGame() {
            playSound('combo');
            createFireworks(null, 100); 
            document.getElementById('modal-combos').innerText = foundCombos.size;
            document.getElementById('modal-score').innerText = score + 500; 
            elements.modalEnd.classList.add('active');
        }

        function createFireworks(e, amount = 50) {
            const colors = ['#ff6b6b', '#feca57', '#4ecdc4', '#ff9ff3', '#54a0ff'];
            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;

            for (let i = 0; i < amount; i++) {
                const particle = document.createElement('div');
                particle.className = 'fw-particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${startX}px`;
                particle.style.top = `${startY}px`;

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * (window.innerWidth * 0.4) + 50;
                
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance + 100}px`); 
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1500);
            }
        }

    </script>
</body>
</html>
