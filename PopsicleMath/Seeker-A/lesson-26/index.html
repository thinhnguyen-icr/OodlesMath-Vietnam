<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lava Leap v24</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a082e;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #top-bar {
            position: absolute;
            top: 25px;
            width: 100%;
            display: flex;
            justify-content: center; 
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            display: none;
        }

        #score-container {
            position: absolute;
            left: 30px;
            top: 0;
            background: rgba(30, 10, 60, 0.85);
            border: 3px solid rgba(0, 255, 255, 0.8);
            padding: 8px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            min-width: 130px;
            text-align: center;
        }

        #score-display {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0px #006666;
        }
        
        #progress-display {
            font-size: 1rem;
            font-weight: 800;
            color: #ffcc00;
            margin-top: -3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #question-board {
            background: rgba(40, 15, 80, 0.95);
            border: 4px solid #ffcc00;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            border-radius: 25px;
            padding: 8px 30px; 
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
            transform: translateY(0);
            animation: floatBoard 3s ease-in-out infinite;
        }

        @keyframes floatBoard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        #question-text {
            font-size: 3.2rem; 
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0px #ff3366, 4px 4px 0px #000;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        #speaker-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.6), rgba(0, 150, 255, 0.6));
            border: 3px solid #00ffff;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.15s ease;
            color: #fff;
            flex-shrink: 0;
        }

        #speaker-btn:hover {
            transform: scale(1.15) translateY(-2px);
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.9), rgba(0, 150, 255, 0.9));
        }

        #speaker-btn:active {
            transform: scale(0.95);
        }

        /* --- BONUS ROUND BANNER --- */
        #bonus-banner {
            position: absolute;
            top: 30%;
            background: rgba(255, 0, 100, 0.9);
            border: 4px solid #fff;
            color: #fff;
            padding: 20px 50px;
            border-radius: 30px;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 #000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #bonus-banner span {
            font-size: 1.5rem;
            color: #ffcc00;
            text-transform: none;
            margin-top: 5px;
            text-shadow: 2px 2px 0 #000;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- PANELS --- */
        .panel {
            background: linear-gradient(145deg, rgba(60, 20, 90, 0.95), rgba(30, 5, 50, 0.98));
            border: 4px solid;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            padding: 40px 50px;
            border-radius: 30px;
            text-align: center;
            color: #fff;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(1);
            max-width: 90%; 
            width: 500px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #start-panel { border-color: #00ffff; }
        #win-panel { border-color: #ffcc00; }
        #game-over-panel { border-color: #ff3333; }

        .panel.hidden {
            display: none !important;
        }

        .title-start { color: #00ffff; text-shadow: 3px 3px 0 #000; }
        .title-win { color: #ffcc00; text-shadow: 3px 3px 0 #000; }
        .title-lose { color: #ff3333; text-shadow: 3px 3px 0 #000; }

        .panel h1 {
            margin: 10px 0;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .panel p {
            font-size: 1.3rem;
            color: #e0f8f8;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 600;
        }

        .highlight {
            color: #ffcc00;
            font-weight: 900;
            font-size: 2rem;
        }

        .settings-row {
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 15px;
            margin: 20px 0 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255,255,255,0.15);
            width: 100%;
            box-sizing: border-box;
        }

        .settings-row label {
            font-size: 1.3rem;
            font-weight: 800;
            color: #00ffcc;
        }

        select {
            background: #110522;
            color: #ff00ff;
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Poppins', sans-serif;
            border: 3px solid #ff00ff;
            border-radius: 10px;
            padding: 6px 15px;
            cursor: pointer;
            outline: none;
        }

        button.main-btn {
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            border: none;
            border-radius: 18px;
            padding: 18px 0;
            font-size: 1.6rem;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 0 #006666, 0 20px 30px rgba(0,0,0,0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            margin-top: 10px;
            transition: all 0.15s ease;
        }

        button.main-btn:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 13px 0 #006666, 0 25px 40px rgba(0,0,0,0.8); }
        button.main-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #006666; }

        .diamond-icon {
            font-size: 4.5rem;
            animation: floatBoard 2s infinite ease-in-out;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="top-bar">
            <div id="score-container">
                <div id="score-display">💎 0</div>
                <div id="progress-display">Question: 1/10</div>
            </div>
            
            <div id="question-board">
                <span id="question-text">12 + 3 = ?</span>
                <button id="speaker-btn" onclick="playTTS()" title="Read aloud">🔊</button>
            </div>
        </div>

        <div id="bonus-banner">
            BONUS ROUND!
            <span>Catch Diamonds & Avoid Spikes!</span>
        </div>

        <div id="start-panel" class="panel">
            <div class="diamond-icon">💎</div>
            <h1 class="title-start">Lava Leap</h1>
            <p>Magical Math Adventure!<br>Jump to the correct answers.<br>Reach the Space Portal!</p>
            
            <div class="settings-row">
                <label for="math-range">Max Number:</label>
                <select id="math-range">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <button class="main-btn" onclick="startGame()">Play Now!</button>
        </div>

        <div id="game-over-panel" class="panel hidden">
            <h1 class="title-lose">OH NO!</h1>
            <p>You fell into the lava or hit a spike.</p>
            <h2 style="color:#fff; font-size:2rem; margin:10px 0 25px;">Collected: <span id="final-score" class="highlight">0</span> 💎</h2>
            <button class="main-btn" onclick="resetGame()">Try Again</button>
        </div>

        <div id="win-panel" class="panel hidden">
            <div class="diamond-icon">💎</div>
            <h1 id="win-title" class="title-win">VICTORY!</h1>
            <p id="win-desc">You survived the adventure!</p>
            <h2 style="color:#fff; font-size:2rem; margin:10px 0 25px;">Total: <span id="win-score" class="highlight">10</span> 💎</h2>
            <button class="main-btn" onclick="resetGame()">Play Again!</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); 
    
    // Virtual resolution
    const VW = 1600;
    const VH = 900;
    
    let gameState = 'start'; // start, playing, minigame, gameover, win
    let scale = 1, offsetX = 0, offsetY = 0;
    
    let cameraX = 0;
    let targetCameraX = 0;
    let cameraShake = 0;

    let diamonds = 0;
    let questionsAnswered = 0;
    let maxQuestions = 10;
    let currentMathRange = 20;
    let usedQuestions = new Set();
    const gravity = 0.75; 
    
    let player = {
        x: 0, y: 0, 
        vx: 0, vy: 0,
        width: 36, height: 110,
        state: 'idle', 
        targetPlatform: null,
        jumpTargetX: null
    };

    // Minigame Data
    let pointerX = VW/2;
    let bonusItems = [];
    let bonusTimer = 0;
    let bonusDuration = 60 * 60; // 60 seconds at 60fps

    let platforms = [];
    let particles = [];
    let backgroundElements = [];
    let fireworks = [];
    let floatingTexts = [];
    let lavaBubbles = [];
    let backgroundTime = 0;
    let fwInterval = null;

    let currentQuestion = null;

    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function initAudio() {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTone(freq, type, duration, vol=0.1) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function sfxJump() {
        playTone(350, 'sine', 0.1, 0.05);
        setTimeout(() => playTone(550, 'sine', 0.15, 0.05), 50);
    }

    function sfxCorrect() {
        playTone(523.25, 'sine', 0.1, 0.1); 
        setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); 
        setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200); 
    }

    function sfxWrong() {
        playTone(200, 'sawtooth', 0.2, 0.1);
        setTimeout(() => playTone(150, 'sawtooth', 0.3, 0.1), 150);
    }

    function sfxBonusGem() {
        playTone(880, 'sine', 0.1, 0.05);
        setTimeout(() => playTone(1108, 'sine', 0.1, 0.05), 50);
    }

    function sfxBonusSpike() {
        playTone(150, 'sawtooth', 0.4, 0.2);
        setTimeout(() => playTone(100, 'sawtooth', 0.5, 0.2), 100);
    }

    function sfxWin() {
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
            setTimeout(() => playTone(freq, 'square', 0.3, 0.05), i * 150);
        });
    }

    function sfxLose() {
        [400, 350, 300, 250].forEach((freq, i) => {
            setTimeout(() => playTone(freq, 'triangle', 0.3, 0.05), i * 200);
        });
    }

    // --- SETUP & RESIZE ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let scaleX = canvas.width / VW;
        let scaleY = canvas.height / VH;
        scale = Math.min(scaleX, scaleY);
        
        offsetX = (canvas.width - VW * scale) / 2;
        offsetY = (canvas.height - VH * scale) / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- MATH & TTS (STRICT 0 CHECK FIX) ---
    function generateMathQuestion() {
        let op = (questionsAnswered % 2 === 0) ? '+' : '-';
        let num1, num2, ans, qString;
        let attempts = 0;

        do {
            if (op === '+') {
                ans = Math.floor(Math.random() * (currentMathRange - 1)) + 2; 
                num1 = Math.floor(Math.random() * (ans - 1)) + 1; // 1 to ans-1
                num2 = ans - num1;
            } else {
                num1 = Math.floor(Math.random() * (currentMathRange - 1)) + 2; 
                num2 = Math.floor(Math.random() * (num1 - 1)) + 1; // 1 to num1-1
                ans = num1 - num2;
            }

            qString = `${num1} ${op} ${num2}`;
            attempts++;
            if (attempts > 50) break; 
        } while (usedQuestions.has(qString));

        usedQuestions.add(qString);
        
        let options = [ans];
        while(options.length < 4) {
            let offset = Math.floor(Math.random() * 9) - 4; 
            if (offset === 0) offset = 5;
            let fake = ans + offset;
            
            if (fake > 0 && fake <= currentMathRange && !options.includes(fake)) {
                options.push(fake);
            }
        }
        
        options.sort(() => Math.random() - 0.5);
        
        let spokenOp = op === '+' ? 'plus' : 'minus';
        currentQuestion = {
            text: `${num1} ${op} ${num2} = ?`,
            ans: ans,
            options: options,
            spokenText: `${num1} ${spokenOp} ${num2} equals what?`
        };
        
        document.getElementById('question-text').innerText = currentQuestion.text;
        document.getElementById('progress-display').innerText = `Question: ${questionsAnswered + 1}/${maxQuestions}`;
    }

    function playTTS() {
        if (!currentQuestion) return;
        initAudio();
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance(currentQuestion.spokenText);
            msg.lang = 'en-US';
            msg.rate = 0.85; 
            window.speechSynthesis.speak(msg);
        }
    }

    // --- PROCEDURAL GENERATION ---
    function generateBackgroundElements() {
        backgroundElements = [];
        lavaBubbles = [];
        
        for(let i=0; i<10; i++) {
            backgroundElements.push({
                type: 'crystal',
                x: Math.random() * VW * 4, 
                y: VH/2 + Math.random() * 300 - 150,
                size: 35 + Math.random() * 70,
                hue: Math.random() > 0.5 ? 185 : (Math.random() > 0.5 ? 300 : 280), 
                parallax: 0.15
            });
        }
        for(let i=0; i<8; i++) {
            backgroundElements.push({
                type: 'pillar_back',
                x: Math.random() * VW * 4,
                width: 250 + Math.random() * 250,
                parallax: 0.2
            });
        }
        for(let i=0; i<5; i++) {
            backgroundElements.push({
                type: 'pillar_front',
                x: Math.random() * VW * 4,
                width: 150 + Math.random() * 150,
                parallax: 0.35
            });
        }
        for(let i=0; i<25; i++) {
            lavaBubbles.push({
                x: Math.random() * VW * 2,
                y: VH - 40 + Math.random() * 30,
                size: Math.random() * 12 + 8,
                life: Math.random(),
                speed: Math.random() * 1.5 + 0.5
            });
        }
    }

    function createPlatformObject(x, y, w, isBase, answerValue) {
        let shape = [];
        let segments = Math.floor(w / 15);
        for(let i = 0; i <= segments; i++) {
            let px = (i / segments) * w;
            let py = (i === 0 || i === segments) ? 0 : (Math.random() * 8 - 4); 
            shape.push({ x: px, y: py });
        }
        
        let cracks = [];
        if(!isBase) {
            let numCracks = Math.floor(Math.random() * 2) + 1; 
            for(let c=0; c<numCracks; c++) {
                let startX = w * (0.2 + Math.random() * 0.6);
                cracks.push({ x: startX, len: 40 + Math.random()*50, branch: Math.random() > 0.5 });
            }
        }
        
        let hangingMoss = [];
        for(let i = 0; i <= segments; i++) {
            hangingMoss.push(10 + Math.random() * 30);
        }

        return {
            x: x, y: y, w: w, 
            blockHeight: 220 + Math.random() * 60, 
            h: 800, 
            shape: shape,
            cracks: cracks,
            hangingMoss: hangingMoss,
            isBase: isBase,
            answer: answerValue,
            isCrumbling: false,
            isPortal: false,
            vy: 0,
            mossColor: `hsl(${95 + Math.random()*25}, 85%, 45%)` 
        };
    }

    function generateLevelSet(baseX) {
        let baseY = VH - 280;
        if (platforms.length === 0) {
            platforms.push(createPlatformObject(baseX, baseY, 200, true, null));
        } else {
            baseY = platforms[0].y;
        }

        let startX = baseX + 280;
        let yOffsets = [-40, -120, 20, -90]; 
        
        for(let i=0; i<4; i++) {
            let platX = startX + i * 240;
            let platY = baseY + yOffsets[i];
            platforms.push(createPlatformObject(platX, platY, 140, false, currentQuestion.options[i]));
        }
    }

    function initLevel() {
        initAudio();
        currentMathRange = parseInt(document.getElementById('math-range').value);
        diamonds = 0;
        questionsAnswered = 0;
        usedQuestions.clear();
        
        document.getElementById('score-display').innerText = `💎 0`;
        document.getElementById('bonus-banner').style.display = 'none';
        
        platforms = [];
        particles = [];
        fireworks = [];
        floatingTexts = [];
        bonusItems = [];
        if(fwInterval) clearInterval(fwInterval);
        
        generateBackgroundElements();
        generateMathQuestion();
        generateLevelSet(200);

        player.x = platforms[0].x + platforms[0].w / 2;
        player.y = platforms[0].y;
        player.vx = 0;
        player.vy = 0;
        player.state = 'idle';
        player.targetPlatform = null;
        player.jumpTargetX = null;
        
        cameraX = 0;
        targetCameraX = 0;
        cameraShake = 0;
    }

    // --- INPUT HANDLING (FIXED ZERO LAG) ---
    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        if(gameState === 'playing') handleClick(e.touches[0] || e); 
        else handleMove(e.touches[0] || e);
    }, {passive: false});

    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0] || e); }, {passive: false});

    function handleMove(e) {
        if(gameState === 'minigame') {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
            }
            
            // Map directly to Virtual Width (100% accurate, zero camera lag)
            let drawnWidth = VW * scale;
            let actualX = clientX - rect.left - offsetX;
            pointerX = (actualX / drawnWidth) * VW;
        }
    }

    function handleClick(e) {
        initAudio(); 
        if(gameState !== 'playing' || player.state !== 'idle') return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const scaledX = x - offsetX;
        const scaledY = y - offsetY;
        
        const virtualX = scaledX / scale + cameraX;
        const virtualY = scaledY / scale;

        for(let i=1; i<platforms.length; i++) {
            let p = platforms[i];
            if (!p.isCrumbling && virtualX >= p.x && virtualX <= p.x + p.w && virtualY >= p.y - 150 && virtualY <= p.y + p.h) {
                jumpTo(p);
                break;
            }
        }
    }

    function jumpTo(target) {
        sfxJump();
        player.state = 'jumping';
        player.targetPlatform = target;
        
        let targetX = target.x + target.w/2;
        player.jumpTargetX = targetX; 
        
        let dx = targetX - player.x;
        let dy = target.y - player.y;

        let vx_speed = 22; 
        let T = Math.abs(dx) / vx_speed;
        
        player.vx = vx_speed;
        player.vy = (dy - 0.5 * gravity * T * T) / T;
    }

    function screenShake(amount) {
        cameraShake = amount;
    }

    // --- GAME LOGIC ---
    function update() {
        backgroundTime += 0.03;
        if(cameraShake > 0) cameraShake *= 0.8;

        // Camera Logic
        if (gameState === 'minigame') {
            targetCameraX = 0; // Lock camera strictly in minigame
            cameraX = 0;
        } else {
            let desiredCamX = player.x - VW * 0.15; 
            if(desiredCamX > targetCameraX) targetCameraX = desiredCamX; 
            cameraX += (targetCameraX - cameraX) * 0.08; 
        }

        // Parallax updates
        if (gameState !== 'minigame') {
            backgroundElements.forEach(bg => {
                if(bg.x < cameraX * bg.parallax - VW) {
                    bg.x += VW * 2.5;
                    if(bg.type === 'crystal') bg.y = VH/2 + Math.random() * 300 - 150;
                }
            });

            lavaBubbles.forEach(b => {
                b.life += 0.015 * b.speed; 
                if(b.life > 1) {
                    b.life = 0;
                    b.x = cameraX + Math.random() * VW * 1.5;
                    b.y = VH - 40 + Math.random() * 30; 
                    b.size = Math.random() * 12 + 8;
                    b.speed = Math.random() * 1.5 + 0.5;
                }
            });
        } else {
            // Space stars movement (Falling)
            backgroundElements.forEach(bg => {
                bg.y += bg.speedY;
                if(bg.y > VH + 10) {
                    bg.y = -10;
                    bg.x = Math.random() * VW;
                }
            });
        }

        // Fast Fireworks Physics
        for (let i = fireworks.length - 1; i >= 0; i--) {
            let f = fireworks[i];
            f.px = f.x; 
            f.py = f.y;
            f.x += f.vx;
            f.y += f.vy;
            f.vy += 0.12; 
            f.vx *= 0.96; 
            f.life -= f.decay;
            if (f.life <= 0) fireworks.splice(i, 1);
        }

        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            ft.y -= 2.5;
            ft.life -= 0.02;
            if(ft.life <= 0) floatingTexts.splice(i, 1);
        }

        // --- STATE: MINIGAME (Falling Gems & Spikes) ---
        if (gameState === 'minigame') {
            bonusTimer++;
            
            // DIRECT ASSIGNMENT for zero-lag feeling
            let targetPx = pointerX;
            if(targetPx < 40) targetPx = 40;
            if(targetPx > VW - 40) targetPx = VW - 40;
            
            player.vx = targetPx - player.x; // Track speed for tilt animation
            player.x = targetPx;

            // DIFFICULTY SCALING: 10s wait, then scales up to 2.5x speed
            let difficultyMultiplier = 1;
            if (bonusTimer > 600) { // After 10 seconds (600 frames)
                difficultyMultiplier = 1 + ((bonusTimer - 600) / (bonusDuration - 600)) * 1.5; 
            }

            // Spawn Items
            if (Math.random() < 0.03 * (1 + (difficultyMultiplier-1)*0.5)) {
                bonusItems.push({
                    x: 50 + Math.random() * (VW - 100),
                    y: -100,
                    vy: (Math.random() * 2 + 2.5) * difficultyMultiplier, 
                    type: 'gem',
                    hue: Math.random() > 0.5 ? 180 : (Math.random() > 0.5 ? 300 : 50)
                });
            }
            if (Math.random() < 0.015 * (1 + (difficultyMultiplier-1)*0.5)) { 
                bonusItems.push({
                    x: 50 + Math.random() * (VW - 100),
                    y: -100,
                    vy: (Math.random() * 2.5 + 3) * difficultyMultiplier, 
                    type: 'spike',
                    rot: 0
                });
            }

            // Update & Collision
            for (let i = bonusItems.length - 1; i >= 0; i--) {
                let item = bonusItems[i];
                item.y += item.vy;
                if(item.type === 'spike') item.rot += 0.05; // Spikes rotate
                
                if (item.y > player.y - player.height && item.y < player.y &&
                    item.x > player.x - 30 && item.x < player.x + 30) {
                    
                    if (item.type === 'gem') {
                        sfxBonusGem();
                        diamonds++;
                        document.getElementById('score-display').innerText = `💎 ${diamonds}`;
                        floatingTexts.push({x: player.x, y: player.y - 120, text: "+1", life: 1});
                        createDust(item.x, item.y, 5);
                        bonusItems.splice(i, 1);
                    } else if (item.type === 'spike') {
                        sfxBonusSpike();
                        screenShake(15);
                        createDust(item.x, item.y, 20);
                        endMinigame(true); 
                        return;
                    }
                } else if (item.y > VH + 50) {
                    bonusItems.splice(i, 1); 
                }
            }

            if (bonusTimer > bonusDuration) {
                endMinigame(false); 
            }
            return; 
        }

        // --- POST GAME OVER/WIN ---
        if (gameState !== 'playing') {
            if ((gameState === 'gameover' || gameState === 'win') && Math.random() < (gameState==='win'?0.1:0.02)) {
                // Ensure fireworks appear within visible area
                createFirework(VW*0.1 + Math.random()*VW*0.8, VH*0.3 + (Math.random()-0.5)*300);
            }
            return;
        }

        // --- STATE: PLAYING (JUMPING) ---
        if (player.state === 'jumping') {
            player.x += player.vx;
            player.vy += gravity;
            player.y += player.vy;

            let targetX = player.jumpTargetX || (player.targetPlatform.x + player.targetPlatform.w/2);
            
            if (player.x >= targetX) {
                player.x = targetX;
                player.y = player.targetPlatform.y; 
                player.vx = 0;
                player.vy = 0;
                player.jumpTargetX = null;
                
                screenShake(8);

                if (player.targetPlatform.isPortal) {
                    // INSTANT TRANSITION TO MINIGAME
                    sfxWin();
                    player.state = 'idle';
                    gameState = 'minigame';
                    bonusTimer = 0;
                    bonusDuration = 60 * 60; // 1 minute
                    player.x = VW / 2;
                    player.y = VH - 50;
                    targetCameraX = 0;
                    cameraX = 0;
                    pointerX = player.x;
                    platforms = []; 
                    bonusItems = [];
                    
                    // Replace background with clean space and nebulas
                    backgroundElements = [];
                    for(let i=0; i<100; i++) {
                        backgroundElements.push({
                            x: Math.random() * VW,
                            y: Math.random() * VH,
                            size: Math.random() * 2 + 1,
                            speedY: Math.random() * 8 + 4
                        });
                    }

                    document.getElementById('bonus-banner').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('bonus-banner').style.display = 'none';
                    }, 3000);
                }
                else if (player.targetPlatform.answer === currentQuestion.ans) {
                    sfxCorrect();
                    player.state = 'idle';
                    diamonds += 1;
                    questionsAnswered++;
                    document.getElementById('score-display').innerText = `💎 ${diamonds}`;
                    
                    floatingTexts.push({x: player.x, y: player.y - 120, text: "+1 💎", life: 1});

                    platforms.forEach(p => {
                        if (p !== player.targetPlatform && !p.isBase) {
                            p.isCrumbling = true;
                        }
                    });

                    player.targetPlatform.isBase = true;
                    player.targetPlatform.answer = null; 
                    
                    platforms = platforms.filter(p => p === player.targetPlatform || p.isCrumbling);
                    
                    if(questionsAnswered < maxQuestions) {
                        generateMathQuestion();
                        generateLevelSet(player.targetPlatform.x);
                    } else {
                        // TRIGGER PORTAL
                        document.getElementById('top-bar').style.display = 'none';
                        
                        let portalX = player.targetPlatform.x + 350;
                        let portalY = player.targetPlatform.y; 
                        
                        let portalPlat = createPlatformObject(portalX, portalY, 200, true, null);
                        portalPlat.isPortal = true; 
                        platforms.push(portalPlat);
                        
                        setTimeout(() => {
                            sfxJump();
                            player.targetPlatform = portalPlat;
                            player.jumpTargetX = portalX + 100;
                            let dx = player.jumpTargetX - player.x;
                            let dy = portalY - player.y;
                            let T = Math.abs(dx) / 22;
                            player.vx = 22;
                            player.vy = (dy - 0.5 * gravity * T * T) / T;
                            player.state = 'jumping';
                        }, 1000);
                    }
                } else {
                    sfxWrong();
                    player.state = 'falling';
                    player.targetPlatform.isCrumbling = true;
                }
            }
        } 
        else if (player.state === 'falling') {
            if (player.targetPlatform) {
                player.y = player.targetPlatform.y;
                player.x = player.targetPlatform.x + player.targetPlatform.w/2;
            } else {
                player.vy += gravity;
                player.y += player.vy;
            }
            
            if (player.y > VH + 100) {
                loseGame();
            }
        }

        platforms.forEach(p => {
            if (p.isCrumbling) {
                p.vy += gravity * 0.4; 
                p.y += p.vy;
            }
        });

        for (let i = platforms.length - 1; i >= 0; i--) {
            if (platforms[i].y > VH + 300 || platforms[i].x < cameraX - 800) {
                platforms.splice(i, 1);
            }
        }
    }

    function endMinigame(hitSpike) {
        gameState = 'win';
        document.getElementById('top-bar').style.display = 'none';
        document.getElementById('win-score').innerText = diamonds;
        
        let titleEl = document.getElementById('win-title');
        let descEl = document.getElementById('win-desc');
        
        if(hitSpike) {
            titleEl.innerText = "OUCH!";
            titleEl.style.color = "#ff3333";
            descEl.innerText = "You hit a spike!";
        } else {
            titleEl.innerText = "TIME'S UP!";
            titleEl.style.color = "#00ffcc";
            descEl.innerText = "Bonus round complete!";
        }

        fwInterval = setInterval(() => {
            if(gameState !== 'win') clearInterval(fwInterval);
            createFirework(VW*0.1 + Math.random()*VW*0.8, VH*0.4 + (Math.random()-0.5)*400);
        }, 250);
        
        sfxWin();
        setTimeout(() => {
            document.getElementById('win-panel').classList.remove('hidden');
        }, 1500);
    }

    function createDust(x, y, amount) {
        for(let i=0; i<amount; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 50,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: -Math.random() * 5 - 1,
                size: Math.random() * 6 + 3,
                color: `rgba(200, 220, 200, ${Math.random()*0.5 + 0.3})`, 
                life: 1,
                decay: 0.03 + Math.random()*0.02,
                type: 'dust'
            });
        }
    }

    function createSplash(x, y, amount=30) {
        for(let i=0; i<amount; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 100,
                y: y,
                vx: (Math.random() - 0.5) * 12,
                vy: -Math.random() * 15 - 5,
                size: Math.random() * 10 + 4,
                color: Math.random() > 0.4 ? '#ffcc00' : '#ff3300', 
                life: 1,
                decay: 0.02,
                type: 'splash'
            });
        }
    }

    function createFirework(x, y) {
        let count = 40 + Math.random()*20; 
        let hues = [0, 60, 180, 280, 320, 120]; 
        let hue = hues[Math.floor(Math.random()*hues.length)];
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 14 + 4;
            fireworks.push({
                x: x, y: y, px: x, py: y,
                vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
                life: 1.0, decay: Math.random()*0.02 + 0.015,
                color: `hsl(${hue + (Math.random()-0.5)*20}, 100%, 65%)`
            });
        }
    }

    // --- ENHANCED DRAWING (Optimized Flat Shading) ---
    function darken(hex, percent) {
        let num = parseInt(hex.replace("#",""),16),
        amt = Math.round(2.55 * percent),
        R = (num >> 16) - amt,
        B = (num >> 8 & 0x00FF) - amt,
        G = (num & 0x0000FF) - amt;
        return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (B<255?B<1?0:B:255)*0x100 + (G<255?G<1?0:G:255)).toString(16).slice(1);
    }

    function drawOrganicLimb(ctx, startX, startY, thickBase, thickEnd, length, angle, color1, highlight1, isLeg) {
        ctx.save();
        ctx.translate(startX, startY);
        ctx.rotate(angle);
        
        ctx.fillStyle = color1; 
        
        ctx.beginPath();
        ctx.moveTo(-thickBase/2, 0);
        ctx.lineTo(thickBase/2, 0);
        ctx.quadraticCurveTo(thickBase/2, length/4, thickEnd/2, length/2);
        ctx.lineTo(-thickEnd/2, length/2);
        ctx.quadraticCurveTo(-thickBase/2, length/4, -thickBase/2, 0);
        ctx.fill();

        ctx.strokeStyle = highlight1; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(thickEnd/4, 5); ctx.lineTo(thickEnd/4, length/2-5); ctx.stroke();

        ctx.beginPath(); ctx.arc(0, length/2, thickEnd/2, 0, Math.PI*2); ctx.fill();

        ctx.translate(0, length/2);
        ctx.rotate(-angle * 0.2); 

        ctx.beginPath();
        ctx.moveTo(-thickEnd/2, 0);
        ctx.lineTo(thickEnd/2, 0);
        ctx.quadraticCurveTo(thickEnd/2, length/4, (thickEnd*0.8)/2, length/2);
        ctx.lineTo(-(thickEnd*0.8)/2, length/2);
        ctx.quadraticCurveTo(-thickEnd/2, length/4, -thickEnd/2, 0);
        ctx.fill();

        ctx.translate(0, length/2);
        if(isLeg) { 
            ctx.fillStyle = "#4a2c14";
            ctx.beginPath();
            ctx.roundRect(-thickEnd/2 - 4, 0, thickEnd + 12, 18, 5);
            ctx.fill();
            
            ctx.fillStyle = "#111";
            ctx.fillRect(-thickEnd/2 - 3, 14, thickEnd + 10, 6);
            
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(-thickEnd/2 + 2, 4, 6, 2);
            ctx.fillRect(-thickEnd/2 + 3, 9, 6, 2);
            ctx.fillStyle = "#2d1b0b";
            ctx.fillRect(-thickEnd/2 - 4, 0, 7, 14); 
        } else { 
            ctx.fillStyle = "#fcd4b1"; 
            ctx.beginPath();
            ctx.arc(0, 3, thickEnd/2, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }

    function drawRealisticPlayer(ctx, px, py) {
        ctx.save();
        ctx.translate(px, py);
        
        const h = player.height;
        const headR = 10;
        const torsoH = 42;
        const legH = 50;
        
        let legAngle1 = 0, legAngle2 = 0;
        let armAngle1 = 0, armAngle2 = 0;
        let bodyTilt = 0;

        if (player.state === 'idle' || player.state === 'falling') {
            legAngle1 = Math.PI / 15;
            legAngle2 = -Math.PI / 12;
            armAngle1 = -Math.PI / 10;
            armAngle2 = Math.PI / 8;
            if (player.state === 'falling') {
                armAngle1 = -Math.PI / 1.5;
                armAngle2 = -Math.PI / 1.2;
                legAngle1 = -Math.PI / 4;
            }
        } else if (player.state === 'jumping') {
            bodyTilt = Math.PI / 8;
            if(player.vy < -5) {
                legAngle1 = -Math.PI / 3.5; 
                legAngle2 = Math.PI / 3;  
                armAngle1 = Math.PI / 1.8;  
                armAngle2 = -Math.PI / 2;
            } else if (player.vy > 5) {
                legAngle1 = Math.PI / 6; 
                legAngle2 = Math.PI / 8;
                armAngle1 = -Math.PI / 2.5;
                armAngle2 = -Math.PI / 4;
                bodyTilt = Math.PI / 12;
            } else {
                legAngle1 = -Math.PI / 15; 
                legAngle2 = Math.PI / 5;
                armAngle1 = Math.PI / 7; 
                armAngle2 = -Math.PI / 4;
            }
        }

        if (gameState === 'minigame') {
            bodyTilt = player.vx * 0.02; 
            let walkCycle = Math.sin(backgroundTime * 10);
            if(Math.abs(player.vx) > 3) {
                legAngle1 = walkCycle * 0.6;
                legAngle2 = -walkCycle * 0.6;
                armAngle1 = -walkCycle * 0.6;
                armAngle2 = walkCycle * 0.6;
            } else {
                legAngle1 = Math.PI/10; legAngle2 = -Math.PI/10;
                armAngle1 = -Math.PI/8; armAngle2 = Math.PI/8;
            }
        }

        ctx.rotate(bodyTilt);

        const skinColor = "#fcd4b1";
        const jacketColor = "#185f80"; 
        const jacketHi = "#2b8cb8";
        const pantsColor = "#2d3436"; 
        const pantsHi = "#4a5356";
        const backpackMain = "#e86a17"; 
        const backpackSub = "#ff8e42";

        // Backpack 
        ctx.fillStyle = backpackMain;
        ctx.beginPath();
        ctx.roundRect(-32, -h + headR*2, 24, 40, 8);
        ctx.fill();
        ctx.fillStyle = darken(backpackMain, 20);
        ctx.beginPath();
        ctx.roundRect(-36, -h + headR*2 + 10, 10, 22, 4);
        ctx.fill();
        
        ctx.fillStyle = "#2d3e33"; 
        ctx.beginPath();
        ctx.roundRect(-34, -h + headR*2 + 40, 30, 16, 5);
        ctx.fill();

        // Limbs Back 
        drawOrganicLimb(ctx, 3, -legH, 16, 12, legH, legAngle2, darken(pantsColor, 15), darken(pantsHi, 15), true);
        drawOrganicLimb(ctx, -3, -h + headR*2 + 5, 12, 9, 34, armAngle2, darken(jacketColor, 20), darken(jacketHi, 20), false);

        // Torso 
        ctx.fillStyle = jacketColor;
        ctx.beginPath();
        ctx.moveTo(-13, -h + headR*2);
        ctx.lineTo(13, -h + headR*2);
        ctx.quadraticCurveTo(15, -h + headR*2 + torsoH/2, 13, -h + headR*2 + torsoH);
        ctx.lineTo(-13, -h + headR*2 + torsoH);
        ctx.quadraticCurveTo(-15, -h + headR*2 + torsoH/2, -13, -h + headR*2);
        ctx.fill();

        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(-14, -h + headR*2 + torsoH - 9, 28, 9); 
        ctx.fillStyle = "#ffd700"; 
        ctx.fillRect(4, -h + headR*2 + torsoH - 8, 8, 7); 
        ctx.fillStyle = darken(jacketColor, 30);
        ctx.fillRect(2, -h + headR*2 + 12, 8, 10); 

        ctx.beginPath(); 
        ctx.moveTo(-6, -h + headR*2); ctx.lineTo(-10, -h + headR*2 + torsoH/2);
        ctx.lineWidth = 5; ctx.strokeStyle = "#111"; ctx.stroke(); 

        ctx.fillStyle = darken(skinColor, 20);
        ctx.fillRect(-4, -h + headR*1.8, 9, 8); 

        // Face Profile
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(0, -h + headR, headR, Math.PI * 0.5, Math.PI * 1.5); 
        ctx.quadraticCurveTo(headR * 1.1, -h + headR - headR, headR * 1.1, -h + headR); 
        ctx.lineTo(headR * 1.4, -h + headR + 2); 
        ctx.lineTo(headR * 0.8, -h + headR + 4); 
        ctx.quadraticCurveTo(headR, -h + headR + 8, 0, -h + headR*2); 
        ctx.fill();
        
        ctx.fillStyle = "#221100";
        ctx.beginPath(); 
        ctx.arc(headR-1, -h + headR - 1, 1.5, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#a05a45"; ctx.lineWidth = 1.5;
        ctx.beginPath(); 
        ctx.arc(headR-2, -h + headR + 3, 2.5, 0, Math.PI/2);
        ctx.stroke();

        // Hair
        const hairColor = "#3d2212"; 
        ctx.fillStyle = hairColor;
        ctx.beginPath(); 
        ctx.arc(-1, -h + headR - 2, headR + 2.5, Math.PI*0.7, Math.PI*2.5);
        ctx.fill();
        
        let hairSway;
        if (gameState === 'minigame') {
            hairSway = Math.max(-12, Math.min(12, player.vx * -0.5));
        } else if (player.state === 'jumping' || player.state === 'falling') {
            hairSway = Math.max(-12, Math.min(12, player.vy * -1));
        } else {
            hairSway = Math.sin(backgroundTime*2.5)*3;
        }

        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.strokeStyle = hairColor;
        ctx.beginPath();
        ctx.moveTo(-headR+2, -h + headR + 2);
        let controlX = -22 + hairSway*0.4;
        let controlY = -h + headR + 22 + Math.abs(hairSway)*0.5; 
        ctx.quadraticCurveTo(-26, -h + headR + 15, controlX, controlY);
        ctx.stroke();
        
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#6b3b1f";
        ctx.beginPath();
        ctx.moveTo(-headR+2, -h + headR + 2);
        ctx.quadraticCurveTo(-26, -h + headR + 15, controlX, controlY);
        ctx.stroke();

        // Limbs Front
        drawOrganicLimb(ctx, 0, -legH, 18, 13, legH, legAngle1, pantsColor, pantsHi, true);
        drawOrganicLimb(ctx, 8, -h + headR*2 + 5, 14, 10, 35, armAngle1, jacketColor, jacketHi, false);

        ctx.restore();
    }

    function drawCaveBackground() {
        let startDraw = -offsetX/scale;
        let endDraw = VW + offsetX/scale;
        
        ctx.fillStyle = "#160729";
        ctx.fillRect(startDraw, 0, endDraw - startDraw, VH); 

        backgroundElements.forEach(el => {
            let px = el.x - cameraX * el.parallax;
            if(px + 300 < startDraw || px > endDraw + 300) return;

            if (el.type === 'crystal') {
                ctx.fillStyle = `hsla(${el.hue}, 90%, 65%, 0.5)`;
                ctx.beginPath();
                ctx.moveTo(px, el.y - el.size*1.6);
                ctx.lineTo(px + el.size*0.6, el.y);
                ctx.lineTo(px, el.y + el.size*2);
                ctx.lineTo(px - el.size*0.6, el.y);
                ctx.fill();
            } else {
                let isFront = el.type === 'pillar_front';
                ctx.fillStyle = isFront ? "#2a0d42" : "#1a062e";
                ctx.beginPath();
                ctx.moveTo(px, 0);
                for(let y=0; y<=VH; y+=150) { 
                    ctx.lineTo(px + Math.sin(y/(isFront?60:90))* (isFront?20:10), y);
                }
                ctx.lineTo(px + el.width, VH);
                for(let y=VH; y>=0; y-=150) {
                    ctx.lineTo(px + el.width + Math.sin(y/(isFront?50:80))* (isFront?20:10), y);
                }
                ctx.fill();
            }
        });
    }

    function drawSpaceBackground() {
        let startDraw = -offsetX/scale;
        let endDraw = VW + offsetX/scale;
        
        let bgGrad = ctx.createLinearGradient(0, 0, 0, VH);
        bgGrad.addColorStop(0, "#050011"); 
        bgGrad.addColorStop(1, "#20003b"); 
        ctx.fillStyle = bgGrad;
        ctx.fillRect(startDraw, 0, endDraw - startDraw, VH); 

        // Nebula Effects
        let neb1 = ctx.createRadialGradient(VW*0.3, VH*0.3, 0, VW*0.3, VH*0.3, 400);
        neb1.addColorStop(0, "rgba(100, 0, 200, 0.15)");
        neb1.addColorStop(1, "rgba(100, 0, 200, 0)");
        ctx.fillStyle = neb1;
        ctx.fillRect(startDraw, 0, endDraw - startDraw, VH);

        let neb2 = ctx.createRadialGradient(VW*0.8, VH*0.7, 0, VW*0.8, VH*0.7, 500);
        neb2.addColorStop(0, "rgba(0, 150, 255, 0.1)");
        neb2.addColorStop(1, "rgba(0, 150, 255, 0)");
        ctx.fillStyle = neb2;
        ctx.fillRect(startDraw, 0, endDraw - startDraw, VH);

        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        backgroundElements.forEach(el => {
            // Fixed star wrapping logic for absolute space
            let px = el.x;
            ctx.beginPath();
            ctx.arc(px, el.y, el.size * 0.5, 0, Math.PI*2);
            ctx.fill();
        });
    }

    function drawPlatform(p) {
        let drawX = p.x;
        let startDraw = -offsetX/scale + cameraX;
        let endDraw = VW + offsetX/scale + cameraX;
        if (drawX + p.w < startDraw - 200 || drawX > endDraw + 200) return;

        ctx.save();
        ctx.translate(drawX, p.y);

        if (p.isCrumbling) {
            ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
        }

        let w = p.w;
        let h = p.blockHeight; 
        
        let fTopL = {x: 0, y: 0};
        let fTopR = {x: w * 0.85, y: 0};
        let fBotR = {x: w * 0.7, y: h * 0.8};
        let fBotC = {x: w * 0.4, y: h};
        let fBotL = {x: w * 0.1, y: h * 0.85};

        let sTopR = {x: w, y: -20};
        let sBotR = {x: w * 0.85, y: h * 0.75};

        // Side Face
        ctx.fillStyle = "#3e2723";
        ctx.beginPath();
        ctx.moveTo(fTopR.x, fTopR.y);
        ctx.lineTo(sTopR.x, sTopR.y);
        ctx.lineTo(sBotR.x, sBotR.y);
        ctx.lineTo(fBotR.x, fBotR.y);
        ctx.fill();

        // Front Face
        ctx.fillStyle = "#5d4037";
        ctx.beginPath();
        ctx.moveTo(fTopL.x, fTopL.y);
        for(let i=0; i<p.shape.length; i++) {
            ctx.lineTo(p.shape[i].x * 0.85, p.shape[i].y);
        }
        ctx.lineTo(fBotR.x, fBotR.y);
        ctx.lineTo(fBotC.x, fBotC.y);
        ctx.lineTo(fBotL.x, fBotL.y);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(100, 20, 0, 0.4)"; 
        ctx.beginPath();
        ctx.moveTo(fTopL.x, fTopL.y + h*0.5);
        ctx.lineTo(fTopR.x, fTopR.y + h*0.5);
        ctx.lineTo(fBotR.x, fBotR.y);
        ctx.lineTo(fBotC.x, fBotC.y);
        ctx.lineTo(fBotL.x, fBotL.y);
        ctx.fill();

        // Cracks
        ctx.strokeStyle = "rgba(0,0,0,0.6)";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        p.cracks.forEach(c => {
            let cx = c.x * 0.85;
            ctx.moveTo(cx, 0); 
            ctx.lineTo(cx + 10, c.len*0.3); 
            ctx.lineTo(cx - 5, c.len*0.6); 
            ctx.lineTo(cx + 5, c.len);
        });
        ctx.stroke();

        // Moss 
        ctx.fillStyle = p.mossColor;
        ctx.beginPath();
        ctx.moveTo(fTopL.x, fTopL.y);
        for(let i=0; i<p.shape.length; i++) { 
            ctx.lineTo(p.shape[i].x * 0.85, p.shape[i].y); 
        }
        for(let i=p.shape.length-1; i>=0; i--) { 
            ctx.lineTo(p.shape[i].x * 0.85, p.shape[i].y + p.hangingMoss[i] * 0.8); 
        }
        ctx.fill();

        // Portal Effect 
        if (p.isPortal) {
            ctx.save();
            ctx.translate(w*0.425, -20); 
            ctx.scale(1, 0.4); 
            ctx.rotate(backgroundTime * 2);
            for(let i=0; i<4; i++) {
                ctx.fillStyle = `hsla(${280 + i*20}, 100%, 50%, ${0.8 - i*0.15})`;
                ctx.beginPath();
                ctx.arc(0, 0, 80 - i*15, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
        } 
        else if (p.answer !== null) {
            let rx = w * 0.425;
            let ry = h * 0.4;
            ctx.font = "900 65px Poppins, sans-serif"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillText(p.answer, rx, ry + 4);
            
            ctx.strokeStyle = "#ff6600";
            ctx.lineWidth = 8;
            ctx.strokeText(p.answer, rx, ry);
            ctx.fillStyle = "#ffaa00";
            ctx.fillText(p.answer, rx, ry);
            ctx.fillStyle = "#ffffff"; 
            ctx.font = "900 60px Poppins, sans-serif"; 
            ctx.fillText(p.answer, rx, ry);
        }

        ctx.restore();
    }

    function drawBonusItems() {
        bonusItems.forEach(item => {
            ctx.save();
            // Draw item directly without subtracting offsetX to fix absolute positioning
            ctx.translate(item.x, item.y);
            
            if (item.type === 'gem') {
                let hue = item.hue;
                ctx.fillStyle = `hsl(${hue}, 100%, 40%)`;
                ctx.beginPath(); ctx.moveTo(-15, -5); ctx.lineTo(15, -5); ctx.lineTo(0, 25); ctx.fill();
                
                ctx.fillStyle = `hsl(${hue}, 100%, 80%)`;
                ctx.beginPath(); ctx.moveTo(-10, -20); ctx.lineTo(10, -20); ctx.lineTo(15, -5); ctx.lineTo(-15, -5); ctx.fill();
                
                ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                ctx.beginPath(); ctx.moveTo(-15, -5); ctx.lineTo(0, -5); ctx.lineTo(0, 25); ctx.fill();
                
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.beginPath(); ctx.moveTo(15, -5); ctx.lineTo(0, -5); ctx.lineTo(0, 25); ctx.fill();
                
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.moveTo(-10, -20); ctx.lineTo(0, -20); ctx.lineTo(0, -5); ctx.lineTo(-15, -5); ctx.fill();
            } 
            else if (item.type === 'spike') {
                ctx.rotate(item.rot);
                
                let ballGrad = ctx.createRadialGradient(-5, -5, 2, 0, 0, 18);
                ballGrad.addColorStop(0, "#aaa");
                ballGrad.addColorStop(0.5, "#444");
                ballGrad.addColorStop(1, "#111");
                
                ctx.fillStyle = ballGrad;
                ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = "#555";
                for(let i=0; i<8; i++) {
                    ctx.save();
                    ctx.rotate(i * Math.PI/4);
                    ctx.beginPath();
                    ctx.moveTo(-5, 15); ctx.lineTo(5, 15); ctx.lineTo(0, 28); ctx.fill();
                    ctx.fillStyle = "#999";
                    ctx.beginPath();
                    ctx.moveTo(-5, 15); ctx.lineTo(0, 15); ctx.lineTo(0, 28); ctx.fill();
                    ctx.fillStyle = "#555"; 
                    ctx.restore();
                }
                
                ctx.restore(); 
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.fillStyle = "#ff0000";
                ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ffaa00";
                ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fill();
            }
            
            ctx.restore();
        });
    }

    function render() {
        let shakeX = (Math.random() - 0.5) * cameraShake;
        let shakeY = (Math.random() - 0.5) * cameraShake;
        
        ctx.save(); 
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        
        if (gameState === 'minigame') {
            drawSpaceBackground();
            
            ctx.save();
            ctx.translate(shakeX, shakeY);
            
            let startDraw = -offsetX/scale;
            let endDraw = VW + offsetX/scale;
            
            // Minigame Floor
            ctx.fillStyle = "#1a0b2e";
            ctx.fillRect(startDraw, VH-50, endDraw - startDraw, 50);
            ctx.fillStyle = "#ff00ff";
            ctx.fillRect(startDraw, VH-50, endDraw - startDraw, 5);

            // ONLY draw player if not gameover/win
            if (gameState !== 'gameover' && gameState !== 'win') {
                drawRealisticPlayer(ctx, player.x, player.y);
            }
            drawBonusItems();
            
            ctx.restore();

        } else {
            drawCaveBackground();

            ctx.save();
            ctx.translate(-cameraX + shakeX, shakeY);

            let startDraw = -offsetX/scale + cameraX - 200;
            let endDraw = VW + offsetX/scale + cameraX + 200;

            // Boiling Lava
            ctx.fillStyle = "#8a1c00";
            ctx.fillRect(startDraw, VH - 100, endDraw - startDraw, 150);

            for(let j=0; j<2; j++) { 
                let lavaColor = j===0 ? '#ffcc00' : '#ff5500';
                ctx.fillStyle = lavaColor;
                ctx.beginPath();
                ctx.moveTo(startDraw, VH);
                
                let speed = backgroundTime * (2.5 + j*0.6);
                let heightBase = VH - 80 + j * 30;
                
                for(let x = startDraw; x <= endDraw; x += 50) { 
                    let wave = Math.sin((x + cameraX*0.2)/(70 + j*15) + speed) * (18 + j*6);
                    ctx.lineTo(x, heightBase + wave);
                }
                ctx.lineTo(endDraw, VH);
                ctx.fill();
            }

            lavaBubbles.forEach(b => {
                let px = b.x;
                if(px < startDraw || px > endDraw) return;
                
                let py = b.y - (b.life * 60 * b.speed); 
                let size = b.size * (1 + b.life*0.5); 
                
                if (b.life < 0.9) {
                    ctx.fillStyle = "#ffcc00"; 
                    ctx.beginPath(); ctx.arc(px, py, size, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.strokeStyle = "#ffaa00"; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(px, py, size * 1.5, 0, Math.PI*2); ctx.stroke();
                }
            });

            platforms.forEach(p => drawPlatform(p));

            // ONLY draw player if not gameover/win
            if (gameState !== 'gameover' && gameState !== 'win') {
                drawRealisticPlayer(ctx, player.x, player.y);
            }

            ctx.fillStyle = "rgba(200, 200, 200, 0.6)";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            
            ctx.restore(); 
        }

        floatingTexts.forEach(ft => {
            ctx.globalAlpha = ft.life;
            ctx.font = "900 45px Poppins, sans-serif";
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffcc00";
            let fx = gameState === 'minigame' ? ft.x : ft.x - cameraX;
            ctx.fillText(ft.text, fx, ft.y);
            ctx.globalAlpha = 1.0;
        });

        // Fast Motion Trail Fireworks
        ctx.lineCap = "round";
        fireworks.forEach(f => {
            let fx = gameState === 'minigame' ? f.x : f.x - cameraX;
            let fpx = gameState === 'minigame' ? f.px : f.px - cameraX;

            // Fake glow 
            ctx.strokeStyle = f.color;
            ctx.lineWidth = 12;
            ctx.globalAlpha = f.life * 0.2;
            ctx.beginPath(); ctx.moveTo(fpx, f.py); ctx.lineTo(fx, f.y); ctx.stroke();

            // Core line
            ctx.lineWidth = 4;
            ctx.globalAlpha = f.life;
            ctx.beginPath(); ctx.moveTo(fpx, f.py); ctx.lineTo(fx, f.y); ctx.stroke();
            
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(fx, f.y, 2, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;
        
        // Draw Minigame UI Overlay
        if(gameState === 'minigame') {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.beginPath(); ctx.roundRect(VW/2 - 200, 20, 400, 45, 10); ctx.fill();
            
            let timeRatio = 1 - (bonusTimer / bonusDuration);
            ctx.fillStyle = timeRatio > 0.2 ? "#00ffcc" : "#ff3366";
            ctx.beginPath(); ctx.roundRect(VW/2 - 195, 25, 390 * timeRatio, 35, 8); ctx.fill();
            
            ctx.font = "900 24px Poppins, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#fff";
            ctx.fillText("TIME REMAINING", VW/2, 42);
        }
        
        ctx.restore(); 
    }

    function endMinigame(hitSpike) {
        gameState = 'win';
        document.getElementById('top-bar').style.display = 'none';
        document.getElementById('win-score').innerText = diamonds;
        
        let titleEl = document.getElementById('win-title');
        let descEl = document.getElementById('win-desc');
        
        if(hitSpike) {
            titleEl.innerText = "OUCH!";
            titleEl.style.color = "#ff3333";
            descEl.innerText = "You hit a spike!";
        } else {
            titleEl.innerText = "TIME'S UP!";
            titleEl.style.color = "#00ffcc";
            descEl.innerText = "Bonus round complete!";
        }

        fwInterval = setInterval(() => {
            if(gameState !== 'win') clearInterval(fwInterval);
            createFirework(VW*0.1 + Math.random()*VW*0.8, VH*0.4 + (Math.random()-0.5)*400);
        }, 250);
        
        sfxWin();
        setTimeout(() => {
            document.getElementById('win-panel').classList.remove('hidden');
        }, 1500);
    }

    // --- GAME LOOP ---
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        update();
        render();
        requestAnimationFrame(loop);
    }

    // --- UI CONTROLS ---
    function startGame() {
        initAudio();
        document.getElementById('start-panel').classList.add('hidden');
        document.getElementById('question-board').style.display = 'flex';
        document.getElementById('top-bar').style.display = 'flex';
        initLevel();
        gameState = 'playing';
    }

    function loseGame() {
        gameState = 'gameover';
        sfxLose();
        document.getElementById('final-score').innerText = diamonds;
        setTimeout(() => {
            document.getElementById('game-over-panel').classList.remove('hidden');
            document.getElementById('top-bar').style.display = 'none';
        }, 1200);
    }

    function resetGame() {
        initAudio();
        document.getElementById('game-over-panel').classList.add('hidden');
        document.getElementById('win-panel').classList.add('hidden');
        document.getElementById('start-panel').classList.remove('hidden');
        gameState = 'start';
    }

    // Initial render
    currentMathRange = 20;
    generateBackgroundElements();
    generateMathQuestion(); 
    generateLevelSet(200);
    requestAnimationFrame(loop);

</script>
</body>
</html>
