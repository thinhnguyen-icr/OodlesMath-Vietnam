<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Kids Math Game V5</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* 3D Button Styles */
    .btn-3d {
      transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .btn-3d:active:not(:disabled) {
      transform: translateY(6px);
      box-shadow: none !important;
      border-bottom-width: 2px !important;
      margin-top: 6px;
      margin-bottom: -6px;
    }

    /* Animations */
    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
    .animate-wiggle { animation: wiggle 2s ease-in-out infinite; }
    .animate-wiggle-fast { animation: wiggle 0.3s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 2.5s ease-in-out infinite; }

    @keyframes cloud-fly {
      0% { transform: translateX(-15vw); }
      100% { transform: translateX(115vw); }
    }
    .animate-cloud-fast { animation: cloud-fly 30s linear infinite; }
    .animate-cloud-med { animation: cloud-fly 45s linear infinite; }
    .animate-cloud-slow { animation: cloud-fly 60s linear infinite; }

    @keyframes sun-pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 80px rgba(255,209,102,1); }
    }
    .animate-sun { animation: sun-pulse 4s ease-in-out infinite; }

    @keyframes confetti-fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: absolute;
      animation: confetti-fall linear infinite;
    }

    @keyframes ping-slow {
      0% { transform: scale(1); opacity: 0.8; }
      75%, 100% { transform: scale(2); opacity: 0; }
    }
    .animate-ping-slow { animation: ping-slow 1s cubic-bezier(0, 0, 0.2, 1) infinite; }

    /* Visual Polish */
    .emoji-shadow { filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.15)); }
    .text-shadow { text-shadow: 0px 2px 4px rgba(0,0,0,0.1); }
    
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative bg-sky-200">

  <!-- ================= SCENERY BACKGROUND ================= -->
  <div class="fixed inset-0 z-[-1] overflow-hidden bg-gradient-to-b from-[#6EE2FF] to-[#C9F0FF]">
    <!-- Sun (Moved to Left) -->
    <div class="absolute top-8 sm:top-16 left-8 sm:left-24 w-20 h-20 sm:w-32 sm:h-32 bg-[#FFD166] rounded-full shadow-[0_0_50px_rgba(255,209,102,0.8)] animate-sun"></div>

    <!-- Rainbow -->
    <svg class="absolute bottom-[20%] left-1/2 -translate-x-1/2 w-[150%] min-w-[800px] max-w-[1400px] opacity-60" viewBox="0 0 100 50">
      <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#EF476F" stroke-width="3"/>
      <path d="M 13 50 A 37 37 0 0 1 87 50" fill="none" stroke="#F78C6B" stroke-width="3"/>
      <path d="M 16 50 A 34 34 0 0 1 84 50" fill="none" stroke="#FFD166" stroke-width="3"/>
      <path d="M 19 50 A 31 31 0 0 1 81 50" fill="none" stroke="#06D6A0" stroke-width="3"/>
      <path d="M 22 50 A 28 28 0 0 1 78 50" fill="none" stroke="#118AB2" stroke-width="3"/>

    </svg>

    <!-- Clouds -->
    <svg class="absolute top-[10%] text-white opacity-90 animate-cloud-med w-24 sm:w-36 drop-shadow-md" viewBox="0 0 24 24" style="animation-delay: -5s;"><path fill="currentColor" d="M17.5,19c2.48,0,4.5-2.02,4.5-4.5c0-2.33-1.78-4.25-4.06-4.47c-0.65-2.9-3.26-5.03-6.44-5.03c-2.81,0-5.21,1.75-6.19,4.24C2.5,9.45,0.5,11.83,0.5,14.5C0.5,17.53,2.97,20,6,20h11.5V19z"/></svg>
    <svg class="absolute top-[25%] text-white opacity-80 animate-cloud-slow w-32 sm:w-48 drop-shadow-md" viewBox="0 0 24 24" style="animation-delay: -30s;"><path fill="currentColor" d="M17.5,19c2.48,0,4.5-2.02,4.5-4.5c0-2.33-1.78-4.25-4.06-4.47c-0.65-2.9-3.26-5.03-6.44-5.03c-2.81,0-5.21,1.75-6.19,4.24C2.5,9.45,0.5,11.83,0.5,14.5C0.5,17.53,2.97,20,6,20h11.5V19z"/></svg>
    <svg class="absolute top-[5%] text-white opacity-80 animate-cloud-fast w-20 sm:w-28 drop-shadow-md" viewBox="0 0 24 24" style="animation-delay: -15s;"><path fill="currentColor" d="M17.5,19c2.48,0,4.5-2.02,4.5-4.5c0-2.33-1.78-4.25-4.06-4.47c-0.65-2.9-3.26-5.03-6.44-5.03c-2.81,0-5.21,1.75-6.19,4.24C2.5,9.45,0.5,11.83,0.5,14.5C0.5,17.53,2.97,20,6,20h11.5V19z"/></svg>

    <!-- Grass Layers -->

      <path fill="#7ED321" d="M0,160L48,154.7C96,149,192,139,288,144C384,149,480,171,576,176C672,181,768,171,864,149.3C960,128,1056,96,1152,90.7C1248,85,1344,107,1392,117.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg class="absolute bottom-0 w-full h-[15vh] sm:h-[20vh]" preserveAspectRatio="none" viewBox="0 0 1440 320">
      <path fill="#52B700" d="M0,224L60,208C120,192,240,160,360,160C480,160,600,192,720,202.7C840,213,960,203,1080,186.7C1200,171,1320,149,1380,138.7L1440,128L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
    </svg>

    <!-- Flowers -->
    <div class="absolute bottom-0 w-full h-[15vh] overflow-hidden pointer-events-none">
      <span class="absolute bottom-[20%] left-[5%] text-2xl sm:text-4xl animate-wiggle">🌸</span>
      <span class="absolute bottom-[40%] left-[25%] text-xl sm:text-3xl animate-wiggle" style="animation-delay: 0.4s">🌼</span>
      <span class="absolute bottom-[15%] left-[50%] text-3xl sm:text-5xl animate-wiggle" style="animation-delay: 1s">🌻</span>
      <span class="absolute bottom-[30%] left-[75%] text-2xl sm:text-4xl animate-wiggle" style="animation-delay: 0.6s">🌷</span>
      <span class="absolute bottom-[10%] left-[90%] text-3xl sm:text-5xl animate-wiggle" style="animation-delay: 0.2s">🌺</span>

  <!-- ================= END SCENERY ================= -->

  <!-- SVG Sprite -->

    <symbol id="icon-star" viewBox="0 0 24 24"><path fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></symbol>

    <symbol id="icon-trophy" viewBox="0 0 24 24"><path fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M8 21h8M12 17v4M7 4h10M5 4h14c1.1 0 2 .9 2 2v2c0 3.3-2.7 6-6 6h-6c-3.3 0-6-2.7-6-6V6c0-1.1.9-2 2-2z"/></symbol>

    <symbol id="icon-vol-on" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M11 5L6 9H2v6h4l5 4V5z"/><path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></symbol>
    <symbol id="icon-vol-off" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M11 5L6 9H2v6h4l5 4V5z"/><line fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" x1="23" y1="9" x2="17" y2="15"/><line fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" x1="17" y1="9" x2="23" y2="15"/></symbol>
    <symbol id="icon-sparkles" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></symbol>
  </svg>

  <!-- Tailwind Color Safelist -->
  <div class="hidden bg-rose-100/90 text-rose-500 bg-orange-100/90 text-orange-500 bg-sky-100/90 text-sky-500 bg-purple-100/90 text-purple-500 bg-yellow-100/90 text-yellow-600 bg-indigo-100/90 text-indigo-500 bg-pink-100/90 text-pink-500 bg-emerald-100/90 text-emerald-600"></div>

  <!-- ================= SCREEN 1: START ================= -->
  <div id="start-screen" class="w-full min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl p-8 md:p-12 text-center max-w-md w-full border-4 border-white animate-float">
      <div class="bg-sky-100 w-28 h-28 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border-4 border-sky-50">
        <svg class="w-16 h-16 text-yellow-400 drop-shadow-md"><use href="#icon-star"></use></svg>
      </div>
      <h1 class="text-4xl md:text-5xl font-black text-slate-800 mb-4 tracking-tight">Math Magic</h1>
      <p class="text-slate-500 font-medium mb-10 text-lg">Let's learn counting together!</p>
      
      <div class="flex justify-center gap-4 mb-10 text-5xl">
        <span class="emoji-shadow animate-float" style="animation-delay: 0s;">🐶</span>
        <span class="emoji-shadow animate-float" style="animation-delay: 0.2s;">🍎</span>
        <span class="emoji-shadow animate-float" style="animation-delay: 0.4s;">🚀</span>
      </div>
      
      <button onclick="startGame()" class="btn-3d w-full bg-[#58CC02] hover:bg-[#46A302] text-white text-2xl font-bold py-5 px-8 rounded-2xl shadow-[0_8px_0_#46A302] border-b-8 border-[#46A302] flex items-center justify-center gap-3">
        <svg class="w-8 h-8"><use href="#icon-play"></use></svg> Play Now!
      </button>
    </div>
  </div>

  <!-- ================= SCREEN 2: GAME ================= -->
  <div id="game-screen" class="hidden w-full min-h-screen flex flex-col items-center p-2 sm:p-6 pb-8">
    
    <!-- Top Header: Progress (Center) & Logo (Right) -->
    <div class="w-full max-w-4xl flex items-center justify-between sm:relative h-12 sm:h-16 mb-4 sm:mb-6 mt-2 px-2 z-10 gap-2">
      
      <!-- Invisible Spacer for Desktop balance -->
      <div class="hidden sm:block w-[80px] opacity-0 pointer-events-none"></div>

      <!-- Center: Progress Bar & Sound Icon -->
      <div class="flex items-center gap-2 sm:gap-3 sm:absolute sm:left-1/2 sm:-translate-x-1/2">
        <!-- Progress Bar -->
        <div class="flex items-center gap-1.5 sm:gap-2 bg-white/80 backdrop-blur-md p-1.5 sm:p-2 rounded-[1.25rem] shadow-md border-2 border-white/50 w-32 sm:w-48 md:w-56">
          <svg class="w-6 h-6 sm:w-8 sm:h-8 text-yellow-400 shrink-0 drop-shadow-sm"><use href="#icon-star"></use></svg>
          <div class="flex-1 bg-slate-200/70 h-3 sm:h-4 rounded-full overflow-hidden relative shadow-inner">
            <div id="progress-fill" class="bg-gradient-to-r from-[#58CC02] to-[#7ee02b] h-full rounded-full transition-all duration-500 ease-out w-0 relative">
              <div class="absolute top-0 left-0 w-full h-1/3 bg-white/40 rounded-full"></div>
            </div>
          </div>
          <span id="progress-text" class="font-bold text-slate-600 text-xs sm:text-sm md:text-base min-w-[3ch] text-center shrink-0">0/10</span>
        </div>

        <!-- Sound Button -->
        <button onclick="toggleSound()" class="bg-white/80 backdrop-blur-md p-2 sm:p-2.5 rounded-xl sm:rounded-[1.25rem] shadow-md border-2 border-white/50 text-slate-500 hover:text-slate-700 active:scale-95 transition-all shrink-0">
          <svg id="icon-sound" class="w-5 h-5 sm:w-6 sm:h-6"><use href="#icon-vol-on"></use></svg>
        </button>
      </div>

      <!-- Right: Logo -->
      <div class="bg-white/80 backdrop-blur-md rounded-xl sm:rounded-[1.25rem] shadow-md border-2 border-white/50 p-1 sm:p-1.5 flex items-center justify-center h-10 sm:h-14 shrink-0 overflow-hidden">
        <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Logo" class="h-full w-auto object-contain">
      </div>
    </div>

    <!-- Main Game Board (Thon gọn hơn) -->
    <div id="game-board" class="w-full max-w-3xl flex-1 flex flex-col items-center justify-center bg-rose-100/90 backdrop-blur-sm rounded-[2rem] sm:rounded-[2.5rem] shadow-xl border-4 sm:border-8 border-white p-4 sm:p-6 transition-colors duration-500 relative mt-0 sm:mt-2">
      
      <div id="particles-overlay" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none z-10">
        <svg class="text-yellow-400 w-48 h-48 sm:w-64 sm:h-64 animate-ping-slow"><use href="#icon-sparkles"></use></svg>
      </div>
      
      <!-- Unified Visual Equation Area -->
      <div id="equation-area" class="flex flex-row flex-nowrap items-center justify-center w-full gap-1 sm:gap-2 md:gap-4 mb-6 sm:mb-10 transition-transform duration-300 px-1">
        
        <!-- Num 1 Card -->
        <div class="flex flex-col items-center bg-white p-2 sm:p-4 md:p-5 rounded-2xl sm:rounded-[1.5rem] shadow-sm shrink min-w-[45px] sm:min-w-[100px] md:min-w-[130px]">
          <div id="items-1" class="flex flex-wrap justify-center gap-0.5 sm:gap-1 max-w-[40px] sm:max-w-[80px] md:max-w-[110px]"></div>
          <span id="text-1" class="text-3xl sm:text-4xl md:text-5xl font-black mt-1 sm:mt-3 text-rose-500 text-shadow">1</span>
        </div>

        <!-- Plus Sign -->
        <span class="text-2xl sm:text-4xl md:text-5xl font-black text-slate-600/80 drop-shadow-sm shrink-0">+</span>

        <!-- Num 2 Card -->
        <div class="flex flex-col items-center bg-white p-2 sm:p-4 md:p-5 rounded-2xl sm:rounded-[1.5rem] shadow-sm shrink min-w-[45px] sm:min-w-[100px] md:min-w-[130px]">
          <div id="items-2" class="flex flex-wrap justify-center gap-0.5 sm:gap-1 max-w-[40px] sm:max-w-[80px] md:max-w-[110px]"></div>
          <span id="text-2" class="text-3xl sm:text-4xl md:text-5xl font-black mt-1 sm:mt-3 text-rose-500 text-shadow">1</span>
        </div>

        <!-- Equals Sign -->
        <span class="text-2xl sm:text-4xl md:text-5xl font-black text-slate-600/80 drop-shadow-sm shrink-0">=</span>

        <!-- Equation Result Block (Question Mark) -->
        <span id="result-box" class="shrink-0 inline-flex items-center justify-center w-10 h-10 sm:w-16 sm:h-16 md:w-20 md:h-20 rounded-lg sm:rounded-xl md:rounded-2xl border-4 sm:border-[5px] border-dashed border-white bg-white/40 text-slate-500 text-2xl sm:text-4xl md:text-5xl font-black transition-all duration-300 shadow-inner">
          ?
        </span>
      </div>

      <!-- 3D Answer Buttons -->
      <div class="grid grid-cols-3 gap-2 sm:gap-4 w-full max-w-sm px-2 mt-auto sm:mb-2">
        <button id="btn-opt-0" onclick="handleAnswer(0)" class="btn-3d relative w-full aspect-square rounded-2xl sm:rounded-[1.5rem] border-b-[5px] sm:border-b-[6px] text-white text-3xl sm:text-5xl font-black flex items-center justify-center disabled:opacity-80 disabled:cursor-not-allowed bg-[#1CB0F6] border-[#1899D6] hover:bg-[#1899D6]">
          <div class="absolute top-2 left-1/2 -translate-x-1/2 w-[70%] h-[20%] bg-white/20 rounded-full blur-[1px]"></div>
          <span id="val-opt-0" class="text-shadow">1</span>
        </button>
        <button id="btn-opt-1" onclick="handleAnswer(1)" class="btn-3d relative w-full aspect-square rounded-2xl sm:rounded-[1.5rem] border-b-[5px] sm:border-b-[6px] text-white text-3xl sm:text-5xl font-black flex items-center justify-center disabled:opacity-80 disabled:cursor-not-allowed bg-[#FF4B4B] border-[#EA1537] hover:bg-[#EA1537]">
          <div class="absolute top-2 left-1/2 -translate-x-1/2 w-[70%] h-[20%] bg-white/20 rounded-full blur-[1px]"></div>
          <span id="val-opt-1" class="text-shadow">2</span>
        </button>
        <button id="btn-opt-2" onclick="handleAnswer(2)" class="btn-3d relative w-full aspect-square rounded-2xl sm:rounded-[1.5rem] border-b-[5px] sm:border-b-[6px] text-white text-3xl sm:text-5xl font-black flex items-center justify-center disabled:opacity-80 disabled:cursor-not-allowed bg-[#FF9600] border-[#E58700] hover:bg-[#E58700]">
          <div class="absolute top-2 left-1/2 -translate-x-1/2 w-[70%] h-[20%] bg-white/20 rounded-full blur-[1px]"></div>
          <span id="val-opt-2" class="text-shadow">3</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ================= SCREEN 3: END ================= -->
  <div id="end-screen" class="hidden w-full min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-0"></div>
    
    <div class="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl p-8 md:p-12 text-center max-w-md w-full border-4 border-white z-10 animate-float">
      <div class="bg-yellow-100 w-28 h-28 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border-4 border-yellow-200">
        <svg class="w-16 h-16 text-yellow-500 drop-shadow-md"><use href="#icon-trophy"></use></svg>
      </div>
      <h2 class="text-4xl md:text-5xl font-black text-slate-800 mb-3 tracking-tight">Amazing!</h2>
      <p class="text-slate-500 font-medium mb-8 text-lg">You completed the lesson.</p>
      
      <div class="bg-slate-50 rounded-2xl p-6 mb-8 border-2 border-slate-100 flex flex-col items-center">
        <span class="text-slate-400 font-bold mb-2 uppercase tracking-wider text-sm">Total Stars</span>
        <div class="flex items-center gap-3 text-5xl md:text-6xl font-black text-yellow-400">
          <span id="final-score">10</span> 
          <svg class="w-12 h-12 drop-shadow-sm"><use href="#icon-star"></use></svg>
        </div>
      </div>

      <button onclick="startGame()" class="btn-3d w-full bg-[#1CB0F6] hover:bg-[#1899D6] text-white text-2xl font-bold py-5 px-8 rounded-2xl shadow-[0_8px_0_#1899D6] border-b-8 border-[#1899D6] flex items-center justify-center gap-3">
        <svg class="w-8 h-8"><use href="#icon-rotate"></use></svg> Play Again
      </button>
    </div>
  </div>

  <!-- ================= LOGIC & AUDIO ================= -->
  <script>
    const THEMES = [
      { emoji: '🍎', color: 'bg-rose-100/90', text: 'text-rose-500' },
      { emoji: '🍔', color: 'bg-orange-100/90', text: 'text-orange-500' },
      { emoji: '🦋', color: 'bg-sky-100/90', text: 'text-sky-500' },
      { emoji: '🎈', color: 'bg-purple-100/90', text: 'text-purple-500' },
      { emoji: '🐶', color: 'bg-yellow-100/90', text: 'text-yellow-600' },
      { emoji: '🚗', color: 'bg-indigo-100/90', text: 'text-indigo-500' },
      { emoji: '🍩', color: 'bg-pink-100/90', text: 'text-pink-500' },
      { emoji: '🦖', color: 'bg-emerald-100/90', text: 'text-emerald-600' },
    ];
    const MAX_QUESTIONS = 10;

    let soundEnabled = true, score = 0, questionCount = 0;
    let num1 = 1, num2 = 1, options = [], currentTheme = THEMES[0], isAnimating = false;

    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const iconSound = document.getElementById('icon-sound');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const gameBoard = document.getElementById('game-board');
    const equationArea = document.getElementById('equation-area');
    const items1 = document.getElementById('items-1'), items2 = document.getElementById('items-2');
    const text1 = document.getElementById('text-1'), text2 = document.getElementById('text-2');
    const resultBox = document.getElementById('result-box');
    const particlesOverlay = document.getElementById('particles-overlay');
    const btnOpts = [document.getElementById('btn-opt-0'), document.getElementById('btn-opt-1'), document.getElementById('btn-opt-2')];
    const valOpts = [document.getElementById('val-opt-0'), document.getElementById('val-opt-1'), document.getElementById('val-opt-2')];

    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, type, duration, vol = 0.1) {
      if (!audioCtx || !soundEnabled) return;
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function playSound(type) {
      if (!soundEnabled) return;
      if (type === 'correct') {
        playTone(440, 'sine', 0.1, 0.1); setTimeout(() => playTone(554, 'sine', 0.1, 0.1), 100);
        setTimeout(() => playTone(659, 'sine', 0.2, 0.15), 200); setTimeout(() => playTone(880, 'sine', 0.4, 0.2), 300);
      } else if (type === 'wrong') {
        playTone(300, 'triangle', 0.2, 0.1); setTimeout(() => playTone(250, 'triangle', 0.3, 0.1), 150);
      } else if (type === 'pop') {
        playTone(600, 'sine', 0.1, 0.05);
      } else if (type === 'win') {
        playTone(523, 'square', 0.2, 0.1); setTimeout(() => playTone(659, 'square', 0.2, 0.1), 200);
        setTimeout(() => playTone(783, 'square', 0.2, 0.1), 400); setTimeout(() => playTone(1046, 'square', 0.6, 0.15), 600);
        setTimeout(() => playTone(1318, 'square', 0.8, 0.15), 800);
      }
    }
    function toggleSound() {
      initAudio(); soundEnabled = !soundEnabled;
      iconSound.innerHTML = soundEnabled ? '<use href="#icon-vol-on"></use>' : '<use href="#icon-vol-off"></use>';
      playSound('pop');
    }

    function renderItems(container, count, emoji) {
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.className = 'text-xl sm:text-3xl md:text-4xl emoji-shadow inline-block';
        span.style.animation = 'float 2.5s ease-in-out infinite';
        span.style.animationDelay = `${i * 0.15}s`;
        span.textContent = emoji;
        container.appendChild(span);
      }
    }

    const resultBoxDefaultClass = 'shrink-0 inline-flex items-center justify-center w-10 h-10 sm:w-16 sm:h-16 md:w-20 md:h-20 rounded-lg sm:rounded-xl md:rounded-2xl border-4 sm:border-[5px] border-dashed border-white bg-white/40 text-slate-500 text-2xl sm:text-4xl md:text-5xl font-black transition-all duration-300 shadow-inner';

    function generateQuestion() {
      const targetSum = Math.floor(Math.random() * 9) + 2; 
      num1 = Math.floor(Math.random() * (targetSum - 1)) + 1; num2 = targetSum - num1;
      
      const prevTheme = currentTheme;
      currentTheme = THEMES[Math.floor(Math.random() * THEMES.length)];

      const correctAns = targetSum;
      let wrong1, wrong2;
      do { wrong1 = correctAns + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 2) + 1); } while (wrong1 === correctAns || wrong1 <= 0 || wrong1 > 12);
      do { wrong2 = correctAns + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1); } while (wrong2 === correctAns || wrong2 === wrong1 || wrong2 <= 0 || wrong2 > 12);

      options = [correctAns, wrong1, wrong2].sort(() => Math.random() - 0.5);

      gameBoard.classList.remove(prevTheme.color); gameBoard.classList.add(currentTheme.color);
      text1.className = `text-3xl sm:text-4xl md:text-5xl font-black mt-1 sm:mt-3 text-shadow ${currentTheme.text}`;
      text2.className = `text-3xl sm:text-4xl md:text-5xl font-black mt-1 sm:mt-3 text-shadow ${currentTheme.text}`;
      text1.textContent = num1; text2.textContent = num2;
      
      renderItems(items1, num1, currentTheme.emoji); renderItems(items2, num2, currentTheme.emoji);
      valOpts.forEach((el, idx) => el.textContent = options[idx]);

      resultBox.textContent = '?';
      resultBox.className = resultBoxDefaultClass;
      equationArea.classList.remove('scale-105', 'animate-wiggle-fast');
      particlesOverlay.classList.add('hidden');
      
      btnOpts.forEach(btn => btn.disabled = false);
      isAnimating = false;
    }

    function handleAnswer(index) {
      if (isAnimating) return;
      isAnimating = true; btnOpts.forEach(btn => btn.disabled = true);
      
      const selectedAns = options[index];
      const isCorrect = selectedAns === (num1 + num2);

      if (isCorrect) {
        playSound('correct'); score++;
        resultBox.textContent = selectedAns;
        resultBox.className = 'shrink-0 inline-flex items-center justify-center w-10 h-10 sm:w-16 sm:h-16 md:w-20 md:h-20 rounded-lg sm:rounded-xl md:rounded-2xl border-4 sm:border-[5px] border-[#58CC02] bg-[#58CC02] text-white text-2xl sm:text-4xl md:text-5xl font-black transition-all duration-300 shadow-md';
        equationArea.classList.add('scale-105');
        particlesOverlay.classList.remove('hidden');

        setTimeout(() => {
          questionCount++;
          progressFill.style.width = `${(questionCount / MAX_QUESTIONS) * 100}%`;
          progressText.textContent = `${questionCount}/${MAX_QUESTIONS}`;

          if (questionCount >= MAX_QUESTIONS) { playSound('win'); showEndScreen(); } 
          else { generateQuestion(); }
        }, 1200);

      } else {
        playSound('wrong');
        resultBox.textContent = 'X';
        resultBox.className = 'shrink-0 inline-flex items-center justify-center w-10 h-10 sm:w-16 sm:h-16 md:w-20 md:h-20 rounded-lg sm:rounded-xl md:rounded-2xl border-4 sm:border-[5px] border-[#FF4B4B] bg-[#FF4B4B] text-white text-2xl sm:text-4xl md:text-5xl font-black transition-all duration-300 shadow-md';
        equationArea.classList.add('animate-wiggle-fast');

        setTimeout(() => {
          resultBox.textContent = '?';
          resultBox.className = resultBoxDefaultClass;
          equationArea.classList.remove('animate-wiggle-fast');
          btnOpts.forEach(btn => btn.disabled = false);
          isAnimating = false;
        }, 800);
      }
    }

    function startGame() {
      initAudio(); playSound('pop');
      score = 0; questionCount = 0;
      progressFill.style.width = '0%'; progressText.textContent = `0/${MAX_QUESTIONS}`;
      startScreen.classList.add('hidden'); endScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden'); gameScreen.classList.add('flex');
      document.getElementById('confetti-container').innerHTML = '';
      generateQuestion();
    }

    function showEndScreen() {
      gameScreen.classList.add('hidden'); gameScreen.classList.remove('flex');
      endScreen.classList.remove('hidden'); endScreen.classList.add('flex');
      document.getElementById('final-score').textContent = score;
      createConfetti();
    }

    function createConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      const colors = ['#FFC700', '#FF0000', '#1CB0F6', '#58CC02', '#FF4B4B', '#FF9600'];
      for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = `${Math.random() * 100}%`;
        c.style.width = c.style.height = `${Math.random() * 10 + 8}px`;
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '4px';
        c.style.animationDuration = `${Math.random() * 3 + 2}s`;
        c.style.animationDelay = `${Math.random() * 2}s`;
        container.appendChild(c);
      }
    }
  </script>
</body>
</html>
