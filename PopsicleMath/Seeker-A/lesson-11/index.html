<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Little Math Heroes: Wizard Cup V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #facc15;
            --bg-sky: #f0f9ff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-sky);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 30%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .game-card {
            width: 95%;
            max-width: 500px;
            height: 92vh;
            max-height: 850px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1), inset 0 0 40px rgba(168, 85, 247, 0.05);
            border: 12px solid #FFF;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Decorative Block Borders - Version 5 */
        .decorated-block {
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, #f5f3ff 100%);
            border-radius: 45px;
            border: 6px solid #e0e7ff;
            box-shadow: 0 12px 0 #d1d5db;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .visual-container {
            min-height: 160px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 12px;
        }

        .math-icon {
            font-size: 3.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.12));
            user-select: none;
        }
        .math-icon.dimmed {
            opacity: 0.15;
            filter: grayscale(1) blur(2px);
            transform: scale(0.7) translateY(10px);
        }

        /* Math Bubble - More Colorful */
        .math-bubble {
            background: linear-gradient(135deg, #fff9c4 0%, #fde047 100%);
            border: 8px solid #fef08a;
            border-radius: 40px;
            padding: 22px;
            box-shadow: 0 12px 0 #eab308, 0 15px 30px rgba(250, 204, 21, 0.2);
            position: relative;
        }

        /* Wizard Hat - Turned Upward like a bowl for Ver 5 */
        #wizard-hat {
            position: absolute;
            width: 130px;
            height: 130px;
            pointer-events: none;
            z-index: 160;
            transform: translate(-50%, -50%) rotate(180deg); /* Upside down */
            filter: drop-shadow(0 -10px 15px rgba(0,0,0,0.3));
            transition: transform 0.05s linear;
        }

        .bonus-star {
            position: absolute;
            font-size: 3rem;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            z-index: 150;
            pointer-events: none;
        }

        /* Game Buttons */
        .btn-game {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 8px solid rgba(0,0,0,0.2);
            user-select: none;
        }
        .btn-game:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        #fireworks-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes bounce-gentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-gentle { animation: bounce-gentle 2.5s infinite ease-in-out; }

        @keyframes float-clouds {
            from { transform: translateX(-10%); }
            to { transform: translateX(10%); }
        }
        .bg-cloud {
            position: absolute;
            opacity: 0.4;
            animation: float-clouds 5s infinite alternate ease-in-out;
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="game-card">
        <!-- HEADER -->
        <div id="game-header" class="hidden p-6 pb-2">
            <div class="flex justify-between items-center mb-4">
                <div class="bg-indigo-50 px-5 py-2 rounded-2xl border-b-4 border-indigo-200">
                    <span class="font-extrabold text-indigo-600 tracking-tight">SPELL <span id="q-count">1</span>/10</span>
                </div>
                <div class="bg-amber-50 px-5 py-2 rounded-2xl border-b-4 border-amber-200 flex items-center">
                    <span class="mr-2">✨</span>
                    <span id="score-text" class="font-black text-amber-600 text-2xl">0</span>
                </div>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-5 overflow-hidden border-2 border-white shadow-inner">
                <div id="progress-val" class="h-full bg-gradient-to-r from-indigo-400 via-purple-500 to-indigo-600 transition-all duration-700" style="width: 10%"></div>
            </div>
        </div>

        <!-- INTRO SCREEN -->
        <div id="screen-intro" class="flex-1 flex flex-col items-center justify-center p-8 text-center">
            <div class="animate-bounce-gentle mb-8 relative">
                <!-- Corrected SVG Icon for Magic Wand / Hat -->
                <svg width="140" height="140" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#f5f3ff" />
                    <path d="M40 10 L80 80 Q90 90 40 90 Q-10 90 20 80 Z" fill="#6366f1" transform="rotate(-15 50 50)"/>
                    <rect x="25" y="70" width="50" height="8" fill="#2dd4bf" transform="rotate(-15 50 50)"/>
                    <circle cx="50" cy="40" r="4" fill="#fbbf24" />
                    <circle cx="65" cy="55" r="3" fill="#fbbf24" />
                    <circle cx="35" cy="60" r="2" fill="#fbbf24" />
                </svg>
            </div>
            <h1 class="text-5xl font-black text-indigo-700 mb-2 drop-shadow-sm">Math Wizard</h1>
            <p class="text-xl text-indigo-400 font-bold mb-10">Magic Subtraction Academy</p>
            
            <div class="bg-white p-6 rounded-[45px] border-4 border-indigo-50 shadow-xl mb-10 w-full relative">
                <div class="flex flex-col gap-4">
                    <div class="flex items-center gap-5 bg-indigo-50/50 p-4 rounded-3xl">
                        <div class="bg-white p-2 rounded-xl shadow-sm">
                            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        </div>
                        <p class="text-xs text-left font-extrabold text-indigo-800 uppercase tracking-tight">Solve to earn Magic Stars</p>
                    </div>
                    <div class="flex items-center gap-5 bg-amber-50/50 p-4 rounded-3xl">
                        <div class="bg-white p-2 rounded-xl shadow-sm">
                            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        </div>
                        <p class="text-xs text-left font-extrabold text-amber-800 uppercase tracking-tight">Win a Bonus Catch Game!</p>
                    </div>
                </div>
            </div>

            <button onclick="initGame()" class="btn-game w-full py-6 bg-indigo-600 text-white rounded-[35px] text-3xl font-black shadow-2xl hover:bg-indigo-500 transform hover:scale-105">
                START SPELL!
            </button>
        </div>

        <!-- GAME SCREEN -->
        <div id="screen-game" class="hidden flex-1 flex flex-col p-6 overflow-y-auto">
            <div class="flex-1 flex flex-col items-center justify-center">
                
                <!-- Visual Block -->
                <div class="decorated-block w-full">
                    <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-white px-4 py-1 rounded-full border-2 border-indigo-100 shadow-sm">
                        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Remove Items</span>
                    </div>
                    <div id="visual-area" class="visual-container">
                        <!-- Icons injected here -->
                    </div>
                </div>

                <!-- Equation Block -->
                <div class="math-bubble w-full text-center mb-8">
                    <span id="equation-text" class="text-7xl font-black text-indigo-900 tracking-tighter">
                        ? - ? = ?
                    </span>
                </div>

                <div id="feedback-msg" class="h-10 text-2xl font-black opacity-0 transition-all mb-4 text-center">
                    Correct! ✨
                </div>

                <div id="choices-grid" class="grid grid-cols-3 gap-5 w-full">
                    <!-- Buttons injected here -->
                </div>
            </div>

            <button id="btn-next" onclick="nextStep()" class="hidden btn-game w-full py-5 mt-6 bg-indigo-600 text-white rounded-[30px] text-2xl font-black shadow-xl">
                NEXT SPELL ➔
            </button>
        </div>

        <!-- RESULT SCREEN -->
        <div id="screen-result" class="hidden flex-1 flex flex-col items-center justify-center p-8 text-center relative">
            <canvas id="fireworks-canvas"></canvas>
            <div class="z-20">
                <div class="text-[110px] mb-6 drop-shadow-2xl animate-bounce">🏆</div>
                <h2 class="text-5xl font-black text-indigo-700 mb-2">GRAND WIZARD</h2>
                <p class="text-indigo-400 font-bold mb-10">Magic Academy Graduated!</p>
                
                <div class="bg-gradient-to-br from-amber-100 to-orange-100 p-10 rounded-[50px] border-8 border-white shadow-2xl mb-12 transform -rotate-2">
                    <span class="text-xs font-black text-amber-600 uppercase tracking-[0.3em]">Total Magic Power</span>
                    <div id="final-score" class="text-8xl font-black text-orange-600 my-2">0</div>
                    <div class="flex justify-center gap-2">
                        <span>🌟</span><span>🌟</span><span>🌟</span>
                    </div>
                </div>

                <button onclick="location.reload()" class="btn-game w-full py-6 bg-indigo-600 text-white rounded-[35px] text-3xl font-black shadow-2xl">
                    PLAY AGAIN 🔄
                </button>
            </div>
        </div>

        <!-- BONUS OVERLAY -->
        <div id="bonus-overlay" class="hidden absolute inset-0 bg-indigo-900/60 backdrop-blur-md z-[100] flex flex-col items-center justify-center text-white overflow-hidden">
            <!-- Wizard Hat SVG - Flipped for Ver 5 -->
            <div id="wizard-hat">
                <svg width="130" height="130" viewBox="0 0 100 100">
                    <!-- The Hat as a Bowl (Brim is at bottom in SVG, but container is rotated 180) -->
                    <path d="M10 80 Q50 95 90 80 Q95 95 50 95 Q5 95 10 80" fill="#4c1d95"/>
                    <path d="M50 5 L85 75 Q95 85 50 85 Q5 85 15 75 Z" fill="#6b21a8"/>
                    <rect x="23" y="65" width="54" height="10" fill="#2dd4bf" />
                    <!-- Moon & Stars Inside -->
                    <circle cx="50" cy="70" r="5" fill="#facc15" />
                    <path d="M50 70 A3 3 0 1 1 50 64" fill="#6b21a8"/>
                    <text x="35" y="35" font-size="12" fill="white" style="font-family: Arial;">★</text>
                    <text x="55" y="50" font-size="10" fill="white" style="font-family: Arial;">★</text>
                </svg>
            </div>
            
            <div class="z-10 flex flex-col items-center pointer-events-none">
                <h3 class="text-7xl font-black text-accent mb-2 drop-shadow-2xl">STAR CATCH!</h3>
                <p class="text-xl font-bold mb-10 opacity-90 tracking-wide">Catch them in your Magic Hat!</p>
                <div id="bonus-timer" class="w-24 h-24 bg-white text-indigo-700 rounded-full flex items-center justify-center text-5xl font-black border-8 border-accent shadow-2xl">5</div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const QUESTIONS = [
            { q: "3 - 1", a: 2, icon: "🍎", options: [2, 1, 3] },
            { q: "5 - 2", a: 3, icon: "🦄", options: [2, 3, 4] },
            { q: "4 - 3", a: 1, icon: "🍦", options: [1, 2, 0] },
            { q: "6 - 4", a: 2, icon: "🎈", options: [1, 2, 3] },
            { q: "2 - 2", a: 0, icon: "🍕", options: [0, 1, 2] },
            { q: "8 - 5", a: 3, icon: "🍭", options: [2, 3, 5] },
            { q: "5 - 1", a: 4, icon: "🚀", options: [4, 5, 3] },
            { q: "7 - 3", a: 4, icon: "🐼", options: [4, 3, 5] },
            { q: "9 - 2", a: 7, icon: "🎁", options: [6, 7, 8] },
            { q: "10 - 6", a: 4, icon: "🦖", options: [4, 5, 3] }
        ];

        // --- STATE ---
        let currentIdx = 0;
        let score = 0;
        let isActive = false;
        let isFirstAttempt = true;
        let bagX = 0, bagY = 0;

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freqs, type = 'sine', duration = 0.2) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                osc.type = type;
                osc.frequency.setValueAtTime(f, now + (i * 0.05));
                osc.connect(gain);
                osc.start(now + (i * 0.05));
                osc.stop(now + duration);
            });
        }

        const sounds = {
            click: () => playSfx([400], 'triangle', 0.1),
            correct: () => playSfx([523, 659, 783], 'sine', 0.5),
            wrong: () => playSfx([200, 150], 'sawtooth', 0.3),
            pop: () => playSfx([800, 1200], 'sine', 0.1),
            catch: () => playSfx([1000, 1500], 'sine', 0.1),
            win: () => playSfx([523, 659, 783, 1046], 'square', 0.8)
        };

        // --- UI HELPERS ---
        const $ = id => document.getElementById(id);
        const hide = el => el.classList.add('hidden');
        const show = el => el.classList.remove('hidden');

        // --- CORE LOGIC ---
        function initGame() {
            sounds.click();
            hide($('screen-intro'));
            show($('screen-game'));
            show($('game-header'));
            loadQuestion();

            // Hat Tracking
            const moveHandler = (e) => {
                const rect = $('bonus-overlay').getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                bagX = cx - rect.left;
                bagY = cy - rect.top;
                $('wizard-hat').style.left = `${bagX}px`;
                $('wizard-hat').style.top = `${bagY}px`;
            };
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('touchmove', moveHandler, { passive: false });
        }

        function loadQuestion() {
            isActive = true;
            isFirstAttempt = true;
            const data = QUESTIONS[currentIdx];
            
            $('q-count').innerText = currentIdx + 1;
            $('progress-val').style.width = ((currentIdx + 1) / QUESTIONS.length * 100) + '%';
            $('equation-text').innerText = `${data.q} = ?`;
            $('feedback-msg').classList.add('opacity-0');
            hide($('btn-next'));

            const visualArea = $('visual-area');
            visualArea.innerHTML = '';
            const totalCount = parseInt(data.q.split(' - ')[0]);
            for(let i=0; i<totalCount; i++) {
                const span = document.createElement('span');
                span.className = 'math-icon animate-bounce-gentle';
                span.style.animationDelay = (i * 0.1) + 's';
                span.innerText = data.icon;
                span.onclick = () => {
                    sounds.pop();
                    span.classList.toggle('dimmed');
                };
                visualArea.appendChild(span);
            }

            const choicesGrid = $('choices-grid');
            choicesGrid.innerHTML = '';
            data.options.forEach(val => {
                const btn = document.createElement('button');
                btn.className = "btn-game py-6 bg-white border-4 border-indigo-50 rounded-[35px] text-5xl font-black text-indigo-900 shadow-xl hover:bg-indigo-50";
                btn.innerText = val;
                btn.onclick = () => checkAnswer(val, btn);
                choicesGrid.appendChild(btn);
            });
        }

        function checkAnswer(val, btn) {
            if(!isActive) return;
            const data = QUESTIONS[currentIdx];

            if(val === data.a) {
                isActive = false;
                sounds.correct();
                
                if (isFirstAttempt) {
                    score += 10;
                    $('score-text').innerText = score;
                    $('feedback-msg').innerText = "Perfect Spell! ✨";
                    $('feedback-msg').classList.remove('opacity-0', 'text-rose-500');
                    $('feedback-msg').classList.add('text-emerald-500');
                    setTimeout(startBonus, 1200);
                } else {
                    $('feedback-msg').innerText = "Good! Move Next ➔";
                    $('feedback-msg').classList.remove('opacity-0');
                    $('feedback-msg').classList.add('text-amber-500');
                    show($('btn-next'));
                }
                btn.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600');
            } else {
                sounds.wrong();
                isFirstAttempt = false;
                btn.classList.add('bg-rose-100', 'border-rose-300', 'animate-shake');
                $('feedback-msg').innerText = "Try again! 💪";
                $('feedback-msg').classList.remove('opacity-0');
                $('feedback-msg').classList.add('text-rose-500');
                setTimeout(() => {
                    btn.classList.remove('animate-shake');
                    $('feedback-msg').classList.add('opacity-0');
                }, 1000);
            }
        }

        // --- BONUS ---
        function startBonus() {
            show($('bonus-overlay'));
            let time = 5;
            $('bonus-timer').innerText = time;

            const countdown = setInterval(() => {
                time--;
                $('bonus-timer').innerText = time;
                if(time <= 0) {
                    clearInterval(countdown);
                    clearInterval(spawner);
                    endBonus();
                }
            }, 1000);

            const spawner = setInterval(spawnStar, 450);
        }

        function spawnStar() {
            const star = document.createElement('div');
            star.innerText = '⭐';
            star.className = 'bonus-star';
            star.style.left = (Math.random() * 80 + 10) + '%';
            star.style.top = '-10%';
            $('bonus-overlay').appendChild(star);

            const duration = Math.random() * 1500 + 2500;
            const anim = star.animate([
                { top: '-10%', transform: 'rotate(0deg)' },
                { top: '110%', transform: 'rotate(720deg)' }
            ], { duration: duration, easing: 'linear' });

            const check = setInterval(() => {
                const sRect = star.getBoundingClientRect();
                const hRect = $('wizard-hat').getBoundingClientRect();
                
                const dx = (sRect.left + sRect.width/2) - (hRect.left + hRect.width/2);
                const dy = (sRect.top + sRect.height/2) - (hRect.top + hRect.height/2);
                const dist = Math.sqrt(dx*dx + dy*dy);

                // Collision with "bowl" opening (which is the top area now since it's flipped)
                if(dist < 65) {
                    sounds.catch();
                    score += 2;
                    $('score-text').innerText = score;
                    star.innerHTML = '<span class="text-white text-xl">+2</span>';
                    star.style.opacity = '0';
                    clearInterval(check);
                    setTimeout(() => star.remove(), 200);
                }
            }, 50);

            anim.onfinish = () => { clearInterval(check); star.remove(); };
        }

        function endBonus() {
            hide($('bonus-overlay'));
            nextStep();
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < QUESTIONS.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // --- RESULTS ---
        function showResults() {
            sounds.win();
            hide($('screen-game'));
            hide($('game-header'));
            show($('screen-result'));
            $('final-score').innerText = score;
            startFireworks();
        }

        function startFireworks() {
            const canvas = $('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            let particles = [];

            class P {
                constructor(x, y, color) {
                    this.x = x; this.y = y; this.color = color;
                    this.vx = (Math.random() - 0.5) * 15;
                    this.vy = (Math.random() - 0.5) * 15;
                    this.a = 1;
                }
                draw() {
                    ctx.globalAlpha = this.a;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 5, 0, Math.PI*2);
                    ctx.fill();
                }
                update() {
                    this.x += this.vx; this.y += this.vy;
                    this.vy += 0.2;
                    this.a -= 0.012;
                }
            }

            function fire() {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height/2);
                const col = `hsl(${Math.random()*360}, 100%, 65%)`;
                for(let i=0; i<40; i++) particles.push(new P(x, y, col));
            }

            const interval = setInterval(fire, 500);
            function anim() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                particles = particles.filter(p => p.a > 0);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(anim);
            }
            anim();
            setTimeout(() => clearInterval(interval), 8000);
        }

    </script>
</body>
</html>
