<!doctype html>
<html lang="en">
 <head>
  <link rel="stylesheet" href="../assets/brand.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Math Adventure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FFE5F1, #E5F3FF, #F0FFE5);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .game-container {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .title {
            text-align: center;
            font-size: 2.2em;
            font-weight: 800;
            color: #2D3436;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #FF6B9D, #6C5CE7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .progress-bar {
            width: 100%;
            height: 15px;
            background: #f1f2f6;
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B9D, #A29BFE);
            border-radius: 20px;
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .question-text {
            font-size: 1.6em;
            color: #2D3436;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .display-area {
            font-size: 3.5em;
            margin: 20px 0;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            line-height: 1.2;
        }
        .fruit-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 40%;
            gap: 5px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 20px;
            border: 2px dashed rgba(0, 0, 0, 0.05);
        }
        .plus-sign-wrapper {
            font-size: 1.5em;
            color: #FF6B9D;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .number-bonds {
            position: relative;
            width: 200px;
            height: 180px;
            margin: 20px auto;
        }
        .bond-circle {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .part-circle { width: 60px; height: 60px; font-size: 1.4em; background: #00CEC9; top: 0; }
        .part-left { left: 0px; }
        .part-right { right: 0px; }
        .whole-circle { background: #FF6B9D; width: 85px; height: 85px; font-size: 2em; bottom: 0; left: 57px; }

        .answer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .answer-btn {
            padding: 15px 35px;
            font-size: 1.6em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            background: #ffffff;
            color: #2D3436;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #f1f2f6;
            transition: all 0.2s;
            min-width: 90px;
        }
        .answer-btn:hover {
            border-color: #A29BFE;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .feedback {
            font-size: 1.4em;
            font-weight: 600;
            margin: 15px 0;
            min-height: 40px;
            text-align: center;
        }
        .correct { color: #00b894; animation: bounce 0.5s; }
        .incorrect { color: #ff7675; }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .listen-btn {
            background: #ffffff;
            border: 2px solid #f1f2f6;
            cursor: pointer;
            font-size: 1.2em;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .listen-btn:hover { transform: scale(1.1); background: #f9f9f9; }

        /* Butterfly Break Game Styles */
        #butterflyBreakScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .butterfly-area {
            width: 90vw;
            max-width: 700px;
            height: 450px;
            background: rgba(255,255,255,0.3);
            border: 4px solid #ffffff;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .butterfly {
            position: absolute;
            font-size: 3.5rem;
            user-select: none;
            cursor: pointer;
            transition: all 1.5s ease-in-out;
            z-index: 110;
        }
        .butterfly-inner {
            display: inline-block;
            animation: flutter 0.3s infinite alternate;
        }
        @keyframes flutter {
            from { transform: scaleX(1); }
            to { transform: scaleX(0.7); }
        }
        .cloud {
            position: absolute;
            font-size: 3rem;
            opacity: 0.6;
            animation: drift 20s linear infinite;
        }
        @keyframes drift {
            from { left: -100px; }
            to { left: 110%; }
        }
        .grass {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60px;
            background: #2ecc71;
            z-index: 105;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 1.5rem;
        }

        /* Celebration */
        #celebrationScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1e272e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #fireworksCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .celebration-content {
            position: relative;
            z-index: 201;
            text-align: center;
        }
        .action-btn {
            padding: 15px 45px;
            font-size: 1.3em;
            font-weight: 700;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #FF6B9D, #6C5CE7);
            color: white;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(255, 107, 157, 0.3);
            transition: transform 0.2s;
        }
        .action-btn:hover { transform: scale(1.05); }

        .hidden { display: none !important; }
    </style>
 </head>
 <body>
  <img src="../assets/logo-oodles-math.png" class="oodles-logo">
  <div class="game-container">
   <h1 class="title">Fruit Math Adventure</h1>
   <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
   </div>
   <div id="mathGameArea">
    <div class="question-text" id="questionText"></div>
    <div class="display-area" id="fruitDisplay"></div>
    <div class="number-bonds hidden" id="numberBonds"></div>
    <div class="answer-buttons" id="answerButtons"></div>
    <div class="feedback" id="feedback"></div>
   </div>
  </div>

  <!-- Butterfly Break Screen -->
  <div id="butterflyBreakScreen" class="hidden">
    <div class="text-center mb-4">
        <h2 class="text-4xl font-black text-gray-800">BREAK TIME! 🦋</h2>
        <p class="text-xl font-bold text-blue-600">Catch the butterflies!</p>
        <div class="flex justify-between w-full px-10 mt-2 text-2xl font-bold">
            <span id="gameTimer">Time: 20s</span>
            <span id="gameScore">Score: 0</span>
        </div>
    </div>
    <div class="butterfly-area" id="butterflyArea">
        <div class="cloud" style="top: 20px; animation-duration: 25s;">☁️</div>
        <div class="cloud" style="top: 80px; animation-duration: 35s;">☁️</div>
        <div class="grass">
            <span>🌸</span><span>🌷</span><span>🌻</span><span>🌼</span><span>🌹</span>
        </div>
        <div id="startBreakOverlay" class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center z-[150] rounded-2xl">
            <button class="action-btn" onclick="startButterflyGame()">Start Catching! ▶️</button>
        </div>
    </div>
    <div id="breakFeedback" class="mt-4 text-2xl font-black h-10 text-blue-600"></div>
  </div>

  <!-- Celebration -->
  <div id="celebrationScreen" class="hidden">
    <canvas id="fireworksCanvas"></canvas>
    <div class="celebration-content">
        <h1 class="text-6xl font-black mb-4 tracking-tight">FANTASTIC! 🏆</h1>
        <p class="text-2xl text-gray-300">You are a Math & Nature Master!</p>
        <div id="finalScoreDisplay" class="text-4xl font-bold my-8 text-yellow-400"></div>
        <button class="action-btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
  </div>

  <script>
    const fruits = ['🍎', '🍌', '🍊', '🍇', '🍓', '🍑', '🍐', '🥭'];
    const fruitNames = {
        '🍎': 'apples', '🍌': 'bananas', '🍊': 'oranges', 
        '🍇': 'grapes', '🍓': 'strawberries', '🍑': 'peaches', 
        '🍐': 'pears', '🥭': 'mangoes'
    };
    
    let currentQuestion = 0;
    let currentStep = 1;
    let fruit1, fruit2, count1, count2, correctAnswer;
    let totalScore = 0;
    let speechText = "";

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, type, duration, volume = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- MATH GAME LOGIC ---

    function startMath() {
        if (currentQuestion >= 3) {
            showCelebration();
            return;
        }
        currentStep = 1;
        const i1 = Math.floor(Math.random() * fruits.length);
        let i2 = Math.floor(Math.random() * fruits.length);
        while (i1 === i2) i2 = Math.floor(Math.random() * fruits.length);
        
        fruit1 = fruits[i1];
        fruit2 = fruits[i2];
        count1 = Math.floor(Math.random() * 6) + 5; // 5-10
        count2 = Math.floor(Math.random() * 6) + 5; // 5-10

        updateProgress();
        showMathStep();
    }

    function showMathStep() {
        const qText = document.getElementById('questionText');
        const display = document.getElementById('fruitDisplay');
        const bonds = document.getElementById('numberBonds');
        const feedback = document.getElementById('feedback');
        feedback.textContent = "";

        if (currentStep === 1) {
            speechText = `How many ${fruitNames[fruit1]} do you see?`;
            display.innerHTML = `<div class="fruit-group">${fruit1.repeat(count1)}</div>`;
            bonds.classList.add('hidden');
            correctAnswer = count1;
        } else if (currentStep === 2) {
            speechText = `How many ${fruitNames[fruit2]} do you see?`;
            display.innerHTML = `<div class="fruit-group">${fruit2.repeat(count2)}</div>`;
            correctAnswer = count2;
        } else {
            speechText = `How many fruits altogether?`;
            display.innerHTML = `
                <div class="fruit-group">${fruit1.repeat(count1)}</div>
                <div class="plus-sign-wrapper">+</div>
                <div class="fruit-group">${fruit2.repeat(count2)}</div>
            `;
            bonds.classList.remove('hidden');
            bonds.innerHTML = `
                <svg style="position:absolute; top:0; left:0; width:100%; height:100%;">
                    <line x1="40" y1="30" x2="100" y2="140" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round" />
                    <line x1="160" y1="30" x2="100" y2="140" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round" />
                </svg>
                <div class="bond-circle part-circle part-left">${count1}</div>
                <div class="bond-circle part-circle part-right">${count2}</div>
                <div class="bond-circle whole-circle">?</div>
            `;
            correctAnswer = count1 + count2;
        }

        qText.innerHTML = `<span>${speechText}</span><button class="listen-btn" onclick="speak()">🔊</button>`;
        createButtons();
    }

    function createButtons() {
        const container = document.getElementById('answerButtons');
        container.innerHTML = "";
        let options = [correctAnswer];
        while(options.length < 3) {
            let r = correctAnswer + (Math.floor(Math.random()*7)-3);
            if(r > 0 && !options.includes(r)) options.push(r);
        }
        options.sort((a,b) => a - b);
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.textContent = opt;
            btn.onclick = () => checkMath(opt, btn);
            container.appendChild(btn);
        });
    }

    function checkMath(val, btn) {
        const feedback = document.getElementById('feedback');
        if (val === correctAnswer) {
            playTone(600, 'sine', 0.2);
            feedback.textContent = "Correct! You are amazing! 🎉";
            feedback.className = "feedback correct";
            if (currentStep === 3) {
                document.querySelector('.whole-circle').textContent = correctAnswer;
                setTimeout(initButterflyBreak, 1200);
            } else {
                setTimeout(() => {
                    currentStep++;
                    showMathStep();
                }, 1000);
            }
        } else {
            playTone(200, 'sawtooth', 0.3);
            feedback.textContent = "Oops! Try counting again.";
            feedback.className = "feedback incorrect";
            btn.classList.add('incorrect');
            setTimeout(() => btn.classList.remove('incorrect'), 500);
        }
    }

    function speak() {
        const msg = new SpeechSynthesisUtterance(speechText);
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function updateProgress() {
        document.getElementById('progressFill').style.width = (currentQuestion / 3) * 100 + "%";
    }

    // --- BUTTERFLY BREAK MINI-GAME ---

    let butterflyTimer = null;
    let spawnTimer = null;
    let catchCount = 0;
    let timeLeft = 20;

    function initButterflyBreak() {
        document.getElementById('butterflyBreakScreen').classList.remove('hidden');
        document.getElementById('startBreakOverlay').classList.remove('hidden');
        document.getElementById('breakFeedback').textContent = "";
        catchCount = 0;
        timeLeft = 20;
        document.getElementById('gameScore').textContent = `Score: 0`;
        document.getElementById('gameTimer').textContent = `Time: 20s`;
        
        // Clear old butterflies
        const area = document.getElementById('butterflyArea');
        area.querySelectorAll('.butterfly').forEach(b => b.remove());
    }

    function startButterflyGame() {
        document.getElementById('startBreakOverlay').classList.add('hidden');
        
        butterflyTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('gameTimer').textContent = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) endButterflyGame();
        }, 1000);

        spawnTimer = setInterval(spawnButterfly, 800);
    }

    function spawnButterfly() {
        const area = document.getElementById('butterflyArea');
        const b = document.createElement('div');
        b.className = 'butterfly';
        
        const inner = document.createElement('span');
        inner.className = 'butterfly-inner';
        const types = ['🦋', '🐝', '🐞'];
        const type = types[Math.floor(Math.random() * types.length)];
        inner.textContent = type;
        
        if (type === '🦋') {
            const hue = Math.floor(Math.random() * 360);
            inner.style.filter = `hue-rotate(${hue}deg)`;
        }
        
        b.appendChild(inner);
        
        const x = Math.random() * (area.offsetWidth - 80);
        const y = Math.random() * (area.offsetHeight - 120);
        b.style.left = x + 'px';
        b.style.top = y + 'px';
        
        b.onclick = (e) => {
            e.stopPropagation();
            catchCount++;
            totalScore++;
            document.getElementById('gameScore').textContent = `Score: ${catchCount}`;
            playTone(800, 'sine', 0.1);
            b.style.transform = 'scale(0) rotate(180deg)';
            b.style.opacity = '0';
            setTimeout(() => b.remove(), 300);
        };

        area.appendChild(b);

        // Move butterfly
        setTimeout(() => {
            if (b.parentNode) {
                b.style.left = Math.random() * (area.offsetWidth - 80) + 'px';
                b.style.top = Math.random() * (area.offsetHeight - 120) + 'px';
            }
        }, 100);

        // Remove if not caught
        setTimeout(() => {
            if (b.parentNode) {
                b.style.opacity = '0';
                setTimeout(() => b.remove(), 500);
            }
        }, 3000);
    }

    function endButterflyGame() {
        clearInterval(butterflyTimer);
        clearInterval(spawnTimer);
        document.getElementById('breakFeedback').textContent = `Time's up! You caught ${catchCount}!`;
        playTone(600, 'sine', 0.3);
        
        setTimeout(() => {
            document.getElementById('butterflyBreakScreen').classList.add('hidden');
            currentQuestion++;
            startMath();
        }, 2000);
    }

    // --- CELEBRATION & FIREWORKS ---

    function showCelebration() {
        document.getElementById('celebrationScreen').classList.remove('hidden');
        document.getElementById('finalScoreDisplay').textContent = `Total Butterflies Caught: ${totalScore}`;
        initFireworks();
    }

    function initFireworks() {
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        function createFirework() {
            const x = Math.random() * canvas.width;
            const targetY = Math.random() * (canvas.height * 0.6);
            const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            
            for(let i=0; i<60; i++) {
                particles.push({
                    x, y: targetY,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    color,
                    alpha: 1,
                    size: Math.random() * 3 + 1
                });
            }
            playTone(200 + Math.random()*300, 'sine', 0.1, 0.05);
        }

        function animate() {
            ctx.fillStyle = 'rgba(30, 39, 46, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.alpha -= 0.012;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });

            if (Math.random() < 0.08) createFirework();
            requestAnimationFrame(animate);
        }
        animate();
    }

    window.onload = startMath;
  </script>
 </body>
</html>
