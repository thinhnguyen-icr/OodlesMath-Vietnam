<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Penalty Kicks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import Font Poppins */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            touch-action: none;
            background-color: #7cd1f9; /* Soft sky blue */
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #4cb8ee 0%, #a4e1ff 60%, #58cc02 60%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* --- Background Scenery (Duolingo Style) --- */
        .background-hills {
            position: absolute;
            bottom: 35%; 
            left: 0;
            width: 100%;
            height: 30%;
            z-index: 1;
        }

        .hill {
            position: absolute;
            border-radius: 50%;
        }

        .hill-1 {
            width: 150%; height: 150%; left: -25%; bottom: -100%; 
            background: #73d124; 
        }

        .hill-2 {
            width: 100%; height: 100%; right: -20%; bottom: -60%; 
            background: #58cc02; z-index: 2;
        }

        .hill-3 {
            width: 80%; height: 80%; left: -10%; bottom: -40%; 
            background: #46a302; z-index: 3;
        }

        /* Cây xanh (Trees) */
        .scenery-item {
            position: absolute;
            font-size: 8vmin;
            z-index: 4;
            filter: drop-shadow(0 0.5vmin 0.5vmin rgba(0,0,0,0.2));
            transform-origin: bottom center;
            animation: sway 4s infinite ease-in-out alternate;
        }

        @keyframes sway {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

        /* --- Clouds --- */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            animation: floatCloud linear infinite;
            z-index: 5;
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cloud-1 { width: 18vmin; height: 6vmin; top: 8%; left: -20vmin; animation-duration: 32s; }
        .cloud-1::after { width: 8vmin; height: 8vmin; top: -4vmin; left: 3vmin; }
        .cloud-1::before { width: 6vmin; height: 6vmin; top: -2vmin; left: 9vmin; }

        .cloud-2 { width: 14vmin; height: 5vmin; top: 18%; left: -15vmin; animation-duration: 40s; animation-delay: 5s; }
        .cloud-2::after { width: 6vmin; height: 6vmin; top: -3vmin; left: 2vmin; }
        .cloud-2::before { width: 5vmin; height: 5vmin; top: -2vmin; left: 7vmin; }

        @keyframes floatCloud {
            0% { transform: translateX(-20vmin); }
            100% { transform: translateX(110vw); }
        }

        /* Vạch vôi và sân cỏ */
        .field-lines {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%; /* Cố định chiều cao sân cỏ */
            pointer-events: none;
            transform-style: preserve-3d;
            background: #58cc02;
            background-image: repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.15) 0px,
                rgba(255,255,255,0.15) 6vmin,
                transparent 6vmin,
                transparent 12vmin
            );
            border-top: 1.5vmin solid #46a302;
            z-index: 2;
        }

        /* Bông hoa trên cỏ (Flowers) */
        .flower-item {
            position: absolute;
            font-size: 3vmin;
            z-index: 5;
            animation: popIn 0.8s ease-out backwards;
        }
        
        .penalty-box {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) perspective(600px) rotateX(60deg);
            width: 70%;
            max-width: 90vmin;
            height: 40vmin;
            border: 1vmin solid rgba(255,255,255,0.8);
            border-top: none;
            border-radius: 0 0 2vmin 2vmin;
        }

        /* Khung thành - Neo chính xác vào mép sân cỏ để khi Responsive không bị lệch */
        .goal-post {
            position: absolute;
            bottom: 35%; /* Bằng chính xác height của .field-lines */
            left: 50%;
            transform: translateX(-50%);
            width: 75vmin;
            height: 27vmin; 
            border-top: 2.5vmin solid #fff;
            border-left: 2.5vmin solid #fff;
            border-right: 2.5vmin solid #fff;
            box-shadow: 0 2vmin 4vmin rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 0.1);
            z-index: 10;
            perspective: 800px;
            border-radius: 3vmin 3vmin 0 0;
        }

        .net {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.8) 0.3vmin, transparent 0.3vmin),
                linear-gradient(90deg, rgba(255,255,255,0.8) 0.3vmin, transparent 0.3vmin);
            background-size: 3vmin 3vmin;
            z-index: -1;
            opacity: 0.6;
        }

        /* Đáp án */
        .targets-container {
            position: absolute;
            bottom: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 90vmin;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 30;
        }

        .target-zone {
            position: relative;
            width: 16vmin;
            height: 16vmin;
            border-radius: 50%;
            background: #ffffff;
            border: 1vmin solid #e5e5e5;
            border-bottom: 2vmin solid #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6vmin;
            font-weight: 900;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 1.5vmin 2vmin rgba(0,0,0,0.15);
        }

        .target-zone:nth-child(1) { border-color: #ff4b4b; border-bottom-color: #ea1515; color: #ea1515; }
        .target-zone:nth-child(2) { border-color: #ffb703; border-bottom-color: #e09f00; color: #e09f00; }
        .target-zone:nth-child(3) { border-color: #1cb0f6; border-bottom-color: #147ab0; color: #147ab0; }

        .target-zone:active, .target-zone.clicked {
             transform: translateY(1vmin);
             border-bottom-width: 1vmin;
             filter: brightness(0.95);
        }

        /* Thủ môn (CUTE BEAR) */
        .goalkeeper-container {
            position: absolute;
            bottom: -2vmin; 
            left: 50%;
            transform: translateX(-50%);
            width: 25vmin;
            height: 28vmin;
            z-index: 20;
            transition: left 0.5s ease-out, transform 0.5s ease-out;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            transform-origin: bottom center; 
        }

        .gk-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 1vmin 1vmin rgba(0,0,0,0.3));
        }

        /* Bóng */
        .ball-container {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none; 
            width: 14vmin; 
            height: 14vmin;
        }

        .ball {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 1.5vmin 2vmin rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        .ball svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .ball-flying {
            transition: transform 0.7s cubic-bezier(0.2, 0.6, 0.35, 1);
        }
        
        .ball-flying .ball svg {
            animation: spinBall 0.7s linear;
        }

        @keyframes spinBall {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(1080deg); }
        }

        /* UI Panels */
        .scoreboard {
            position: absolute;
            top: 2vmin;
            left: 2vmin;
            background: #ffffff;
            padding: 1.5vmin 3vmin;
            border-radius: 3vmin;
            color: #afafaf;
            font-size: 3.5vmin;
            z-index: 50;
            border: 0.6vmin solid #e5e5e5;
            border-bottom: 1vmin solid #e5e5e5;
            font-weight: 900;
        }

        .question-panel {
            position: absolute;
            top: 10%; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3vmin;
            z-index: 50;
            pointer-events: none; 
        }

        .question-bg {
            background: #1cb0f6;
            color: white;
            padding: 2vmin 6vmin;
            border-radius: 5vmin;
            font-size: 8vmin;
            font-weight: 900;
            display: inline-block;
            border: 0.8vmin solid #1899d6;
            border-bottom: 1.5vmin solid #1899d6;
            box-shadow: 0 1.5vmin 2vmin rgba(0,0,0,0.15);
            text-shadow: 0 0.5vmin 0 #147ab0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Nút loa đọc phép tính */
        .speak-btn {
            pointer-events: auto; 
            background: #ffffff;
            width: 11vmin;
            height: 11vmin;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 0.8vmin solid #1899d6;
            border-bottom: 1.5vmin solid #1899d6;
            box-shadow: 0 1.5vmin 2vmin rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.1s;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation-delay: 0.1s;
            animation-fill-mode: backwards;
        }

        .speak-btn:active {
            transform: translateY(1vmin);
            border-bottom-width: 0.8vmin;
            margin-top: 0.7vmin;
        }

        .speak-btn svg {
            width: 55%;
            height: 55%;
            fill: #1cb0f6;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .feedback-text {
            font-size: 14vmin;
            font-weight: 900;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-text-stroke: 0.4vmin white;
            text-align: center;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(124, 209, 249, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
            backdrop-filter: blur(5px);
            padding: 2vmin;
        }

        .title-text {
            color: #fff;
            -webkit-text-stroke: 0.3vmin #1cb0f6;
            text-shadow: 0 1vmin 0 #1899d6;
            line-height: 1.2;
        }

        .info-box { 
            font-size: 3.5vmin; 
            padding: 4vmin; 
            border-radius: 4vmin; 
            max-width: 80vmin; 
            margin-bottom: 5vmin; 
            border: 0.8vmin solid #e5e5e5;
            border-bottom: 1.5vmin solid #e5e5e5;
        }

        /* Buttons */
        .btn {
            background: #58cc02;
            color: white;
            border: none;
            padding: 3vmin 8vmin;
            font-size: 5vmin;
            border-radius: 6vmin;
            cursor: pointer;
            margin-top: 2vmin;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            border-bottom: 1.2vmin solid #46a302;
            transition: all 0.1s;
        }
        
        .btn:active {
            transform: translateY(1.2vmin);
            border-bottom-width: 0;
            margin-bottom: 1.2vmin;
        }

        .hidden { display: none !important; }
        
        #fireworks { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 1100;
        }

        /* --- Mystery Box Game Styles --- */
        .box-container {
            display: flex;
            justify-content: center;
            gap: 5vmin;
            margin-top: 5vmin;
            position: relative;
            height: 25vmin;
            width: 100%;
        }

        .mystery-box {
            width: 22vmin;
            height: 22vmin;
            background: #a855f7;
            border: 0.8vmin solid #9333ea;
            border-bottom: 2vmin solid #7e22ce;
            border-radius: 3vmin;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8vmin;
            cursor: pointer;
            position: absolute;
            top: 0;
            transition: left 0.5s ease-in-out, transform 0.3s, filter 0.2s;
            box-shadow: 0 1.5vmin 2vmin rgba(0,0,0,0.2);
            z-index: 10;
        }

        .mystery-box::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 4vmin;
            background: #fde047; 
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            box-shadow: 0 0 1vmin rgba(0,0,0,0.1);
            z-index: 1;
        }

        .mystery-box::after {
            content: '';
            position: absolute;
            height: 100%;
            width: 4vmin;
            background: #fde047;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            box-shadow: 0 0 1vmin rgba(0,0,0,0.1);
            z-index: 1;
        }

        .box-lid-mark {
            position: absolute;
            color: white;
            font-size: 10vmin;
            font-weight: 900;
            z-index: 2;
            text-shadow: 0 0.5vmin 0 rgba(0,0,0,0.2);
            -webkit-text-stroke: 0.2vmin #7e22ce;
        }

        .mystery-box:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        .mystery-box.open {
            background: #fff;
            border-color: #fde047;
            border-bottom-color: #eab308;
        }
        
        .mystery-box.open::before, .mystery-box.open::after, .mystery-box.open .box-lid-mark {
            display: none; 
        }

        .mystery-content {
            opacity: 0;
            transition: opacity 0.3s;
            transform: scale(0);
            z-index: 5;
        }

        .mystery-box.open .mystery-content {
            opacity: 1;
            transform: scale(1);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes winnerPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) translateY(-2vmin); box-shadow: 0 0 4vmin #fde047; }
            100% { transform: scale(1); }
        }
        .mystery-box.highlight {
            animation: winnerPulse 0.8s ease-in-out infinite;
            z-index: 20;
        }

        .pos-0 { left: calc(50% - 38vmin); } 
        .pos-1 { left: calc(50% - 11vmin); } 
        .pos-2 { left: calc(50% + 16vmin); } 

    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <!-- Start Screen -->
    <div id="startScreen" class="screen">
        <h1 class="title-text text-[12vmin] font-black mb-4">MATH<br>PENALTY</h1>
        <div class="info-box bg-white text-gray-700 shadow-xl">
            <p class="flex items-center justify-center gap-2 mb-2">⚽ TAP the <b>CORRECT</b> answer!</p>
            <p class="flex items-center justify-center gap-2">🧤 Score goals & beat the Bear!</p>
        </div>
        <button class="btn" onclick="initGame()">PLAY NOW</button>
    </div>

    <!-- Mini Game Screen (Total Score & Box Picking) -->
    <div id="miniGameScreen" class="screen hidden">
        
        <!-- Phase 1: Pick Box -->
        <div id="boxPhase" class="flex flex-col items-center w-full">
            <h1 class="title-text text-[8vmin] font-black mb-2">CHOOSE A PRIZE!</h1>
            <p class="text-white text-[4vmin] font-bold mb-6 text-shadow-md">Where is your reward?</p>
            
            <div class="box-container" id="boxContainer">
                <!-- Boxes injected by JS -->
            </div>
        </div>

        <!-- Phase 2: Final Result -->
        <div id="resultPhase" class="hidden flex flex-col items-center w-full">
            <h1 class="title-text text-[10vmin] font-black mb-4">AMAZING!</h1>
            <div class="bg-white rounded-[4vmin] p-6 border-[0.8vmin] border-gray-200 border-b-[1.5vmin] text-center mb-8 w-[80vmin]">
                <p class="text-gray-400 text-[4vmin] font-bold">FINAL SCORE</p>
                <p class="text-[14vmin] font-black text-[#58cc02] leading-none" id="finalScoreDisplay">0/10</p>
            </div>
            <div id="prizeDisplay" class="text-[12vmin] mb-6 drop-shadow-lg"></div>
            <button class="btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>

    </div>

    <div class="game-container" id="gameContainer">
        <!-- Hills -->
        <div class="background-hills">
            <div class="hill hill-1"></div>
            <div class="hill hill-2"></div>
            <div class="hill hill-3"></div>

            <!-- Cây Xanh (Trees) -->
            <div class="scenery-item" style="left: 10%; bottom: 35%;">🌲</div>
            <div class="scenery-item" style="left: 20%; bottom: 42%; font-size: 6vmin; animation-delay: 0.5s;">🌳</div>
            <div class="scenery-item" style="left: 75%; bottom: 38%; animation-delay: 1s;">🌳</div>
            <div class="scenery-item" style="left: 88%; bottom: 32%; font-size: 7vmin; animation-delay: 1.5s;">🌲</div>
        </div>

        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <canvas id="fireworks"></canvas>

        <div class="field-lines">
            <div class="penalty-box"></div>
            <!-- Bông hoa trên mặt cỏ (Flowers) -->
            <div class="flower-item" style="left: 15%; top: 5%; animation-delay: 0.1s;">🌼</div>
            <div class="flower-item" style="left: 85%; top: 8%; animation-delay: 0.2s;">🌸</div>
            <div class="flower-item" style="left: 8%; top: 15%; animation-delay: 0.3s;">🌻</div>
            <div class="flower-item" style="left: 92%; top: 12%; animation-delay: 0.4s;">🌷</div>
        </div>

        <div class="scoreboard">
            SCORE: <span id="scoreDisplay" class="text-[#1cb0f6]">0</span>
        </div>

        <div class="question-panel">
            <div id="questionText" class="question-bg m-0">10 + 5 = ?</div>
            
            <!-- Nút bấm nghe đọc phép tính -->
            <button id="speakBtn" onclick="speakQuestion()" class="speak-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75.75 0 011.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75.75 0 010-1.06z"/>
                    <path d="M15.932 7.757a.75.75 0 011.061 0 6 6 0 010 8.486.75.75 0 01-1.06-1.061 4.5 4.5 0 000-6.364.75.75 0 010-1.06z"/>
                </svg>
            </button>
        </div>

        <div class="feedback-overlay">
            <div id="feedbackText" class="feedback-text text-yellow-400">GOAL!</div>
        </div>

        <div class="goal-post">
            <div class="net"></div>
            <!-- CUTE BEAR GOALKEEPER -->
            <div class="goalkeeper-container" id="goalkeeper">
                <svg class="gk-svg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
                    <!-- Legs -->
                    <line x1="85" y1="180" x2="75" y2="240" stroke="#ffb703" stroke-width="22" stroke-linecap="round" />
                    <line x1="115" y1="180" x2="125" y2="240" stroke="#ffb703" stroke-width="22" stroke-linecap="round" />
                    <!-- Shoes -->
                    <path d="M 55 240 h 30 a 10 10 0 0 1 10 10 v 0 a 10 10 0 0 1 -10 10 h -30 a 10 10 0 0 1 -10 -10 v 0 a 10 10 0 0 1 10 -10 z" fill="#023047" />
                    <path d="M 115 240 h 30 a 10 10 0 0 1 10 10 v 0 a 10 10 0 0 1 -10 10 h -30 a 10 10 0 0 1 -10 -10 v 0 a 10 10 0 0 1 10 -10 z" fill="#023047" />
                    <!-- Body (Shirt) -->
                    <rect x="60" y="100" width="80" height="90" rx="25" fill="#ef233c" />
                    <!-- Collar -->
                    <path d="M 85 100 Q 100 120 115 100" fill="none" stroke="#d90429" stroke-width="6" />
                    <!-- Number -->
                    <text x="100" y="160" font-family="Poppins" font-weight="900" font-size="40" fill="white" text-anchor="middle">1</text>
                    <!-- Arms -->
                    <path d="M 65 120 Q 30 110 25 150" stroke="#ffb703" stroke-width="22" stroke-linecap="round" fill="none" />
                    <path d="M 135 120 Q 170 110 175 150" stroke="#ffb703" stroke-width="22" stroke-linecap="round" fill="none" />
                    <!-- Gloves -->
                    <circle cx="25" cy="160" r="22" fill="#edf2f4" stroke="#8d99ae" stroke-width="3" />
                    <circle cx="175" cy="160" r="22" fill="#edf2f4" stroke="#8d99ae" stroke-width="3" />
                    <!-- Head -->
                    <circle cx="100" cy="65" r="45" fill="#ffb703" />
                    <!-- Ears -->
                    <circle cx="55" cy="40" r="18" fill="#ffb703" />
                    <circle cx="145" cy="40" r="18" fill="#ffb703" />
                    <circle cx="55" cy="40" r="10" fill="#fb8500" />
                    <circle cx="145" cy="40" r="10" fill="#fb8500" />
                    <!-- Eyes -->
                    <circle cx="85" cy="60" r="6" fill="#023047" />
                    <circle cx="115" cy="60" r="6" fill="#023047" />
                    <!-- Snout -->
                    <ellipse cx="100" cy="75" rx="15" ry="10" fill="#fb8500" />
                    <!-- Nose -->
                    <circle cx="100" cy="72" r="4" fill="#023047" />
                    <!-- Smile -->
                    <path d="M 95 80 Q 100 85 105 80" fill="none" stroke="#023047" stroke-width="3" stroke-linecap="round" />
                </svg>
            </div>
        </div>

        <div class="targets-container">
            <div id="target0" class="target-zone" data-index="0">0</div>
            <div id="target1" class="target-zone" data-index="1">0</div>
            <div id="target2" class="target-zone" data-index="2">0</div>
        </div>

        <div class="ball-container" id="ballWrapper">
            <div class="ball">
                <!-- Quả bóng SVG Mới - Thiết kế 3D chân thực dạng Telstar -->
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="shine" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
                            <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
                            <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="48" fill="#f8fafc" stroke="#1e293b" stroke-width="1.5"/>
                    
                    <!-- Hình khối đen (Ngũ giác/Lục giác cắt) -->
                    <path d="M50 12 L65 24 L59 42 L41 42 L35 24 Z" fill="#1e293b" stroke="#cbd5e1" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M12 36 L25 28 L35 45 L25 60 L10 52 Z" fill="#1e293b" stroke="#cbd5e1" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M88 36 L75 28 L65 45 L75 60 L90 52 Z" fill="#1e293b" stroke="#cbd5e1" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M30 82 L41 68 L59 68 L70 82 L50 94 Z" fill="#1e293b" stroke="#cbd5e1" stroke-width="1.5" stroke-linejoin="round"/>
                    
                    <!-- Các đường nối chìm (Seams) -->
                    <path d="M50 12 L50 2" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M65 24 L82 15" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M35 24 L18 15" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M41 42 L35 45" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M59 42 L65 45" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M25 60 L41 68" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M75 60 L59 68" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M30 82 L15 88" stroke="#64748b" stroke-width="1.5"/>
                    <path d="M70 82 L85 88" stroke="#64748b" stroke-width="1.5"/>
                    
                    <!-- Lớp phủ 3D Bóng (Glossy Overlay) -->
                    <circle cx="50" cy="50" r="48" fill="url(#shine)"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // --- Audio Logic ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let ambienceNode;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            startAmbience();
        }

        function createNoiseBuffer() {
            if(!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
            return buffer;
        }

        function startAmbience() {
            if (!audioCtx) return;
            if (ambienceNode) try{ ambienceNode.stop(); } catch(e){}
            const noise = audioCtx.createBufferSource();
            noise.buffer = createNoiseBuffer();
            noise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400; 
            const gain = audioCtx.createGain();
            gain.gain.value = 0.03; 
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
            ambienceNode = noise;
        }

        function playSound(type) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;

            if (type === 'kick') {
                playNote(300, t, 0.1, 'triangle');
                playNote(150, t+0.05, 0.1, 'triangle');
            } else if (type === 'goal') {
                // Cheerful arpeggio
                playNote(523.25, t, 0.1, 'sine'); // C5
                playNote(659.25, t+0.1, 0.1, 'sine'); // E5
                playNote(783.99, t+0.2, 0.1, 'sine'); // G5
                playNote(1046.50, t+0.3, 0.3, 'sine'); // C6
            } else if (type === 'miss') {
                // Sad slide down
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.3);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.3);
                osc.start(t);
                osc.stop(t + 0.3);
            } else if (type === 'confetti') {
                playNote(440, t, 0.1, 'square');
                playNote(554.37, t+0.1, 0.1, 'square');
                playNote(659.25, t+0.2, 0.4, 'square');
            }
        }

        function playNote(freq, t, dur, type='sine') {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = type;
            o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, t);
            g.gain.linearRampToValueAtTime(0, t+dur);
            o.start(t);
            o.stop(t+dur);
        }

        // Đọc phép tính bằng giọng nói
        function speakQuestion() {
            if (!('speechSynthesis' in window)) return;
            
            // Dừng các âm thanh đang nói trước đó
            window.speechSynthesis.cancel();
            
            // Lọc chuỗi phép tính thân thiện với bộ đọc
            let text = questionText.innerText;
            text = text.replace('=', 'equals').replace('?', 'what');
            text = text.replace('+', 'plus').replace('-', 'minus');
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // Đọc tiếng Anh
            utterance.rate = 0.85; // Tốc độ thân thiện với trẻ
            utterance.pitch = 1.2; // Giọng cao hơn một chút
            
            window.speechSynthesis.speak(utterance);
            
            // Tạm thời tạo hiệu ứng click cho nút loa
            const btn = document.getElementById('speakBtn');
            btn.style.transform = "scale(0.9)";
            setTimeout(() => btn.style.transform = "", 150);
        }

        // --- Game Logic ---
        const totalQuestions = 10;
        let currentQuestion = 0;
        let score = 0;
        let correctAnswer = 0;
        let canInteract = false;

        const ballWrapper = document.getElementById('ballWrapper');
        const questionText = document.getElementById('questionText');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const feedbackText = document.getElementById('feedbackText');
        const goalkeeper = document.getElementById('goalkeeper');
        const goalPost = document.querySelector('.goal-post'); 
        const targets = [
            document.getElementById('target0'),
            document.getElementById('target1'),
            document.getElementById('target2')
        ];
        
        const startScreen = document.getElementById('startScreen');
        const miniGameScreen = document.getElementById('miniGameScreen');
        const boxContainer = document.getElementById('boxContainer');
        const boxPhase = document.getElementById('boxPhase');
        const resultPhase = document.getElementById('resultPhase');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');
        const prizeDisplay = document.getElementById('prizeDisplay');

        function initGame() {
            initAudio();
            startScreen.classList.add('hidden');
            miniGameScreen.classList.add('hidden');
            boxPhase.classList.remove('hidden');
            resultPhase.classList.add('hidden');
            
            score = 0;
            currentQuestion = 0;
            scoreDisplay.innerText = score;
            targets.forEach(t => {
                t.removeEventListener('click', handleTargetClick);
                t.addEventListener('click', handleTargetClick);
                t.removeEventListener('touchstart', handleTargetClick);
                t.addEventListener('touchstart', handleTargetClick, {passive: false});
            });
            nextTurn();
        }

        function resetGame() { 
            boxContainer.innerHTML = '';
            initGame(); 
        }

        function nextTurn() {
            if (currentQuestion >= totalQuestions) {
                endGame();
                return;
            }
            feedbackText.style.opacity = 0;
            feedbackText.style.transform = 'scale(0.5)';
            resetBall();
            resetGoalkeeper();
            generateMath();
            canInteract = true;
            targets.forEach(t => t.classList.remove('clicked'));
        }

        function generateMath() {
            const isPlus = Math.random() > 0.5;
            let n1, n2;
            if (isPlus) {
                let sum = Math.floor(Math.random() * 11) + 5; // Easier numbers for 4-5yo
                n1 = Math.floor(Math.random() * (sum - 1)) + 1;
                n2 = sum - n1;
                correctAnswer = sum;
                questionText.innerText = `${n1} + ${n2} = ?`;
            } else {
                n1 = Math.floor(Math.random() * 10) + 5;
                n2 = Math.floor(Math.random() * n1);
                correctAnswer = n1 - n2;
                questionText.innerText = `${n1} - ${n2} = ?`;
            }
            let answers = [correctAnswer];
            while(answers.length < 3) {
                let diff = Math.floor(Math.random() * 3) + 1;
                let fake = Math.random() > 0.5 ? correctAnswer + diff : correctAnswer - diff;
                if(fake >= 0 && !answers.includes(fake)) answers.push(fake);
            }
            answers.sort(() => Math.random() - 0.5);
            targets.forEach((el, idx) => {
                el.innerText = answers[idx];
                el.dataset.val = answers[idx];
            });
        }

        function resetBall() {
            ballWrapper.className = 'ball-container'; 
            ballWrapper.style.transform = 'translateX(-50%) translate(0,0) scale(1)';
            ballWrapper.style.opacity = 1;
        }

        function resetGoalkeeper() {
            goalkeeper.style.left = '50%';
            goalkeeper.style.transform = 'translateX(-50%) rotate(0deg)';
        }

        function handleTargetClick(e) {
            if (!canInteract) return;
            e.preventDefault();
            e.stopPropagation();
            const target = e.currentTarget;
            const targetIdx = parseInt(target.dataset.index);
            target.classList.add('clicked');
            shootBall(targetIdx);
        }

        function shootBall(targetIdx) {
            canInteract = false;
            playSound('kick');

            const targetEl = targets[targetIdx];
            const val = parseInt(targetEl.dataset.val);
            const isCorrect = (val === correctAnswer);

            const targetRect = targetEl.getBoundingClientRect();
            const ballStartRect = ballWrapper.getBoundingClientRect();
            const goalRect = goalPost.getBoundingClientRect();
            
            const tx = targetRect.left + targetRect.width/2;
            const ty = targetRect.top + targetRect.height/2;
            const bx = ballStartRect.left + ballStartRect.width/2;
            const by = ballStartRect.top + ballStartRect.height/2;
            const goalCenterY = goalRect.top + goalRect.height / 2;
            
            const moveX = tx - bx;
            const distToGoalY = goalCenterY - by; 

            ballWrapper.classList.add('ball-flying');
            
            if (isCorrect) {
                ballWrapper.style.transform = `translateX(-50%) translate(${moveX}px, ${distToGoalY}px) scale(0.6)`; 
                const diveDir = (targetIdx === 0) ? 120 : (targetIdx === 2) ? -120 : (Math.random()>0.5?100:-100);
                goalkeeper.style.transform = `translateX(-50%) translateX(${diveDir}px) rotate(${diveDir > 0 ? 40 : -40}deg)`;
                setTimeout(() => showFeedback(true), 700);
            } else {
                ballWrapper.style.transform = `translateX(-50%) translate(${moveX}px, ${distToGoalY}px) scale(0.6)`;
                
                let gkMoveX = 0;
                let gkRotate = 0;
                let gkMoveY = 0; 

                if (targetIdx === 0) {
                    gkMoveX = -100; gkRotate = -45; gkMoveY = -50;
                } else if (targetIdx === 2) { 
                    gkMoveX = 100; gkRotate = 45; gkMoveY = -50;
                }
                
                goalkeeper.style.transform = `translateX(-50%) translate(${gkMoveX}px, ${gkMoveY}px) rotate(${gkRotate}deg)`;
                
                setTimeout(() => {
                    ballWrapper.style.transition = "all 0.3s ease-out";
                    ballWrapper.style.transform = `translateX(-50%) translate(${moveX + (Math.random()*50-25)}px, ${distToGoalY + 50}px) scale(0.6)`;
                    playSound('miss');
                    showFeedback(false, "OOPS!"); 
                }, 500);
            }
        }

        function showFeedback(success, textOverride) {
            if (success) {
                score++;
                scoreDisplay.innerText = score;
                feedbackText.innerText = "GOAL!!!";
                feedbackText.className = "feedback-text text-[#fde047]";
                feedbackText.style.textShadow = "0 1vmin 0 #ca8a04";
                playSound('goal');
            } else {
                feedbackText.innerText = textOverride || "OOPS!";
                feedbackText.className = "feedback-text text-[#ef4444]";
                feedbackText.style.textShadow = "0 1vmin 0 #991b1b";
            }
            feedbackText.style.opacity = 1;
            feedbackText.style.transform = 'scale(1)';
            setTimeout(() => {
                currentQuestion++;
                nextTurn();
            }, 2000);
        }

        // --- Mini Game Logic ---
        function endGame() {
            miniGameScreen.classList.remove('hidden');
            startMiniGame();
        }

        function startMiniGame() {
            boxContainer.innerHTML = '';
            
            let reward = "";
            let rewardStyle = "";
            if (score >= 8) {
                reward = "🏆"; 
                rewardStyle = "filter: drop-shadow(0 0 10px gold); font-size: 10vmin;";
            } else if (score >= 5) {
                reward = "🥈"; 
                rewardStyle = "filter: grayscale(100%) brightness(120%) drop-shadow(0 0 10px silver); font-size: 10vmin;";
            } else {
                reward = "⭐"; 
                rewardStyle = "filter: drop-shadow(0 0 10px gold); font-size: 10vmin;";
            }

            const boxes = [];
            const winningIndex = Math.floor(Math.random() * 3);

            for(let i=0; i<3; i++) {
                const box = document.createElement('div');
                box.className = `mystery-box pos-${i}`;
                box.dataset.index = i;
                
                const lid = document.createElement('div');
                lid.className = "box-lid-mark";
                lid.innerText = "?";
                box.appendChild(lid);

                const content = document.createElement('div');
                content.className = "mystery-content";
                
                if (i === winningIndex) {
                    content.innerHTML = reward;
                    content.style.cssText = rewardStyle;
                    box.dataset.type = "win";
                } else {
                    content.innerText = "💨";
                    content.style.cssText = "font-size: 10vmin;";
                    box.dataset.type = "lose";
                }
                
                box.appendChild(content);
                boxContainer.appendChild(box);
                boxes.push(box);
            }

            setTimeout(() => {
                const winBox = boxes[winningIndex];
                winBox.classList.add('open', 'highlight'); 
                playSound('goal');
                
                setTimeout(() => {
                    winBox.classList.remove('open', 'highlight');
                    setTimeout(() => shuffleBoxes(boxes), 500);
                }, 2000); 
            }, 500);
        }

        function shuffleBoxes(boxes) {
            let shuffles = 0;
            const maxShuffles = 8; // Kept short to not lose toddler's attention
            let currentPositions = [0, 1, 2];

            const interval = setInterval(() => {
                shuffles++;
                currentPositions.sort(() => Math.random() - 0.5);
                
                boxes.forEach((box, index) => {
                    box.classList.remove('pos-0', 'pos-1', 'pos-2');
                    box.classList.add(`pos-${currentPositions[index]}`);
                    box.style.transform = "scale(0.9)";
                    setTimeout(() => box.style.transform = "scale(1)", 200);
                });

                if (shuffles >= maxShuffles) {
                    clearInterval(interval);
                    setTimeout(() => enableBoxPicking(boxes), 500); 
                }
            }, 500); 
        }

        function enableBoxPicking(boxes) {
            boxes.forEach(box => {
                box.onclick = () => {
                    if (box.classList.contains('open')) return;
                    
                    boxes.forEach(b => b.onclick = null);
                    box.classList.add('open');
                    let isWin = box.dataset.type === "win";
                    
                    if (isWin) {
                        playSound('goal');
                    } else {
                        playSound('miss');
                        const winBox = boxes.find(b => b.dataset.type === "win");
                        if(winBox) winBox.classList.add('open');
                    }
                    
                    // Transition to Final Summary
                    setTimeout(() => {
                        boxPhase.classList.add('hidden');
                        resultPhase.classList.remove('hidden');
                        finalScoreDisplay.innerText = `${score}/10`;
                        
                        // Luôn hiển thị bắn pháo giấy ở phần tổng kết
                        startConfetti(); 

                        if (isWin) {
                            prizeDisplay.innerHTML = box.querySelector('.mystery-content').innerHTML;
                            prizeDisplay.className = "text-[15vmin] drop-shadow-lg mb-6 animate-bounce";
                        } else {
                            prizeDisplay.innerHTML = "😊"; // Keep it positive
                            prizeDisplay.className = "text-[15vmin] drop-shadow-lg mb-6";
                        }
                    }, 1500);
                }
            });
        }

        // --- Beautiful Falling Confetti System ---
        const cvs = document.getElementById('fireworks');
        const ctx = cvs.getContext('2d');
        let confettis = [];
        let fwInterval;

        function resizeCvs() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCvs);
        resizeCvs();

        class ConfettiParticle {
            constructor() {
                this.x = Math.random() * cvs.width;
                this.y = Math.random() * cvs.height - cvs.height; // Start off-screen
                this.w = Math.random() * 15 + 10;
                this.h = Math.random() * 10 + 5;
                this.vx = Math.random() * 4 - 2;
                this.vy = Math.random() * 3 + 3;
                const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ffd166', '#06d6a0', '#118ab2', '#58cc02', '#ffb703', '#fde047', '#a855f7'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.tilt = Math.floor(Math.random() * 10) - 10;
                this.tiltAngleInc = (Math.random() * 0.07) + 0.05;
                this.tiltAngle = 0;
            }
            update() {
                this.tiltAngle += this.tiltAngleInc;
                this.y += this.vy;
                this.x += Math.sin(this.tiltAngle) * 2;
                this.tilt = Math.sin(this.tiltAngle) * 15;
                if (this.y > cvs.height) {
                    this.y = -20;
                    this.x = Math.random() * cvs.width;
                }
            }
            draw(ctx) {
                ctx.beginPath();
                ctx.lineWidth = this.w;
                ctx.strokeStyle = this.color;
                ctx.moveTo(this.x + this.tilt + this.w / 2, this.y);
                ctx.lineTo(this.x + this.tilt, this.y + this.tilt + this.h);
                ctx.stroke();
            }
        }

        function startConfetti() {
            confettis = [];
            for(let i=0; i<150; i++) {
                confettis.push(new ConfettiParticle());
            }
            playSound('confetti');
            if(fwInterval) clearInterval(fwInterval);
            loopConfetti();
        }

        function loopConfetti() {
            if(resultPhase.classList.contains('hidden')) {
                ctx.clearRect(0,0,cvs.width, cvs.height);
                return; 
            }
            ctx.clearRect(0,0,cvs.width, cvs.height);
            confettis.forEach(c => {
                c.update();
                c.draw(ctx);
            });
            requestAnimationFrame(loopConfetti);
        }
    </script>
</body>
