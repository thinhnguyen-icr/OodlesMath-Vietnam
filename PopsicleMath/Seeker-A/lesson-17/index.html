<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest: Cute Runes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Using Nunito for a very cute, rounded typography */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            /* Cute Sky Background */
            background: linear-gradient(180deg, #74b9ff 0%, #c8d6e5 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            color: #4a4a4a;
            overflow-x: hidden; /* Prevent scrollbars from moving clouds */
        }

        /* Scenery Elements: Rainbow and Clouds */
        .rainbow {
            position: fixed;
            bottom: -20vh;
            left: 50%;
            transform: translateX(-50%);
            width: 120vw;
            height: 120vw;
            max-width: 900px;
            max-height: 900px;
            border-radius: 50%;
            background: radial-gradient(circle at center,
                transparent 50%,
                #c2e9fb 50%, #c2e9fb 54%,
                #a1c4fd 54%, #a1c4fd 58%,
                #fdfd96 58%, #fdfd96 62%,
                #fecfef 62%, #fecfef 66%,
                #ff9a9e 66%, #ff9a9e 70%,
                transparent 70%
            );
            opacity: 0.7;
            z-index: -2;
            pointer-events: none;
        }

        .cloud {
            position: fixed;
            background: #ffffff;
            border-radius: 50px;
            z-index: -1;
            opacity: 0.9;
            pointer-events: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        .cloud::before {
            width: 50px; height: 50px;
            top: -20px; left: 15px;
        }
        .cloud::after {
            width: 70px; height: 70px;
            top: -30px; right: 15px;
        }

        .cloud1 { width: 120px; height: 40px; top: 10%; animation: floatCloud 35s linear infinite; }
        .cloud2 { width: 160px; height: 50px; top: 30%; animation: floatCloud 45s linear infinite; animation-delay: -15s; transform: scale(0.8); opacity: 0.7; }
        .cloud3 { width: 100px; height: 35px; top: 60%; animation: floatCloud 25s linear infinite; animation-delay: -5s; transform: scale(1.2); opacity: 0.8; }
        .cloud4 { width: 140px; height: 45px; top: 80%; animation: floatCloud 40s linear infinite; animation-delay: -25s; transform: scale(0.9); opacity: 0.6; }

        @keyframes floatCloud {
            0% { left: -20%; }
            100% { left: 120%; }
        }

        /* Cute Bold Text */
        .cute-bold {
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        /* Bubble Text Effect for Title */
        .cute-title {
            color: #ff6b81;
            text-shadow: 3px 3px 0px #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            filter: drop-shadow(0 4px 6px rgba(255, 107, 129, 0.3));
        }

        /* Light Glassmorphism Panel */
        .cute-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 6px solid #fff; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.8);
            border-radius: 40px;
        }

        /* Bouncy Cute Button */
        .btn-submit {
            background: linear-gradient(180deg, #ff9a9e 0%, #ff758c 100%);
            color: #fff;
            border: 4px solid #fff;
            box-shadow: 0 8px 0 #d65a6f, 0 15px 20px rgba(255, 117, 140, 0.4);
            border-radius: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn-submit:active {
            transform: translateY(8px) scale(0.95);
            box-shadow: 0 0px 0 #d65a6f, 0 5px 10px rgba(255, 117, 140, 0.4);
        }

        /* Cute Speaker Button */
        .btn-speaker {
            background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%);
            border: 4px solid #fff;
            box-shadow: 0 6px 0 #7ca4e4, 0 10px 15px rgba(161, 196, 253, 0.4);
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn-speaker:active {
            transform: translateY(6px) scale(0.9);
            box-shadow: 0 0px 0 #7ca4e4, 0 4px 6px rgba(161, 196, 253, 0.4);
        }

        /* Magic Runes / Cute Cards */
        .die-box {
            background: #ffffff;
            border: 5px solid #ffeaa7;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            width: 100%;
            max-width: 150px;
            aspect-ratio: 4/5;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08), inset 0 -5px 15px rgba(255, 234, 167, 0.4);
        }

        .die-box:hover {
            border-color: #ff9a9e;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 154, 158, 0.2), inset 0 -5px 15px rgba(255, 154, 158, 0.1);
        }

        .die-box:active {
            transform: scale(0.92);
        }

        .die-selected {
            border-color: #55efc4 !important;
            background: #e8fcf5 !important;
            box-shadow: 0 0 25px rgba(85, 239, 196, 0.6), inset 0 -5px 15px rgba(85, 239, 196, 0.2) !important;
            transform: scale(1.08) translateY(-8px);
            animation: happyBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes happyBounce {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-12px); }
            100% { transform: scale(1.08) translateY(-8px); }
        }

        /* Realistic 3D effect on emojis */
        .realistic-icon {
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.15)) saturate(1.2) scale(1.1);
        }

        .concrete-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            font-size: clamp(1.2rem, 4vw, 1.75rem);
            margin-top: 5px;
        }

        .counted-item {
            opacity: 0.5;
            transform: scale(0.7) rotate(-10deg);
            filter: grayscale(0.2);
            transition: all 0.2s ease;
        }

        .number-display {
            font-size: clamp(3.5rem, 10vw, 4.5rem);
            color: #ff758c;
            line-height: 1;
            /* Cuter shadow for number */
            text-shadow: 3px 3px 0px #ffeaa7; 
        }

        /* Animations */
        .rolling {
            animation: cuteWiggle 0.3s ease-in-out infinite;
            pointer-events: none;
            background: #fff0f3;
            border-color: #ffb8b8;
        }

        @keyframes cuteWiggle {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-8px) rotate(-6deg) scale(1.05); }
            50% { transform: translateY(0) rotate(6deg) scale(1); }
            75% { transform: translateY(-4px) rotate(-3deg) scale(1.02); }
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 12px 24px rgba(0,0,0,0.08); border-color: #ffeaa7; }
            50% { transform: scale(1.03); box-shadow: 0 15px 30px rgba(255, 234, 167, 0.8); border-color: #ffd32a; }
        }

        .pulse-hint {
            animation: softPulse 2s infinite;
        }

        /* Minigame Canvas Styling */
        #gameCanvas {
            /* Cute Daytime Sky */
            background: linear-gradient(180deg, #81ecec 0%, #74b9ff 100%);
            border-radius: 30px;
            border: 6px solid #fff;
            width: 100%;
            max-width: 320px;
            height: auto;
            aspect-ratio: 4/5;
            touch-action: none;
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.4), 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Score Badge */
        .score-badge {
            background: #fff;
            border: 3px solid #ffeaa7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <!-- Background Scenery -->
    <div class="rainbow"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>

    <!-- Main Screen -->
    <div class="cute-panel p-6 sm:p-8 w-full max-w-lg text-center relative mx-auto">
        
        <!-- Score -->
        <div class="score-badge absolute top-4 right-4 sm:top-6 sm:right-6 flex items-center gap-2 font-extrabold text-pink-500 text-lg sm:text-xl px-4 py-2 rounded-full z-10 transition-transform duration-300">
            <span class="realistic-icon">🏆</span> <span id="totalScore">0</span>
        </div>

        <!-- Logo (Kept the original but with soft shadow) -->
        <img src="https://image2url.com/r2/default/images/1770270908168-036a8878-e468-415d-9a50-73d8cbcc8574.png" alt="Logo" class="h-16 sm:h-20 mx-auto mb-4 object-contain filter drop-shadow-md transition-transform hover:scale-105">

        <h1 class="text-4xl sm:text-5xl cute-bold cute-title mb-6">Math Quest</h1>
        
        <!-- Question & Speaker Area -->
        <div class="min-h-[80px] flex flex-col items-center justify-center mb-6">
            <div class="flex items-center justify-center gap-3">
                <button id="speakerBtn" onclick="replayAudio()" class="btn-speaker p-3 rounded-full hidden focus:outline-none flex items-center justify-center" title="Listen again">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-7 sm:w-7 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.5 10H2a1 1 0 00-1 1v2a1 1 0 001 1h3.5l5.5 5.5v-15L5.5 10z" />
                    </svg>
                </button>
                <h2 id="questionText" class="text-2xl sm:text-3xl cute-bold text-gray-700 opacity-0 transition-opacity duration-300 drop-shadow-sm">Question</h2>
            </div>
            <p id="feedbackText" class="text-xl sm:text-2xl cute-bold opacity-0 transition-opacity duration-300 mt-2"></p>
        </div>

        <!-- Dice Area -->
        <div class="flex justify-center gap-4 sm:gap-8 mb-4 px-2">
            <div id="die1" class="die-box pulse-hint" onclick="handleBoxClick(1)">
                <div class="number-display cute-bold">?</div>
                <div class="concrete-items"></div>
            </div>
            <div id="die2" class="die-box pulse-hint" onclick="handleBoxClick(2)">
                <div class="number-display cute-bold">?</div>
                <div class="concrete-items"></div>
            </div>
        </div>

        <!-- Submit Button Container -->
        <div id="submitContainer" class="hidden mb-4 opacity-0 transition-opacity duration-300 h-[60px]">
            <button id="submitBtn" class="btn-submit px-8 py-3 cute-bold text-xl uppercase tracking-wider">
                Submit Answer
            </button>
        </div>

        <!-- Audio Elements -->
        <audio id="audioGreater" src="greater.mp3"></audio>
        <audio id="audioLess" src="less.mp3"></audio>
    </div>

    <!-- Mini Game Overlay (Lighter cute overlay) -->
    <div id="miniGameOverlay" class="fixed inset-0 bg-white/60 backdrop-blur-md z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300 p-4">
        <div class="cute-panel p-6 sm:p-8 text-center transform scale-95 transition-transform duration-300 w-full max-w-sm" id="miniGameModal">
            <h2 class="text-3xl sm:text-4xl cute-bold cute-title mb-4">Catch Treasures!</h2>
            
            <div class="flex justify-between items-center mb-6 font-bold text-lg">
                <div class="flex items-center gap-2 text-blue-600 bg-blue-100 border-2 border-blue-300 px-4 py-2 rounded-full shadow-sm">
                    <span>⏳</span> <span id="timeLeft">5</span>s
                </div>
                <div class="flex items-center gap-2 text-yellow-600 bg-yellow-100 border-2 border-yellow-300 px-4 py-2 rounded-full shadow-sm">
                    <span class="realistic-icon">💎</span> <span id="miniScore">0</span>
                </div>
            </div>

            <div class="flex justify-center w-full relative">
                <canvas id="gameCanvas" width="320" height="400"></canvas>
            </div>
            
            <p class="mt-6 text-pink-500 cute-bold text-sm sm:text-base bg-pink-100 border border-pink-200 rounded-full py-2 px-4 inline-block shadow-sm">Move the basket to catch the food! 💖</p>
        </div>
    </div>

    <script>
        // --- SOUND EFFECTS ENGINE (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSfx(type) {
            initAudio();
            switch(type) {
                case 'click':
                    playTone(600, 'sine', 0.1);
                    break;
                case 'pop':
                    playTone(900, 'sine', 0.05, 0.05);
                    break;
                case 'roll':
                    playTone(400 + Math.random() * 200, 'triangle', 0.05, 0.05);
                    break;
                case 'win':
                    playTone(440, 'sine', 0.1, 0.15);
                    setTimeout(() => playTone(554, 'sine', 0.1, 0.15), 100);
                    setTimeout(() => playTone(659, 'sine', 0.2, 0.15), 200);
                    setTimeout(() => playTone(880, 'sine', 0.4, 0.15), 300);
                    break;
                case 'lose':
                    playTone(300, 'sawtooth', 0.2, 0.1);
                    setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.1), 150);
                    break;
                case 'catch':
                    playTone(800 + Math.random() * 400, 'sine', 0.1, 0.08);
                    break;
                case 'end':
                    playTone(523, 'square', 0.2, 0.05);
                    setTimeout(() => playTone(659, 'square', 0.2, 0.05), 150);
                    setTimeout(() => playTone(783, 'square', 0.4, 0.05), 300);
                    break;
            }
        }

        // --- MAIN MATH GAME ---
        let val1 = 0;
        let val2 = 0;
        let currentQuestionType = ''; 
        let currentQuestionText = '';
        let gameState = 'REVEAL'; 
        let box1Revealed = false;
        let box2Revealed = false;
        let isRolling1 = false;
        let isRolling2 = false;
        let totalScore = 0;
        let selectedBoxIndex = null;
        let currentIcon1 = '🌸';
        let currentIcon2 = '⭐';

        const cuteIcons = ['🌸', '🍓', '⭐', '🍭', '🎀', '🦄', '🍎', '🍉', '🌻', '🍩', '🧁', '🎈', '💖', '🧸', '🌈', '🍦'];

        const die1El = document.getElementById('die1');
        const die2El = document.getElementById('die2');
        const questionTextEl = document.getElementById('questionText');
        const feedbackTextEl = document.getElementById('feedbackText');
        const submitBtn = document.getElementById('submitBtn');
        const submitContainer = document.getElementById('submitContainer');
        const totalScoreEl = document.getElementById('totalScore');
        const speakerBtn = document.getElementById('speakerBtn');

        document.body.addEventListener('click', initAudio, { once: true });
        document.body.addEventListener('touchstart', initAudio, { once: true });

        submitBtn.addEventListener('click', submitAnswer);

        function resetGameUI() {
            gameState = 'REVEAL';
            box1Revealed = false;
            box2Revealed = false;
            val1 = 0;
            val2 = 0;
            selectedBoxIndex = null;
            
            die1El.classList.remove('die-selected');
            die2El.classList.remove('die-selected');
            die1El.classList.add('pulse-hint');
            die2El.classList.add('pulse-hint');
            
            submitContainer.classList.add('opacity-0');
            submitContainer.classList.add('hidden');
            
            die1El.querySelector('.number-display').textContent = "?";
            die1El.querySelector('.concrete-items').innerHTML = "";
            die2El.querySelector('.number-display').textContent = "?";
            die2El.querySelector('.concrete-items').innerHTML = "";
            
            questionTextEl.textContent = "Tap cards to open! ✨";
            questionTextEl.style.opacity = '1';
            feedbackTextEl.style.opacity = '0';
            speakerBtn.classList.add('hidden');
        }

        resetGameUI();

        window.countItem = function(event, el) {
            event.stopPropagation(); 
            playSfx('pop');
            el.classList.toggle('counted-item');
        }

        function generateConcretes(num, icon) {
            return Array(num).fill(`<span class="realistic-icon text-pink-400 drop-shadow-sm inline-block cursor-pointer transition-all duration-200" onclick="countItem(event, this)">${icon}</span>`).join('');
        }

        function setDieContent(dieEl, number, icon) {
            dieEl.querySelector('.number-display').textContent = number;
            dieEl.querySelector('.concrete-items').innerHTML = generateConcretes(number, icon);
        }

        function handleBoxClick(index) {
            if (gameState === 'REVEAL') {
                revealBox(index);
            } else if (gameState === 'ANSWER') {
                selectBox(index);
            }
        }

        function revealBox(index) {
            const dieEl = index === 1 ? die1El : die2El;
            
            if (index === 1 && (box1Revealed || isRolling1)) return;
            if (index === 2 && (box2Revealed || isRolling2)) return;

            playSfx('click');
            
            if (index === 1) {
                isRolling1 = true;
                currentIcon1 = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
            }
            if (index === 2) {
                isRolling2 = true;
                currentIcon2 = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
            }

            dieEl.classList.remove('pulse-hint');
            dieEl.classList.add('rolling');

            let rollInterval = setInterval(() => {
                setDieContent(dieEl, Math.floor(Math.random() * 10) + 1, index === 1 ? currentIcon1 : currentIcon2);
                playSfx('roll');
            }, 80);

            setTimeout(() => {
                clearInterval(rollInterval);
                dieEl.classList.remove('rolling');

                if (index === 1) {
                    do {
                        val1 = Math.floor(Math.random() * 10) + 1;
                    } while (box2Revealed && val1 === val2); 
                    setDieContent(dieEl, val1, currentIcon1);
                    box1Revealed = true;
                    isRolling1 = false;
                } else {
                    do {
                        val2 = Math.floor(Math.random() * 10) + 1;
                    } while (box1Revealed && val2 === val1); 
                    setDieContent(dieEl, val2, currentIcon2);
                    box2Revealed = true;
                    isRolling2 = false;
                }

                checkBothRevealed();
            }, 600);
        }

        function checkBothRevealed() {
            if (box1Revealed && box2Revealed) {
                gameState = 'ANSWER';
                currentQuestionType = Math.random() < 0.5 ? 'greater' : 'less';
                currentQuestionText = currentQuestionType === 'greater' ? 'Which is GREATER?' : 'Which is LESS?';
                
                questionTextEl.style.opacity = '0';
                setTimeout(() => {
                    questionTextEl.textContent = currentQuestionText;
                    questionTextEl.style.opacity = '1';
                    speakerBtn.classList.remove('hidden');
                    playAudio(currentQuestionText, currentQuestionType);
                }, 300);
            }
        }

        function selectBox(index) {
            if (gameState !== 'ANSWER') return;
            playSfx('click');
            
            die1El.classList.remove('die-selected');
            die2El.classList.remove('die-selected');
            
            selectedBoxIndex = index;
            const selectedEl = index === 1 ? die1El : die2El;
            selectedEl.classList.add('die-selected');

            submitContainer.classList.remove('hidden');
            setTimeout(() => submitContainer.classList.remove('opacity-0'), 10);
        }

        function submitAnswer() {
            if (gameState !== 'ANSWER' || selectedBoxIndex === null) return;

            submitContainer.classList.add('opacity-0');
            setTimeout(() => submitContainer.classList.add('hidden'), 300);

            let correctBoxIndex;
            if (currentQuestionType === 'greater') {
                correctBoxIndex = val1 > val2 ? 1 : 2;
            } else {
                correctBoxIndex = val1 < val2 ? 1 : 2;
            }

            feedbackTextEl.style.opacity = '1';
            
            if (selectedBoxIndex === correctBoxIndex) {
                playSfx('win');
                feedbackTextEl.textContent = "Magical! Bonus time! ✨";
                feedbackTextEl.className = "text-xl sm:text-2xl cute-bold text-green-500 transition-opacity duration-300 mt-2";
                gameState = 'WAITING'; 
                speakerBtn.classList.add('hidden');
                
                setTimeout(() => {
                    startMiniGame();
                }, 1500);
            } else {
                playSfx('lose');
                feedbackTextEl.textContent = "Oops, try again! 🥺";
                feedbackTextEl.className = "text-xl sm:text-2xl cute-bold text-red-500 transition-opacity duration-300 mt-2";
            }

            die1El.classList.remove('die-selected');
            die2El.classList.remove('die-selected');
        }

        function playAudio(text, type) {
            const audioId = type === 'greater' ? 'audioGreater' : 'audioLess';
            const audioEl = document.getElementById(audioId);
            
            audioEl.play().catch(e => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const msg = new SpeechSynthesisUtterance(text);
                    msg.lang = 'en-US'; 
                    msg.rate = 0.9; 
                    msg.pitch = 1.2; // Higher pitch for cuter voice
                    window.speechSynthesis.speak(msg);
                }
            });
        }

        function replayAudio() {
            playSfx('click');
            if(currentQuestionText && currentQuestionType) {
                playAudio(currentQuestionText, currentQuestionType);
            }
        }

        // --- TREASURE CATCH MINI GAME ---
        const overlay = document.getElementById('miniGameOverlay');
        const modal = document.getElementById('miniGameModal');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timeLeftEl = document.getElementById('timeLeft');
        const miniScoreEl = document.getElementById('miniScore');

        let basket = { x: 135, y: 330, w: 60, h: 50 };
        let treasures = [];
        let miniScore = 0;
        let timeRemaining = 5;
        let gameLoopId;
        let timerId;
        let isGameRunning = false;

        function updateBasketPos(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width; 
            let x = (clientX - rect.left) * scaleX - basket.w / 2;
            
            if (x < 0) x = 0;
            if (x + basket.w > canvas.width) x = canvas.width - basket.w;
            basket.x = x;
        }

        canvas.addEventListener('mousemove', e => updateBasketPos(e.clientX));
        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); 
            updateBasketPos(e.touches[0].clientX);
        });

        function spawnTreasure() {
            if (Math.random() < 0.05) {
                // Cuter emojis for items
                const emojis = ['🎀', '🍬', '⭐', '🍓', '🍰'];
                const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                treasures.push({
                    x: Math.random() * (canvas.width - 40) + 10,
                    y: -40,
                    w: 40,
                    h: 40,
                    speed: 2 + Math.random() * 2.5, 
                    emoji: randomEmoji
                });
            }
        }

        function gameLoop() {
            if (!isGameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Basket
            ctx.font = '50px Arial';
            ctx.filter = "drop-shadow(0px 4px 6px rgba(0,0,0,0.2))"; 
            ctx.fillText('🧺', basket.x, basket.y + 40); 
            ctx.filter = "none";

            spawnTreasure();
            for (let i = treasures.length - 1; i >= 0; i--) {
                let t = treasures[i];
                t.y += t.speed;
                
                ctx.font = '35px Arial';
                ctx.filter = "drop-shadow(0px 3px 3px rgba(0,0,0,0.2))";
                ctx.fillText(t.emoji, t.x, t.y + 30);
                ctx.filter = "none";

                // Hitbox detection
                let centerX = t.x + t.w/2;
                let centerY = t.y + t.h/2;
                
                if (centerX > basket.x - 10 && centerX < basket.x + basket.w + 10 &&
                    centerY > basket.y && centerY < basket.y + basket.h) {
                    
                    playSfx('catch'); 
                    miniScore++;
                    miniScoreEl.textContent = miniScore;
                    treasures.splice(i, 1);
                } else if (t.y > canvas.height) {
                    treasures.splice(i, 1);
                }
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function startMiniGame() {
            miniScore = 0;
            timeRemaining = 5;
            treasures = [];
            basket.x = canvas.width / 2 - basket.w / 2;
            isGameRunning = true;
            
            miniScoreEl.textContent = miniScore;
            timeLeftEl.textContent = timeRemaining;

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('scale-95');
            }, 10);

            gameLoop();

            timerId = setInterval(() => {
                timeRemaining--;
                timeLeftEl.textContent = timeRemaining;
                if (timeRemaining <= 0) {
                    endMiniGame();
                }
            }, 1000);
        }

        function endMiniGame() {
            isGameRunning = false;
            clearInterval(timerId);
            cancelAnimationFrame(gameLoopId);
            
            playSfx('end'); 

            totalScore += miniScore;
            totalScoreEl.textContent = totalScore;
            
            totalScoreEl.parentElement.classList.add('scale-110');
            setTimeout(() => {
                totalScoreEl.parentElement.classList.remove('scale-110');
            }, 400);

            overlay.classList.add('opacity-0');
            modal.classList.add('scale-95');
            setTimeout(() => {
                overlay.classList.add('hidden');
                
                resetGameUI();
            }, 300);
        }
    </script>
</body>
</html>
