<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/brand.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Magic Shell ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ocean-top: #00d2ff;
      --ocean-mid: #3a7bd5;
      --ocean-bottom: #1c356b;
      
      --sand-top: #ffdf73;
      --sand-bottom: #e6b13b;

      --shell-outer: #ff4d85;
      --shell-inner: #fdf2f8;
      
      --ui-primary: #ffb100;
      --ui-primary-shadow: #cc6600;
      --ui-accent: #8b5cf6;
      
      --danger: #ff4757;
      --success: #2ed573;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--ocean-top) 0%, var(--ocean-mid) 50%, var(--ocean-bottom) 100%);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    /* Ambient Ocean Effects */
    .ocean-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .light-rays {
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 150%;
      height: 150%;
      background: repeating-conic-gradient(
        from 0deg at 50% 0%,
        rgba(255, 255, 255, 0.15) 0deg,
        rgba(255, 255, 255, 0) 10deg,
        rgba(255, 255, 255, 0.1) 20deg,
        rgba(255, 255, 255, 0) 30deg
      );
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
      animation: gentleRotate 30s infinite alternate linear;
      z-index: 1;
    }

    @keyframes gentleRotate {
      from { transform: translateX(-50%) rotate(-5deg); }
      to { transform: translateX(-50%) rotate(5deg); }
    }

    /* Locked Sand Dunes */
    .sea-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 25vh;
      z-index: 2;
    }
    
    .sand-wave {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 -10px 15px rgba(0,0,0,0.2));
    }

    #coralContainer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
    }

    .coral-item {
      position: absolute;
      bottom: 5%;
      transform-origin: bottom center;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
      animation: gentleSway 4s infinite alternate ease-in-out;
    }

    @keyframes gentleSway {
      0% { transform: rotate(-3deg); }
      100% { transform: rotate(3deg); }
    }

    /* Cute Bubbles */
    .bubble {
      position: absolute;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.3) 60%, rgba(255,255,255,0) 100%);
      border-radius: 50%;
      box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
      animation: floatUp infinite ease-in;
      z-index: 3;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
    }

    /* Ambient Background Fish */
    .fish-wrapper {
      position: absolute;
      z-index: 6;
      filter: drop-shadow(0 12px 10px rgba(0,0,0,0.25));
    }
    .fish-right { animation: swimRight infinite linear; transform: scaleX(-1); }
    .fish-left { animation: swimLeft infinite linear; }

    @keyframes swimRight {
      0% { transform: translateX(-200px) scaleX(-1) translateY(0); }
      25% { transform: translateX(25vw) scaleX(-1) translateY(-20px); }
      75% { transform: translateX(75vw) scaleX(-1) translateY(20px); }
      100% { transform: translateX(120vw) scaleX(-1) translateY(0); }
    }

    @keyframes swimLeft {
      0% { transform: translateX(120vw) translateY(0); }
      25% { transform: translateX(75vw) translateY(20px); }
      75% { transform: translateX(25vw) translateY(-20px); }
      100% { transform: translateX(-200px) translateY(0); }
    }

    /* --- GAME UI --- */
    .game-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9);
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    #gameScreen {
      justify-content: flex-end;
      padding-bottom: 22vh; 
    }

    /* Premium Text */
    h1 {
      font-size: clamp(3.5rem, 8vw, 6rem);
      text-align: center;
      margin: 0 0 25px 0;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      -webkit-text-stroke: 3px #1c356b;
      text-shadow: 0 6px 0 #1c356b, 0 15px 20px rgba(0,0,0,0.5);
      line-height: 1.1;
    }

    .score-board {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 10px 30px;
      border-radius: 99px;
      font-size: clamp(1.2rem, 3.5vw, 1.8rem);
      font-weight: 900;
      color: #1c356b;
      border: 4px solid #1c356b;
      box-shadow: 0 6px 0 #1c356b, 0 15px 20px rgba(0,0,0,0.25);
      z-index: 20;
      display: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .score-board span {
      color: var(--ui-primary);
      -webkit-text-stroke: 1px #cc6600;
      font-size: 1.2em;
      vertical-align: middle;
    }

    .btn {
      background: var(--ui-primary);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 900;
      padding: 16px 50px;
      border: 4px solid #fff;
      border-radius: 99px;
      cursor: pointer;
      box-shadow: 0 8px 0 var(--ui-primary-shadow), 0 15px 25px rgba(0,0,0,0.3);
      transition: all 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      -webkit-text-stroke: 1.5px #cc6600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn:hover { 
      transform: translateY(3px); 
      box-shadow: 0 5px 0 var(--ui-primary-shadow), 0 10px 20px rgba(0,0,0,0.3); 
      filter: brightness(1.05);
    }
    .btn:active { 
      transform: translateY(8px); 
      box-shadow: 0 0 0 var(--ui-primary-shadow), 0 5px 10px rgba(0,0,0,0.3); 
    }

    /* --- LOCKED STAGE WRAPPER --- */
    .stage-wrapper {
      position: absolute;
      bottom: 22vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      z-index: 10;
    }

    /* --- PEDESTAL --- */
    .coral-pedestal {
      position: absolute;
      bottom: -45px;
      width: min(500px, 85vw);
      height: 160px;
      background: var(--ui-accent);
      border-radius: 50%;
      border: 6px solid #4c1d95;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 -15px 0 rgba(0,0,0,0.2);
      z-index: 1;
    }

    .pedestal-decor {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 30px;
      z-index: 5;
    }

    /* --- THE SHELL --- */
    .shell-wrapper {
      position: relative;
      width: min(560px, 94vw);
      height: min(520px, 60vh);
      perspective: 2000px;
      transform-style: preserve-3d;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .shell-glow {
      position: absolute;
      width: min(480px, 85vw);
      height: min(480px, 85vw);
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,177,0,0.3) 40%, transparent 70%);
      border-radius: 50%;
      z-index: 2;
      animation: pulseGlow 2s infinite alternate ease-in-out;
      bottom: 0px;
    }

    @keyframes pulseGlow {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    .shell-base {
      position: relative;
      width: min(460px, 88vw);
      height: min(350px, 45vh);
      z-index: 8;
    }

    .shell-bottom {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      width: min(440px, 82vw);
      height: min(180px, 20vh);
      background: var(--shell-outer);
      border-radius: 20px 20px 200px 200px;
      border: 6px solid #fff;
      border-top: 10px solid #fff;
      box-shadow: 0 25px 30px rgba(0,0,0,0.4), inset 0 -20px 0 rgba(0,0,0,0.15);
      z-index: 3;
      background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(255,255,255,0.15) 15px, rgba(255,255,255,0.15) 25px);
    }

    .shell-interior {
      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      width: min(380px, 72vw);
      height: min(130px, 15vh);
      background: radial-gradient(ellipse at center, #ffffff 0%, #fbcfe8 100%);
      border-radius: 20px 20px 180px 180px;
      box-shadow: inset 0 15px 25px rgba(219, 39, 119, 0.4), inset 0 -8px 0 rgba(255,255,255,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 4;
      padding-bottom: 25px;
    }

    .shell-top {
      position: absolute;
      left: 50%;
      bottom: 115px;
      width: min(440px, 82vw);
      height: min(240px, 28vh);
      transform: translateX(-50%) rotateX(-65deg);
      transform-origin: center bottom;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 12;
      pointer-events: none;
      transform-style: preserve-3d;
    }

    .shell-top.opening { 
      transform: translateX(-50%) rotateX(-115deg); 
      z-index: 2; 
    }
    
    .shell-top.snap { 
      transform: translateX(-50%) rotateX(0deg); 
      z-index: 12; 
    }

    .shell-top-outer, .shell-top-inner {
      position: absolute;
      inset: 0;
      border-radius: 45% 45% 10% 10% / 100% 100% 10% 10%;
      overflow: hidden;
      backface-visibility: hidden;
    }

    .shell-top-outer {
      background: var(--shell-outer);
      border: 8px solid #fff;
      border-bottom: 15px solid #e11d48;
      box-shadow: inset 0 -20px 0 rgba(0,0,0,0.15), inset 0 20px 0 rgba(255,255,255,0.3);
      background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(255,255,255,0.15) 15px, rgba(255,255,255,0.15) 25px);
    }

    .shell-top-inner {
      background: #fdf2f8;
      transform: rotateX(180deg) translateZ(1px);
      box-shadow: inset 0 0 30px rgba(219, 39, 119, 0.3);
      border: 6px solid #ff99cc;
    }

    .pearl-container {
      width: min(280px, 55vw);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: center;
      gap: 8px 10px;
      z-index: 5;
      margin-top: 15px;
    }

    .pearl {
      width: clamp(25px, 5vw, 35px);
      height: clamp(25px, 5vw, 35px);
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle at 35% 25%, #fff 0%, #ffeb3b 40%, #ff9800 90%);
      box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2), 0 6px 8px rgba(0,0,0,0.3), 0 0 8px rgba(255, 235, 59, 0.6);
      position: relative;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: pearlFloat 2s infinite alternate ease-in-out;
      pointer-events: auto;
    }

    .pearl::after {
      content: '';
      position: absolute;
      top: 10%; left: 15%;
      width: 30%; height: 30%;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
      filter: blur(1px);
    }

    .pearl:hover:not(.collected) {
      transform: scale(1.2) translateY(-5px);
      filter: brightness(1.1);
    }

    .pearl.collected { transform: scale(0); opacity: 0; pointer-events: none; animation: none; }
    .pearl.danger-hit { animation: dangerPulse 0.1s 6 alternate; }

    @keyframes pearlFloat {
      0% { transform: translateY(0); }
      100% { transform: translateY(-5px); }
    }

    @keyframes dangerPulse {
      from { transform: scale(1); filter: drop-shadow(0 0 5px #ff0000); }
      to { transform: scale(1.2); filter: drop-shadow(0 0 20px #ff0000) brightness(1.5); }
    }

    /* Modal Box (Win Screen) */
    .message-box {
      background: #fff;
      padding: 40px;
      border-radius: 30px;
      text-align: center;
      border: 6px solid #1c356b;
      box-shadow: 0 15px 0 #1c356b, 0 30px 40px rgba(0,0,0,0.4);
      max-width: min(90vw, 450px);
      z-index: 30;
      position: relative;
    }

    .message-box::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 3px dashed rgba(28, 53, 107, 0.2);
      border-radius: 20px;
      pointer-events: none;
    }

    .message-box h2 {
      font-size: clamp(2.8rem, 7vw, 4rem);
      margin: 0 0 10px 0;
      text-transform: uppercase;
      -webkit-text-stroke: 2px #1c356b;
      text-shadow: 0 5px 0 #1c356b;
      color: var(--success);
    }

    .message-box p {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 800;
      color: #1c356b;
      margin: 0 0 30px 0;
    }

    .win-text { color: var(--success); }
    .lose-text { color: var(--danger); }

    /* --- SLOWER & REALISTIC SHARK CHASE SCENE (18s Animation) --- */
    .chase-scene {
      position: fixed;
      inset: 0;
      background: rgba(0, 20, 50, 0.85); /* Tối hơn để tăng cảm giác bí ẩn */
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .chase-scene.active {
      opacity: 1;
    }

    .chase-container {
      position: absolute;
      top: 30%;
      left: -600px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    /* Thay đổi thời gian lên 18s và giảm số vòng lặp để bơi cực kỳ chậm rãi */
    .chase-scene.active .chase-container {
      animation: zigZagChase 18s linear forwards;
    }

    .chase-shark { 
      width: 400px; 
      height: 266px; 
      filter: drop-shadow(0 20px 25px rgba(0,0,0,0.8)); 
      transform: scaleX(-1); /* Lật cá mập lại để quay mặt đuổi theo thợ lặn */
    }
    .chase-diver { width: 200px; height: 120px; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6)); margin-top: 20px;}

    /* Cảnh bơi qua bơi lại 2 lần trong 18 giây (chậm rãi và hùng vĩ) */
    @keyframes zigZagChase {
       0%   { transform: translateX(-50vw) translateY(0) scaleX(1); } 
       45%  { transform: translateX(130vw) translateY(-5vh) scaleX(1); } /* Vòng 1: bơi qua phải (Rất chậm) */
       50%  { transform: translateX(130vw) translateY(15vh) scaleX(-1); } /* Đảo chiều bên ngoài màn hình */
       95%  { transform: translateX(-50vw) translateY(10vh) scaleX(-1); } /* Vòng 2: bơi qua trái (Rất chậm) */
       100% { transform: translateX(-50vw) translateY(10vh) scaleX(-1); }
    }

    #fireworksCanvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 25;
    }

    .start-graphics {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
      position: relative;
    }

    .start-graphics::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 60%);
      z-index: -1;
      border-radius: 50%;
      animation: pulseGlow 2s infinite alternate;
    }

    @media (max-width: 768px) {
      .coral-pedestal { height: 130px; bottom: -35px; }
      .start-graphics { gap: 10px; margin-bottom: 30px; }
      .start-graphics svg { transform: scale(0.8); }
      .chase-shark { width: 280px; height: 186px; }
      .chase-diver { width: 140px; height: 84px; margin-top: 15px;}
    }
  </style>
</head>
<body>
  <img src="../assets/logo-oodles-math.png" class="oodles-logo">
  <div class="ocean-bg">
    <div class="light-rays"></div>
    <div class="sea-floor">
      <svg class="sand-wave" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="var(--sand-bottom)" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,160C960,139,1056,149,1152,160C1248,171,1344,181,1392,186.7L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
      </svg>
      <svg class="sand-wave" viewBox="0 0 1440 320" preserveAspectRatio="none" style="bottom:-20px;">
        <path fill="var(--sand-top)" fill-opacity="1" d="M0,256L60,245.3C120,235,240,213,360,218.7C480,224,600,256,720,256C840,256,960,224,1080,213.3C1200,203,1320,213,1380,218.7L1440,224L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
      </svg>
      <div id="coralContainer"></div>
    </div>
  </div>

  <canvas id="fireworksCanvas"></canvas>

  <div class="score-board" id="scoreDisplay">SCORE: <span id="scoreText">0</span> / 11 <span>★</span></div>

  <div class="game-container">
    <div class="screen active" id="startScreen">
      <h1>MAGIC<br>SHELL</h1>
      <div class="start-graphics">
        <div style="width: 100px; height: 100px; transform: rotate(-15deg); animation: pearlFloat 2s infinite alternate;" id="startSvg1"></div>
        <div style="width: 160px; height: 160px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); animation: pearlFloat 1.5s infinite alternate;" id="heroShellIcon"></div>
        <div style="width: 100px; height: 100px; transform: rotate(15deg); animation: pearlFloat 2s infinite alternate reverse;" id="startSvg2"></div>
      </div>
      <button class="btn" onclick="startGame()">PLAY <span style="font-size:1.2em; -webkit-text-stroke:0;">▶</span></button>
    </div>

    <div class="screen" id="gameScreen">
      <div class="stage-wrapper">
        <div class="coral-pedestal">
          <div class="pedestal-decor" id="pedestalDecor"></div>
        </div>
        <div class="shell-wrapper">
          <div class="shell-glow"></div>
          <div class="shell-base">
            <div class="shell-bottom"></div>
            <div class="shell-interior">
              <div class="pearl-container" id="pearlContainer"></div>
            </div>
            <div class="shell-top" id="shellTop" aria-hidden="true">
              <div class="shell-top-outer"></div>
              <div class="shell-top-inner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Màn hình Win -->
    <div class="screen" id="endScreen">
      <div class="message-box">
        <h2 id="endTitle" class="win-text">YOU WIN!</h2>
        <p id="endSubtitle">Perfect Score!</p>
        <button class="btn" onclick="resetGame()" style="margin:0 auto; font-size:1.6rem; padding:12px 40px;">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <!-- CHASE SCENE OVERLAY (Thay thế cho màn hình Lose) -->
  <div id="chaseScene" class="chase-scene">
    <div class="chase-container">
      <div class="chase-shark" id="chaseShark"></div>
      <div class="chase-diver" id="chaseDiver"></div>
    </div>
  </div>

  <script>
    // --- REALISTIC & BORDERLESS SVGs ---
    const svgs = {
      clownFish: `<svg viewBox="0 0 120 100" width="100%" height="100%">
        <defs>
          <linearGradient id="cfBody" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff7a00"/><stop offset="100%" stop-color="#cc2900"/></linearGradient>
          <linearGradient id="cfWhite" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#b2bec3"/></linearGradient>
          <linearGradient id="cfFin" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff6600"/><stop offset="100%" stop-color="#b32400"/></linearGradient>
        </defs>
        <path d="M 85 50 C 115 20, 125 35, 115 50 C 125 65, 115 80, 85 50 Z" fill="url(#cfFin)"/>

    // Inject SVGs
    document.getElementById('startSvg1').innerHTML = svgs.clownFish;

    document.getElementById('chaseShark').innerHTML = svgs.chaseShark;
    document.getElementById('chaseDiver').innerHTML = svgs.chaseDiver;

    // Decorate Pedestal
    const decorContainer = document.getElementById('pedestalDecor');

    // Background corals
    const coralContainer = document.getElementById('coralContainer');
    const coralsInfo = [
      { type: svgs.smoothCoral1, left: '5%', size: 120 },
      { type: svgs.smoothCoral2, left: '20%', size: 90 },
      { type: svgs.smoothCoral1, left: '40%', size: 100 },
      { type: svgs.smoothCoral2, right: '10%', size: 130 },
      { type: svgs.smoothCoral1, right: '30%', size: 110 }
    ];

    coralsInfo.forEach(c => {
      const el = document.createElement('div');
      el.className = 'coral-item';
      el.style.width = c.size + 'px';
      el.style.height = c.size + 'px';
      if (c.left) el.style.left = c.left;
      if (c.right) el.style.right = c.right;
      el.style.animationDelay = (Math.random() * 2) + 's';
      el.innerHTML = c.type;
      coralContainer.appendChild(el);
    });

    // Bubbles
    const oceanBg = document.querySelector('.ocean-bg');
    for (let i = 0; i < 25; i++) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const size = Math.random() * 20 + 10;
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = Math.random() * 100 + '%';
      bubble.style.animationDelay = (Math.random() * 5) + 's';
      bubble.style.animationDuration = (Math.random() * 5 + 3) + 's';
      oceanBg.appendChild(bubble);
    }

    // Background Fish Array
    const fishTypes = [svgs.clownFish, svgs.blueTang];
    for (let i = 0; i < 8; i++) {
      const fish = document.createElement('div');
      const direction = Math.random() > 0.5 ? 'fish-right' : 'fish-left';
      fish.className = `fish-wrapper ${direction}`;
      fish.innerHTML = fishTypes[i % fishTypes.length];
      const w = Math.random() * 50 + 60;
      fish.style.width = w + 'px';
      fish.style.height = w + 'px';
      fish.style.top = (Math.random() * 50 + 10) + '%';
      fish.style.animationDelay = (Math.random() * 5) + 's';
      fish.style.animationDuration = (Math.random() * 15 + 10) + 's';
      oceanBg.appendChild(fish);
    }

    // --- GAME LOGIC ---
    const totalPearls = 12;
    const targetScore = 11;
    let score = 0;
    let dangerPearlIndex = -1;
    let isGameOver = false;

    const pearlColors = [
      'radial-gradient(circle at 35% 25%, #fff 0%, #ff9ff3 50%, #f368e0 100%)',
      'radial-gradient(circle at 35% 25%, #fff 0%, #48dbfb 50%, #0abde3 100%)',
      'radial-gradient(circle at 35% 25%, #fff 0%, #feca57 50%, #ff9f43 100%)',
      'radial-gradient(circle at 35% 25%, #fff 0%, #1dd1a1 50%, #10ac84 100%)'
    ];

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const endScreen = document.getElementById('endScreen');
    const chaseScene = document.getElementById('chaseScene');
    const pearlContainer = document.getElementById('pearlContainer');
    const shellTop = document.getElementById('shellTop');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const scoreText = document.getElementById('scoreText');

    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(type, freqStart, freqEnd, duration, vol = 0.5) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
      if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playPop() { playTone('sine', 800, 1200, 0.1, 0.2); }
    function playSnap() { playTone('square', 100, 30, 0.3, 0.5); }
    
    // Slower Chase Music logic (18s)
    let chaseAudioInterval;
    let chaseTimeout1, chaseTimeout2;
    function playChaseMusic() {
      let speed = 400;
      let isLow = true;
      let startTime = Date.now();

      function playNote() {
        if (Date.now() - startTime > 18000) return;
        playTone('sawtooth', isLow ? 80 : 85, isLow ? 75 : 80, speed/1000, 0.3);
        isLow = !isLow;
        speed = Math.max(200, speed * 0.95); // Giảm tốc độ từ từ
        chaseAudioInterval = setTimeout(playNote, speed);
      }
      playNote();
    }
    function stopChaseMusic() {
      clearTimeout(chaseAudioInterval);
    }

    function playWin() {
      const notes = [440, 554, 659, 880];
      notes.forEach((freq, i) => setTimeout(() => playTone('sine', freq, freq + 10, 0.2, 0.2), i * 150));
    }

    function openShell() {
      shellTop.classList.remove('snap');
      shellTop.classList.add('opening');
    }

    function closeShell() {
      shellTop.classList.remove('opening');
      shellTop.classList.add('snap');
    }

    function startGame() {
      initAudio();
      switchScreen(startScreen, gameScreen);
      scoreDisplay.style.display = 'block';
      resetGame();
    }

    function resetGame() {
      isGameOver = false;
      score = 0;
      updateScore();
      openShell();
      generatePearls();
      dangerPearlIndex = Math.floor(Math.random() * totalPearls);
      switchScreen(endScreen, gameScreen);
      scoreDisplay.style.display = 'block';
      clearFireworks();
    }

    function resetGameInternal() {
      isGameOver = false;
      score = 0;
      updateScore();
      generatePearls();
      dangerPearlIndex = Math.floor(Math.random() * totalPearls);
    }

    function generatePearls() {
      pearlContainer.innerHTML = '';
      for (let i = 0; i < totalPearls; i++) {
        const pearl = document.createElement('div');
        pearl.className = 'pearl';
        pearl.style.background = pearlColors[Math.floor(Math.random() * pearlColors.length)];
        pearl.style.animationDelay = (Math.random() * 1) + 's';
        pearl.onclick = () => handlePearlClick(i, pearl);
        pearlContainer.appendChild(pearl);
      }
    }

    function handlePearlClick(index, pearlElement) {
      if (isGameOver || pearlElement.classList.contains('collected')) return;
      if (index === dangerPearlIndex) triggerSnap(pearlElement);
      else markSafe(pearlElement);
    }

    function markSafe(pearl) {
      playPop();
      pearl.classList.add('collected');
      score++;
      updateScore();
      if (score >= targetScore) {
        isGameOver = true;
        setTimeout(winGame, 500);
      }
    }

    function triggerSnap(pearl) {
      isGameOver = true;
      playSnap();
      pearl.classList.add('danger-hit');
      pearl.style.background = 'radial-gradient(circle at 35% 25%, #fff 0%, #ff4757 50%, #c0392b 100%)';
      closeShell();
      
      // Khởi động hoạt cảnh chậm rãi rượt đuổi
      chaseTimeout1 = setTimeout(() => {
        chaseScene.classList.add('active');
        playChaseMusic();
      }, 400);

      // Kết thúc hoạt cảnh sau 18.5s và về trang chủ
      chaseTimeout2 = setTimeout(() => {
        chaseScene.classList.remove('active');
        stopChaseMusic();
        scoreDisplay.style.display = 'none';
        switchScreen(gameScreen, startScreen);
        resetGameInternal();
      }, 18500);
    }

    function updateScore() {
      scoreText.innerText = score;
    }

    function winGame() {
      playWin();
      switchScreen(gameScreen, endScreen);
      scoreDisplay.style.display = 'none';
      startFireworks();
    }

    function switchScreen(hideElement, showElement) {
      hideElement.classList.remove('active');
      setTimeout(() => showElement.classList.add('active'), 300);
    }

    // --- CARTOON FIREWORKS ---
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createParticles(x, y) {
      const colors = ['#ff4d85', '#ffb100', '#2ed573', '#48dbfb', '#ff9ff3', '#fff'];
      for (let i = 0; i < 40; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 20,
          vy: (Math.random() - 0.5) * 20,
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          alpha: 1,
          decay: Math.random() * 0.03 + 0.02
        });
      }
    }

    function drawFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.5;
        p.alpha -= p.decay;
        
        if (p.alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }
        
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      
      if (particles.length > 0 || (isGameOver && endScreen.classList.contains('active'))) {
        if (Math.random() < 0.08) createParticles(Math.random() * canvas.width, Math.random() * (canvas.height * 0.6));
        animationId = requestAnimationFrame(drawFireworks);
      }
    }

    function startFireworks() {
      particles = [];
      createParticles(canvas.width / 2, canvas.height / 2);
      cancelAnimationFrame(animationId);
      drawFireworks();
    }

    function clearFireworks() {
      particles = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      cancelAnimationFrame(animationId);
    }
  </script>
