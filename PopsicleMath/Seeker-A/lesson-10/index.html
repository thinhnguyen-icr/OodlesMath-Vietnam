<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Line Subtraction Game V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            /* Beautiful Landscape Background */
            background: linear-gradient(180deg, #87CEEB 0%, #B3E5FC 55%, #A5D6A7 55%, #4CAF50 100%);
            touch-action: manipulation;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* Animated Clouds */
        @keyframes float-cloud {
            from { transform: translateX(-150px); }
            to { transform: translateX(120vw); }
        }
        .animate-cloud-slow { animation: float-cloud 45s linear infinite; }
        .animate-cloud-fast { animation: float-cloud 25s linear infinite; }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 8px solid #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 8px rgba(255, 255, 255, 0.4);
            width: 100%;
            max-width: 850px;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        .number-line-container {
            position: relative;
            height: 140px;
            margin: 30px 0;
            user-select: none;
        }

        @media (min-width: 768px) {
            .number-line-container {
                height: 180px;
                margin: 50px 0;
            }
        }

        .line {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 8px;
            background: linear-gradient(90deg, #f43f5e, #fb7185, #f43f5e);
            border-radius: 10px;
            transform: translateY(-50%);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255,255,255,0.3);
        }

        @media (min-width: 768px) {
            .line { height: 12px; }
        }

        .tick-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateX(-50%);
            z-index: 10;
        }

        @media (min-width: 768px) {
            .tick-zone { width: 50px; }
        }

        .tick {
            width: 4px;
            height: 20px;
            background-color: #be123c;
            position: absolute;
            bottom: 50%; 
            border-radius: 4px;
        }

        @media (min-width: 768px) {
            .tick { width: 6px; height: 28px; }
        }

        .tick-label {
            font-weight: 800;
            font-size: 1.25rem;
            color: #1e293b;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 65px; 
            text-shadow: 0 2px 0 white, 0 -2px 0 white, 2px 0 0 white, -2px 0 0 white;
        }

        @media (min-width: 768px) {
            .tick-label { font-size: 2rem; margin-top: 95px; }
        }

        .tick-zone:hover .tick-label {
            transform: scale(1.4) translateY(3px);
            color: #f43f5e;
        }

        /* SVG Frog Character Styling */
        .character {
            position: absolute;
            bottom: 50%; 
            width: 60px;
            height: 80px;
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30; 
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.2));
            transform: translateY(15%); 
        }

        @media (min-width: 768px) {
            .character { width: 80px; height: 110px; }
        }

        .arc-path {
            position: absolute;
            top: 0;
            fill: none;
            stroke-width: 4;
            stroke-dasharray: 8, 4;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
            filter: drop-shadow(0 4px 3px rgba(0,0,0,0.15));
        }

        @media (min-width: 768px) {
            .arc-path { stroke-width: 6; stroke-dasharray: 12, 6; }
        }

        @keyframes drawArc {
            to { stroke-dashoffset: 0; }
        }

        .jump-animation {
            animation: jump 0.4s ease;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(15%) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        @media (min-width: 768px) {
            @keyframes jump {
                0%, 100% { transform: translateY(15%) scale(1); }
                50% { transform: translateY(-80px) scale(1.1); }
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(244, 63, 94, 0.3);
            transform: scale(0);
            animation: ripple-effect 0.6s ease-out;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }

        /* Candy-style Buttons */
        .btn-primary { 
            background: #f43f5e; 
            box-shadow: 0 6px 0 #be123c, 0 10px 15px -3px rgba(244, 63, 94, 0.5); 
            transition: all 0.15s; 
        }
        .btn-primary:active { transform: translateY(6px); box-shadow: 0 0px 0 #be123c; }
        
        .btn-secondary { 
            background: #fbbf24; 
            box-shadow: 0 6px 0 #d97706, 0 10px 15px -3px rgba(251, 191, 36, 0.5); 
            transition: all 0.15s; 
        }
        .btn-secondary:active { transform: translateY(6px); box-shadow: 0 0px 0 #d97706; }
        
        .btn-success { 
            background: #10b981; 
            box-shadow: 0 6px 0 #047857, 0 10px 15px -3px rgba(16, 185, 129, 0.5); 
            transition: all 0.15s; 
        }
        .btn-success:active { transform: translateY(6px); box-shadow: 0 0px 0 #047857; }

        /* Bonus Game Styles */
        .bonus-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #f0fdf4 0%, #bbf7d0 100%);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            border-radius: 2rem;
            animation: fadeIn 0.3s ease-in;
            padding-top: 1rem;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .bonus-fly-element {
            position: absolute;
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 600;
            user-select: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        @media (min-width: 768px) {
            .bonus-fly-element { width: 56px; height: 56px; }
        }

        .fly-inner {
            width: 100%;
            height: 100%;
            position: relative;
            animation: buzz-jitter 0.1s infinite;
        }

        @keyframes buzz-jitter {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(1.5px, -1.5px); }
            50% { transform: translate(-1.5px, 1.5px); }
            75% { transform: translate(1.5px, 1.5px); }
        }

        .fly-wing {
            position: absolute;
            width: 18px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(150, 180, 200, 0.6);
            border-radius: 50%;
            top: 12px;
            transform-origin: center;
            animation: flap 0.05s infinite alternate;
        }

        @media (min-width: 768px) {
            .fly-wing { width: 24px; height: 14px; top: 18px; }
        }

        .wing-left { left: 4px; transform: rotate(-30deg); }
        .wing-right { right: 4px; transform: rotate(30deg); }

        @keyframes flap {
            from { transform: scaleY(1) rotate(20deg); }
            to { transform: scaleY(0.2) rotate(40deg); }
        }

        .fly-body {
            position: absolute;
            width: 14px;
            height: 18px;
            background: #1e293b;
            border-radius: 40% 40% 50% 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @media (min-width: 768px) {
            .fly-body { width: 18px; height: 26px; }
        }

        .fly-head {
            position: absolute;
            width: 100%;
            height: 9px;
            background: #0f172a;
            border-radius: 50%;
            top: -5px;
            left: 0;
        }

        @media (min-width: 768px) {
            .fly-head { height: 12px; top: -7px; }
        }

        .bonus-frog {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 160px;
            z-index: 700;
            pointer-events: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
        }

        @media (min-width: 768px) {
            .bonus-frog { width: 160px; height: 220px; }
        }

        .bonus-tongue {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 650;
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.6);
        }
    </style>

    <script>
        // --- Audio System (Synthesized, no external files) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioUnlocked = false;

        function unlockAudio() {
            if (!audioUnlocked) {
                audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                gain.gain.value = 0;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.01);
                audioUnlocked = true;
            }
        }

        document.body.addEventListener('click', unlockAudio, { once: true });
        document.body.addEventListener('touchstart', unlockAudio, { once: true });

        function playSound(type) {
            if (!audioUnlocked || audioCtx.state === 'suspended') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'correct') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554.37, now + 0.1);
                osc.frequency.setValueAtTime(659.25, now + 0.2);
                osc.frequency.setValueAtTime(880, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'catch') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'firework') {
                const bufferSize = audioCtx.sampleRate * 0.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.5, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                
                noise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(now);
            }
        }

        // --- Game Logic ---
        let currentNum1 = 0;
        let currentNum2 = 0;
        let score = 0;
        let currentPos = 0;
        let isInitialJumping = false;
        let solvedCount = 0;
        let totalRounds = 5;
        let isBonusActive = false;
        let bonusTimer = null;
        let flyInterval = null;
        let fireworkInterval = null;
        const maxNum = 10;
        
        const character = document.getElementById('character');
        const num1El = document.getElementById('num1');
        const num2El = document.getElementById('num2');
        const answerDisplay = document.getElementById('answer-display');
        const checkBtn = document.getElementById('check-btn');
        const nextBtn = document.getElementById('next-btn');
        const resetBtn = document.getElementById('reset-jumps-btn');
        const feedback = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const solvedCountEl = document.getElementById('solved-count');
        const ticksContainer = document.getElementById('ticks-container');
        const arcSvg = document.getElementById('arc-svg');
        const bonusOverlay = document.getElementById('bonus-overlay');
        const bonusBar = document.getElementById('bonus-timer-bar');
        const bonusSeconds = document.getElementById('bonus-seconds');
        const tongueLine = document.getElementById('tongue-line');
        const tongueTip = document.getElementById('tongue-tip');
        const mouthClosed = document.querySelector('.bonus-mouth-closed');
        const mouthOpen = document.querySelector('.bonus-mouth-open');

        // Start Screen Logic
        document.getElementById('start-game-btn').addEventListener('click', () => {
            unlockAudio();
            document.getElementById('start-screen').classList.add('hidden');
            playSound('correct');
            initNumberLine();
            generateProblem();
        });

        // End Screen Logic
        document.getElementById('play-again-btn').addEventListener('click', () => {
            document.getElementById('end-screen').classList.add('hidden');
            clearInterval(fireworkInterval);
            score = 0;
            solvedCount = 0;
            scoreEl.innerText = score;
            solvedCountEl.innerText = `1/${totalRounds}`;
            generateProblem();
        });

        function initNumberLine() {
            ticksContainer.innerHTML = '';
            for (let i = 0; i <= maxNum; i++) {
                const percentage = 5 + (i * 9);
                const zone = document.createElement('div');
                zone.className = 'tick-zone';
                zone.style.left = `${percentage}%`;
                zone.onclick = () => handleTickClick(i);
                
                const tick = document.createElement('div');
                tick.className = 'tick';
                
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.innerText = i;
                
                zone.appendChild(tick);
                zone.appendChild(label);
                ticksContainer.appendChild(zone);
            }
        }

        function getPositionForValue(val) {
            return 5 + (val * 9);
        }

        function createRipple(pos) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            const left = getPositionForValue(pos);
            const container = document.getElementById('number-line');
            ripple.style.left = `calc(${left}% - 10px)`;
            ripple.style.top = '50%';
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function generateProblem() {
            currentNum1 = Math.floor(Math.random() * 8) + 3; // 3 to 10
            currentNum2 = Math.floor(Math.random() * currentNum1) + 1;
            
            num1El.innerText = currentNum1;
            num2El.innerText = currentNum2;
            solvedCountEl.innerText = `${Math.min(solvedCount + 1, totalRounds)}/${totalRounds}`;
            
            resetAnswerDisplay();
            
            currentPos = 0;
            isInitialJumping = true;
            feedback.style.opacity = '0';
            
            document.getElementById('action-buttons').classList.remove('hidden');
            nextBtn.classList.add('hidden');
            bonusOverlay.classList.add('hidden');
            
            clearArcs();
            moveCharacter(0, false);
            
            setTimeout(() => { showInitialJump(); }, 600);
        }

        function resetAnswerDisplay() {
            answerDisplay.innerText = '?';
            answerDisplay.className = "w-20 h-20 sm:w-28 sm:h-28 md:w-32 md:h-32 flex items-center justify-center border-4 sm:border-[6px] border-dashed border-slate-300 rounded-2xl sm:rounded-[2rem] bg-slate-50 text-slate-400 transition-all duration-300 shadow-inner";
        }

        function moveCharacter(value, animate = true) {
            const pos = getPositionForValue(value);
            const charWidth = character.offsetWidth;
            character.style.left = `calc(${pos}% - ${charWidth / 2}px)`;
            
            if (animate) {
                character.classList.remove('jump-animation');
                void character.offsetWidth;
                character.classList.add('jump-animation');
                playSound('jump');
                setTimeout(() => createRipple(value), 350);
            }
            currentPos = value;
            
            if (!isInitialJumping) {
                updateAnswerDisplay();
            }
        }

        function updateAnswerDisplay() {
            answerDisplay.innerText = currentPos;
            answerDisplay.classList.remove('border-dashed', 'text-slate-400', 'border-slate-300', 'bg-slate-50');
            answerDisplay.classList.add('border-solid', 'text-rose-500', 'border-rose-400', 'bg-rose-50');
        }

        function handleTickClick(targetVal) {
            if (!nextBtn.classList.contains('hidden') || isBonusActive) return;
            isInitialJumping = false;

            if (targetVal < currentPos) {
                const stepBack = () => {
                    if (currentPos > targetVal) {
                        const start = currentPos;
                        const end = currentPos - 1;
                        drawJumpArc(start, end, '#f43f5e');
                        moveCharacter(end);
                        setTimeout(stepBack, 450);
                    }
                };
                stepBack();
            } else if (targetVal > currentPos) {
                const stepForward = () => {
                    if (currentPos < targetVal) {
                        const start = currentPos;
                        const end = currentPos + 1;
                        drawJumpArc(start, end, '#fb7185');
                        moveCharacter(end);
                        setTimeout(stepForward, 450);
                    }
                };
                stepForward();
            }
        }

        function drawJumpArc(start, end, color = '#f43f5e') {
            const containerRect = arcSvg.getBoundingClientRect();
            const containerWidth = containerRect.width;
            const containerHeight = containerRect.height;
            
            const startX = (getPositionForValue(start) / 100) * containerWidth;
            const endX = (getPositionForValue(end) / 100) * containerWidth;
            const centerY = containerHeight / 2;
            const dist = Math.abs(end - start);
            const height = Math.min(containerHeight * 0.4, dist * (containerHeight / 5));

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${startX} ${centerY} Q ${(startX + endX) / 2} ${centerY - height * 2.5} ${endX} ${centerY}`;
            
            path.setAttribute("d", d);
            path.setAttribute("class", "arc-path");
            path.style.stroke = color;
            path.style.animation = "drawArc 0.5s forwards";
            
            arcSvg.appendChild(path);
        }

        function clearArcs() {
            arcSvg.innerHTML = '';
        }

        function showInitialJump() {
            const step = () => {
                if (currentPos < currentNum1) {
                    const next = currentPos + 1;
                    drawJumpArc(currentPos, next, '#cbd5e1'); 
                    moveCharacter(next);
                    setTimeout(step, 450);
                } else {
                    isInitialJumping = false;
                    resetAnswerDisplay();
                }
            };
            step();
        }

        function checkAnswer() {
            const correctAnswer = currentNum1 - currentNum2;

            if (currentPos === correctAnswer) {
                score += 10;
                solvedCount++;
                scoreEl.innerText = score;
                
                showFeedback("CORRECT! 🌟", "text-emerald-500");
                playSound('correct');
                answerDisplay.classList.remove('bg-rose-50', 'border-rose-400', 'text-rose-500');
                answerDisplay.classList.add('bg-emerald-100', 'border-emerald-500', 'text-emerald-600');
                createConfetti();
                
                document.getElementById('action-buttons').classList.add('hidden');
                
                if (solvedCount >= totalRounds) {
                    setTimeout(() => {
                        document.getElementById('end-screen').classList.remove('hidden');
                        document.getElementById('final-score').innerText = score;
                        playSound('correct');
                        fireworkInterval = setInterval(launchFirework, 700);
                    }, 1500);
                } else if (solvedCount % 2 === 0) {
                    setTimeout(startBonusGame, 1000);
                } else {
                    nextBtn.classList.remove('hidden');
                }
            } else {
                showFeedback("TRY AGAIN! 🐸", "text-rose-500");
                playSound('wrong');
                answerDisplay.classList.add('animate-pulse');
                setTimeout(() => {
                    answerDisplay.classList.remove('animate-pulse');
                }, 500);
            }
        }

        function startBonusGame() {
            isBonusActive = true;
            bonusOverlay.classList.remove('hidden');
            
            for(let i=0; i<4; i++) spawnFly();
            flyInterval = setInterval(spawnFly, 1200);

            let timeLeft = 6000;
            const interval = 50;
            
            bonusTimer = setInterval(() => {
                timeLeft -= interval;
                const percentage = (timeLeft / 6000) * 100;
                bonusBar.style.width = percentage + '%';
                bonusSeconds.innerText = (timeLeft / 1000).toFixed(1);

                if (timeLeft <= 0) endBonusGame();
            }, interval);
        }

        function spawnFly() {
            if(!isBonusActive) return;
            const fly = document.createElement('div');
            fly.className = 'bonus-fly-element pointer-events-auto';
            
            fly.innerHTML = `
                <div class="fly-inner">
                    <div class="fly-wing wing-left"></div>
                    <div class="fly-wing wing-right"></div>
                    <div class="fly-body">
                        <div class="fly-head"></div>
                    </div>
                </div>
            `;
            
            const rect = bonusOverlay.getBoundingClientRect();
            const startX = Math.random() * (rect.width - 60);
            const startY = Math.random() * (rect.height * 0.45) + 60; 
            
            fly.style.left = startX + 'px';
            fly.style.top = startY + 'px';
            
            bonusOverlay.appendChild(fly);

            const moveFly = () => {
                if(!isBonusActive || !fly.parentElement) return;
                const nextX = Math.max(20, Math.min(rect.width - 80, parseFloat(fly.style.left) + (Math.random() - 0.5) * 180));
                const nextY = Math.max(60, Math.min(rect.height * 0.55, parseFloat(fly.style.top) + (Math.random() - 0.5) * 120));
                
                fly.animate([
                    { left: fly.style.left, top: fly.style.top },
                    { left: nextX + 'px', top: nextY + 'px' }
                ], { duration: 1000 + Math.random() * 1000, easing: 'ease-in-out' }).onfinish = moveFly;
            };
            moveFly();

            fly.onclick = (e) => catchFly(e, fly);
        }

        function catchFly(e, fly) {
            if (fly.getAttribute('data-caught')) return;
            fly.setAttribute('data-caught', 'true');
            fly.style.pointerEvents = 'none';

            playSound('catch');

            const rect = bonusOverlay.getBoundingClientRect();
            const frogX = rect.width / 2;
            const frogY = rect.height - (rect.height < 500 ? 50 : 70); 
            
            const flyRect = fly.getBoundingClientRect();
            const flyX = flyRect.left - rect.left + flyRect.width / 2;
            const flyY = flyRect.top - rect.top + flyRect.height / 2;

            mouthClosed.setAttribute('visibility', 'hidden');
            mouthOpen.setAttribute('visibility', 'visible');

            tongueLine.setAttribute('x1', frogX);
            tongueLine.setAttribute('y1', frogY);
            tongueLine.setAttribute('x2', frogX);
            tongueLine.setAttribute('y2', frogY);
            tongueLine.setAttribute('visibility', 'visible');
            
            tongueTip.setAttribute('cx', frogX);
            tongueTip.setAttribute('cy', frogY);
            tongueTip.setAttribute('visibility', 'visible');

            const duration = 100;
            const startTime = performance.now();

            function animateTongue(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                if (progress < 1) {
                    const curX = frogX + (flyX - frogX) * progress;
                    const curY = frogY + (flyY - frogY) * progress;
                    tongueLine.setAttribute('x2', curX);
                    tongueLine.setAttribute('y2', curY);
                    tongueTip.setAttribute('cx', curX);
                    tongueTip.setAttribute('cy', curY);
                    requestAnimationFrame(animateTongue);
                } else {
                    score += 5;
                    scoreEl.innerText = score;
                    
                    const pullStartTime = performance.now();
                    function retract(time2) {
                        const elapsed2 = time2 - pullStartTime;
                        const progress2 = Math.min(elapsed2 / duration, 1);
                        const curX = flyX + (frogX - flyX) * progress2;
                        const curY = flyY + (frogY - flyY) * progress2;
                        
                        tongueLine.setAttribute('x2', curX);
                        tongueLine.setAttribute('y2', curY);
                        tongueTip.setAttribute('cx', curX);
                        tongueTip.setAttribute('cy', curY);
                        
                        fly.style.left = (curX - flyRect.width/2) + 'px';
                        fly.style.top = (curY - flyRect.height/2) + 'px';
                        fly.style.transform = `scale(${1 - progress2}) rotate(${progress2 * 360}deg)`;

                        if (progress2 < 1) {
                            requestAnimationFrame(retract);
                        } else {
                            tongueLine.setAttribute('visibility', 'hidden');
                            tongueTip.setAttribute('visibility', 'hidden');
                            fly.remove();
                            mouthClosed.setAttribute('visibility', 'visible');
                            mouthOpen.setAttribute('visibility', 'hidden');
                        }
                    }
                    requestAnimationFrame(retract);
                }
            }
            requestAnimationFrame(animateTongue);
        }

        function endBonusGame() {
            clearInterval(bonusTimer);
            clearInterval(flyInterval);
            isBonusActive = false;
            document.querySelectorAll('.bonus-fly-element').forEach(f => f.remove());
            bonusOverlay.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            showFeedback("BONUS DONE! 🌟", "text-rose-500");
        }

        function showFeedback(text, colorClass) {
            feedback.innerText = text;
            feedback.className = `h-10 sm:h-12 text-2xl sm:text-4xl font-black transition-all duration-300 opacity-100 transform translate-y-0 ${colorClass}`;
        }

        // Standard Confetti for correct answers
        function createConfetti() {
            const colors = ['#f43f5e', '#10b981', '#f59e0b', '#3b82f6', '#a855f7', '#ec4899'];
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'absolute w-3 h-3 sm:w-4 sm:h-4 z-[200]';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                document.body.appendChild(conf);

                conf.animate([
                    { transform: `translate(0, 0) rotate(0deg) scale(0.5)`, opacity: 1 },
                    { transform: `translate(${(Math.random() - 0.5) * 400}px, ${window.innerHeight + 50}px) rotate(${Math.random() * 1080}deg) scale(1.5)`, opacity: 0 }
                ], {
                    duration: 2500 + Math.random() * 1500,
                    easing: 'cubic-bezier(0,.37,.52,.99)'
                }).onfinish = () => conf.remove();
            }
        }

        // Firework functions for End Screen
        function launchFirework() {
            const x = Math.random() * (window.innerWidth - 100) + 50;
            const y = window.innerHeight; 
            const rocket = document.createElement('div');
            rocket.className = 'absolute w-2 h-8 bg-yellow-300 rounded-full z-[150] shadow-[0_0_10px_#fde047]';
            rocket.style.left = x + 'px';
            rocket.style.top = y + 'px';
            document.body.appendChild(rocket);
            
            const targetY = window.innerHeight * 0.1 + Math.random() * (window.innerHeight * 0.4);
            playSound('jump'); // Ascend sound effect
            
            rocket.animate([
                { top: y + 'px', transform: 'scaleY(1)' },
                { top: targetY + 'px', transform: 'scaleY(0.5)' }
            ], { duration: 800, easing: 'ease-out' }).onfinish = () => {
                rocket.remove();
                playSound('firework'); // Explosion sound
                createExplosion(x, targetY);
            };
        }

        function createExplosion(x, y) {
            const colors = ['#f43f5e', '#10b981', '#3b82f6', '#f59e0b', '#a855f7', '#06b6d4', '#ec4899'];
            for(let i=0; i<60; i++) {
                const particle = document.createElement('div');
                particle.className = 'absolute w-3 h-3 rounded-full z-[150]';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.boxShadow = `0 0 8px ${particle.style.backgroundColor}`;
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 80 + Math.random() * 250;
                
                particle.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*velocity}px, ${Math.sin(angle)*velocity + 150}px) scale(0)`, opacity: 0 }
                ], { duration: 1200 + Math.random()*1000, easing: 'cubic-bezier(.17,.89,.32,1)' }).onfinish = () => particle.remove();
            }
        }

        // Event Listeners
        checkBtn.addEventListener('click', checkAnswer);
        nextBtn.addEventListener('click', generateProblem);
        resetBtn.addEventListener('click', () => {
            if (isBonusActive) return;
            isInitialJumping = true; 
            clearArcs();
            currentPos = 0;
            moveCharacter(0, false);
            setTimeout(showInitialJump, 300);
            playSound('jump');
        });

        window.addEventListener('resize', () => {
            clearArcs();
            const pos = getPositionForValue(currentPos);
            const charWidth = character.offsetWidth;
            character.style.left = `calc(${pos}% - ${charWidth / 2}px)`;
        });
    </script>
</body>
</html>
