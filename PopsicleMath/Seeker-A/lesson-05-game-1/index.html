<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Math Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --pastel-red: #ff8a80;
            --pastel-orange: #ffd180;
            --pastel-green: #b9f6ca;
            --pastel-blue: #80d8ff;
            --text-color: #455a64;
            --dot-color: radial-gradient(circle at 30% 30%, #ff5252, #c62828);
            --dot-color-alt: radial-gradient(circle at 30% 30%, #448aff, #1565c0);
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- UI Elements --- */
        .game-header {
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 4px solid #fff;
        }

        .score-board {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ff5252;
            background: white;
            padding: 8px 25px;
            border-radius: 50px;
            border: 4px solid var(--pastel-red);
            box-shadow: 0 4px 0 var(--pastel-red);
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: white;
            border: 3px solid #eceff1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #eceff1;
        }

        .icon-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 #eceff1; 
        }

        /* --- Main Game Area --- */
        .game-container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.3s;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; color: #1e88e5; text-shadow: 2px 2px 0px #fff; font-weight: 900; }
        p.subtitle { font-size: 1.4rem; color: #546e7a; font-weight: 700; margin-top: 0;}

        .problem-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 25px 0;
        }

        .operator {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffa726;
            text-shadow: 3px 3px 0px #fff;
            transform: translateY(-25px); /* Move the plus sign slightly higher */
        }

        /* --- Ten Frame Styles --- */
        .ten-frame-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .ten-frame {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 6px;
            background-color: #fff9c4;
            padding: 10px;
            border: 6px solid #ffd54f;
            border-radius: 16px;
            width: 280px;
            height: 120px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .cell {
            background-color: #fff;
            border: 2px dashed #ffb74d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: popIn 0.4s ease forwards;
            box-shadow: inset -4px -4px rgba(0,0,0,0.2), 0 3px 5px rgba(0,0,0,0.2);
        }

        .dot.color1 { background: var(--dot-color); }
        .dot.color2 { background: var(--dot-color-alt); }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .num-label {
            font-weight: 900; 
            font-size: 1.8rem;
            color: #fff;
            background: #ab47bc;
            padding: 5px 20px;
            border-radius: 20px;
            border: 3px solid #8e24aa;
            box-shadow: 0 4px 0 #8e24aa;
        }

        /* --- Answers --- */
        .answers-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .answer-btn {
            background-color: #fff;
            border: 5px solid #4fc3f7;
            border-radius: 25px;
            padding: 15px 45px;
            font-size: 2.8rem;
            font-weight: 900;
            color: #0277bd;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 120px;
            box-shadow: 0 8px 0 #4fc3f7;
        }

        .answer-btn:hover { background-color: #e1f5fe; }
        .answer-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #4fc3f7; }

        .answer-btn.correct { 
            background-color: #69f0ae; 
            border-color: #00e676; 
            color: #1b5e20; 
            box-shadow: 0 8px 0 #00e676;
            animation: bounce 0.5s; 
        }
        .answer-btn.wrong { 
            background-color: #ff8a80; 
            border-color: #d50000; 
            color: white; 
            box-shadow: 0 8px 0 #d50000;
            animation: shake 0.4s; 
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* --- Feedback --- */
        .feedback-text {
            height: 40px;
            margin-top: 15px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #d81b60;
        }

        /* --- Overlays & Fireworks --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        .win-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            border: 8px solid #69f0ae;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            z-index: 1001;
            position: relative;
        }

        .win-title { font-size: 3.5rem; color: #ff3d00; margin: 0; text-shadow: 2px 2px 0px #ffd54f; font-weight: 900; }
        
        .stats-box {
            background: #f1f8e9;
            border: 4px solid #c5e1a5;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .stats-box p {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 8px 0;
            color: #33691e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        /* --- Mario Bonus Game Styles --- */
        #marioBonus {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e1f5fe;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 2000;
            overflow: hidden;
            touch-action: none;
        }

        #marioCanvas {
            display: block;
            margin: auto;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .bonus-ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            text-shadow: 3px 3px 0 #1565c0;
            pointer-events: none;
        }

        .bonus-start-msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff59d;
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            text-shadow: 4px 4px 0 #d84315;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { scale: 1; } to { scale: 1.1; } }

        @media (max-width: 600px) {
            .ten-frame { width: 140px; height: 60px; gap: 2px; padding: 4px; border-width: 4px;}
            .dot { width: 18px; height: 18px; }
            .answer-btn { padding: 10px 25px; font-size: 2rem; box-shadow: 0 6px 0 #4fc3f7;}
            .operator { font-size: 3rem; transform: translateY(-15px);}
            .bonus-ui { font-size: 1.5rem; }
            .bonus-start-msg { font-size: 1.8rem; }
            .num-label { font-size: 1.2rem; padding: 3px 12px; }
            .game-header { padding: 10px; }
            h1 { font-size: 1.8rem; }
            p.subtitle { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="game-header">
        <div style="display: flex; align-items: center;">
            <div class="score-board" id="scoreBoard">Score: 0 / 15</div>
            <div id="timerDisplay" class="timer-display" style="display:none; margin-left:15px; font-size:1.4rem; font-weight: 900; color: #1e88e5;">⏱ 00:00</div>
        </div>
        <div class="controls">
            <button class="icon-btn" id="soundToggle" title="Toggle Sound">🔊</button>
            <button class="icon-btn" id="timerToggle" title="Toggle Timer">⏱</button>
            <button class="icon-btn" id="resetBtn" title="Restart Game">🔄</button>
        </div>
    </div>

    <div class="game-container" id="mathGame">
        <h1 id="gameTitle">Magic Math Adventure</h1>
        <p class="subtitle">10 and how many more? Let's count the candies!</p>

        <div class="problem-display">
            <div class="ten-frame-container">
                <div class="ten-frame" id="frame1"></div>
                <div id="numLabel1" class="num-label">10</div>
            </div>
            
            <div class="operator">+</div>

            <div class="ten-frame-container">
                <div class="ten-frame" id="frame2"></div>
                <div id="numLabel2" class="num-label">0</div>
            </div>
        </div>

        <div class="feedback-text" id="feedback"></div>

        <div class="answers-grid" id="answersGrid"></div>
    </div>

    <!-- Fireworks Canvas -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- Win Modal -->
    <div class="overlay" id="winOverlay">
        <div class="win-card">
            <h2 class="win-title">AWESOME! 🏆</h2>
            <p style="font-size: 1.6rem; margin-top: 10px; font-weight: 800; color: #ff9800;">You are a Math Superstar!</p>
            
            <div class="stats-box">
                <p>⭐ <span>Score: <span id="finalScore" style="color:#d32f2f;">15</span></span></p>
                <p>🪙 <span>Bonus Coins: <span id="finalCoins" style="color:#f57c00;">0</span></span></p>
                <p id="finalTimeLine" style="display: none;">⏱ <span>Time: <span id="finalTime" style="color:#1976d2;">00:00</span></span></p>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
                <button class="answer-btn" style="background-color: #b9f6ca; border-color: #69f0ae; color: #1b5e20; box-shadow: 0 8px 0 #69f0ae; font-size: 2rem;" onclick="resetGame()">🌟 Play Again! 🌟</button>
            </div>
        </div>
    </div>

    <!-- Mario Bonus Game Section -->
    <div id="marioBonus">
        <div class="bonus-ui">
            <div>💰 COINS: <span id="bonusCoins">0</span></div>
            <div>⏱ SEC: <span id="bonusTime">10</span></div>
        </div>
        <div id="bonusMsg" class="bonus-start-msg">Tap to Jump & Collect Coins!</div>
        <canvas id="marioCanvas"></canvas>
    </div>

    <script>
        // --- State ---
        const TARGET_SCORE = 15;
        let score = 0;
        let currentCorrectAnswer = 0;
        let isMuted = false;
        let timerActive = false;
        let timerInterval = null;
        let secondsElapsed = 0;
        let canAnswer = true;
        let totalBonusCoins = 0;

        // --- DOM Elements ---
        const mathGame = document.getElementById('mathGame');
        const frame1 = document.getElementById('frame1');
        const frame2 = document.getElementById('frame2');
        const numLabel1 = document.getElementById('numLabel1');
        const numLabel2 = document.getElementById('numLabel2');
        const answersGrid = document.getElementById('answersGrid');
        const scoreBoard = document.getElementById('scoreBoard');
        const feedback = document.getElementById('feedback');
        
        const winOverlay = document.getElementById('winOverlay');
        const finalScore = document.getElementById('finalScore');
        const finalCoins = document.getElementById('finalCoins');
        const finalTime = document.getElementById('finalTime');
        const finalTimeLine = document.getElementById('finalTimeLine');
        
        const marioBonus = document.getElementById('marioBonus');
        const bonusCoinsDisplay = document.getElementById('bonusCoins');
        const bonusTimeDisplay = document.getElementById('bonusTime');
        const bonusMsg = document.getElementById('bonusMsg');

        // --- Audio Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, volume = 0.1) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            correct: () => { playTone(523, 'sine', 0.5); setTimeout(()=>playTone(659, 'sine', 0.5), 100); },
            wrong: () => playTone(220, 'triangle', 0.3, 0.2),
            jump: () => playTone(400, 'square', 0.1, 0.05),
            coin: () => { playTone(987, 'sine', 0.1, 0.1); setTimeout(()=>playTone(1318, 'sine', 0.2, 0.1), 50); },
            win: () => {
                [523, 659, 783, 1046].forEach((freq, i) => {
                    setTimeout(() => playTone(freq, 'sine', 0.3, 0.15), i * 150);
                });
            }
        };

        // --- Math Game Logic ---
        function initFrame(el) {
            el.innerHTML = '';
            for (let i = 0; i < 10; i++) el.appendChild(Object.assign(document.createElement('div'), {className:'cell'}));
        }

        function fillFrame(el, count, colorClass) {
            const cells = el.querySelectorAll('.cell');
            for (let i = 0; i < count; i++) {
                cells[i].appendChild(Object.assign(document.createElement('div'), {className:`dot ${colorClass}`}));
            }
        }

        function generateQuestion() {
            canAnswer = true;
            feedback.textContent = '';
            const n1 = 10, n2 = Math.floor(Math.random() * 11);
            currentCorrectAnswer = n1 + n2;
            initFrame(frame1); initFrame(frame2);
            fillFrame(frame1, n1, 'color1'); fillFrame(frame2, n2, 'color2');
            numLabel1.textContent = n1; numLabel2.textContent = n2;
            generateAnswers(currentCorrectAnswer);
        }

        function generateAnswers(correct) {
            answersGrid.innerHTML = '';
            let opts = [correct];
            while(opts.length < 3) {
                let w = 10 + Math.floor(Math.random() * 11);
                if(!opts.includes(w)) opts.push(w);
            }
            opts.sort(()=>Math.random()-0.5).forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = val;
                btn.onclick = () => {
                    if(!canAnswer) return;
                    if(val === correct) {
                        canAnswer = false; score++; updateScore();
                        btn.classList.add('correct');
                        feedback.textContent = `🌟 Great job! 10 + ${val-10} = ${val}! 🌟`;
                        sounds.correct();
                        
                        // Auto-advance logic
                        setTimeout(() => {
                            if(score >= TARGET_SCORE) {
                                showWinScreen();
                            } else if (score % 3 === 0) {
                                startBonusLevel(); 
                            } else {
                                generateQuestion(); // Auto-next
                            }
                        }, 1500);

                    } else {
                        btn.classList.add('wrong'); sounds.wrong();
                        setTimeout(()=>btn.classList.remove('wrong'), 500);
                    }
                };
                answersGrid.appendChild(btn);
            });
        }

        function updateScore() { scoreBoard.textContent = `Score: ${score} / ${TARGET_SCORE}`; }
        
        function resetGame() { 
            score = 0; secondsElapsed = 0; totalBonusCoins = 0;
            updateScore(); 
            winOverlay.style.display = 'none'; 
            marioBonus.style.display = 'none';
            stopFireworks();
            if(timerActive) {
                clearInterval(timerInterval);
                document.getElementById('timerToggle').onclick(); // turn off
                document.getElementById('timerToggle').onclick(); // turn on to reset
            }
            generateQuestion(); 
        }

        function formatTime(secs) {
            const m = Math.floor(secs/60).toString().padStart(2,'0');
            const s = (secs%60).toString().padStart(2,'0');
            return `${m}:${s}`;
        }

        function showWinScreen() {
            sounds.win();
            winOverlay.style.display = 'flex';
            finalScore.textContent = score;
            finalCoins.textContent = totalBonusCoins;
            if(timerActive) {
                finalTimeLine.style.display = 'block';
                finalTime.textContent = formatTime(secondsElapsed);
                clearInterval(timerInterval);
            } else {
                finalTimeLine.style.display = 'none';
            }
            startFireworks();
        }

        // --- Bonus Game Engine ---
        const canvas = document.getElementById('marioCanvas');
        const ctx = canvas.getContext('2d');
        let bonusActive = false, currentBonusCoins = 0, bonusTimeLeft = 10;
        let marioY = 0, marioVY = 0, groundY = 0;
        let clouds = [], coins = [];

        function startBonusLevel() {
            mathGame.style.opacity = '0';
            marioBonus.style.display = 'flex';
            canvas.width = window.innerWidth;
            canvas.height = Math.min(window.innerHeight * 0.7, 500);
            
            // Ground level calculation
            groundY = canvas.height - 40; 
            marioY = groundY;
            
            currentBonusCoins = 0; bonusTimeLeft = 10;
            bonusActive = true;
            bonusMsg.style.display = 'block';
            bonusMsg.textContent = "Tap to Jump & Collect Coins!";
            coins = []; clouds = [];
            for(let i=0; i<6; i++) clouds.push({x: Math.random()*canvas.width, y: Math.random()*120 + 20, s: 0.5+Math.random()*1.5});
            
            bonusCoinsDisplay.textContent = currentBonusCoins;
            bonusTimeDisplay.textContent = bonusTimeLeft;

            const timer = setInterval(() => {
                if(!bonusActive) return clearInterval(timer);
                bonusTimeLeft--;
                bonusTimeDisplay.textContent = bonusTimeLeft;
                if(bonusTimeLeft <= 0) endBonus();
            }, 1000);

            requestAnimationFrame(bonusLoop);
        }

        function endBonus() {
            bonusActive = false;
            totalBonusCoins += currentBonusCoins;
            bonusMsg.textContent = `BONUS: ${currentBonusCoins} Coins! ➔`;
            bonusMsg.style.display = 'block';
            
            setTimeout(() => {
                marioBonus.style.display = 'none';
                mathGame.style.opacity = '1';
                generateQuestion(); 
            }, 1500);
        }

        function jump(e) {
            if(bonusActive && e.type === 'touchstart') e.preventDefault(); 
            if(marioY >= groundY - 5 && bonusActive) {
                marioVY = -15; // jump height
                sounds.jump();
                bonusMsg.style.display = 'none';
            }
        }

        window.addEventListener('mousedown', jump);
        window.addEventListener('touchstart', jump, {passive: false});

        function bonusLoop() {
            if(!bonusActive) return;

            // Sky Gradient
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#4fc3f7");
            gradient.addColorStop(1, "#e1f5fe");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Glowing Sun
            ctx.fillStyle = "rgba(255, 238, 88, 0.4)";
            ctx.beginPath(); ctx.arc(canvas.width - 70, 70, 50, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffee58";
            ctx.beginPath(); ctx.arc(canvas.width - 70, 70, 35, 0, Math.PI*2); ctx.fill();

            // Clouds
            clouds.forEach(c => {
                c.x -= c.s;
                if(c.x < -100) { c.x = canvas.width + 100; c.y = Math.random()*120 + 20; }
                ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
                ctx.beginPath();
                ctx.arc(c.x, c.y, 25, 0, Math.PI*2);
                ctx.arc(c.x+25, c.y-15, 30, 0, Math.PI*2);
                ctx.arc(c.x+50, c.y, 25, 0, Math.PI*2);
                ctx.fill();
            });

            // Draw Ground Surface 
            // The character stands exactly on this line
            ctx.fillStyle = "#8d6e63"; // Dirt
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.fillStyle = "#66bb6a"; // Grass top
            ctx.fillRect(0, groundY, canvas.width, 15);

            // Gravity for character
            marioVY += 0.8;
            marioY += marioVY;
            if(marioY > groundY) { marioY = groundY; marioVY = 0; }

            // Coins Spawn & Update
            if(Math.random() < 0.08) coins.push({x: canvas.width, y: groundY - 50 - Math.random()*120});
            coins.forEach((c, i) => {
                c.x -= 7;
                // Coin Draw
                ctx.fillStyle = "#ffb300"; // Darker border
                ctx.beginPath(); ctx.arc(c.x, c.y, 18, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ffeb3b"; // Lighter inner
                ctx.beginPath(); ctx.arc(c.x, c.y, 13, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#f57f17"; 
                ctx.font = "bold 16px Poppins"; 
                ctx.fillText("1", c.x-4, c.y+6);

                // Collision
                const dx = c.x - 60; // mario x center
                const dy = c.y - (marioY - 25); // mario y center
                if(Math.sqrt(dx*dx + dy*dy) < 45) {
                    coins.splice(i, 1);
                    currentBonusCoins++;
                    bonusCoinsDisplay.textContent = currentBonusCoins;
                    sounds.coin();
                }
            });
            coins = coins.filter(c => c.x > -50);

            // Draw Character (Standing exactly on groundY)
            const mx = 60;
            const my = marioY - 50; // Feet are at my + 50 (which equals marioY)
            
            // Shoes
            ctx.fillStyle = "#5d4037"; // Brown shoes
            ctx.beginPath(); ctx.roundRect(mx-14, my+42, 12, 8, 4); ctx.fill();
            ctx.beginPath(); ctx.roundRect(mx+2, my+42, 12, 8, 4); ctx.fill();

            // Pants/Overalls
            ctx.fillStyle = "#1e88e5"; 
            ctx.beginPath(); ctx.roundRect(mx-12, my+25, 24, 20, 6); ctx.fill();
            
            // Shirt
            ctx.fillStyle = "#e53935"; 
            ctx.beginPath(); ctx.roundRect(mx-9, my+20, 18, 15, 6); ctx.fill();
            
            // Head
            ctx.fillStyle = "#ffccbc"; 
            ctx.beginPath(); ctx.arc(mx, my+8, 15, 0, Math.PI*2); ctx.fill();
            
            // Nose
            ctx.fillStyle = "#ffab91";
            ctx.beginPath(); ctx.arc(mx+12, my+10, 6, 0, Math.PI*2); ctx.fill();
            
            // Eye
            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.arc(mx+6, my+5, 3, 0, Math.PI*2); ctx.fill();
            
            // Hat
            ctx.fillStyle = "#e53935"; 
            ctx.beginPath(); ctx.arc(mx, my+3, 15, Math.PI, 0); ctx.fill();
            ctx.fillRect(mx-5, my, 22, 5); // Brim

            // Hand
            ctx.fillStyle = "#ffccbc";
            ctx.beginPath(); ctx.arc(mx+15, my+30, 5, 0, Math.PI*2); ctx.fill();

            requestAnimationFrame(bonusLoop);
        }

        // --- Fireworks System ---
        const fwCanvas = document.getElementById('fireworksCanvas');
        const fwCtx = fwCanvas.getContext('2d');
        let fwParticles = [];
        let fwActive = false;

        function startFireworks() {
            fwCanvas.style.display = 'block';
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            fwActive = true;
            fwParticles = [];
            fwLoop();
        }

        function stopFireworks() {
            fwActive = false;
            fwCanvas.style.display = 'none';
        }

        function createExplosion(x, y) {
            const colors = ['#ff5252', '#ffd740', '#69f0ae', '#40c4ff', '#e040fb'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for(let i=0; i<50; i++) {
                fwParticles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*15,
                    vy: (Math.random()-0.5)*15,
                    life: 1,
                    decay: Math.random() * 0.015 + 0.015,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function fwLoop() {
            if(!fwActive) return;
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            for(let i = fwParticles.length - 1; i >= 0; i--) {
                let p = fwParticles[i];
                p.x += p.vx; 
                p.y += p.vy;
                p.vy += 0.15; // Gravity
                p.life -= p.decay; // Fade out
                
                if(p.life <= 0) { 
                    fwParticles.splice(i, 1); 
                    continue; 
                }
                
                fwCtx.globalAlpha = p.life;
                fwCtx.fillStyle = p.color;
                fwCtx.beginPath(); 
                fwCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); 
                fwCtx.fill();
            }
            fwCtx.globalAlpha = 1;

            // Random fireworks firing
            if(Math.random() < 0.06) {
                createExplosion(Math.random() * fwCanvas.width, Math.random() * (fwCanvas.height / 2));
            }

            requestAnimationFrame(fwLoop);
        }

        // --- System Controls ---
        document.getElementById('soundToggle').onclick = function() {
            isMuted = !isMuted; this.textContent = isMuted ? '🔇' : '🔊';
            if(!isMuted && audioCtx.state === 'suspended') audioCtx.resume();
        };
        document.getElementById('timerToggle').onclick = function() {
            timerActive = !timerActive;
            document.getElementById('timerDisplay').style.display = timerActive ? 'block' : 'none';
            if(timerActive) {
                secondsElapsed = 0;
                document.getElementById('timerDisplay').textContent = `⏱ 00:00`;
                timerInterval = setInterval(() => { 
                    secondsElapsed++; 
                    document.getElementById('timerDisplay').textContent = `⏱ ${formatTime(secondsElapsed)}`;
                }, 1000);
            } else {
                clearInterval(timerInterval);
            }
        };
        document.getElementById('resetBtn').onclick = resetGame;

        window.onload = () => { generateQuestion(); };
    </script>
</body>
</html>
