<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Adventure - Heavy & Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            user-select: none;
            overflow: hidden;
            background: #bae6fd;
        }

        /* --- BEAUTIFUL TYPOGRAPHY --- */
        .text-fun-title {
            background: linear-gradient(to bottom, #ffffff, #fde047, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 6px 0px #b45309) drop-shadow(0px 8px 10px rgba(0,0,0,0.3));
            letter-spacing: 2px;
        }

        .text-fun-subtitle {
            color: #fff;
            text-shadow: 
                3px 3px 0 #ec4899, -2px -2px 0 #ec4899,  
                2px -2px 0 #ec4899, -2px 2px 0 #ec4899,
                2px 2px 0 #ec4899, 0 6px 10px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        /* --- ENHANCED ICONS --- */
        .emoji-sticker {
            display: inline-block;
            filter: drop-shadow(0 12px 10px rgba(0,0,0,0.35)) drop-shadow(0 0 4px rgba(255,255,255,0.8));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- NEW CUSTOM UNITS --- */
        .icon-marble {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 30%),
                        repeating-linear-gradient(60deg, #3b82f6 0%, #3b82f6 25%, #f8fafc 25%, #f8fafc 35%, #ec4899 35%, #ec4899 60%, #f8fafc 60%, #f8fafc 70%); 
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.5), 2px 2px 4px rgba(0,0,0,0.3);
            vertical-align: middle;
        }

        /* Cục tẩy thay cho sỏi */
        .icon-eraser {
            display: inline-block;
            width: 32px;
            height: 18px;
            background: linear-gradient(to right, #f472b6 40%, #0ea5e9 40%);
            border-radius: 4px;
            box-shadow: 
                inset 2px 2px 4px rgba(255,255,255,0.4),
                inset -2px -2px 4px rgba(0,0,0,0.2),
                2px 2px 4px rgba(0,0,0,0.3);
            vertical-align: middle;
            transform: rotate(-10deg);
        }

        .icon-cap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 
                inset 0 0 0 3px #dc2626,
                inset 0 0 5px 4px rgba(0,0,0,0.3), 
                2px 2px 4px rgba(0,0,0,0.3); 
            vertical-align: middle;
            position: relative;
        }
        .icon-cap::after {
            content: '';
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* --- BACKGROUND ELEMENTS --- */
        .sky-bg {
            background: linear-gradient(to bottom, #38bdf8 0%, #7dd3fc 50%, #bae6fd 100%);
            position: relative;
        }

        .sun {
            position: absolute;
            top: -20px;
            left: -20px;
            width: clamp(100px, 15vw, 160px);
            height: clamp(100px, 15vw, 160px);
            background: radial-gradient(circle, #fff 10%, #fef08a 30%, #facc15 60%, transparent 75%);
            border-radius: 50%;
            box-shadow: 0 0 60px 30px rgba(253, 224, 71, 0.6);
            animation: sun-glow 4s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes sun-glow {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.15); opacity: 1; }
        }

        .cloud-container {
            position: absolute;
            z-index: 0;
            filter: drop-shadow(0 15px 20px rgba(255, 255, 255, 0.5));
        }
        .cloud-float { animation: float-h 45s infinite linear; }
        .cloud-bob { animation: bob 4s infinite alternate ease-in-out; }
        @keyframes float-h {
            from { transform: translateX(-250px); }
            to { transform: translateX(100vw); }
        }
        @keyframes bob {
            from { transform: translateY(0px); }
            to { transform: translateY(15px); }
        }

        /* Grass */
        .grass-ground {
            background-color: #22c55e;
            background-image: 
                radial-gradient(circle at 15% 30%, #16a34a 2%, transparent 2.5%),
                radial-gradient(circle at 85% 70%, #16a34a 2%, transparent 2.5%);
            background-size: 80px 80px;
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.15);
        }

        /* --- ENHANCED BALANCE SCALE --- */
        .scale-wrapper {
            position: relative;
            transform-origin: bottom center;
            transform: scale(min(1, min(calc(100vw / 460), calc(100vh / 750))));
            width: 420px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
        }

        .scale-base-new {
            width: 260px;
            height: 35px;
            background: linear-gradient(to bottom, #1e40af, #1e3a8a);
            border-radius: 20px 20px 8px 8px;
            position: absolute;
            bottom: 0;
            border-bottom: 8px solid #172554;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .scale-pillar-new {
            width: 35px;
            height: 210px;
            background: linear-gradient(to right, #1d4ed8, #3b82f6, #1d4ed8);
            position: absolute;
            bottom: 35px;
            border-radius: 20px 20px 0 0;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
            border: 2px solid #1e3a8a;
        }

        .scale-pivot-new {
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 30% 30%, #60a5fa, #1e40af, #172554);
            border-radius: 50%;
            position: absolute;
            bottom: 210px; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            border: 3px solid #1e3a8a;
        }

        .scale-pivot-inner {
            width: 25px;
            height: 25px;
            background: #fbbf24;
            border-radius: 50%;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.3);
        }

        .scale-beam-new {
            width: 400px;
            height: 22px;
            background: linear-gradient(to bottom, #3b82f6, #1e40af);
            position: absolute;
            bottom: 232px;
            border-radius: 11px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center;
            z-index: 15;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            border: 2px solid #1e3a8a;
        }

        .pan-hinge {
            position: absolute;
            top: 11px;
            width: 16px;
            height: 55px;
            background: linear-gradient(to right, #94a3b8, #cbd5e1);
            border-radius: 8px;
            transform-origin: top center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 16;
            border: 2px solid #64748b;
        }

        .pan-plate {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 170px;
            height: 40px;
            background: linear-gradient(to bottom, #fde047, #eab308);
            border-radius: 0 0 85px 85px;
            border-top: 6px solid #ca8a04;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,0.5);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 5px;
        }

        .scale-obj-left {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: -5px;
            font-size: 6.5rem; 
            filter: drop-shadow(0 12px 10px rgba(0,0,0,0.35));
            z-index: 25;
        }

        .scale-units-right {
            position: absolute;
            bottom: 100%;
            width: 100%;
            display: flex;
            flex-wrap: wrap-reverse;
            justify-content: center;
            align-content: flex-start;
            gap: 2px;
            margin-bottom: -2px;
            z-index: 25;
        }

        .unit-item {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .unit-item:active { transform: scale(0.9); }
        .unit-item:hover { transform: scale(1.1) translateY(-5px); }

        /* --- STUNNING 2.5D BOWLING --- */
        #screen-bowling {
            background: radial-gradient(circle at 50% 100%, #fbcfe8 0%, #d8b4fe 40%, #4f46e5 100%);
        }

        .bowling-lane-2d {
            width: clamp(280px, 80vw, 400px);
            height: clamp(350px, 45vh, 450px);
            position: relative;
            margin: 0 auto;
            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
            background: 
                linear-gradient(to top, rgba(0,0,0,0.15), transparent),
                repeating-linear-gradient(90deg, transparent, transparent 8%, rgba(0,0,0,0.1) 8%, rgba(0,0,0,0.1) 10%),
                linear-gradient(to top, #fef08a, #b45309);
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.6);
        }

        #bowling-area {
            position: absolute;
            top: 5%; left: 0; width: 100%; height: 35%;
        }

        .pin-wrapper {
            position: absolute;
            width: clamp(25px, 7%, 40px);
            height: clamp(70px, 18%, 110px);
            transform: translateX(-50%);
            transform-origin: bottom center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s;
            z-index: 10;
        }

        .bowling-ball-2d {
            position: absolute;
            bottom: 10px;
            left: 50%;
            width: clamp(65px, 16vw, 95px);
            height: clamp(65px, 16vw, 95px);
            background: radial-gradient(circle at 30% 20%, #ff8a80 0%, #e53935 20%, #b71c1c 50%, #4a0404 85%, #000000 100%);
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 15px 15px 30px rgba(0,0,0,0.8), inset -15px -15px 25px rgba(0,0,0,0.9), inset 8px 8px 20px rgba(255,255,255,0.4);
            z-index: 50;
            transition: bottom 0.7s cubic-bezier(0.3, 0, 0.2, 1), left 0.7s linear, transform 0.7s cubic-bezier(0.3, 0, 0.2, 1), opacity 0.7s;
        }

        .ball-hole {
            position: absolute;
            background: radial-gradient(circle at 70% 70%, #000 30%, #2a0000 100%);
            border-radius: 50%;
            box-shadow: inset 3px 3px 8px #000, 1px 1px 2px rgba(255,255,255,0.3);
        }

        /* --- AIM BAR --- */
        .aim-container {
            width: w-full; max-width: 400px;
            margin: 15px auto; padding: 8px;
            background: #1e293b; border-radius: 50px;
            border: 4px solid #475569;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer; position: relative;
        }
        
        .aim-track {
            width: 100%; height: 24px; border-radius: 12px;
            background: linear-gradient(to right, #ef4444 0%, #facc15 30%, #22c55e 50%, #facc15 70%, #ef4444 100%);
            position: relative;
        }

        #aim-cursor {
            position: absolute; top: -4px; bottom: -4px;
            width: 12px; background: #ffffff;
            border: 2px solid #000; border-radius: 6px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            transform: translateX(-50%); left: 50%;
        }

        /* --- UI HELPERS --- */
        .pop-in { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .wiggle { animation: wiggle 0.4s ease-in-out; }
        @keyframes wiggle {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
            75% { transform: translateX(-10px) rotate(-5deg); }
        }

        .candy-btn {
            background: linear-gradient(to bottom, #4ade80, #16a34a);
            border-bottom: 6px solid #14532d;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.4), inset 0 2px 5px rgba(255,255,255,0.5);
            transition: all 0.2s;
        }
        .candy-btn:active { border-bottom: 0px; transform: translateY(6px); }
        
        .mc-btn {
            background: white;
            border-bottom: 8px solid #cbd5e1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .mc-btn:hover { transform: translateY(-5px); border-bottom-width: 10px; }
        .mc-btn:active { border-bottom-width: 0px; transform: translateY(8px); }

        #fireworksCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body class="sky-bg h-screen w-screen overflow-hidden flex flex-col relative text-slate-800">
    <img src="../assets/logo-oodles-math.png" class="oodles-logo absolute top-4 right-4 w-24 sm:w-32 z-30" onerror="this.style.display='none'">
    
    <!-- Environment -->
    <div class="sun"></div>
    <div class="cloud-container cloud-float" style="top: 5%; animation-duration: 50s; opacity: 0.9;">
        <div class="cloud-bob"><svg width="140" height="80" viewBox="0 0 180 100" fill="white"><circle cx="40" cy="60" r="35"/><circle cx="85" cy="45" r="45"/><circle cx="135" cy="60" r="35"/><rect x="40" y="65" width="95" height="30"/></svg></div>
    </div>
    <div class="grass-ground absolute bottom-0 left-0 w-full h-[25vh] border-t-[10px] border-green-400 z-0"></div>

    <!-- SCREENS -->
    
    <!-- 0. Start Screen -->
    <div id="screen-start" class="absolute inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm px-4">
        <div class="bg-white/95 backdrop-blur rounded-[3rem] p-8 sm:p-12 max-w-md w-full text-center shadow-[0_20px_50px_rgba(0,0,0,0.3)] border-[12px] border-white pop-in relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-yellow-200 rounded-full mix-blend-multiply opacity-50 blur-xl"></div>
            <h1 class="text-6xl sm:text-7xl font-black mb-1 text-fun-title relative z-10">MASS</h1>
            <h2 class="text-3xl sm:text-4xl font-black mb-10 text-fun-subtitle relative z-10">ADVENTURE</h2>
            <div class="flex justify-center gap-6 mb-12 text-6xl relative z-10 drop-shadow-md">
                <div class="animate-bounce emoji-sticker" style="animation-delay: 0s">⚖️</div>
                <div class="animate-bounce emoji-sticker" style="animation-delay: 0.1s">🐘</div>
                <div class="animate-bounce emoji-sticker" style="animation-delay: 0.2s">🍬</div>
            </div>
            <button onclick="startGame()" class="candy-btn w-full text-white text-4xl font-black py-4 rounded-[2rem] relative z-10">
                PLAY! ▶
            </button>
        </div>
    </div>

    <!-- 1. Unit Select Screen -->
    <div id="screen-unit-select" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm px-4">
        <div class="bg-white/95 rounded-[3rem] p-8 max-w-2xl w-full text-center shadow-2xl border-8 border-sky-400 pop-in">
            <h2 class="text-3xl sm:text-4xl font-black text-sky-600 mb-8 uppercase tracking-wide">Choose your unit!</h2>
            <div class="flex flex-wrap justify-center gap-4 sm:gap-6 mb-6">
                <!-- Marble -->
                <div onclick="selectUnit('marble', 'Marble')" class="cursor-pointer transform hover:scale-110 active:scale-95 transition-transform bg-sky-50 p-4 sm:p-6 rounded-[2rem] border-4 border-sky-200 shadow-md min-w-[120px] flex flex-col items-center">
                    <div class="h-20 flex items-center justify-center mb-2">
                        <div class="icon-marble" style="transform: scale(2.5);"></div>
                    </div>
                    <p class="font-bold text-sky-700 text-xl">Marble</p>
                </div>
                <!-- Eraser -->
                <div onclick="selectUnit('eraser', 'Eraser')" class="cursor-pointer transform hover:scale-110 active:scale-95 transition-transform bg-pink-50 p-4 sm:p-6 rounded-[2rem] border-4 border-pink-200 shadow-md min-w-[120px] flex flex-col items-center">
                    <div class="h-20 flex items-center justify-center mb-2">
                        <div class="icon-eraser" style="transform: scale(2.2);"></div>
                    </div>
                    <p class="font-bold text-pink-700 text-xl">Eraser</p>
                </div>
                <!-- Cap -->
                <div onclick="selectUnit('cap', 'Cap')" class="cursor-pointer transform hover:scale-110 active:scale-95 transition-transform bg-red-50 p-4 sm:p-6 rounded-[2rem] border-4 border-red-200 shadow-md min-w-[120px] flex flex-col items-center">
                    <div class="h-20 flex items-center justify-center mb-2">
                        <div class="icon-cap" style="transform: scale(2);"></div>
                    </div>
                    <p class="font-bold text-red-700 text-xl">Cap</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Top UI (Score & Level) -->
    <div id="game-ui" class="hidden absolute top-0 left-0 w-full p-4 sm:p-6 z-30 flex flex-col items-center gap-3 pointer-events-none">
        <div class="w-full flex justify-center items-center gap-4 sm:gap-6 pointer-events-auto">
            <div class="bg-white/95 backdrop-blur rounded-[2rem] px-5 sm:px-8 py-2 sm:py-3 border-4 border-yellow-400 shadow-lg flex items-center gap-2 sm:gap-3">
                <div class="text-2xl sm:text-3xl animate-pulse">⭐</div>
                <span id="score-text" class="text-2xl sm:text-3xl font-black text-yellow-500">0</span>
            </div>
            <div class="bg-gradient-to-b from-indigo-400 to-indigo-600 text-white px-5 sm:px-8 py-2 sm:py-3 rounded-[2rem] border-4 border-white shadow-lg flex flex-col items-center">
                <span class="text-[10px] sm:text-xs uppercase font-bold opacity-90">Round</span>
                <span id="level-text" class="text-xl sm:text-2xl font-black leading-none">1/6</span>
            </div>
        </div>
    </div>

    <!-- Instruction Box (Central container - will move up/down dynamically) -->
    <div id="instruction-container" class="hidden absolute top-24 left-0 w-full flex justify-center z-30 px-4 pointer-events-none transition-all duration-500 ease-in-out">
        <div class="bg-white/95 backdrop-blur-md px-6 sm:px-10 py-3 sm:py-4 rounded-[2.5rem] shadow-2xl border-4 border-white flex items-center justify-center gap-4 pointer-events-auto pop-in">
            <h2 id="instruction-text" class="text-2xl sm:text-4xl font-black text-slate-700 text-center tracking-wide">
                <!-- Instruction injected dynamically -->
            </h2>
            <button onclick="readInstruction()" class="w-10 h-10 sm:w-12 sm:h-12 bg-gradient-to-br from-sky-200 to-sky-400 hover:from-sky-300 hover:to-sky-500 rounded-full flex items-center justify-center border-4 border-white text-lg sm:text-xl shadow-md active:scale-95 transition-transform shrink-0">
                🔊
            </button>
        </div>
    </div>

    <!-- 2. Screen: Weighing Individual Items -->
    <main id="screen-weighing" class="hidden flex-1 w-full flex flex-col justify-end items-center relative z-10 pt-20 pb-4">
        <!-- Scale -->
        <div class="absolute inset-x-0 bottom-[25vh] flex justify-center items-end pointer-events-none">
            <div class="scale-wrapper pointer-events-auto">
                <div class="scale-base-new"></div>
                <div class="scale-pillar-new"></div>
                <div id="weigh-scale-beam" class="scale-beam-new">
                    <!-- Left Pan -->
                    <div id="weigh-pan-left-hinge" class="pan-hinge" style="left: 0px;">
                        <div class="pan-plate relative">
                            <div id="obj-left" class="scale-obj-left emoji-sticker">🍊</div>
                        </div>
                    </div>
                    <!-- Right Pan -->
                    <div id="weigh-pan-right-hinge" class="pan-hinge" style="right: 0px;">
                        <div class="pan-plate relative">
                            <div id="pan-right-items" class="scale-units-right"></div>
                        </div>
                    </div>
                </div>
                <div class="scale-pivot-new"><div class="scale-pivot-inner"></div></div>
            </div>
        </div>
        
        <!-- Bottom Interaction Area -->
        <div class="w-full min-h-[140px] flex items-center justify-center z-30 relative px-4 pb-6 sm:pb-10 mt-auto pointer-events-none">
            <!-- Add Button (Visible when NOT balanced) -->
            <div id="add-unit-container" class="flex flex-col sm:flex-row items-center gap-2 sm:gap-4 bg-white/95 px-6 py-3 rounded-[3rem] shadow-2xl border-4 border-white pop-in pointer-events-auto">
                <span class="text-base sm:text-xl font-bold text-slate-600 whitespace-nowrap">Tap to add!</span>
                <button onclick="addUnit()" id="add-unit-btn" class="candy-btn w-20 h-20 sm:w-24 sm:h-24 rounded-full flex items-center justify-center active:scale-95 shrink-0 overflow-hidden">
                    <!-- Icon injected here -->
                </button>
            </div>

            <!-- Message Box (Visible when balanced) -->
            <div id="mc-container" class="hidden w-full max-w-xl bg-white/95 backdrop-blur-md rounded-[2rem] sm:rounded-[2.5rem] p-5 sm:p-8 text-center shadow-[0_15px_30px_rgba(0,0,0,0.3)] border-[6px] border-indigo-200 pointer-events-auto">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </main>

    <!-- 3. Screen: Compare Phase (Cards) -->
    <main id="screen-compare" class="hidden flex-1 w-full flex flex-col justify-center items-center relative z-10 pt-16 pb-20">
        <div id="compare-container" class="flex flex-wrap justify-center gap-6 sm:gap-12 w-full max-w-5xl px-4 mt-8">
            <!-- Buttons dynamically injected here -->
        </div>
    </main>

    <!-- 4. 3D Bowling Bonus Scene -->
    <div id="screen-bowling" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/90 p-4">
        <!-- Timer Header -->
        <div class="absolute top-6 left-1/2 -translate-x-1/2 flex items-center gap-3 sm:gap-4 bg-white/10 backdrop-blur-md px-6 sm:px-8 py-2 sm:py-3 rounded-full border-2 border-white/20 z-50">
            <span class="text-2xl sm:text-3xl">⏱️</span>
            <span id="bowling-timer" class="text-3xl sm:text-4xl font-black text-white">60</span>
        </div>

        <div class="text-center mb-4 mt-16 sm:mt-20 pop-in">
            <h2 class="text-3xl sm:text-5xl font-black text-white drop-shadow-md mb-2">BONUS BOWLING!</h2>
            <p class="text-yellow-300 font-bold text-lg sm:text-xl drop-shadow">KNOCK DOWN ALL 10 PINS!</p>
        </div>

        <!-- Lane 2.5D -->
        <div class="bowling-lane-2d">
            <div id="bowling-area"></div>
            <!-- Shiny Realistic 3D Ball -->
            <div id="bowling-ball" class="bowling-ball-2d">
                <div class="ball-hole" style="width: 22%; height: 22%; top: 20%; left: 30%;"></div>
                <div class="ball-hole" style="width: 22%; height: 22%; top: 38%; right: 20%;"></div>
                <div class="ball-hole" style="width: 26%; height: 26%; bottom: 22%; left: 40%;"></div>
            </div>
        </div>

        <!-- Aim Bar -->
        <div class="w-full max-w-[400px]">
            <div class="aim-container" onclick="throwBall()">
                <div class="aim-track"><div id="aim-cursor"></div></div>
            </div>
            <p class="text-white text-center font-bold animate-pulse tracking-wide drop-shadow-md text-base sm:text-lg mt-2">TAP THE BAR TO THROW!</p>
        </div>
        <div id="strike-text" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl sm:text-7xl font-black text-fun-title z-50 transform rotate-[-10deg]">CLEAR!</div>
    </div>

    <!-- 5. Game Over -->
    <div id="screen-end" class="hidden absolute inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-md px-4">
        <div class="bg-white/95 rounded-[3rem] p-8 sm:p-12 w-full max-w-md text-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-[12px] border-yellow-300 pop-in">
            <h1 class="text-5xl sm:text-7xl font-black mb-4 text-fun-title">YOU WON!</h1>
            <div class="text-7xl sm:text-8xl mb-8 animate-bounce emoji-sticker">🏆</div>
            <p class="text-2xl sm:text-3xl font-black text-slate-700 mb-8 uppercase tracking-widest bg-yellow-100 px-6 py-3 rounded-2xl inline-block border-4 border-yellow-200">
                Score: <span class="text-yellow-600" id="final-score">0</span>
            </p>
            <button onclick="location.reload()" class="candy-btn w-full text-white text-2xl sm:text-3xl font-black py-4 sm:py-5 rounded-3xl mt-2">
                PLAY AGAIN! ↺
            </button>
        </div>
    </div>

    <canvas id="fireworksCanvas"></canvas>

    <script>
        // --- GAME CONFIG & STATE ---
        // Đảm bảo 15 item có khối lượng từ 1->15 hoàn toàn khác nhau để tránh bị trùng kết quả "nặng hơn/nhẹ hơn"
        const ITEMS = [
            { id: 'candy', name: 'Candy', emoji: '🍬', mass: 1 },
            { id: 'leaf', name: 'Leaf', emoji: '🍃', mass: 2 },
            { id: 'balloon', name: 'Balloon', emoji: '🎈', mass: 3 },
            { id: 'strawberry', name: 'Strawberry', emoji: '🍓', mass: 4 },
            { id: 'apple', name: 'Apple', emoji: '🍎', mass: 5 },
            { id: 'orange', name: 'Orange', emoji: '🍊', mass: 6 },
            { id: 'toy_bear', name: 'Toy Bear', emoji: '🧸', mass: 7 },
            { id: 'shoe', name: 'Shoe', emoji: '👟', mass: 8 },
            { id: 'book', name: 'Book', emoji: '📖', mass: 9 },
            { id: 'watermelon', name: 'Watermelon', emoji: '🍉', mass: 10 },
            { id: 'key', name: 'Key', emoji: '🔑', mass: 11 },
            { id: 'clock', name: 'Clock', emoji: '⏰', mass: 12 },
            { id: 'hammer', name: 'Hammer', emoji: '🔨', mass: 13 },
            { id: 'backpack', name: 'Backpack', emoji: '🎒', mass: 14 },
            { id: 'anchor', name: 'Anchor', emoji: '⚓', mass: 15 }
        ];

        // Store Custom SVG/CSS units
        const UNIT_ICONS = {
            'marble': '<div class="icon-marble"></div>',
            'eraser': '<div class="icon-eraser"></div>',
            'cap': '<div class="icon-cap"></div>'
        };

        let state = {
            unit: null, 
            level: 1, // 1 to 6
            maxLevels: 6, 
            score: 0,
            questionType: '', 
            shuffledItems: [],
            currentRoundItems: [],
            weighedCount: 0,
            rightMass: 0,
            firstTry: true,
            busy: false,
            bowlingActive: false,
            pinsStatus: [],
            bowlingTime: 60,
            bowlingTimer: null
        };

        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let rollingSoundNode = null;
        
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            if (type === 'ting') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'correct') {
                [659.25, 880.00, 1046.50, 1318.51].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, now + i*0.08);
                    gain.gain.linearRampToValueAtTime(0.15, now + i*0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.08 + 0.5);
                    osc.start(now + i*0.08); osc.stop(now + i*0.08 + 0.6);
                });
            } else if (type === 'wrong') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'add') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            }
        }

        function playRollingSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const bufferSize = audioCtx.sampleRate * 2.0;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            rollingSoundNode = audioCtx.createBufferSource();
            rollingSoundNode.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 180; 
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.6, now + 0.2);
            rollingSoundNode.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            rollingSoundNode.start(now); rollingSoundNode.gainNode = gain;
        }

        function playWoodCrashSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const createClack = (time, pitchMult, vol) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400 * pitchMult, time);
                osc.frequency.exponentialRampToValueAtTime(100 * pitchMult, time + 0.1);
                gain.gain.setValueAtTime(vol, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + 0.2);
            };
            createClack(now, 0.8, 1.2); createClack(now, 1.2, 1.0);
            for(let i=0; i<6; i++) createClack(now + 0.03 + (Math.random()*0.1), 0.8+(Math.random()*0.6), 0.4+(Math.random()*0.5));
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000; filter.Q.value = 1.0;
            const gainNoise = audioCtx.createGain(); gainNoise.gain.setValueAtTime(0.6, now); gainNoise.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            noise.connect(filter); filter.connect(gainNoise); gainNoise.connect(audioCtx.destination);
            noise.start(now); noise.stop(now + 0.4);
        }

        // --- TTS Helpers ---
        function readTextOutLoud(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; utterance.rate = 0.9; utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function readInstruction() {
            let text = "";
            if (document.getElementById('screen-weighing').classList.contains('hidden') === false) {
                let currentObj = state.currentRoundItems[state.weighedCount];
                text = `Let's weigh the ${currentObj.name}!`;
            } else if (document.getElementById('screen-compare').classList.contains('hidden') === false) {
                if (state.questionType === 'heavier') text = "Which one is heavier?";
                else if (state.questionType === 'lighter') text = "Which one is lighter?";
                else if (state.questionType === 'heaviest') text = "Which one is the heaviest?";
                else if (state.questionType === 'lightest') text = "Which one is the lightest?";
            }
            if(text) readTextOutLoud(text);
        }
        
        function readWeighSuccess() {
            let currentObj = state.currentRoundItems[state.weighedCount];
            let suffix = currentObj.mass > 1 ? 's' : '';
            readTextOutLoud(`The ${currentObj.name} weighs ${currentObj.mass} ${state.unit.name}${suffix}!`);
        }

        // --- NAVIGATION ---
        function changeScreen(id) {
            ['screen-start', 'screen-unit-select', 'screen-weighing', 'screen-compare', 'screen-bowling', 'screen-end']
                .forEach(s => {
                    const el = document.getElementById(s);
                    if (el) el.classList.add('hidden');
                });
            if(id) {
                const el = document.getElementById(id);
                if (el) el.classList.remove('hidden');
            }
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            changeScreen('screen-unit-select');
        }

        function selectUnit(unitId, name) {
            state.unit = { id: unitId, name: name };
            
            document.getElementById('add-unit-btn').innerHTML = `<div class="scale-[1.8] transform transition-transform pointer-events-none">${UNIT_ICONS[unitId]}</div>`;
            
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('instruction-container').classList.remove('hidden');
            
            state.shuffledItems = [...ITEMS].sort(() => Math.random() - 0.5);
            state.level = 1;
            state.score = 0;
            state.questionType = '';
            
            startRound();
        }

        // --- MAIN GAME LOOP ---
        function startRound() {
            if(state.level > state.maxLevels) {
                document.getElementById('instruction-container').classList.add('hidden');
                document.getElementById('game-ui').classList.add('hidden');
                initBowling();
                return;
            }
            updateUI();
            
            let numItems = state.level <= 3 ? 2 : 3;
            
            // Pop items to ensure no duplicate icons across all rounds
            state.currentRoundItems = [];
            for(let i=0; i<numItems; i++) {
                state.currentRoundItems.push(state.shuffledItems.pop());
            }
            
            // Alternating question logic to ensure no duplicates in consecutive rounds
            if(state.level <= 3) {
                let pool = ['heavier', 'lighter'];
                let available = pool.filter(q => q !== state.questionType);
                state.questionType = available.length > 0 ? available[0] : pool[Math.floor(Math.random()*pool.length)];
            } else {
                let pool = ['heaviest', 'lightest'];
                let available = pool.filter(q => q !== state.questionType);
                state.questionType = available.length > 0 ? available[0] : pool[Math.floor(Math.random()*pool.length)];
            }
            
            state.weighedCount = 0;
            startWeighingCurrentItem();
        }

        function updateUI() {
            document.getElementById('score-text').innerText = state.score;
            document.getElementById('level-text').innerText = `${state.level}/${state.maxLevels}`;
        }

        function getCorrectColorClass() {
            return (state.questionType === 'heavier' || state.questionType === 'heaviest') ? 'text-rose-500' : 'text-sky-500';
        }

        // --- STEP 1: WEIGHING PHASE ---
        function startWeighingCurrentItem() {
            state.busy = false;
            state.rightMass = 0;
            
            changeScreen('screen-weighing');
            document.getElementById('mc-container').classList.add('hidden');
            document.getElementById('add-unit-container').classList.remove('hidden');
            document.getElementById('add-unit-container').classList.add('pop-in');
            
            // Position instruction box at Top for weighing
            const instContainer = document.getElementById('instruction-container');
            instContainer.classList.remove('bottom-8', 'top-24');
            instContainer.classList.add('top-24');
            
            let currentObj = state.currentRoundItems[state.weighedCount];
            document.getElementById('instruction-text').innerHTML = `Let's weigh the <span class="text-rose-500 uppercase">${currentObj.name}</span>!`;
            document.getElementById('obj-left').innerText = currentObj.emoji;
            document.getElementById('pan-right-items').innerHTML = '';
            
            updateScalePhysics();
            setTimeout(readInstruction, 500);
        }

        function addUnit() {
            if(state.busy || state.rightMass >= 15) return; 
            state.rightMass++;
            playSfx('add');
            
            const item = document.createElement('div');
            item.className = 'unit-item';
            item.innerHTML = UNIT_ICONS[state.unit.id];
            item.onclick = function() { removeUnit(this); };
            document.getElementById('pan-right-items').appendChild(item);
            
            updateScalePhysics();
            checkBalance();
        }

        function removeUnit(element) {
            if(state.busy || state.rightMass <= 0) return;
            state.rightMass--;
            playSfx('add');
            element.remove();
            updateScalePhysics();
            checkBalance();
        }

        function updateScalePhysics() {
            let currentObj = state.currentRoundItems[state.weighedCount];
            const beam = document.getElementById('weigh-scale-beam');
            const panLeft = document.getElementById('weigh-pan-left-hinge');
            const panRight = document.getElementById('weigh-pan-right-hinge');

            let diff = state.rightMass - currentObj.mass;
            let tilt = Math.max(-20, Math.min(20, diff * 4));

            beam.style.transform = `rotate(${tilt}deg)`;
            panLeft.style.transform = `rotate(${-tilt}deg)`;
            panRight.style.transform = `rotate(${-tilt}deg)`;
        }

        function checkBalance() {
            let currentObj = state.currentRoundItems[state.weighedCount];
            const mcContainer = document.getElementById('mc-container');
            const addContainer = document.getElementById('add-unit-container');

            if(state.rightMass === currentObj.mass) {
                // Balanced!
                if (mcContainer.classList.contains('hidden')) {
                    playSfx('ting'); 
                    mcContainer.classList.remove('hidden');
                    mcContainer.classList.add('pop-in');
                    addContainer.classList.add('hidden');
                    
                    let suffix = currentObj.mass > 1 ? 's' : '';
                    mcContainer.innerHTML = `
                        <div class="flex items-center justify-center gap-3 sm:gap-5 mb-4 sm:mb-6">
                            <h2 class="text-xl sm:text-3xl font-black text-indigo-800 tracking-wide flex flex-wrap items-center justify-center gap-2">
                                The <span class="text-rose-500">${currentObj.name}</span> weighs 
                                <span class="text-sky-500 flex items-center gap-2 bg-sky-50 px-4 py-2 rounded-full border-2 border-sky-200">
                                    ${currentObj.mass} <span class="scale-125 mx-1 inline-block align-middle">${UNIT_ICONS[state.unit.id]}</span>
                                </span>
                            </h2>
                        </div>
                        <button onclick="nextWeighingStep()" class="candy-btn px-8 py-3 text-white text-2xl font-black rounded-[2rem] w-full sm:w-auto">CONTINUE ➡️</button>
                    `;
                    setTimeout(readWeighSuccess, 500);
                }
            } else {
                // Unbalanced
                mcContainer.classList.add('hidden');
                mcContainer.classList.remove('pop-in');
                addContainer.classList.remove('hidden');
            }
        }

        function nextWeighingStep() {
            state.weighedCount++;
            if(state.weighedCount < state.currentRoundItems.length) {
                startWeighingCurrentItem();
            } else {
                startComparing();
            }
        }

        // --- STEP 2: COMPARISON PHASE ---
        function startComparing() {
            state.busy = false;
            state.firstTry = true;
            
            renderCompareCards();
            setTimeout(readInstruction, 500);
        }

        function renderCompareCards() {
            changeScreen('screen-compare');
            
            // Position instruction box at Bottom for comparison
            const instContainer = document.getElementById('instruction-container');
            instContainer.classList.remove('top-24', 'bottom-8');
            instContainer.classList.add('bottom-8');
            
            let questionText = "";
            if (state.questionType === 'heavier') questionText = 'Which one is <span class="text-rose-500 underline decoration-4 uppercase">HEAVIER</span>?';
            else if (state.questionType === 'lighter') questionText = 'Which one is <span class="text-sky-500 underline decoration-4 uppercase">LIGHTER</span>?';
            else if (state.questionType === 'heaviest') questionText = 'Which one is the <span class="text-rose-500 underline decoration-4 uppercase">HEAVIEST</span>?';
            else if (state.questionType === 'lightest') questionText = 'Which one is the <span class="text-sky-500 underline decoration-4 uppercase">LIGHTEST</span>?';
            
            document.getElementById('instruction-text').innerHTML = questionText;

            const container = document.getElementById('compare-container');
            container.innerHTML = '';
            
            state.currentRoundItems.forEach((obj) => {
                const btn = document.createElement('button');
                btn.className = "mc-btn p-6 sm:p-10 rounded-[3rem] flex flex-col items-center justify-center gap-4 hover:bg-slate-50 w-40 sm:w-56 pop-in bg-white border-[6px] border-slate-200 shadow-xl transition-transform active:scale-95";
                btn.innerHTML = `
                    <div class="text-6xl sm:text-8xl emoji-sticker mb-2">${obj.emoji}</div>
                    <div class="font-bold text-lg sm:text-2xl text-slate-700 mb-2">${obj.name}</div>
                    <div class="text-base sm:text-xl font-black text-sky-600 bg-sky-50 px-4 py-2 rounded-full border-2 border-sky-200 shadow-sm flex items-center gap-2">
                        ${obj.mass} <span class="inline-block align-middle scale-125">${UNIT_ICONS[state.unit.id]}</span>
                    </div>
                `;
                btn.onclick = () => checkCompareAnswer(obj, btn);
                container.appendChild(btn);
            });
        }

        function checkCompareAnswer(selectedObj, btnEl) {
            if(state.busy) return;

            let correctObj;
            if(state.questionType === 'heavier' || state.questionType === 'heaviest') {
                correctObj = state.currentRoundItems.reduce((a, b) => a.mass > b.mass ? a : b);
            } else {
                correctObj = state.currentRoundItems.reduce((a, b) => a.mass < b.mass ? a : b);
            }

            if(selectedObj.id === correctObj.id) {
                state.busy = true; 
                playSfx('correct');
                if(state.firstTry) state.score += 10;
                updateUI();
                
                setTimeout(() => {
                    state.level++;
                    startRound();
                }, 1500);
            } else {
                playSfx('wrong');
                state.firstTry = false;
                btnEl.classList.add('wiggle');
                
                if(btnEl.tagName === 'BUTTON') {
                    btnEl.style.borderColor = '#ef4444';
                    setTimeout(() => { btnEl.style.borderColor = ''; }, 500);
                }
                
                setTimeout(() => { btnEl.classList.remove('wiggle'); }, 500);
            }
        }

        // --- BOWLING MINI GAME ---
        const svgPin = `
            <svg viewBox="0 0 100 320" class="w-full h-full overflow-visible">
                <defs>
                    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#94a3b8" />
                        <stop offset="15%" stop-color="#f8fafc" />
                        <stop offset="50%" stop-color="#ffffff" />
                        <stop offset="85%" stop-color="#e2e8f0" />
                        <stop offset="100%" stop-color="#475569" />
                    </linearGradient>
                    <linearGradient id="redStripe" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#991b1b" /><stop offset="20%" stop-color="#ef4444" /><stop offset="80%" stop-color="#dc2626" /><stop offset="100%" stop-color="#7f1d1d" />
                    </linearGradient>
                </defs>
                <ellipse cx="50" cy="295" rx="30" ry="10" fill="rgba(0,0,0,0.4)" filter="blur(3px)"/>
                <path d="M 35,290 C 15,290 12,200 28,155 C 38,125 42,110 42,90 C 42,60 30,35 50,15 C 70,35 58,60 58,90 C 58,110 62,125 72,155 C 88,200 85,290 65,290 C 55,298 45,298 35,290 Z" fill="url(#pinGrad)"/>
                <path d="M 42,85 Q 50,92 58,85 L 59,95 Q 50,102 41,95 Z" fill="url(#redStripe)"/>
                <path d="M 38,115 Q 50,123 62,115 L 63,125 Q 50,133 37,125 Z" fill="url(#redStripe)"/>
                <path d="M 50,15 C 30,35 42,60 42,90 C 42,110 38,125 28,155 C 12,200 15,290 35,290 C 45,298 50,295 50,290 C 40,285 30,200 40,155 C 48,125 50,110 50,90 C 50,60 38,35 50,15 Z" fill="rgba(255,255,255,0.6)" filter="blur(2px)"/>
            </svg>
        `;

        const pinLayout2D = [
            { id: 7, top: '0%', left: '35%', scale: 0.55 }, { id: 8, top: '0%', left: '45%', scale: 0.55 }, { id: 9, top: '0%', left: '55%', scale: 0.55 }, { id: 10, top: '0%', left: '65%', scale: 0.55 },
            { id: 4, top: '25%', left: '40%', scale: 0.7 }, { id: 5, top: '25%', left: '50%', scale: 0.7 }, { id: 6, top: '25%', left: '60%', scale: 0.7 },
            { id: 2, top: '55%', left: '45%', scale: 0.85 }, { id: 3, top: '55%', left: '55%', scale: 0.85 },
            { id: 1, top: '90%', left: '50%', scale: 1 }
        ];

        let aimInterval;
        let aimPos = 0; 
        let aimDirection = 1;

        function initBowling() {
            changeScreen('screen-bowling');
            state.bowlingActive = false;
            state.pinsStatus = new Array(10).fill(true);
            state.bowlingTime = 60;
            
            document.getElementById('bowling-timer').innerText = state.bowlingTime;
            document.getElementById('strike-text').classList.add('hidden');
            
            const area = document.getElementById('bowling-area');
            area.innerHTML = '';
            
            pinLayout2D.forEach((pos, i) => {
                const pin = document.createElement('div');
                pin.className = 'pin-wrapper';
                pin.id = `pin-${i}`;
                pin.style.top = pos.top;
                pin.style.left = pos.left;
                pin.style.transform = `translateX(-50%) scale(${pos.scale})`;
                pin.innerHTML = svgPin;
                area.appendChild(pin);
            });

            resetBallAndAim();

            state.bowlingTimer = setInterval(() => {
                state.bowlingTime--;
                document.getElementById('bowling-timer').innerText = state.bowlingTime;
                if(state.bowlingTime <= 0) {
                    clearInterval(state.bowlingTimer);
                    clearInterval(aimInterval);
                    showGameOver();
                }
            }, 1000);
        }

        function resetBallAndAim() {
            const ball = document.getElementById('bowling-ball');
            ball.style.transition = 'none'; 
            ball.style.bottom = '10px';
            ball.style.left = '50%';
            ball.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
            ball.style.opacity = '1';
            
            void ball.offsetWidth; // Reflow
            ball.style.transition = 'bottom 0.7s cubic-bezier(0.3, 0, 0.2, 1), left 0.7s linear, transform 0.7s cubic-bezier(0.3, 0, 0.2, 1), opacity 0.7s';

            state.bowlingActive = true;
            aimPos = 0;
            aimDirection = 1;
            const cursor = document.getElementById('aim-cursor');
            clearInterval(aimInterval);
            aimInterval = setInterval(() => {
                aimPos += 0.05 * aimDirection;
                if(aimPos >= 1) { aimPos = 1; aimDirection = -1; }
                if(aimPos <= -1) { aimPos = -1; aimDirection = 1; }
                cursor.style.left = `${(aimPos + 1) / 2 * 100}%`;
            }, 20);
        }

        function throwBall() {
            if (!state.bowlingActive) return;
            state.bowlingActive = false;
            clearInterval(aimInterval);
            
            const ball = document.getElementById('bowling-ball');
            playRollingSound();

            const accuracy = Math.abs(aimPos);
            const endX = 50 + (aimPos * 30); 
            ball.style.bottom = '80%';
            ball.style.left = `${endX}%`;
            ball.style.transform = 'translateX(-50%) scale(0.35) rotateZ(720deg)';
            
            setTimeout(() => {
                if (rollingSoundNode) {
                    rollingSoundNode.gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    rollingSoundNode.stop(audioCtx.currentTime + 0.1);
                }
                
                let hitAny = false;
                let pinsToFall = [];
                
                state.pinsStatus.forEach((isStanding, idx) => {
                    if(!isStanding) return;
                    let prob = 0;
                    if (accuracy < 0.15) prob = 1.0; 
                    else if (accuracy < 0.4) prob = 0.6;
                    else if (accuracy < 0.7) prob = 0.3;
                    else prob = 0.1;
                    
                    if(Math.random() < prob) {
                        pinsToFall.push(idx);
                        state.pinsStatus[idx] = false;
                        hitAny = true;
                    }
                });

                if(hitAny) {
                    playWoodCrashSound();
                    state.score += (pinsToFall.length * 2);
                    updateUI();
                }
                
                pinsToFall.forEach(idx => {
                    const pin = document.getElementById(`pin-${idx}`);
                    if (pin) {
                        const explodeX = (Math.random() - 0.5) * 200;
                        const explodeY = -(Math.random() * 100 + 50); 
                        const spin = (Math.random() - 0.5) * 360;
                        pin.style.transform = `translateX(calc(-50% + ${explodeX}px)) translateY(${explodeY}px) rotateZ(${spin}deg) scale(0.5)`;
                        pin.style.opacity = '0';
                    }
                });
                
                ball.style.opacity = '0';
                
                const allDown = state.pinsStatus.every(s => !s);
                
                setTimeout(() => {
                    if(allDown) {
                        document.getElementById('strike-text').classList.remove('hidden');
                        document.getElementById('strike-text').classList.add('pop-in');
                        state.score += 50; 
                        clearInterval(state.bowlingTimer);
                        setTimeout(showGameOver, 2000);
                    } else if(state.bowlingTime > 0) {
                        resetBallAndAim();
                    }
                }, 1000);
            }, 700); 
        }

        // --- END GAME ---
        let fwInterval;
        function showGameOver() {
            changeScreen('screen-end');
            document.getElementById('final-score').innerText = state.score;
            triggerFireworks(); 
            fwInterval = setInterval(triggerFireworks, 2500); 
        }

        // --- FIREWORKS ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeFw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeFw);
        resizeFw();

        function animateFw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.alpha -= 0.02; 
                ctx.save(); 
                ctx.globalAlpha = Math.max(0, p.alpha); 
                ctx.fillStyle = p.color; 
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); 
                ctx.restore();
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateFw);
        }
        animateFw();

        function triggerFireworks() {
            const colors = ['#fde047', '#38bdf8', '#f43f5e', '#4ade80', '#c084fc', '#fb923c'];
            for(let i=0; i<4; i++) { 
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * (canvas.height * 0.5); 
                    const color = colors[Math.floor(Math.random()*colors.length)];
                    for(let j=0; j<35; j++) {
                        particles.push({ 
                            x, y, 
                            vx: Math.cos(j)*Math.random()*10, 
                            vy: Math.sin(j)*Math.random()*10, 
                            color, 
                            alpha: 1,
                            size: Math.random() * 4 + 3 
                        });
                    }
                }, i * 250);
            }
        }

        function triggerSmallFireworks() {
            const colors = ['#fde047', '#38bdf8', '#f43f5e', '#4ade80'];
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const color = colors[Math.floor(Math.random()*colors.length)];
            for(let j=0; j<25; j++) {
                particles.push({ 
                    x, y, 
                    vx: Math.cos(j)*Math.random()*8, 
                    vy: Math.sin(j)*Math.random()*8, 
                    color, 
                    alpha: 1,
                    size: Math.random() * 4 + 2
                });
            }
        }
    </script>
</body>
