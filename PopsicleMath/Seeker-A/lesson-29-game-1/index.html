<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../assets/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Racing Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
            user-select: none;
            background-color: #1a1a1a;
        }

        /* --- ROAD & TRACK IMPROVED --- */
        .track-container {
            background-color: #2d5a27; /* Grass color */
            position: relative;
            overflow: hidden;
            border-top: 8px solid #14532d;
            border-bottom: 8px solid #14532d;
        }

        .road {
            background-color: #334155;
            height: 100%;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .road::before, .road::after {
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 15px;
            background: repeating-linear-gradient(90deg, #ef4444 0, #ef4444 40px, #ffffff 40px, #ffffff 80px);
            z-index: 5;
        }
        .road::before { top: 0; }
        .road::after { bottom: 0; }

        .lane-divider {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            border-top: 4px dashed rgba(255, 255, 255, 0.4);
            transform: translateY(-50%);
        }

        .finish-line {
            background: repeating-linear-gradient(
                0deg,
                #000000 0,
                #000000 20px,
                #ffffff 20px,
                #ffffff 40px
            );
            width: 40px;
            height: 100%;
            position: absolute;
            right: 100px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }

        /* --- CARS --- */
        .car-svg {
            width: 100px;
            height: 50px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* --- SKY & BACKGROUND --- */
        .sky-bg {
            background: linear-gradient(to bottom, #0ea5e9 0%, #38bdf8 60%, #bae6fd 100%);
        }

        .sun {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: #fde047;
            border-radius: 50%;
            box-shadow: 0 0 50px #facc15;
        }

        /* --- ANIMATIONS --- */
        .vroom {
            animation: vroom-shake 0.4s ease-in-out;
        }
        @keyframes vroom-shake {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) translateX(5px); }
        }

        .smoke {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(200, 200, 200, 0.8);
            border-radius: 50%;
            animation: smoke-anim 0.8s forwards;
        }
        @keyframes smoke-anim {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            100% { transform: scale(2) translateY(-40px); opacity: 0; }
        }

        .pop-in { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* UI Buttons Styling */
        .config-btn {
            transition: all 0.2s;
            background-color: #f1f5f9;
            border: 2px solid #e2e8f0;
        }
        .config-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 60;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col items-center relative text-slate-800">
    <!-- Background Decor -->
    <img src="../assets/logo-oodles-math.png" class="oodles-logo">
    <div class="absolute inset-0 sky-bg -z-10">
        <div class="sun"></div>
    </div>

    <!-- Game Header -->
    <header class="w-full p-4 flex justify-between items-center z-10 max-w-6xl">
        <div class="bg-white/90 backdrop-blur rounded-2xl px-6 py-2 border-4 border-blue-400 shadow-xl">
            <span class="text-2xl font-bold text-blue-600">⏱️ <span id="timer">00:00</span></span>
        </div>
        <div class="flex gap-4">
            <div id="scoreBoard" class="hidden bg-white/90 rounded-2xl px-6 py-2 border-4 border-green-400 shadow-xl">
                <span class="text-xl font-bold text-slate-700">P1: <span id="p1ScoreVal" class="text-blue-600">0</span> | P2: <span id="p2ScoreVal" class="text-red-600">0</span></span>
            </div>
            <button id="muteBtn" class="bg-white p-3 rounded-full shadow-lg border-2 border-slate-200 text-xl">🔊</button>
        </div>
    </header>

    <!-- Start Screen -->
    <div id="startScreen" class="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-8 max-w-lg w-[95%] text-center shadow-2xl border-[12px] border-blue-500 pop-in">
            <h1 class="text-5xl font-black text-blue-600 mb-1 italic tracking-tighter">MATH RACING</h1>
            <p class="text-slate-500 font-medium mb-6">Race to the finish with your math skills!</p>
            
            <!-- Operation Selector -->
            <div class="mb-6">
                <p class="text-slate-700 font-bold mb-3 uppercase text-xs tracking-widest">Select Operation:</p>
                <div class="grid grid-cols-3 gap-2">
                    <button class="config-btn op-btn py-2 rounded-xl font-bold active" data-op="plus">Add (+)</button>
                    <button class="config-btn op-btn py-2 rounded-xl font-bold" data-op="minus">Sub (-)</button>
                    <button class="config-btn op-btn py-2 rounded-xl font-bold" data-op="mixed">Mixed</button>
                </div>
            </div>

            <!-- Math Range Selector -->
            <div class="mb-6">
                <p class="text-slate-700 font-bold mb-3 uppercase text-xs tracking-widest">Math Range:</p>
                <div id="rangeOptions" class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                    <button class="config-btn range-btn py-2 rounded-xl font-bold" data-val="5">5</button>
                    <button class="config-btn range-btn py-2 rounded-xl font-bold active" data-val="10">10</button>
                    <button class="config-btn range-btn py-2 rounded-xl font-bold" data-val="20">20</button>
                    <button class="config-btn range-btn py-2 rounded-xl font-bold" data-val="30">30</button>
                    <button class="config-btn range-btn py-2 rounded-xl font-bold" data-val="50">50</button>
                    <button class="config-btn range-btn py-2 rounded-xl font-bold" data-val="100">100</button>
                </div>
            </div>

            <!-- Time Selector -->
            <div class="mb-8 bg-blue-50 p-4 rounded-2xl border-2 border-blue-100">
                <label class="block text-blue-700 mb-2 font-bold text-sm">Race Duration:</label>
                <div class="flex items-center gap-4">
                    <input type="range" id="timeSlider" min="1" max="10" value="3" class="w-full h-3 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                    <span id="timeDisplay" class="font-black text-2xl text-blue-600 min-w-[3ch]">3m</span>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="startGame('cpu')" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl font-black py-4 rounded-2xl shadow-[0_6px_0_#15803d] transition-all active:translate-y-1 active:shadow-none">
                    VS CPU 🤖
                </button>
                <button onclick="startGame('pvp')" class="w-full bg-orange-500 hover:bg-orange-600 text-white text-2xl font-black py-4 rounded-2xl shadow-[0_6px_0_#c2410c] transition-all active:translate-y-1 active:shadow-none">
                    2 PLAYERS 👤👤
                </button>
            </div>
        </div>
    </div>

    <!-- Main Game Area -->
    <main class="w-full max-w-6xl flex-1 flex flex-col justify-between py-4 z-0">
        
        <!-- Improved Track -->
        <div class="track-container w-full h-64 sm:h-80 rounded-[3rem] shadow-2xl overflow-hidden mb-6">
            <div class="road">
                <div class="finish-line"></div>
                <div class="lane-divider"></div>
                
                <!-- Player 1 Lane -->
                <div class="h-1/2 relative flex items-center px-4">
                    <div id="p1Container" class="absolute transition-all duration-700 ease-out" style="left: 20px;">
                        <div id="p1SmokeContainer"></div>
                        <svg class="car-svg p1-car-body vroom" viewBox="0 0 100 50">
                            <rect x="10" y="10" width="80" height="30" rx="10" fill="#2563eb" />
                            <rect x="25" y="5" width="40" height="20" rx="5" fill="#93c5fd" />
                            <circle cx="25" cy="40" r="8" fill="#1e293b" />
                            <circle cx="75" cy="40" r="8" fill="#1e293b" />
                            <rect x="85" y="15" width="10" height="5" fill="#fde047" />
                        </svg>
                        <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow">P1</div>
                    </div>
                </div>

                <!-- Player 2 Lane -->
                <div class="h-1/2 relative flex items-center px-4">
                    <div id="p2Container" class="absolute transition-all duration-700 ease-out" style="left: 20px;">
                        <div id="p2SmokeContainer"></div>
                        <svg class="car-svg p2-car-body vroom" viewBox="0 0 100 50">
                            <rect x="10" y="10" width="80" height="30" rx="10" fill="#dc2626" />
                            <rect x="25" y="5" width="40" height="20" rx="5" fill="#fca5a5" />
                            <circle cx="25" cy="40" r="8" fill="#1e293b" />
                            <circle cx="75" cy="40" r="8" fill="#1e293b" />
                            <rect x="85" y="15" width="10" height="5" fill="#fde047" />
                        </svg>
                        <div id="p2Tag" class="absolute -top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow">P2</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Area -->
        <div id="controlPanel" class="flex-1 flex gap-4 min-h-0 px-2">
            <!-- P1 Side -->
            <div id="p1Side" class="flex-1 bg-white/80 backdrop-blur rounded-[2.5rem] p-4 flex flex-col items-center justify-center relative shadow-xl border-4 border-blue-200">
                <div id="p1Penalty" class="hidden absolute inset-0 bg-slate-900/90 rounded-[2.5rem] z-50 flex flex-col items-center justify-center text-white">
                    <div class="text-5xl mb-2">🚨</div>
                    <div class="text-2xl font-black text-red-400">ENGINE STALLED!</div>
                    <div class="text-4xl font-black mt-2"><span id="p1PenaltyTimer">5</span>s</div>
                </div>
                
                <p class="text-blue-600 font-bold uppercase tracking-widest text-xs mb-2">P1 Equation</p>
                <div class="text-5xl sm:text-7xl font-black text-slate-800 bg-white border-4 border-blue-100 rounded-3xl px-8 py-4 shadow-inner mb-6">
                    <span id="p1N1">0</span> <span id="p1Op" class="text-blue-500">+</span> <span id="p1N2">0</span>
                </div>
                <div id="p1Grid" class="grid grid-cols-2 gap-3 w-full max-w-md"></div>
            </div>

            <!-- P2 Side -->
            <div id="p2Side" class="hidden flex-1 bg-white/80 backdrop-blur rounded-[2.5rem] p-4 flex flex-col items-center justify-center relative shadow-xl border-4 border-red-200">
                <div id="p2Penalty" class="hidden absolute inset-0 bg-slate-900/90 rounded-[2.5rem] z-50 flex flex-col items-center justify-center text-white">
                    <div class="text-5xl mb-2">🚨</div>
                    <div class="text-2xl font-black text-red-400">ENGINE STALLED!</div>
                    <div class="text-4xl font-black mt-2"><span id="p2PenaltyTimer">5</span>s</div>
                </div>

                <p class="text-red-600 font-bold uppercase tracking-widest text-xs mb-2">P2 Equation</p>
                <div class="text-5xl sm:text-7xl font-black text-slate-800 bg-white border-4 border-red-100 rounded-3xl px-8 py-4 shadow-inner mb-6">
                    <span id="p2N1">0</span> <span id="p2Op" class="text-red-500">+</span> <span id="p2N2">0</span>
                </div>
                <div id="p2Grid" class="grid grid-cols-2 gap-3 w-full max-w-md"></div>
            </div>
        </div>
    </main>

    <!-- Game Over Screen -->
    <div id="gameOver" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-10 max-w-md w-[90%] text-center shadow-2xl border-[12px] border-yellow-400 pop-in">
            <div class="text-8xl mb-4">🏆</div>
            <h2 id="winnerTitle" class="text-4xl font-black text-slate-800 mb-2">VICTORY!</h2>
            <p id="winnerSub" class="text-slate-500 mb-8 font-medium">You are the fastest racer!</p>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white text-2xl font-black py-4 rounded-2xl shadow-[0_6px_0_#1e40af] active:translate-y-1 active:shadow-none transition-all">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <canvas id="fireworksCanvas"></canvas>

    <script>
        // --- State ---
        let config = {
            range: 10,
            mode: 'cpu',
            operation: 'plus', // plus, minus, mixed
            timeLeft: 180,
            isMuted: false,
            goal: 20
        };

        let state = {
            p1Score: 0,
            p2Score: 0,
            isActive: false,
            p1Problem: {},
            p2Problem: {},
            timers: { game: null, cpu: null, p1P: null, p2P: null }
        };

        // --- Audio ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (config.isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'win') {
                osc.type = 'triangle';
                [523, 659, 783, 1046].forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, now + i*0.1);
                });
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        // --- UI Setup ---
        const rangeBtns = document.querySelectorAll('.range-btn');
        rangeBtns.forEach(btn => {
            btn.onclick = () => {
                rangeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                config.range = parseInt(btn.dataset.val);
            };
        });

        const opBtns = document.querySelectorAll('.op-btn');
        opBtns.forEach(btn => {
            btn.onclick = () => {
                opBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                config.operation = btn.dataset.op;
            };
        });

        document.getElementById('timeSlider').oninput = (e) => {
            document.getElementById('timeDisplay').innerText = e.target.value + 'm';
            config.timeLeft = e.target.value * 60;
        };

        document.getElementById('muteBtn').onclick = (e) => {
            config.isMuted = !config.isMuted;
            e.target.innerText = config.isMuted ? '🔇' : '🔊';
        };

        // --- Game Logic ---
        function startGame(mode) {
            config.mode = mode;
            state.isActive = true;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('scoreBoard').classList.remove('hidden');

            if (mode === 'pvp') {
                document.getElementById('p2Side').classList.remove('hidden');
            } else {
                startCPULogic();
            }

            updateTimerUI();
            state.timers.game = setInterval(tick, 1000);
            
            generateProblem('p1');
            if (mode === 'pvp') generateProblem('p2');
        }

        function tick() {
            if (!state.isActive) return;
            config.timeLeft--;
            updateTimerUI();
            if (config.timeLeft <= 0) endGame('draw');
        }

        function updateTimerUI() {
            const m = Math.floor(config.timeLeft / 60).toString().padStart(2, '0');
            const s = (config.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        function generateProblem(player) {
            let isAdd;
            if (config.operation === 'plus') isAdd = true;
            else if (config.operation === 'minus') isAdd = false;
            else isAdd = Math.random() > 0.5;

            let n1, n2, ans, op;
            const r = config.range;

            if (isAdd) {
                ans = Math.floor(Math.random() * (r + 1));
                n1 = Math.floor(Math.random() * (ans + 1));
                n2 = ans - n1;
                op = '+';
            } else {
                n1 = Math.floor(Math.random() * (r + 1));
                // To avoid negative results and ensure the minuend is at least 1 if range is small
                n2 = Math.floor(Math.random() * (n1 + 1));
                ans = n1 - n2;
                op = '-';
            }

            const problem = { n1, n2, op, ans };
            const options = generateOptions(ans);

            if (player === 'p1') {
                state.p1Problem = problem;
                document.getElementById('p1N1').innerText = n1;
                document.getElementById('p1N2').innerText = n2;
                document.getElementById('p1Op').innerText = op;
                renderGrid('p1Grid', options, 'p1');
            } else {
                state.p2Problem = problem;
                document.getElementById('p2N1').innerText = n1;
                document.getElementById('p2N2').innerText = n2;
                document.getElementById('p2Op').innerText = op;
                renderGrid('p2Grid', options, 'p2');
            }
        }

        function generateOptions(correct) {
            let opts = [correct];
            while (opts.length < 4) {
                let offset = Math.floor(Math.random() * 5) + 1;
                let fake = Math.random() > 0.5 ? correct + offset : correct - offset;
                if (fake >= 0 && !opts.includes(fake)) opts.push(fake);
            }
            return opts.sort(() => Math.random() - 0.5);
        }

        function renderGrid(id, opts, player) {
            const grid = document.getElementById(id);
            grid.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-b-4 border-slate-200 py-4 rounded-2xl text-2xl font-black text-slate-700 hover:bg-slate-50 active:translate-y-1 active:border-b-0 transition-all shadow-md";
                btn.innerText = o;
                btn.onclick = () => checkAnswer(o, player);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(val, player) {
            const prob = player === 'p1' ? state.p1Problem : state.p2Problem;
            if (val === prob.ans) {
                playSound('correct');
                if (player === 'p1') {
                    state.p1Score++;
                    moveCar('p1', state.p1Score);
                    generateProblem('p1');
                } else {
                    state.p2Score++;
                    moveCar('p2', state.p2Score);
                    generateProblem('p2');
                }
                updateScoreUI();
                checkWin();
            } else {
                playSound('wrong');
                triggerPenalty(player);
            }
        }

        function moveCar(player, score) {
            const container = document.getElementById(`${player}Container`);
            const trackWidth = document.querySelector('.road').offsetWidth;
            const progress = Math.min(score / config.goal, 1);
            const left = 20 + (progress * (trackWidth - 180));
            container.style.left = left + 'px';
            
            const car = container.querySelector('.car-svg');
            car.classList.remove('vroom');
            void car.offsetWidth; 
            car.classList.add('vroom');
        }

        function triggerPenalty(player) {
            const overlay = document.getElementById(`${player}Penalty`);
            const timerText = document.getElementById(`${player}PenaltyTimer`);
            overlay.classList.remove('hidden');
            createSmoke(player);

            let s = 5;
            timerText.innerText = s;
            const int = setInterval(() => {
                s--;
                timerText.innerText = s;
                if (s <= 0) {
                    clearInterval(int);
                    overlay.classList.add('hidden');
                    generateProblem(player);
                }
            }, 1000);
        }

        function createSmoke(player) {
            const container = document.getElementById(`${player}SmokeContainer`);
            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    const smoke = document.createElement('div');
                    smoke.className = 'smoke';
                    smoke.style.left = '10px';
                    container.appendChild(smoke);
                    setTimeout(() => smoke.remove(), 800);
                }, i * 150);
            }
        }

        function startCPULogic() {
            const tickCPU = () => {
                if (!state.isActive) return;
                const delay = 2000 + (Math.random() * 3000) + (config.range * 15);
                state.timers.cpu = setTimeout(() => {
                    if (state.isActive) {
                        state.p2Score++;
                        moveCar('p2', state.p2Score);
                        updateScoreUI();
                        checkWin();
                        tickCPU();
                    }
                }, delay);
            };
            tickCPU();
        }

        function updateScoreUI() {
            document.getElementById('p1ScoreVal').innerText = state.p1Score;
            document.getElementById('p2ScoreVal').innerText = state.p2Score;
        }

        function checkWin() {
            if (state.p1Score >= config.goal) endGame('p1');
            else if (state.p2Score >= config.goal) endGame('p2');
        }

        function endGame(winner) {
            state.isActive = false;
            clearInterval(state.timers.game);
            clearTimeout(state.timers.cpu);
            
            document.getElementById('gameOver').classList.remove('hidden');
            const title = document.getElementById('winnerTitle');

            if (winner === 'p1') {
                title.innerText = "PLAYER 1 WINS!";
                title.className = "text-4xl font-black text-blue-600 mb-2";
                playSound('win');
                startFireworks();
            } else if (winner === 'p2') {
                title.innerText = config.mode === 'cpu' ? "CPU WINS!" : "PLAYER 2 WINS!";
                title.className = "text-4xl font-black text-red-600 mb-2";
                playSound('win');
            } else {
                title.innerText = "IT'S A DRAW!";
            }
        }

        // --- Fireworks Animation ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function startFireworks() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            animateFireworks();
        }

        function animateFireworks() {
            if (document.getElementById('gameOver').classList.contains('hidden')) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (Math.random() < 0.1) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height / 2;
                const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                for(let i=0; i<30; i++) {
                    particles.push({
                        x, y,
                        vx: Math.cos(i) * Math.random() * 5,
                        vy: Math.sin(i) * Math.random() * 5,
                        life: 1,
                        color
                    });
                }
            }

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= 0.01;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                if (p.life <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animateFireworks);
        }
    </script>
</body>
</html>
